# Recommender agent chat task. Requires Harbor runtime plus host API keys:
#   export OPENAI_API_KEY=...
#   export ANTHROPIC_API_KEY=...
job_name: appSim-recommender-agent-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-claude-code
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-2000/persona_0042.yaml

tasks:
  - path: application/tasks/recommender-agent_chat_api
