# Persona bench sampling + verifier probe for this task.
# Job generator (generate_persona_job.py) reads this file from the task directory.

probe_dimension = "dimensions.economic_motivation"

[confounders.socioeconomic_band]
value = "Middle"
rationale = "Income band directly shifts price acceptability on billing and overall pricing items (q2, q3, q6); extremes pull toward premium or cost-sensitive MCQs independent of spending posture."
affects_questions = ["q2", "q3", "q6"]

[confounders.age_bracket]
value = "25-34"
rationale = "Teens vs adults differ on subscriptions and promos (q0, q3); mid-adult band reduces life-stage confounding with the probe."
affects_questions = ["q0", "q3"]

[confounders.risk_tolerance]
value = "Balanced"
rationale = "Extreme risk appetite skews annual prepay and promo uptake (q2, q3) without reflecting economic_motivation alone."
affects_questions = ["q2", "q3"]

[confounders.tech_savviness]
value = "Comfortable"
rationale = "Very low or avoidant tech comfort changes willingness to try paid tiers (q0, q1) separately from spending posture."
affects_questions = ["q0", "q1"]
