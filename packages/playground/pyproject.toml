[project]
name = "playground"
version = "0.1.0"
description = "Playground core runner, scoring, persona, and user-simulation library."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0.2",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
playground = ["user_sim/*.md"]
