[project]
name = "matraix"
version = "0.1.0"
description = "MatrAIx extensions for Harbor (persona agents, reporting hooks)"
requires-python = ">=3.12"
dependencies = [
    "harbor",
    "pyyaml>=6.0.2",
]

[build-system]
requires = ["uv_build>=0.8.4,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "matraix"
module-root = "src"

[tool.uv.sources]
harbor = { workspace = true }
