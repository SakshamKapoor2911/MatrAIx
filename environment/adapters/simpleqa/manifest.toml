schema_version = "1.0"
name = "simpleqa"
status = "experimental"
target_path = "environment/adapters/simpleqa"
source_repository = "MatrAIx-ai/MatrAIx"
source_path = "adapters/simpleqa"
source_commit = "e50592a4cbfca86b3207e1f9d5247ca9f93ee4d0"
owner = "Issa Sugiura (sugiura.issa.q29@kyoto-u.jp)"
package_name = "harbor-simpleqa-adapter"
python_package = "simpleqa"
generated_output = "environment/adapters/simpleqa/_generated/"

smoke_commands = [
    "python -m pip install -e environment/adapters/simpleqa",
    "simpleqa --output-dir environment/adapters/simpleqa/_generated/simpleqa --limit 1 --overwrite",
]

required_external_data = [
    "https://openaipublic.blob.core.windows.net/simple-evals/simple_qa_test_set.csv",
]

required_credentials = [
    "OPENAI_API_KEY for LLM judge/runtime evaluation; not required for metadata validation.",
]

excluded_source_paths = [
    "adapters/simpleqa/uv.lock",
]
