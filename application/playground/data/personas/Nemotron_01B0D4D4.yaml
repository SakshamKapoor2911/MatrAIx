    leadership'', ''stakeholder communication'', ''financial compliance'', ''fintech
    integration'']'
  hobbies: '[''gardening'', ''Southeast Asian cooking'', ''reading historical fiction'',
    ''reading economics and technology non‑fiction'', ''hiking'', ''yoga'', ''mindfulness
    meditation'', ''volunteering for financial‑literacy workshops'', ''exploring personal
    finance software'']'
  career_goals: Hanh aims to transition into a senior executive role, such as Chief
    Financial Officer, where she can drive digital transformation of financial operations
    and champion sustainable finance initiatives within a mid‑size enterprise. She
    plans to obtain a CFA designation and deepen her proficiency in blockchain‑based
    accounting to stay ahead of industry trends. Beyond title advancement, she is
    committed to mentoring emerging female finance professionals and establishing
    flexible work policies that reflect her belief in adaptable, results‑focused environments.
    In the longer term, Hanh envisions leveraging her expertise to consult for nonprofit
    organizations in her community, helping them achieve fiscal stability while maintaining
    a balanced personal life.
