personas:
  professional: Financial manager Hanh Gunasekara, with fifteen years of corporate
    finance expertise and advanced command of Excel, SAP, Oracle, Power BI and Tableau,
    channels a relaxed, flexible planning style and a competitive drive into leading
    cross‑functional teams to pioneer digital transformation and sustainable finance
    initiatives for future C‑suite leadership.
  sports: Hanh Gunasekara pursues low‑key fitness through weekly hikes with the Harford
    County Hiking Club, follows the Baltimore Ravens for football thrills and the
    Orioles for baseball, complements the routine with gentle yoga and occasional
    casual softball games with a small circle of friends, embodying a relaxed yet
    consistent commitment to staying active.
  arts: With a quiet passion for literary and musical immersion, Hanh Gunasekara devotes
    evenings to reading Ken Follett’s sweeping historical novels and listening to
    Yo‑Yo Ma’s cello masterpieces, regularly attends performances by the Baltimore
    Symphony Orchestra, and occasionally enjoys thought‑provoking films by director
    Chloe Zhao, letting artistic experiences balance their analytical professional
    life.
  travel: Preferring meticulously curated yet adaptable itineraries, Hanh Gunasekara
    explores culturally rich locales such as the historic town of Hoi An, the bustling
    markets of Chiang Mai, and the serene rice terraces of Ubud, while also savoring
    short weekend getaways to the Chesapeake Bay for kayaking and to Napa Valley for
    wine tasting, all while balancing executive responsibilities.
  culinary: An adept home chef, Hanh Gunasekara transforms fresh garden herbs like
    cilantro, Thai basil, and lemongrass into aromatic bánh chưng and fragrant phở
    broth while inventively fusing flavors in dishes such as lemongrass‑marinated
    salmon with quinoa spring rolls, and occasionally indulges in upscale farm‑to‑table
    experiences to refine their culinary repertoire.
  core: Hanh Gunasekara is a financially savvy, tech‑curious executive who thrives
    on solitary reflection, grapples with occasional disorganization, and secretly
    hoards vintage kitchen gadgets like an eccentric comfort collection.
background:
  cultural: Hanh was born to parents who emigrated from Vietnam, and her family retains
    many cultural traditions from that heritage while also embracing broader Southeast
    Asian influences. She grew up celebrating Tet (Lunar New Year) with family gatherings,
    preparing dishes such as bánh chưng and phở, and observing customs that emphasize
    respect for elders and communal solidarity. Bilingual in English and Vietnamese,
    she maintains a connection to her roots through language, cuisine, and community
    events at the local Vietnamese cultural center. Her Southeast Asian background
    informs her work ethic—valuing diligence, adaptability, and a balanced view of
    individual achievement within a collective context—and enriches her perspective
    on global financial markets. While married and residing in Bel Air, Maryland,
    she blends these cultural values with the diverse experiences of her American
    life, fostering a nuanced identity that honors both her heritage and her professional
    ambitions.
attributes:
  skills: '[''financial analysis'', ''budget forecasting'', ''cash‑flow management'',
