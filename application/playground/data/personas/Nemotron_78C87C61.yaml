personas:
  professional: Kerri Wilson, a veteran EMT with 25 years of rapid patient assessment,
    trauma triage, and crisis communication expertise, channels her curiosity and
    competitive drive into mentoring new responders and shaping future EMS policies
    while balancing meticulous organization with flexible on‑scene problem‑solving.
  sports: Kerri Wilson embraces a mix of low‑impact fitness, regularly joining a Fort
    Lauderdale beach‑walk club, hiking the Everglades Trails, and cheering for the
    Miami Heat and Miami Dolphins, while occasionally participating in community yoga
    sessions to maintain flexibility.
  arts: Kerri Wilson, an avid acrylic painter and coastal photographer, draws inspiration
    from the works of Kehinde Wiley and the jazz sounds of Miles Davis and Etta James,
    often attending live performances at the Broward Center for the Performing Arts
    and curating personal photo exhibitions of sunrise cityscapes.
  travel: Kerri Wilson prefers thoughtfully planned yet spontaneous escapes, favoring
    Caribbean island hops to Jamaica and the Bahamas for cultural festivals, weekend
    road trips to Savannah’s historic district, and annual pilgrimages to the Everglades
    National Park for nature photography.
  culinary: Kerri Wilson enjoys experimenting in the kitchen with dishes like jerk
    chicken, collard‑greens‑and‑ham stew, and sweet‑potato pie, skillfully balancing
    a moderate cooking proficiency with a pantry stocked with scotch bonnet peppers,
    smoked paprika, and fresh okra.
  core: Kerri Wilson blends seasoned emergency‑care expertise with a relentless curiosity
    for art and community service, navigating life with disciplined organization,
    a competitive edge, and a healthy dose of skeptical introspection.
background:
  cultural: Kerri's cultural background is rooted in African American traditions of
    the Southern United States, with family origins in Georgia and a deep connection
    to the Black community of Broward County. Growing up, she was immersed in church
    music, community gatherings, and narratives of resilience that shaped her commitment
    to service. Living in the multicultural environment of Fort Lauderdale has also
    exposed her to Caribbean influences, particularly Haitian and Jamaican cultures,
    reflected in her food, music, and social circles. As a Black woman in emergency
    medical services, Kerri is acutely aware of health disparities affecting her community
    and is driven to advocate for equity and culturally competent care.
attributes:
  skills: '["Emergency medical care", "Advanced cardiac life support (ACLS) basics",
    "Trauma assessment and triage", "CPR and AED operation", "Patient transport coordination",
    "Crisis communication", "Incident command system coordination", "Community health
    education", "Basic Spanish medical terminology", "Medical equipment maintenance"]'
  hobbies: '["Visiting local art galleries and museums", "Painting with acrylics",
    "Photography of cityscapes and nature", "Reading contemporary fiction and non-fiction",
    "Attending live music events, especially jazz and R&B", "Cooking and exploring
    Caribbean and Southern cuisines", "Volunteering at community health fairs", "Hiking
    and beach walks", "Participating in local theater workshops", "Learning basic
    Spanish phrases"]'
  career_goals: Kerri aims to transition into a supervisory and training role within
    the Broward County EMS system. She plans to become a certified EMS instructor,
    develop and lead community outreach programs that blend health education with
    the arts, and advocate for policies that address health disparities affecting
    Black communities. Over the next few years, she hopes to obtain paramedic certification
    to broaden her clinical capabilities and eventually take on a leadership position
    as a field training officer or EMS program manager, where she can mentor the next
    generation of responders and influence emergency care standards.
