personas:
  professional: Ellias Chand, a retired woodworker and beadwork artisan, channels
    their deep knowledge of traditional storytelling and hands‑on crafts into community
    workshops, informal conflict mediation, and mentoring younger artists, balancing
    a relaxed, flexible approach with a fierce commitment to cultural preservation,
    and they often improvise solutions when plans go awry.
  sports: Ellias Chand enjoys early‑morning birdwatching in the Montana plains, walks
    the local river trail three times weekly, supports the Billings Mustangs minor‑league
    baseball team, and they participate in a casual senior walking club, viewing fitness
    as a gentle, social ritual rather than a regimented workout.
  arts: Ellias Chand paints sweeping Montana prairie landscapes, crafts beadwork jewelry
    inspired by traditional motifs, builds wooden bowls, attends regional art fairs
    and cultural festivals, and they find solace in folk music from Bob Dylan, Gillian
    Welch, and The Chieftains, letting these sounds shape the rhythm of their creative
    process.
  travel: Ellias Chand plans trips that blend quiet nature retreats with cultural
    immersion, having explored Yellowstone's geysers, Banff’s turquoise lakes, and
    Santa Fe’s historic plaza, while they dream of a future pilgrimage to the Canadian
    Rockies’ remote valleys when health permits.
  culinary: Ellias Chand favors farm‑to‑table meals, regularly whips up roasted root‑vegetable
    soup with heirloom carrots, potatoes, and sage, bakes sourdough bread using a
    starter nurtured for years, and they delight in wild berry jam made from locally
    foraged huckleberries.
  core: Ellias Chand is a compassionate, slightly disorganized elder who melds art,
    gardening, and storytelling into community service, combats worry with meditation,
    and they live a modest, purpose‑driven life rich in tradition and quiet curiosity.
background:
  cultural: Ellias is a member of a local Plains tribe in eastern Montana, belonging
    to a community with deep roots in the region's Indigenous culture. He grew up
    immersed in tribal traditions, learning the significance of oral storytelling,
    seasonal ceremonies, and a profound respect for the land. His cultural identity
    is interwoven with the rhythms of rural life in Hill County, and he actively participates
    in community events such as powwows, drum circles, and tribal gatherings, while
    also fostering connections between his tribal community and the broader Havre
    population.
attributes:
  skills: '["Traditional oral storytelling", "Woodworking", "Beadwork", "Sustainable
    gardening", "Peer counseling", "Community mediation", "Basic first aid", "Improvisational
    problem solving"]'
  hobbies: '["Painting", "Beadwork", "Woodworking", "Gardening", "Folk and tribal
    music listening", "Attending art fairs and powwows", "Reading historical biographies",
    "Birdwatching", "Meditation", "Journaling"]'
  career_goals: Although retired from formal employment, Ellias remains driven to
    contribute to his community. He aims to become a recognized elder who mentors
    younger tribal members, preserving and teaching cultural stories, language, and
    crafts. He hopes to organize a seasonal intergenerational art and garden festival
    that celebrates both Native and local traditions. He also plans to write a memoir
    capturing his personal journey and the histories of his ancestors, and to expand
    his role as a volunteer mental-health advocate, offering informal counseling and
    stress-relief workshops for seniors in Havre.
