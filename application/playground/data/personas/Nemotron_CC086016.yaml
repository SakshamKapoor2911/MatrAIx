personas:
  professional: Trisha Wheeler, a diligent dental assistant adept at intra‑oral radiography,
    instrument sterilization, and patient coordination, leverages her curiosity and
    sociable nature to streamline workflows while her relaxed, slightly disorganized
    style often leads to improvised, quick‑fix solutions that keep the clinic humming.
  sports: Trisha Wheeler stays active by pitching for the Shawnee Valley Co‑ed Softball
    Club, sweating through weekly Zumba sessions at FitFusion Studio, and line‑dancing
    at the Riverbend Community Center, while cheering on the Chicago Cubs during baseball
    season and catching Bulls games whenever the team visits the local sports bar.
  arts: Trisha Wheeler unwinds by belting out karaoke hits from Ariana Grande and
    Beyoncé, curating movie nights featuring recent releases by directors like Greta
    Gerwig, and occasionally attending community theater productions of classic plays,
    all of which fuel her outgoing spirit and provide fresh material for the lively
    banter she shares with friends.
  travel: Trisha Wheeler prefers spontaneous weekend road trips, having already explored
    Nashville's live‑music scene and the Great Smoky Mountains, while dreaming of
    a spring backpacking adventure through Patagonia and a summer beach getaway to
    Cancun, balancing a modest travel budget with occasional splurges funded by gig
    earnings from karaoke events.
  culinary: Trisha Wheeler, an enthusiastic home cook, frequently whips up protein‑packed
    quinoa bowls with grilled chicken, black‑bean tacos topped with fresh cilantro
    and lime, and occasionally experiments with baked salmon drizzled in miso glaze,
    while still indulging in late‑night pizza slices with extra cheese during karaoke
    nights.
  core: Trisha Wheeler blends competitive drive with a carefree, slightly disorganized
    streak, turning every dental appointment, softball game, and karaoke showdown
    into a lively arena where curiosity meets spontaneous fun.
background:
  cultural: Trisha grew up in Hardin, a small town in Calhoun County, Illinois, within
    a predominantly white, Midwestern community that values practicality, neighborliness,
    and hard work. Her family has deep agricultural roots, with generations of farm
    and small‑business ownership. Raised in a Protestant (Methodist) household, she
    regularly attended church youth activities and community events such as the county
    fair and 4‑H projects. The local culture emphasizes self‑reliance, community involvement,
    and a down‑to‑earth outlook, which have shaped her pragmatic mindset and strong
    social ties.
attributes:
  skills: '[''Chairside assistance'', ''Intra‑oral radiography'', ''Instrument sterilization'',
    ''Dental materials preparation'', ''Patient education'', ''Dental software (Dentrix)'',
    ''Infection control'', ''Emergency assistance'', ''Office scheduling and billing'',
    ''Team communication'']'
  hobbies: '[''Softball league'', ''Zumba classes'', ''Line dancing'', ''Hiking'',
    ''Fishing'', ''Cooking experimental recipes'', ''Volunteering at health fairs'',
    ''Karaoke nights'', ''Movie gatherings'']'
  career_goals: Trisha aims to become a certified dental radiographer within the next
    year and eventually advance to a lead dental assistant role where she can mentor
    newer staff. She is also considering enrolling in a community college program
    to become a dental hygienist, which would allow her to provide direct patient
    care and broaden her clinical responsibilities. In the longer term, she hopes
    to leverage her practical experience and competitive drive to manage a dental
    practice, possibly opening a modern, community‑focused clinic in a larger town
    while still maintaining ties to her hometown.
