persona_description: A social scientist who is interested in the ethical implications
  of AI and its potential to harm individuals, particularly those who are vulnerable
  or marginalized. They are concerned about the lack of clear ethical guidelines for
  researchers using AI to solve societal problems and the potential for unintended
  harm. They are likely to be involved in ethical review processes and have expertise
  in data science, particularly in the context of AI research. They may also have
  a background in psychology and have concerns about the potential for AI to be used
  for surveillance or to discriminate against certain groups of people.
