  career_goals: Although retired, Michael aims to stay purposeful by mentoring younger
    apprentices in his community, completing a modest cabin‑renovation project on
    his property, and ensuring his family's financial affairs are well‑organized for
    future generations. He also hopes to volunteer regularly at the local historical
    society, preserving the heritage of Fairview and surrounding Multnomah County.
