personas:
  professional: A budding graphic design student and muralist, Zoila Pizano combines
    Adobe Illustrator expertise with a love for mixed‑media storytelling, channeling
    family traditions like Día de los Muertos into community workshops while balancing
    organized project timelines with spontaneous creative bursts, and they thrive
    on bilingual outreach that bridges local art scenes.
  sports: Zoila Pizano enjoys weekend hikes on the Franklin Mountains with a local
    photography club, follows the El Paso Locomotive FC soccer matches on TV, occasionally
    joins a community yoga class at a downtown studio, and they keep a modest collection
    of fitness sneakers for sprint drills on the university track.
  arts: Zoila Pizano spends her evenings sketching scenes inspired by Frida Kahlo’s
    symbolism and listening to indie electronica like Tycho, collects graphic novels
    such as 'Monstress' and 'Saga', and they regularly volunteer at the El Paso public
    library’s youth art program, where they curate pop‑up exhibitions featuring local
    muralists.
  travel: Zoila Pizano dreams of a summer residency in Oaxaca to study traditional
    embroidery, has already road‑tripped to Santa Fe for its art fairs, and they prefer
    low‑budget backpacking with a well‑planned itinerary that balances cultural immersion
    with Instagram‑worthy photo ops.
  culinary: Zoila Pizano loves cooking family‑style chiles rellenos with a quinoa
    filling, perfects homemade tamarind‑glazed fish tacos, and they often experiment
    by adding smoked chipotle to classic pozole, showcasing a palate that blends heritage
    flavors with modern twists.
  core: Zoila Pizano is a curious, bilingual art‑lover who balances meticulous planning
    with spontaneous creativity, often fueled by coffee, occasional procrastination,
    and a deep devotion to family traditions, and they channel that energy into community
    murals.
background:
  cultural: Zoila is a first‑generation Mexican‑American raised in El Paso, a city
    where U.S. and Mexican cultures intersect. Her upbringing blends Mexican family
    traditions—such as celebrating Día de los Muertos, preparing home‑cooked meals,
    and speaking Spanish at home—with the broader Texan environment, including bilingual
    schooling and exposure to border community art. She values the strong sense of
    family, community solidarity, and cultural pride rooted in her heritage while
    also embracing the diverse, multicultural atmosphere of the Southwest. This bicultural
    perspective informs her artistic expression and her commitment to bridging cultural
    narratives.
attributes:
  skills: '[''Digital illustration (Adobe Photoshop, Illustrator)'', ''Traditional
    drawing and mural painting'', ''Bilingual communication (English/Spanish)'', ''Event
    planning and workshop coordination'', ''Social media content creation'', ''Photography
    composition'', ''Team collaboration and project management'']'
  hobbies: '[''Sketching and painting (mixed media)'', ''Mural experimentation'',
    ''Visiting galleries and museums'', ''Photography of street and desert scenes'',
    ''Reading graphic novels and sci‑fi'', ''Listening to diverse music'', ''Cooking
    Mexican dishes with creative twists'', ''Yoga and mindfulness'', ''Participating
    in community art workshops'', ''Volunteering at youth art programs'']'
  career_goals: She aims to enroll in a community college art program, pursue an associate’s
    degree in graphic design or visual communication, and eventually earn a bachelor’s
    in museum studies or cultural arts management. Zoila dreams of becoming a multicultural
    arts educator or community outreach coordinator for a museum or nonprofit, using
    her artistic talents to promote Mexican-American heritage and foster inclusive
    creative spaces. In the longer term she envisions a freelance illustration career
    that allows flexibility to support her family and travel for artistic residencies.
