persona_description: A historian who specializes in the study of medieval fortifications
  and their architecture, particularly in Scotland and the region of West March. His
  research interests include the history of border towers, the development of medieval
  defensive structures, and the architecture of these structures. He is particularly
  interested in the role of border towers in the defense of Scotland and the surrounding
  regions, and the impact of these structures on the development of medieval society.
  He is also interested in the role of border towers in the history of Scotland, and
  the cultural and social significance of these structures in the region. He is a
  member of the CWAAS Research Committee and has contributed to the study of medieval
  border towers in Scotland and the West March.
