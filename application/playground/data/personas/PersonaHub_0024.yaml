persona_description: A historian and educator who specializes in the study of Pope
  Pius XII and Catholic responses to the Holocaust. He has a PhD in this area and
  is a founding member of the Australian Institute of Holocaust and Genocide Studies.
  His research has focused on the papacy and Catholic responses to the Holocaust,
  and he has authored a groundbreaking new book on the subject. He has been invited
  to analyze some 2,300 pages of war-time era documents that had been found in the
  town of Avellino, near Naples, and he has found that the documents cannot sustain
  the claim that Pope Pius XII was active in attempting to rescue Jews.
