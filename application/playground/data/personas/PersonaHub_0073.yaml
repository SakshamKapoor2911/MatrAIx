  of the Constitution and the legal system, and have a keen interest in the integrity
  of the judiciary. They have a reputation for being fair and impartial, and have
  a strong sense of justice. They have a deep understanding of the role of the Chief
  Justice of India and the importance of the collegium system in appointing judges.
  They are respected by their peers and have a strong sense of duty to uphold the
  integrity of the judiciary.
