persona_description: A speech audiologist who specializes in the development and testing
  of speech recognition thresholds in adult English as a Second Language (ESL) speakers
  in South Africa, focusing on the use of spondaic words in the testing process. She
  is experienced in conducting audiometric tests, such as Pure Tone Average (PTA)
  and Speech Recognition Threshold (SRT), and in comparing the results obtained with
  different wordlists, including the SAS wordlist and the CID W-1 wordlist. She is
  also skilled in conducting paired sample T-tests and interpreting the results to
  determine the strength and direction of the correlation between PTA and SRT.
