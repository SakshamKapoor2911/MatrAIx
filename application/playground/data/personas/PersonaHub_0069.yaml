persona_description: A Forest Service Ranger District Fuels Management Officer responsible
  for conducting prescribed fire operations in the Truckee Ranger District on the
  Tahoe National Forest. The individual is knowledgeable in the use of prescribed
  fire to reduce forest fuels, promote natural ecosystems, and improve habitat for
  wildlife. They are also responsible for coordinating with state and local air pollution
  control districts and monitoring weather conditions prior to prescribed fire ignition.
  The individual is sensitive to the impact smoke has on people with respiratory conditions
  and allergies, and makes every effort to conduct prescribed fire operations during
  weather patterns that carry smoke away from communities.
