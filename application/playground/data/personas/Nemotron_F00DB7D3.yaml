personas:
  professional: Kennedi Terry is a seasoned network engineer who leverages fifteen
    years of hands‑on experience with Cisco, Juniper, and multi‑cloud security to
    design fault‑tolerant infrastructures, while their love of routine fuels meticulous
    documentation and their spontaneous problem‑solving style keeps incidents under
    control.
  sports: Kennedi Terry is a devoted fan of the Philadelphia Eagles and follows the
    Phillies’ spring training, while personally playing weekly pick‑up tennis at a
    local South Jersey club and joining a casual adult soccer league for cardio, embodying
    a balanced mix of spectator loyalty and modest active participation.
  arts: Kennedi Terry cultivates a love for neo‑soul and classic R&B, frequently streaming
    Erykah Badu, D’Angelo, and Miles Davis while attending intimate live sessions
    at local jazz lounges, and they channel the storytelling spirit of Gordon Parks
    through street‑photography that captures candid moments in Newark’s parks.
  travel: Kennedi Terry prefers a balanced travel style that blends meticulously planned
    weekend getaways to historic cities like Savannah and Philadelphia with occasional
    spur‑of‑the‑moment trips to New Orleans for its jazz scene, while dreaming of
    a cultural immersion journey to Ghana to explore ancestral roots, all within a
    modest budget and limited family obligations.
  culinary: Kennedi Terry enjoys cooking soul‑food staples such as baked chicken with
    smoked paprika, collard greens seasoned with garlic and apple cider vinegar, and
    sweet potato pie, often swapping traditional deep‑frying for healthier oven‑baked
    methods, and they relish experimenting with fresh herbs from their backyard garden
    while occasionally over‑seasoning a dish in the pursuit of bold flavor.
  core: Kennedi Terry blends a steadfast love for routine with a surprising dash of
    spontaneity, juggling meticulous network documentation and garden watering schedules
    while occasionally impulsively splurging on new camera gear or jazz tickets, a
    paradox that defines their resilient, community‑centered outlook.
background:
  cultural: Kennedi is an African‑American woman raised in a close‑knit, middle‑class
    family in South Jersey. Her upbringing was shaped by church gatherings, family
    celebrations of holidays like Juneteenth and Kwanzaa, and a strong oral tradition
    of storytelling that emphasized resilience and community. She grew up with the
    flavors of soul‑food cooking and the rhythms of R&B and gospel music, which continue
    to influence her tastes today. As the first in her family to earn a STEM bachelor’s
    degree, she values education and professional achievement, and she actively participates
    in local Black community organizations and mentorship networks for women of color
    in tech. Her cultural identity informs her collaborative style, her commitment
    to mentorship, and her desire to give back to the communities that supported her.
attributes:
  skills: '["Network design and implementation", "Cisco routing & switching", "Juniper
    network configuration", "Windows Server administration", "Linux system administration",
    "Virtualization (VMware vSphere, Hyper‑V)", "Network security (firewalls, VPN,
    IDS/IPS)", "Scripting and automation (PowerShell, Python)", "Network monitoring
    (SolarWinds, PRTG, Nagios)", "Backup & disaster recovery planning", "Cloud networking
    (AWS VPC, Azure networking)", "Technical documentation and SOP creation", "End‑user
    support and training"]'
  hobbies: '["Gardening", "Reading mystery novels and African‑American biographies",
    "Cooking soul‑food with healthy twists", "Listening to jazz, neo‑soul, and classic
    R&B", "Photography of urban and natural scenes", "Playing chess and solving puzzles",
    "Volunteer coding tutoring for youth"]'
  career_goals: Kennedi aims to leverage her extensive operational background to move
    into senior leadership within IT, targeting roles such as network architect, cybersecurity
    manager, or IT operations director within the next five years. She plans to earn
    CCNP and CISSP certifications, deepen her expertise in cloud security, and lead
    initiatives that embed proactive maintenance and security into daily workflows.
    She is passionate about mentorship, intending to establish a mentorship program
    for Black women in technology in South Jersey and to speak at local conferences
    about practical career pathways in networking and security. Long‑term, she envisions
    launching a boutique consulting firm that provides reliable, routine‑driven network
    and security services to small businesses while maintaining the flexibility to
    tailor solutions to each client’s unique needs.
