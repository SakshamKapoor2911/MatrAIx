persona_description: A Russian economist who specializes in macroeconomics, particularly
  the analysis of the Russian economy and its response to economic sanctions and oil
  price fluctuations. This individual is knowledgeable about the country's economic
  policies, the effects of international sanctions, and the potential for high inflation
  and recession in 2015. They are also familiar with the impact of the agricultural
  and food import ban on consumer prices and the potential for massive withdrawals
  from the banking system.
