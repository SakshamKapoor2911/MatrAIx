personas:
  professional: Jeffrey Suarez, a diligent food‑service attendant at a busy downtown
    café, leverages his meticulous organizational skills, ServSafe knowledge, and
    knack for staff training to maintain flawless sanitation standards while they
    strive toward a shift‑supervisor role within the next year.
  sports: Jeffrey Suarez, an avid LSU Tigers fan who never misses a Saturday night
    college football game, regularly joins pickup basketball at the West Monroe community
    center, follows the New Orleans Pelicans, and spends early mornings fishing on
    Lake Ouachita, balancing competitive spirit with relaxed outdoor recreation as
    they stay active.
  arts: Jeffrey Suarez, a lover of regional music and culture, frequently attends
    local Zydeco festivals featuring the Dirty Dozen Brass Band, enjoys listening
    to Zachary Richard while cooking, and keeps a collection of classic Southern novels
    by Walker Percy, which they turn to for creative inspiration.
  travel: Jeffrey Suarez, a methodical planner, prefers road‑trips that combine football
    pilgrimages to stadiums like Tiger Stadium, visits to historic New Orleans for
    Mardi Gras, and weekend getaways to the Blue Ridge Mountains, always booking accommodations
    in advance to balance adventure with budget constraints as they map out itineraries
    in detail.
  culinary: Jeffrey Suarez, a confident home cook, specializes in gumbo with Andouille
    sausage, okra, and crab meat, perfects jambalaya seasoned with traditional Southern
    spices, frequently chops fresh vegetables for collard greens, and delights in
    the occasional indulgence of fried catfish, though they sometimes over‑salt the
    roux in pursuit of flavor.
  core: Jeffrey Suarez, a highly organized 32‑year‑old who channels his love for Southern
    hospitality into a disciplined career path, meticulous budgeting, routine health
    monitoring, and a balanced blend of sports, music, and culinary traditions, yet
    wrestles with chronic worry that fuels late‑night journaling and occasional over‑commitments,
    and they often turn to structured routines for comfort.
background:
  cultural: Jeffrey grew up in West Monroe, Louisiana, a town rooted in Southern hospitality
    and a blend of Cajun, Creole, and traditional Southern cultures. Raised in a middle‑class,
    white family, he attended local public schools and is an active member of his
    Baptist church. Family gatherings often feature classic Louisiana dishes such
    as gumbo and jambalaya, and community events like Riverfest and Mardi Gras celebrations
    have shaped his appreciation for regional music, food, and communal spirit. These
    influences instill in him a strong work ethic, respect for tradition, and a commitment
    to serving others.
