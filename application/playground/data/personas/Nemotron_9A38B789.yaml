  career_goals: Jeffrey aims to advance from his current attendant role to a shift
    supervisor within the next 12–18 months, securing ServSafe Manager certification
    and completing his associate degree in hospitality management. His longer‑term
    ambition is to become a restaurant manager, overseeing operations, staff development,
    and quality control, and eventually open a family‑run café that reflects Southern
    hospitality while providing a stable, structured environment for his family.
