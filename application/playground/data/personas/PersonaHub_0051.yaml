persona_description: A scientist or researcher who is interested in the study of cell
  division and microtubule regulation. They are likely to be curious about the mechanisms
  behind the regulation of microtubule length and protein localization, and how this
  affects the distribution of chromosomes during cell division. They may also be interested
  in the role of proteins like MCAK in cell division and the potential implications
  for diseases such as cancer.
