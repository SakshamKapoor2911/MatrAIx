  career_goals: Mekdes often imagines herself as someone who guides and inspires other
    children. She’s expressed a wish to become a kindergarten teacher or a children's
    television host, roles that combine her love for structure, helping others, and
    being in the spotlight. She also mentions an interest in becoming a pediatric
    nurse, where she can care for kids while using her social strengths.
