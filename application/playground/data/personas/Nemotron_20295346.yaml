personas:
  professional: Mekdes Mahone, a budding community event coordinator in training,
    channels their love for structured playground games and Lego building into planning
    lively group activities for classmates, while letting their sociable, talkative
    nature keep everyone engaged and their flexible approach adapt to spontaneous
    fun.
  sports: Mekdes Mahone fuels their boundless energy by playing tag and hopscotch
    on the schoolyard, participates in the Sunrise Sprouts Soccer Club during the
    fall season, joins the Little Swimmers swim team in summer, and cheers for the
    hometown baseball team, the River City Raptors, embodying their love for group
    games and their cooperative yet assertive spirit on the field.
  arts: Mekdes Mahone expresses creativity through bright crayon drawings of Disney
    characters like Elsa and Moana, sings along enthusiastically to the Frozen soundtrack
    and The Wiggles' upbeat tunes, dances to upbeat pop songs from Kidz Bop, and eagerly
    watches animated films by Pixar, a blend that reflects their talkative, sociable
    nature and love for vivid, structured artistic expression.
  travel: Mekdes Mahone enjoys weekend family trips to Lakeview State Park for picnics
    and treasure hunts, a yearly visit to the coastal beach town of Seaside for sandcastle
    building, a school field trip to Washington, D.C.’s National Museum of Natural
    History, and daydreams about an upcoming adventure to Disney World in Florida
    and a future family cruise to the Great Barrier Reef, balancing structure in planning
    with spontaneous play.
  culinary: Mekdes Mahone relishes creamy macaroni and cheese, spaghetti with marinara
    sauce, fruit smoothies blended with strawberries and bananas, and peanut butter‑banana
    sandwiches, often assisting Mom in mixing batter for cupcakes but occasionally
    sneaks extra chocolate chips into the mix, a tasty quirk that mirrors their love
    for both predictable comfort foods and spontaneous culinary creativity.
  core: Mekdes Mahone, a sociable seven‑year‑old with a knack for organizing playful
    group games, a love for colorful Lego creations, and a delightful habit of sneaking
    extra chocolate chips into cupcakes, navigates life with cheerful confidence,
    practical focus, and a flexible approach to routine.
background:
  cultural: Mekdes comes from an Ethiopian‑American family living in Monroeville,
    Pennsylvania. Her parents preserve Ethiopian traditions, sharing Amharic phrases,
    celebrating Enkutatash (Ethiopian New Year) and Kwanzaa, and preparing dishes
    like injera and doro wat for family gatherings. She also participates in the local
    African‑American community, attending a church where gospel music and community
    service are important. These cultural experiences shape her identity, her love
    of music, storytelling, and communal celebrations.
