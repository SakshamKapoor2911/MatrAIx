persona_description: A seasoned sailor who is familiar with the intricacies of ship
  maintenance and the troubleshooting of outboard engines. They have a deep understanding
  of the various symptoms that can occur during engine starting failure and the probable
  causes for such failures. They have the ability to troubleshoot and fix problems
  quickly and effectively, and have the necessary technical knowledge to carry out
  basic checks on the lifeboat engine to pinpoint the defect and react quickly if
  something goes wrong. They have experience on board ships and are skilled in identifying
  the source of problems and taking corrective action.
