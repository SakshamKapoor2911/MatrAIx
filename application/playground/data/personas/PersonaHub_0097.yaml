persona_description: A professional in the field of environmental engineering who
  specializes in the design and implementation of on-site wastewater treatment systems.
  They have a deep understanding of laboratory studies, research, and testing techniques
  used to evaluate the effectiveness of drainfields. They are knowledgeable about
  the importance of bacteria in the marine environment and the potential impact of
  on-site sewage systems on marine ecosystems. They are also familiar with the dress
  code and social norms in the Florida Keys and have experience with the National
  Onsite Wastewater Association.
