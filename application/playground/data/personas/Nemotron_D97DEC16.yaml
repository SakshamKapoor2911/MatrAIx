personas:
  professional: Catherine Denis, a veteran food‑service operations manager, leverages
    over three decades of hands‑on experience and a STEM‑grounded, data‑driven mindset
    to enforce flawless HACCP compliance, engineer meticulous scheduling systems,
    and mentor staff with the same disciplined, routine‑focused precision that defines
    their personal life.
  sports: Catherine Denis maintains modest fitness by tending their vegetable garden
    and taking daily 30‑minute walks with the River City Walking Club, while quietly
    cheering for the River City Rivercats during spring baseball season, a routine
    that satisfies their need for structure without the pressure of competitive sport.
  arts: Catherine Denis finds creative solace knitting scarves while listening to
    the soothing piano works of Debussy and the folk ballads of Joan Baez, and spends
    evenings immersed in the historical narratives crafted by Hilary Mantel and Doris
    Kearns Goodwin, which together shape their appreciation for nuanced storytelling.
  travel: Catherine Denis enjoys organized, small‑group tours of historic European
    cities such as Bruges, Belgium, and Granada, Spain, favoring meticulously planned
    itineraries, boutique B&B accommodations, and ample downtime to reflect on the
    past, ensuring they can return home in time for their weekly church study.
  culinary: Catherine Denis, an accomplished home baker, spends Saturday mornings
    perfecting sourdough loaves and caramelized pineapple upside‑down cake, while
    drawing on vegetables from their garden to create vibrant ratatouille with heirloom
    tomatoes, fresh basil, and rosemary, and pairs these meals with a crisp Chardonnay
    to enhance the flavors.
  core: Catherine Denis blends a lifelong devotion to routine with a quiet curiosity,
    orchestrating each day like a well‑kept ledger, yet they habitually lose track
    of time when solving crossword puzzles, letting the world slip by.
background:
  cultural: Catherine is a first‑generation Honduran American who grew up bilingual,
    speaking Spanish at home while navigating American schooling. She preserves Honduran
    customs—celebrating Día de los Héroes, preparing dishes like baleadas and tamales,
    and supporting the local Honduran diaspora through volunteer food‑distribution
    events. While fully integrated into Dallas life, she balances these traditions
    with a pragmatic, disciplined approach to both her personal and professional worlds.
attributes:
  skills: '[''Operational Scheduling'', ''Inventory Management'', ''Food Safety &
    HACCP Compliance'', ''Budgeting and Cost Control'', ''Staff Training and Development'',
    ''Lean Process Optimization'', ''Customer Service Standards'', ''POS System Administration'']'
  hobbies: '[''Traditional Honduran Cooking'', ''Vegetable Gardening'', ''Knitting'',
    ''Crossword Puzzles'', ''Reading Historical Biographies'', ''Small‑Group Church
    Fellowship'']'
  career_goals: Catherine aims to cement a legacy of operational excellence at her
    current venue before transitioning to retirement. She plans to formalize a mentorship
    program that prepares junior managers for leadership, pursue regional manager
    certification to broaden her impact, and implement a succession plan that preserves
    the restaurant's routine‑driven culture. Reducing personal stress through delegation
    and ensuring financial security for her later years are also top priorities.
