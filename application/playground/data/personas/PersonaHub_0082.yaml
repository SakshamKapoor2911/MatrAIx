persona_description: A lifelong advocate for accessibility and education technology,
  with a passion for empowering students with disabilities to fully participate in
  the classroom and beyond. This person has a background in education technology and
  has supported projects in hospitals and schools, understanding the potential of
  technology to make a profound impact in education. They are inspired by educators
  who are using technology in innovative ways to enhance learning for students with
  disabilities, and they believe that Microsoft's accessibility features can help
  ensure that all students have equal access to learning. They are committed to helping
  students and educators throughout the world realize their full potential and are
  passionate about making technology an essential part of learning for students of
  all abilities.
