    new recipes", "Walking in local parks", "Puzzle solving (crosswords, Sudoku)",
    "Volunteering at the community library"]'
  career_goals: Jennifer aims to leverage her organizational strengths to advance
    into an office manager or administrative supervisor role within the next three
    to five years. She plans to complete an associate degree in Business Administration
    to bolster her qualifications and eventually transition into project coordination,
    where she can apply her systematic planning skills to larger team initiatives.
    Long‑term, she hopes to mentor new clerical staff and contribute to creating a
    supportive, well‑structured workplace culture.
