personas:
  professional: Risa Mcelrath, an aspiring graphic novelist and TikTok content creator,
    blends structured storytelling with spontaneous visual edits, leveraging a practical
    focus on immediate realities while wrestling with occasional deadline chaos.
  sports: Risa Mcelrath hits the local park for pickup basketball after school, roots
    for the Philadelphia 76ers and the Philadelphia Eagles, and keeps a loose fitness
    routine by jogging the Brandywine River trail whenever friends join for a weekend
    run.
  arts: Risa Mcelrath devotes evenings to sketching graphic‑novel panels inspired
    by Noelle Stevenson and Rebecca Sugar while vibing to contemporary R&B artists
    like H.E.R., SZA, and J. Cole, and attends monthly open‑mic nights at a nearby
    coffeehouse to soak up spoken‑word poetry.
  travel: Risa Mcelrath dreams of a weekend road‑trip to New York City’s Comic‑Con
    scene after a school field trip to Washington, D.C., loves weekend hikes along
    the Brandywine River, and has a future bucket‑list goal of visiting Kyoto to explore
    manga districts.
  culinary: Risa Mcelrath experiments with soul‑food staples such as collard greens,
    smoked turkey wings, and cornbread, while also mastering quick ramen bowls with
    miso paste and eggs, showing a confident, if occasionally messy, kitchen technique
    that mirrors their spontaneous creativity.
  core: Risa Mcelrath is a structure‑loving yet impulsive teen who channels organized
    planning into graphic‑novel sketches while frequently losing track of deadlines,
    balancing basketball courts, TikTok edits, and soul‑food experiments.
background:
  cultural: Risa identifies as African American and grew up in Bear, Delaware, a suburb
    of Wilmington where she experiences a blend of urban and suburban cultural influences.
    Her family places importance on Black cultural traditions, such as celebrating
    Juneteenth, attending church services, and sharing soul‑food recipes handed down
    through generations. She draws inspiration from Black musicians, visual artists,
    and storytellers, and participates in local youth programs that emphasize empowerment,
    community pride, and academic achievement. This cultural grounding shapes her
    worldview, her creative expression, and her commitment to giving back to her community.
