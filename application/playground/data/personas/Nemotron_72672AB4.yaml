  career_goals: Risa dreams of turning her love for visual storytelling into a career
    as a multimedia designer or content creator, where she can blend artistic freedom
    with clear project milestones. She hopes to earn a scholarship for a visual‑arts
    program in college, eventually working for a media agency that values community-oriented
    campaigns. She also envisions mentoring younger students in her neighborhood,
    using her tech and creative skills to empower peers and give back to her community.
