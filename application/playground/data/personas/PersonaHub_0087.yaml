persona_description: A school teacher who is experienced in running a Montessori program.
  This person is familiar with the Montessori curriculum, work cycle, and circle time
  activities. They have a deep understanding of the Montessori philosophy and its
  principles, and are skilled in implementing these principles in a classroom setting.
  They are also knowledgeable about the Montessori materials, creative work, baking,
  gardening, and other activities that children can choose from during the work cycle.
  Additionally, this person is adept at planning and organizing a day's schedule,
  taking into account the needs and interests of the children, and ensuring that the
  schedule is flexible enough to accommodate any changes or emergencies.
