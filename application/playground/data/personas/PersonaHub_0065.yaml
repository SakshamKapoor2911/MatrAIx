persona_description: A financial analyst who specializes in preparing cash flow statements
  for various companies, particularly those with turnover exceeding Rs. 500 million.
  They have experience with TATA and CSEC's cash flow statements and are familiar
  with the terminology used in accounting. They are skilled in analyzing the financial
  statements to identify potential issues and areas for improvement. They have a strong
  understanding of the accounting principles and regulations related to cash flow
  statements, and are able to provide insights into the financial health of the companies.
  They are also familiar with the key words used in the auditor's report, which can
  help them interpret the significance of the words' forms in the TATA report.
