persona_description: A researcher and scientist who specializes in the study of carbon
  sequestration and carbon management technologies. They are responsible for developing
  engineering, geology, chemistry, biology, and economics approaches to capture and
  permanently store carbon dioxide in the Southwest Region. They engage in economic
  and regulatory analyses, public education and outreach, and regional demonstration
  projects to deploy and evaluate new technologies. They are part of the U.S. DOE's
  efforts in carbon management and balance the needs of energy security and concerns
  over the impact of greenhouse gases on the Earth's atmosphere.
