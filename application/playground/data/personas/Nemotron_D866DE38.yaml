personas:
  professional: Brian Martin is a meticulous aspiring handyman‑entrepreneur who leverages
    their carpentry, automotive maintenance, and budgeting expertise to design home‑energy
    retrofits, while their organized, reliable nature ensures projects are delivered
    on schedule and their sociable disposition helps them build trust with neighbors
    and volunteers.
  sports: Brian Martin participates in a community softball league during spring,
    enjoys early‑morning beach walks as cardio, follows the New England Patriots and
    Boston Red Sox avidly, and practices weekend fishing trips that blend recreation
    with a low‑impact fitness routine.
  arts: Brian Martin’s weekends often include attending live‑music performances by
    blues guitarist Derek Trucks and soul singer Leon Bridges, while they capture
    coastal wildlife with their DSLR, inspired by the works of Ansel Adams and marine
    photographer Mike Hedges, integrating music and photography into their social
    life.
  travel: Brian Martin prefers carefully planned road trips along the Atlantic seaboard,
    having recently explored the Outer Banks of North Carolina and the historic lighthouses
    of Cape Cod, while they dream of a summer sailing expedition to the Azores to
    combine their love of water, photography, and low‑key adventure.
  culinary: Brian Martin delights in cooking Southern‑inspired comfort dishes such
    as shrimp and grits, smoked brisket, and collard greens seasoned with smoked paprika
    and fresh herbs, showcasing their intermediate cooking skills and a habit of sourcing
    locally caught fish and fresh garden produce for family gatherings.
  core: Brian Martin is a pragmatic, community‑oriented do‑er who balances meticulous
    planning with a lively social streak, yet wrestles with chronic worry that fuels
    both their drive and occasional overcommitment.
background:
  cultural: Brian was raised in a middle‑class, white, suburban family in Florida,
    with Anglo‑American roots that reflect traditional Southern coastal values. His
    upbringing emphasized self‑reliance, community participation, and a pragmatic
    approach to everyday challenges. Living in Broward County, he has been exposed
    to the region’s multicultural diversity, shaping an open‑minded yet fundamentally
    American cultural identity that blends respect for tradition with an appreciation
    for the varied cultures that surround him.
