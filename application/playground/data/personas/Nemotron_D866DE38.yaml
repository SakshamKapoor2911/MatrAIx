  career_goals: Brian aims to transition from his current non‑workforce status into
    a stable, community‑focused role. He plans to obtain certifications in home energy
    retrofits and small‑scale handyman services, launching a modest home‑based business
    that leverages his practical skills. Simultaneously, he seeks a part‑time position
    as a program coordinator at a local community center, allowing him to apply his
    event‑planning and volunteer‑management experience. Over the next five years,
    he hopes to achieve financial stability for his family, reduce his chronic worry
    by establishing a structured work routine, and eventually mentor younger volunteers.
