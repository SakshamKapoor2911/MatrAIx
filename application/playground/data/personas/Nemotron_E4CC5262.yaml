  career_goals: Brittany aims to transition into senior technology leadership within
    the next five years, targeting roles such as Director of Engineering or VP of
    Product at a mid‑size tech firm or a government‑focused startup. She wants to
    spearhead large‑scale, data‑driven projects that modernize public‑sector services,
    while championing inclusive hiring and mentorship programs for women and underrepresented
    groups in tech. She aspires to become a recognized speaker at national conferences,
    publish thought pieces on the intersection of technology, policy, and business
    strategy, and eventually launch her own consultancy focused on digital transformation
    for civic organizations. To support these ambitions, she plans to earn an executive
    MBA and a PMP certification, and to deepen her expertise in emerging cloud security
    and AI ethics.
