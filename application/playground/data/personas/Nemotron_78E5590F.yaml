personas:
  professional: John Papagno, a tech‑savvy sales leader who leverages meticulous pipeline
    analytics, Salesforce mastery, and a flair for storytelling inspired by contemporary
    art to motivate teams and close complex deals, while channeling high emotional
    reactivity into genuine empathy during client presentations.
  sports: John Papagno is a weekly pickup basketball enthusiast who trains with the
    Columbus Hoops Collective, follows the Cleveland Cavaliers and Ohio State Buckeyes
    football seasons, and hikes with the Central Ohio Adventure Club on weekends,
    using a mix of cardio and body‑weight drills to stay fit.
  arts: John Papagno immerses themselves in the Columbus Museum of Art’s contemporary
    exhibitions, avidly collects limited‑edition prints by artists like Yayoi Kusama
    and Banksy, and finds inspiration in the music of Bon Iver and the improv lessons
    from local comedy troupe The Improv Playhouse.
  travel: John Papagno prefers weekend getaways that balance adventure and culture,
    having explored Glacier National Park in the Rocky Mountains and the Amalfi Coast
    on a budget‑savvy itinerary, while dreaming of a spring road trip along the Pacific
    Coast Highway.
  culinary: John Papagno enjoys experimenting in the kitchen, often crafting homemade
    gnocchi with sage butter, mastering the art of caramelized onions for a truffle‑infused
    mushroom risotto, and pairing dishes with bold wines despite occasionally over‑seasoning
    in their quest for flavor perfection.
  core: John Papagno fuses analytical sales expertise with a restless creative spirit,
    channels intense emotions into mindful habits, and navigates life with a schedule‑driven
    yet occasionally impulsive approach to work, money, and pleasure.
background:
  cultural: John was raised in a middle‑class Italian‑American family in Columbus,
    Ohio. His surname reflects his Italian heritage, and he grew up with traditions
    such as family meals centered around pasta dishes, participation in the annual
    Columbus Italian Festival, and occasional trips to Italy to visit relatives. While
    he identifies with the broader white Midwestern culture of his hometown—valuing
    industriousness, community involvement, and modesty—his upbringing also emphasized
    an appreciation for art, music, and culinary creativity. This blend of Midwestern
    pragmatism and Italian cultural richness informs his open‑minded curiosity, love
    for varied experiences, and strong work ethic.
