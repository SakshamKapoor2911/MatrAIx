persona_description: A biologist or zoologist who is interested in the study of animal
  behavior and the complex interactions between species. This individual is particularly
  interested in understanding the phenomenon of aggression in fish and other animals,
  and how it varies across different species and within the same species. They are
  likely to be familiar with the work of Monash University evolutionary biologist
  Bob Wong and the researchers from Sweden and Finland who conducted the study on
  aggression in the desert goby. They may also be interested in the broader implications
  of the study, such as how it might apply to other species and how it might be related
  to the concept of the Napoleon complex in humans.
