    Soul Food", "Volunteer Driving for Church Events", "Podcast Listening (Psychology
    & Entrepreneurship)"]'
  career_goals: Carolyn aims to transition from a frontline driver‑sales role into
    a leadership position within the logistics industry. Over the next five years
    she plans to earn a supervisory certification and eventually become a regional
    operations manager, overseeing a fleet of drivers while integrating innovative
    sales strategies. Long‑term, her competitive drive fuels an ambition to launch
    her own transportation and freight brokerage firm, merging her love for novel
    business models with her artistic flair by branding the company with distinctive
    visual designs. She also hopes to mentor young Black women entering the trucking
    field, fostering diversity and resilience in a traditionally male‑dominated sector.
