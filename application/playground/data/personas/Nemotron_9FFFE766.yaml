personas:
  professional: Carolyn Amos leverages her licensure as a commercial driver and sales
    acumen to orchestrate efficient route planning, negotiate client contracts, and
    run CRM-driven sales, all while infusing her vivid imagination into branding concepts
    for her future logistics brokerage and eyeing a supervisory certification to climb
    toward regional operations management.
  sports: Carolyn Amos enjoys weekly dance‑cardio Zumba sessions, follows the Alabama
    Crimson Tide football team, roots for the Birmingham Barons minor‑league baseball
    club, and participates in a local weekend cycling group that explores the rolling
    backroads of rural Alabama.
  arts: Carolyn Amos channels an abstract sensibility into oil paintings reminiscent
    of Kandinsky, creates digital illustrations inspired by Octavia Butler’s speculative
    worlds, and regularly attends blues gigs featuring musicians like B.B. King and
    gospel performances by Mahalia Jackson, while also showcasing their voice at community
    karaoke nights belting out classics such as “Respect.”
  travel: Carolyn Amos favors meticulously planned road‑trip photography expeditions
    across Alabama’s farmlands and has already visited New Orleans for its jazz scene,
    Nashville for songwriting inspiration, and Asheville for mountain vistas, while
    dreaming of future trips to Iceland’s volcanic landscapes and New Zealand’s fjords
    for broader artistic perspective.
  culinary: Carolyn Amos loves cooking soulful Southern meals—perfecting dishes like
    fried catfish, collard greens simmered with smoked turkey, buttery cornbread,
    and peach cobbler—testing bold spices such as cayenne and smoked paprika, and
    often hosts family gatherings where they pair the fare with sweet tea and a splash
    of bourbon.
  core: Carolyn Amos blends a logistical mind with a restless artistic soul, juggling
    long‑haul routes and sales targets while painting abstract canvases and humming
    blues, all under a constant hum of curiosity and a tendency to worry about the
    next move.
background:
  cultural: Carolyn grew up in Sumiton, Alabama, within a close‑knit African‑American
    community steeped in Southern traditions. Her family’s roots in church life exposed
    her to gospel music, vibrant storytelling, and communal support networks that
    value resilience and mutual uplift. She participates in local cultural events
    such as Juneteenth celebrations and soul‑food festivals, where she shares dishes
    like collard greens and fried catfish. While attending community college, she
    engaged with the campus NAACP chapter, fostering a sense of activism and pride
    in her heritage. This cultural foundation informs her artistic expression, her
    dedication to service, and her ambition to pave the way for greater representation
    in the trucking industry.
