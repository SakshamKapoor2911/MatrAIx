persona_description: A historian who is interested in the history of measurement,
  particularly the medieval period, and how it influenced business, justice, and devotion.
  They are also interested in the history of hair and grooming in the Middle Ages,
  and how it relates to the study of usages of classical Arabic words with the z-r-q
  root in the Qur'an, Qur'anic commentaries, hadith, early medical treatises, and
  words of adab. They are also interested in the history of medieval crafts, particularly
  the cloth trade in England, and the lives of medieval servants in York's recreated
  medieval townhouse.
