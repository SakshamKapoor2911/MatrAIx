personas:
  professional: Sandi Chapman is a front‑of‑house waiter at a bustling Modesto diner,
    where her quick memory for menu details, basic Spanish flair, and charismatic
    storytelling about local art turn routine service into memorable experiences,
    while she strategically leverages this role to earn a shift‑supervisor promotion
    and lay groundwork for a future café‑gallery hybrid.
  sports: Sandi Chapman fuels her active lifestyle by hitting the Sierra Nevada foothills
    for weekend hikes with the Sierra Nevada Hiking Club, dancing salsa and hip‑hop
    twice a week in a downtown community group, cheering on the Sacramento Kings and
    the San Francisco 49ers, and joining a casual pickup basketball league at the
    Modesto Recreation Center every summer.
  arts: Sandi Chapman immerses herself in Modesto’s creative pulse by frequenting
    gallery openings featuring regional muralist Jorge Lopez, catching experimental
    productions by the Burning Bridge Theatre Company, dancing to live sets by indie
    band The Dodos, and sharpening her quick wit on stage with the Modesto Improv
    Collective, all of which fuel her vision of a café‑gallery that doubles as an
    artistic incubator.
  travel: Sandi Chapman prefers spontaneous weekend getaways, having already trekked
    Yosemite’s Mist Trail, strolled through the arts‑laden streets of Los Angeles’
    Arts District, and explored the historic vineyards of Napa, while dreaming of
    an immersive artist‑in‑residence program in Oaxaca, Mexico, and a leisurely summer
    sojourn in Barcelona, Spain, all balanced against a modest budget and a busy work
    schedule.
  culinary: Sandi Chapman blends her culinary curiosity with a moderate kitchen skill
    set, routinely whipping up quinoa‑stuffed poblano peppers with chipotle crema,
    perfecting a velvety espresso‑infused tiramisu, tossing heirloom tomato and basil
    bruschetta on toasted sourdough, and mastering quick ramen bowls spiked with miso,
    all while scouting local farmers’ markets for fresh basil, heirloom tomatoes,
    and seasonal figs.
  core: Sandi Chapman is a talkative, art‑obsessed hospitality enthusiast who thrives
    on spontaneity, juggling café dreams with endless improv jokes, occasional disorganization,
    and a knack for turning every customer interaction into a mini‑gallery tour.
background:
  cultural: Sandi is a white American who grew up in Modesto, California, a Central
    Valley city known for its agricultural roots and increasingly diverse population.
    Her upbringing blended modest, working‑class values with exposure to a multicultural
    environment, notably the strong Latino community that shapes local food, language,
    and festivals. The region’s mix of farm‑town pragmatism, a relaxed California
    lifestyle, and a growing appreciation for the arts has fostered her open‑mindedness
    and curiosity about new ideas. While she identifies with mainstream American cultural
    norms, she also embraces the regional diversity, enjoying the spontaneous, flexible
    rhythm of life in Stanislaus County.
