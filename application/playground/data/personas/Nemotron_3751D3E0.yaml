    contemporary fiction", "Volunteering at community festivals", "Dancing (salsa/hip
    hop)", "Exploring street art"]'
  career_goals: Sandi aims to move up to a shift‑supervisor role within the next year,
    using that experience to transition into restaurant management. She plans to enroll
    in evening courses for hospitality management and possibly obtain a culinary arts
    certificate. Long‑term, she envisions opening a small café‑gallery hybrid that
    showcases local artists while serving coffee and comfort food, creating a community
    hub that blends her love for hospitality and the arts. She also sees herself coordinating
    art‑related events and festivals in the Modesto area, leveraging her sociable
    personality and networking skills.
