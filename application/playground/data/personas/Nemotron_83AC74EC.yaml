personas:
  professional: Kim Goines, a 20-year-old aspiring museum professional, combines meticulous
    event planning, public-speaking poise, and a photographer's eye for detail to
    run community-focused art projects, all while their curiosity fuels inclusive
    programming ideas and they often let anxiety push them to double-check every logistical
    detail.
  sports: Kim Goines, a fan of the Kentucky Wildcats basketball team and Louisville
    City FC soccer, channels their energetic sociability into weekly hip-hop dance
    crew sessions and occasional yoga classes, prefers group workouts, and they balance
    their competitive streak with occasional lapses in consistency due to stress-induced
    fatigue.
  arts: Kim Goines, a regular at Lexington's Paramour gallery and downtown mural walks,
    draws creative fuel from the jazz of Miles Davis, the lyrical flow of Kendrick
    Lamar, and spoken-word performances by Sarah Kay, while they capture the vibrant
    street art of local muralist J. Davis in their sketchbooks.
  travel: Kim Goines, who plans trips with a blend of detailed itineraries and spontaneous
    detours, has road-tripped to the Red River Gorge for hiking, visited New Orleans
    for its music scene, explored the Louvre in Paris, and dreams of a cultural immersion
    program in Mexico City, and they juggle a modest student budget while favoring
    budget-friendly hostels.
  culinary: Kim Goines, an intermediate home chef, loves crafting Southern-inspired
    fusion dishes such as shrimp and grits topped with kale-pesto, fried chicken tacos
    drizzled with chipotle aioli, and sweet-potato quinoa bowls seasoned with smoked
    paprika and fresh basil, they often source local produce at the Lexington Farmers
    Market and pair meals with cold brew coffee.
  core: Kim Goines balances a methodical planner's precision with an impulsive art
    lover's zest, they wrestle with chronic anxiety, yet they channel that energy
    into championing inclusive community arts.
background:
  cultural: Kim is a Black American raised in Lexington, Kentucky, whose family traces
    its roots to the Great Migration and the Southern tradition of resilience and
    community. Growing up, she was immersed in a close‑knit neighborhood where church,
    gospel music, storytelling, and family gatherings were central. She regularly
    participates in local cultural events such as Juneteenth celebrations, the Lexington
    African American Heritage Festival, and community soul‑food potlucks that blend
    Southern cuisine with African culinary influences. Her upbringing emphasized education,
    community service, and pride in Black artistic expression, which helped shape
    her love for visual arts and her commitment to creating inclusive cultural spaces.
    While deeply connected to her African‑American heritage, she also appreciates
    the broader Appalachian and agricultural culture of Central Kentucky, fostering
    a nuanced, respectful perspective on her region’s diversity.
attributes:
  skills: '["Event planning", "Public speaking", "Digital photography", "Graphic design
    basics (Canva, Photoshop)", "Social media content creation", "Community outreach",
    "Project coordination", "Research and documentation", "Active listening", "Conflict
    mediation"]'
  hobbies: '["Visiting art galleries and street murals", "Sketching and drawing",
    "Digital photography", "Listening to jazz and hip‑hop", "Attending community theater",
    "Social dancing (hip‑hop and lyrical)", "Cooking Southern‑Black fusion dishes",
    "Reading contemporary fiction", "Journaling for stress relief", "Volunteering
    at youth mentorship programs", "Gardening"]'
  career_goals: Kim aims to pursue a degree in Museum Studies or Art History with
    the long‑term goal of becoming a gallery coordinator or director of a community‑focused
    arts nonprofit. She wants to design inclusive programs that amplify Black artists
    in the Midwest, develop outreach initiatives for underserved youth, and eventually
    integrate art‑therapy components to help participants manage stress and emotional
    well‑being. Her career vision blends her love of art, methodical planning, and
    desire for purposeful, collaborative work.
