personas:
  professional: Kyle Joffrion blends a budding computer science expertise with a visual
    arts sensibility, leveraging Python, JavaScript, and interactive circuit prototyping
    to co‑lead hackathon teams while their laid‑back, sometimes chaotic planning style
    fuels spontaneous, boundary‑pushing creative‑tech projects.
  sports: Kyle Joffrion hits the Boston community courts for pickup basketball with
    friends on weekends, cheers for the Celtics and the Red Sox, and jogs the Charles
    River trail in spring, preferring fun, social play over regimented workouts despite
    occasionally skipping a session after a late‑night hackathon.
  arts: Kyle Joffrion roams Boston’s street art corridors capturing murals by artists
    like KAWS and Banksy on their phone, attends live shows ranging from Tame Impala
    to Aphex Twin, and performs improv at the Improv Asylum, letting these eclectic
    influences shape their digital illustration style and occasional 3D animated shorts.
  travel: Kyle Joffrion dreams of a backpacking trek through Berlin’s gallery districts
    and a sunrise hike in Kyoto’s Arashiyama bamboo grove, but currently plans weekend
    trips to Cape Cod and the White Mountains with friends, favoring spontaneous itineraries
    over rigid bookings while balancing a modest travel budget.
  culinary: Kyle Joffrion’s palate oscillates between devouring a Boston lobster roll
    with buttered rolls and fresh corn, experimenting with homemade sushi rolls featuring
    avocado and tuna, and whipping up spicy kimchi fried rice, though their cooking
    skill hovers at enthusiastic amateur, often relying on friends for complex plating.
  core: Kyle Joffrion is a restless 18‑year‑old tech‑savvy art enthusiast who swaps
    spreadsheets for sketchpads, bursts into spontaneous coding‑art marathons, and
    lives on a diet of coffee, concert tickets, and occasional procrastination.
background:
  cultural: Kyle grew up in the Boston suburbs of Suffolk County in a middle‑class,
    primarily Anglo‑American household. The region’s strong emphasis on education
    and its historic intellectual vibe shaped his curiosity and love of learning.
    Boston’s multicultural neighborhoods and vibrant arts community exposed him to
    diverse perspectives, fostering his openness to unconventional ideas. Family traditions
    such as celebrating Thanksgiving, the Fourth of July, and local sports fandom
    for the Celtics and Red Sox are part of his cultural fabric. He identifies with
    the New England values of independence, resilience, and a balance between hard
    work and a laid‑back, collaborative spirit.
