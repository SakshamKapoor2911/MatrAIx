  career_goals: In the short term, Kyle aims to secure an internship or entry‑level
    role at a creative technology startup where he can merge his coding expertise
    with his passion for art. He also plans to volunteer at local maker spaces to
    organize hackathons and interdisciplinary workshops, and to travel abroad to experience
    global art scenes. Over the next five years, he envisions pursuing a master’s
    in Human‑Computer Interaction or a related field to deepen his understanding of
    user‑centered design. Ultimately, he aspires to launch his own venture that creates
    immersive, interactive installations for public spaces, blending data‑driven experiences
    with visual storytelling, while maintaining a flexible work style that allows
    for continuous learning and collaboration.
