personas:
  professional: Nhan Issaboube is a budding builder who treats LEGO construction and
    jigsaw puzzles as miniature engineering projects, applying meticulous spatial
    reasoning and a love for clear step‑by‑step instructions, while their practical,
    organized nature keeps each model tidy and on schedule.
  sports: Nhan Issaboube enjoys structured playground games like Simon Says and Red
    Light/Green Light with a small circle of friends, they cheer for the regional
    basketball team, the City Hawks, and they attend after‑school practices with the
    neighborhood junior soccer club, the Little Lions, balancing competitive drills
    with playful team challenges.
  arts: Nhan Issaboube spends afternoons immersed in chapter‑book series such as 'Magic
    Tree House' and 'Geronimo Stilton', colors intricate mandalas from beginner art
    books, and draws inspiration from the whimsical illustrations of Mary Blair and
    the melodic tunes of classic Disney soundtracks.
  travel: Nhan Issaboube prefers short, well‑planned family outings, enjoying visits
    to the local history museum, weekend trips to the nearby seaside boardwalk, and
    annual participation in the town’s cultural festival parade, while dreaming of
    a future adventure to the interactive science museum in Tokyo.
  culinary: Nhan Issaboube loves helping in the kitchen, especially assembling the
    family’s simple noodle soup with broth, rice noodles, fresh herbs, and sliced
    vegetables, and they delight in snacking on fruit kebabs made from mango, banana,
    and pineapple.
  core: Nhan Issaboube is a methodical 7‑year‑old who channels a love for structure
    into LEGO builds, puzzles, and quiet reading, balancing a shy disposition with
    a quietly assertive streak and a penchant for counting coins.
background:
  cultural: Nhan’s family originates from Vietnam, preserving traditions such as Tet
    celebrations, Vietnamese cuisine, and language use at home while also embracing
    the multicultural environment of Lawrenceville, GA. This blend of Southeast Asian
    heritage and Southern American community influences her values of respect for
    elders, community participation, and an appreciation for both Eastern and Southern
    foods and customs.
attributes:
  skills: '[''Reading fluently at grade level'', ''Basic arithmetic (addition, subtraction,
    early multiplication)'', ''Systematic problem solving (LEGO building, jigsaw puzzles)'',
    ''Digital literacy with educational apps'', ''Basic Vietnamese language skills'',
    ''Organizing schoolwork and routines'']'
  hobbies: '[''Reading chapter‑book series (e.g., Magic Tree House)'', ''LEGO building'',
    ''Jigsaw puzzles'', ''Drawing mandalas and coloring books'', ''Structured playground
    games (Simon Says, Red Light/Green Light)'', ''Basic Vietnamese language practice
    with family'', ''Participating in community cultural festivals and cooking simple
    family dishes'']'
  career_goals: Nhan imagines becoming a teacher who can create organized, predictable
    classrooms for young children, designing clear lesson plans and supportive routines.
    She is also fascinated by caring for animals and dreams of someday working as
    a veterinary assistant to help pets with practical, hands‑on care. In the near
    term, she aims to earn a reading award and to lead a small‑group science project
    at school.
