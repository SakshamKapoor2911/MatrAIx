persona_description: A policy maker who is concerned with energy policy and risk assessment,
  particularly in the context of radiation and chemical hazards. This person is interested
  in comparing risks from different energy technologies and strategies, and is aware
  of the potential for dose-effect relationships at very low doses, especially in
  the case of radiation. They are also familiar with the concept of accidents as the
  most accurately assessed of energy-related risks.
