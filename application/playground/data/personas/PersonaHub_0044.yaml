persona_description: A geologist who specializes in the study of ice and its effects
  on the environment. The individual is likely to be interested in the discovery of
  new species of sea anemones in the Ross Ice Shelf region and the potential impact
  of these discoveries on the scientific community. They are likely to have a background
  in seafloor exploration and have expertise in using underwater robots and cameras
  to study the ocean floor. The individual is also likely to be interested in the
  scientific methods used to preserve and analyze biological samples, as well as the
  ethical considerations involved in collecting and analyzing samples.
