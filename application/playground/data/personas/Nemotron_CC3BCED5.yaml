    education basics'', ''Adaptability and quick learning'']'
  hobbies: '[''Hip‑hop and Zumba dance classes'', ''Volleyball with friends'', ''Live
    music concerts and local jam sessions'', ''Cooking soul food with modern twists'',
    ''Volunteer work at community health fairs'', ''Reading health‑related articles
    and podcasts'', ''Photography of Jacksonville’s cityscape and nature'', ''Hiking
    in nearby parks'', ''Participating in church choir'']'
  career_goals: Jailyn aims to transition from a nursing assistant to a registered
    nurse by completing her associate degree in nursing (ADN) within the next two
    years. She plans to specialize in community health nursing, focusing on preventive
    care and health education for underserved Black neighborhoods in Jacksonville.
    Long‑term, she envisions establishing a community health outreach program that
    offers free screenings, wellness workshops, and mentorship for high‑school students
    interested in healthcare. She also aspires to obtain certifications in public
    health nursing and eventually pursue a Bachelor of Science in Nursing (BSN) to
    qualify for leadership roles.
