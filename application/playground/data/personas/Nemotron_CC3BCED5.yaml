personas:
  professional: Jailyn Claybon is a nursing assistant who excels at vital sign monitoring,
    wound care, and EHR documentation, leveraging calm resilience and a curiosity
    for emerging health‑tech while juggling a relaxed approach to scheduling as she
    works toward her ADN and a community‑health nursing specialization.
  sports: Jailyn Claybon plays competitive beach volleyball with the Jacksonville
    Suns club, cheers for the Jacksonville Jaguars on Sundays, and squeezes Zumba
    classes into her schedule to stay fit and social.
  arts: Jailyn Claybon immerses herself in hip‑hop and Zumba dance classes, sings
    in her church choir, captures vibrant murals at Riverside Arts Market, and cites
    J. Cole and Anderson . Paak as the soundtrack to her weekend jam sessions.
  travel: Jailyn Claybon prefers spontaneous road trips, often heading to the Timucuan
    Ecological Preserve for sunrise hikes, the historic streets of Savannah for weekend
    getaways, and dreams of visiting New Orleans to explore its lively music scene.
  culinary: Jailyn Claybon experiments with modern twists on classic soul food—like
    collard‑green quinoa bowls, sweet‑potato pie topped with coconut‑cream, and seasoned
    fried catfish—while regularly feeding friends from her modest kitchen.
  core: Jailyn Claybon blends a calm, resilient bedside manner with a love for spontaneous
    dance, community‑driven finance, and culinary experiments, all while occasionally
    letting a relaxed, disorganized habit sneak into her schedule.
background:
  cultural: Jailyn grew up in the vibrant Black community of Jacksonville, where Southern
    African‑American traditions blend with contemporary urban culture. Family gatherings,
    church events, and local festivals like Juneteenth have shaped her sense of identity
    and collective responsibility. She draws strength from the legacy of Black excellence
    in the region, including historic neighborhoods such as LaVilla and community
    institutions like the Jacksonville Urban League. This cultural grounding fuels
    her commitment to health equity, and she often incorporates elements of Black
    culinary heritage, music, and storytelling into her social interactions and community
    outreach.
attributes:
  skills: '[''Patient care and assistance with activities of daily living'', ''Vital
    signs measurement'', ''Basic wound care'', ''Infection control procedures'', ''CPR
    and BLS certification'', ''Electronic health record documentation'', ''Effective
