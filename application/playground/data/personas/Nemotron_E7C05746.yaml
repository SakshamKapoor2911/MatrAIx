personas:
  professional: Mary Alberti is a front‑line food service specialist whose razor‑sharp
    cash handling, inventory tracking, and POS mastery combine with a disciplined,
    routine‑driven work ethic, enabling them to calmly resolve high‑pressure customer
    issues and hit performance targets while eyeing a promotion to shift supervisor.
  sports: Mary Alberti fuels their fitness routine by clocking 3‑5 mile runs around
    Lake Mendota with the Madison Runners Club, roots for the Wisconsin Badgers basketball
    team in the winter, cheers the Milwaukee Brewers in summer, and never misses a
    Green Bay Packers game on Sundays, balancing competitive spirit with disciplined
    consistency.
  arts: Mary Alberti finds creative inspiration in the lyrical storytelling of John
    Prine, the atmospheric indie folk of Bon Iver, and the classic cinematography
    of Wes Anderson, often attending local art walks and museum exhibits to unwind
    after a shift.
  travel: Mary Alberti prefers meticulously planned weekend getaways that blend quiet
    lakeside relaxation in Door County with occasional culinary adventures in Napa
    Valley, while dreaming of a future overseas trip to Kyoto, always balancing travel
    costs with the need to save for a future diner venture.
  culinary: Mary Alberti showcases an intermediate culinary talent by perfecting Midwestern
    classics such as cheddar‑crusted bratwurst, cheese‑curd laden poutine, and a spiced
    apple crumble, often incorporating fresh tomatoes, beans, and herbs from their
    raised‑bed garden while both cooking at home and hosting low‑key dinner gatherings.
  core: Mary Alberti is a routine‑obsessed, bullet‑journal aficionado who balances
    disciplined work ambition with a competitive edge, occasional craft‑brew indulgence,
    and a habit of double‑checking every receipt for hidden costs.
background:
  cultural: Mary is a second‑generation Italian‑American raised in Madison, Wisconsin.
    Her family’s modest, Catholic, Midwestern upbringing emphasized hard work, practicality,
    and community. She grew up with traditions like Sunday family meals featuring
    homemade pasta and Wisconsin cheese, and she values the region’s love of outdoor
    recreation, local farmers markets, and modest, reliable living.
attributes:
  skills: '[''POS system operation'', ''Cash handling'', ''Food safety compliance'',
    ''Inventory management'', ''Team scheduling'', ''Customer service'', ''Multitasking'',
    ''Time management'', ''Shift leadership'', ''Problem solving under pressure'']'
  hobbies: '[''Bullet journaling'', ''Home cooking and baking'', ''Raised-bed gardening'',
    ''Running around Lake Mendota'', ''Reading self-help books'', ''Solving Sudoku
    puzzles'', ''Attending craft-brew tastings'', ''Listening to classic rock music'']'
  career_goals: She aims to advance from crew member to shift supervisor within the
    next year, then to restaurant manager, and ultimately to own a small family‑style
    diner that emphasizes community and consistency. To support these goals she plans
    to enroll in a community college hospitality program and obtain a ServSafe manager
    certification.
