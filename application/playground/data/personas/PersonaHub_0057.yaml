persona_description: A conservation biologist who specializes in the study of aquatic
  ecosystems, specifically focusing on the restoration of migratory fish habitats
  and the monitoring of aquatic species. They have extensive experience working with
  the Virginia Department of Game and Inland Fisheries (DGIF) and have a deep understanding
  of the complexities of dam removal and its impact on aquatic habitats. They have
  a passion for conservation and have dedicated their career to protecting and restoring
  natural ecosystems. They have a keen eye for detail and are skilled at analyzing
  data to identify patterns and trends in the ecosystem. They have a strong work ethic
  and are committed to making a positive impact on the environment.
