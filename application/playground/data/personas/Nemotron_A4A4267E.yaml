  hobbies: '["Sketching", "Poetry writing", "Listening to R&B, hip‑hop, and Zydeco
    music", "Basketball", "Cooking Creole family recipes", "Watching nature documentaries",
    "Mobile gaming"]'
  career_goals: Kim aims to complete her high school education (or obtain a GED) and
    build a portfolio that blends graphic design with storytelling. She hopes to attend
    a community college or technical program in digital arts, eventually working as
    a freelance graphic designer or visual content creator that offers flexible hours
    to support her family. At the same time, her experiences with intense anxiety
    inspire her to explore a secondary path in youth counseling or mental‑health advocacy,
    where she can use her empathy and personal insight to help peers navigate emotional
    challenges.
