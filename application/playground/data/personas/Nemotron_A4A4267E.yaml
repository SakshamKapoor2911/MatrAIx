personas:
  professional: Kim Boissiere, a sixteen‑year‑old high‑school junior with a talent
    for sketching and photo‑editing, is building a digital portfolio that fuses graphic
    design with short poetic narratives while flexibly juggling school assignments
    and church youth‑group event planning, aiming to launch a freelance career after
    community college.
  sports: Kim Boissiere, an enthusiastic weekend basketball player at the community
    park who cheers for the New Orleans Pelicans and follows the local high‑school
    girls’ basketball team, also joins a seasonal indoor swimming league to stay active
    and balances assertive play with a laid‑back attitude toward scheduled practices.
  arts: Kim Boissiere, a teen sketch‑lover inspired by Beyoncé’s vibrant music‑video
    aesthetics, Rupi Kaur’s emotive poetry, and Clifton Chenier’s lively Zydeco accordion
    riffs, spends free time creating digital collages on Snapseed, attending local
    art workshops, and channeling fluctuating emotions into bold charcoal illustrations.
  travel: Kim Boissiere, who enjoys spontaneous road trips with family to the historic
    French Quarter and nearby wetlands, dreams of exploring New York City’s gallery
    scene and backpacking through Europe, yet typically plans trips with a flexible
    itinerary on a modest budget using a travel‑planning app to balance adventure
    and financial constraints.
  culinary: Kim Boissiere, an aspiring home chef who learns traditional Creole cooking
    from their grandmother, expertly prepares gumbo using okra, andouille sausage,
    and filé powder, experiments with spice blends for jambalaya, and also indulges
    in late‑night pizza and homemade mango‑lime smoothies.
  core: Kim Boissiere, a creatively curious yet anxiety‑prone teenager, toggles between
    sketching vibrant characters, impulsive spending on art supplies, and finding
    comfort in family‑cooked gumbo and weekend basketball games.
background:
  cultural: Kim identifies as African‑American with Creole heritage, growing up in
    Alexandria, Louisiana. Her family blends Southern Black church traditions—gospel
    music, community fellowship—with Creole customs such as the use of French phrases,
    Mardi Gras celebrations, and a love for spicy Cajun cuisine. The close‑knit community
    of Rapides Parish emphasizes respect for elders, mutual support, and pride in
    local history, all of which shape Kim's sense of identity and her desire to give
    back to her neighborhood.
attributes:
  skills: '["Reading and writing", "Basic math", "Smartphone and social media navigation",
    "Photo editing (Snapseed)", "Sketching and illustration", "Cooking Creole dishes",
