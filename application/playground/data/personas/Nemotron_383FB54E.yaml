personas:
  professional: Donovan Munoz leverages a decade of consultative sales experience,
    bilingual fluency in Spanish and English, and a flair for graphic design to create
    culturally resonant proposals for Hispanic‑market clients, while their imaginative
    curiosity and flexible organization enable them to navigate high‑pressure negotiations
    despite occasional emotional spikes.
  sports: Donovan Munoz enjoys weekly salsa dance sessions at a downtown studio, plays
    recreational soccer in a winter league that competes against Miami FC, follows
    the Miami Heat fervently, and maintains a modest cardio routine with a local pickleball
    club.
  arts: Donovan Munoz spends evenings painting abstract canvases inspired by the vibrant
    street murals of Diego Rivera, sketches in cafés while listening to the vinyl
    of Victor Jara and Celia Cruz, curates playlists featuring Beyoncé and the Grupo
    de Música Nova, and draws creative influence from indie game artist Alex Ross.
  travel: Donovan Munoz prefers curated solo trips that blend cultural immersion and
    artistic inspiration, having explored Cartagena’s historic alleys, Barcelona’s
    avant‑garde galleries, and Oaxaca’s bustling markets, while planning a future
    retreat to Kyoto’s tea houses for reflective meditation.
  culinary: Donovan Munoz, an adept home chef, lovingly simmers ropa vieja and picadillo
    with homemade sofrito, spices the dishes with smoked paprika and fresh cilantro,
    and occasionally crafts avocado toast topped with lime zest and chili flakes for
    a quick brunch.
  core: Donovan Munoz channels relentless imagination into art and sales, but battles
    periodic anxiety that fuels late‑night coffee binges and a habit of over‑committing
    to projects.
background:
  cultural: Donovan is a first‑generation Cuban‑American raised in Hialeah, a vibrant
    enclave of Cuban culture in Miami‑Dade County. He grew up speaking Spanish at
    home, celebrating traditions such as Santería holidays, Carnaval, and family gatherings
    centered around music, dance, and food. The strong sense of community and the
    visual richness of Cuban art have profoundly shaped his aesthetic sensibilities.
    While he embraces the entrepreneurial spirit of the United States, he remains
    deeply connected to his heritage, often bridging cultural gaps between American
    business practices and Cuban values in his professional interactions.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Consultative sales'', ''Customer
    relationship management (CRM)'', ''Negotiation and closing'', ''Presentation and
    public speaking'', ''Creative copywriting'', ''Basic graphic design (Adobe Photoshop,
    Canva)'', ''Digital marketing fundamentals'', ''Cultural competency with Cuban
    community'', ''Time management and organization'', ''Emotional intelligence and
    client empathy'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Speculative fiction
    reading'', ''Philosophy study'', ''Guitar playing'', ''Salsa dancing'', ''Cooking
    Cuban cuisine'', ''Mindfulness meditation'', ''Reflective journaling'', ''Small‑group
    socializing'', ''Visiting museums and art galleries'', ''Volunteering at Cuban
    cultural festivals'']'
  career_goals: Donovan aims to transition from a frontline sales representative to
    a strategic account manager and eventually a sales team leader within a company
    that serves the Hispanic market in South Florida. He plans to earn a professional
    sales certification and complete online courses in digital marketing to broaden
    his skill set. In the long term, he envisions founding his own boutique consulting
    firm that blends service sales with culturally resonant branding, allowing him
    to channel his creative interests while providing tailored solutions for small
    Cuban‑American businesses.
