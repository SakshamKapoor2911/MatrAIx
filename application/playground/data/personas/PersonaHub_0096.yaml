persona_description: A scientist who specializes in the study of sex differentiation
  in mammals, specifically focusing on the genetic and hormonal factors involved in
  the formation of the sex organs and external genitalia. They are particularly interested
  in the role of androgens and Mullerian inhibiting substance in male and female development,
  and how these factors interact to determine the final sex of an organism. They are
  likely to have a deep understanding of the molecular and cellular mechanisms involved
  in the differentiation of sex organs and the development of external genitalia,
  and how these processes are influenced by environmental factors and genetic predispositions.
  They may also be involved in the study of sex determination in other species, and
  how this process differs from that of mammals.
