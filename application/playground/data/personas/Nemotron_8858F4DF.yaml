  career_goals: He dreams of becoming a creator—whether as an illustrator, animator,
    or video‑game designer—who can bring his imaginative worlds to life. Nicholas
    hopes to refine his drawing skills into digital art, study animation in high school,
    and eventually work on interactive storytelling. He also imagines a future where
    he uses art to highlight environmental issues, combining his love of nature with
    his creative talents. In the short term, he aims to join a local art‑camp, complete
    a Scratch project that tells a story about his favorite park, and earn a place
    in a school science fair with a project that blends art and ecology.
