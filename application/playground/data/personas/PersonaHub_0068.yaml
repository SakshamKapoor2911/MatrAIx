persona_description: A healthcare professional who is interested in asthma prevention
  and management, particularly in children and adolescents. This person is knowledgeable
  about the environmental triggers that can cause asthma and the effectiveness of
  home-based multi-trigger, multicomponent interventions in reducing asthma symptoms,
  missed school and work days, and early deaths. This person is also interested in
  the economic efficiency of these interventions and the value they provide for the
  dollars spent. This person is likely to be a parent, healthcare provider, or advocate
  for asthma prevention and management.
