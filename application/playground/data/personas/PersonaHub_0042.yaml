persona_description: A teacher who advocates for the implementation of Common Core
  Standards in education, particularly in mathematics and English language arts. She
  is an advocate for the importance of thinking and analyzing skills in teaching,
  and believes that the new standards will help students understand and remember concepts
  more deeply and remember them longer. She is also a proponent of non-fiction texts
  in English and the emphasis on writing genres such as opinion/argument, narrative,
  and informational. She is a teacher who is well-versed in the implementation of
  Common Core Standards and is committed to starting the new standards without materials
  until they are approved by the California Department of Education.
