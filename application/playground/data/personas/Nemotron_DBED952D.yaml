personas:
  professional: Alan Russell, an experienced elementary and middle‑school STEM teacher,
    leverages their methodical planning and data‑driven assessment to design interdisciplinary
    curricula while assertively advocating for robust science education at staff meetings.
  sports: Alan Russell, an avid hiker of Michigan’s state parks, participates in the
    local Detroit Lakes Trail Club, follows the Detroit Lions and Detroit Tigers for
    seasonal sports excitement, and schedules weekly brisk walks on weekends to stay
    fit.
  arts: Alan Russell, a weekend acoustic‑guitar player, often serenades family gatherings
    with folk classics by Bob Dylan and John Denver, and finds artistic inspiration
    in the watercolor paintings of Winslow Homer, while occasional trips to the Detroit
    Institute of Arts fuel their appreciation for modern masters like Andy Warhol.
  travel: Alan Russell, a meticulous planner, prefers road‑trip adventures to Michigan’s
    Upper Peninsula and seasonal visits to the Canadian Rockies, while dreaming of
    a cultural excursion to Kyoto’s temples and a summer getaway to the coastal towns
    of the French Riviera, balancing travel with family commitments and a modest travel
    budget.
  culinary: Alan Russell, a competent home chef, delights in preparing herb‑crusted
    salmon with fresh basil and lemon from their garden, crafting hearty quinoa‑and‑roasted‑beet
    salads, and perfecting sourdough bread using a wild‑fermented starter, while often
    experimenting with new spice blends like smoked paprika and sumac.
  core: Alan Russell, a curious yet pragmatic educator, balances a love for hands‑on
    projects and scientific inquiry with a tendency to meticulously plan everything,
    even if it sometimes leads to over‑scheduling and occasional coffee‑induced procrastination.
background:
  cultural: Alan grew up in a suburban Midwestern family of European descent, with
    deep roots in the Detroit metropolitan area. His upbringing emphasized the Protestant
    work ethic, community involvement, and the value of education. Living in Bloomfield
    Hills, an affluent enclave of Oakland County, he has been shaped by a blend of
    traditional Midwestern pragmatism and the cultural expectations of an upper‑middle‑class
    community. He participates in local civic events, supports the public library,
    and celebrates American holidays with a focus on family and community service,
    reflecting the region's blend of progressive education values and longstanding
    suburban traditions.
attributes:
  skills: '["STEM curriculum design", "Project‑based learning", "Data‑driven assessment",
    "Classroom management", "Educational technology integration", "Robotics and coding
    club facilitation", "Differentiated instruction", "Mentoring new teachers", "Grant
    writing", "Professional development workshop facilitation"]'
  hobbies: '["Woodworking", "Hiking in Michigan state parks", "Reading popular science
    and historical non-fiction", "Playing acoustic guitar", "Cooking experimental
    recipes", "Gardening (vegetable and herb garden)", "Model building (RC cars)",
    "Volunteering for community STEM outreach"]'
  career_goals: Alan aims to transition into a district‑wide instructional leadership
    role, such as STEM curriculum coordinator or instructional coach, where he can
    shape curriculum policy and mentor teachers across schools. He aspires to spearhead
    a regional STEM outreach initiative that partners with local businesses and universities,
    securing sustainable funding through grant writing. Long‑term, he envisions authoring
    a practical guide for integrating engineering concepts into early‑grade classrooms,
    blending his curiosity for new ideas with his practical, results‑oriented approach.
