  career_goals: Approaching retirement, Sonia aims to secure a senior quality assurance
    specialist position where she can lead process‑improvement projects and mentor
    younger employees. She is pursuing Six Sigma Green Belt certification to sharpen
    her efficiency‑driving skill set. In the longer term, she plans to transition
    to part‑time consulting, offering data validation and compliance services to small
    Mexican‑American businesses in Houston. Additionally, she hopes to volunteer regularly
    as a math tutor for local youth, using her expertise to inspire the next generation
    while remaining competitively engaged in her field.
