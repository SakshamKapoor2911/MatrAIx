personas:
  professional: Terri Maxson is a veteran elementary and middle school educator who
    deftly blends rigorous curriculum design with heartfelt mentorship, leveraging
    their methodical planning and tech‑savvy in Google Classroom to nurture junior
    teachers while championing community‑focused literacy initiatives.
  sports: Terri Maxson is a devoted supporter of the local high‑school basketball
    team, a regular attendee of Detroit Tigers games at Comerica Park, and they join
    their husband on the Clinton River trail for brisk walks, while occasionally participating
    in a senior fitness walking group affiliated with the community center.
  arts: Terri Maxson finds artistic fulfillment singing in their church choir, weaving
    intricate quilts inspired by the patterns of Georgia O'Keeffe, and they immerse
    themselves in classic literature, especially the works of Jane Austen and Toni
    Morrison, during their book‑club gatherings.
  travel: Terri Maxson prefers leisurely road trips to historic towns like Mackinac
    Island and the scenic vistas of Acadia National Park, planning each itinerary
    months in advance to accommodate their routine‑oriented nature, while they dream
    of a future pilgrimage to the literary trail of Stratford‑upon‑Avon.
  culinary: Terri Maxson delights in garden‑fresh meals, often preparing herb‑seasoned
    roasted chicken with rosemary and thyme, classic apple pie using Granny Smith
    apples from their backyard, and hearty vegetable soups, while they proudly showcase
    their skill at quilting‑themed cookie decorating.
  core: Terri Maxson balances a structured, community‑centric life with a lively social
    pulse, yet their tendency toward anxiety and occasional neglect of self‑care adds
    a touch of restless humanity to their otherwise orderly world.
background:
  cultural: Terri was raised in a middle-class, white, Midwestern family in the Detroit
    metropolitan area. Her upbringing reflects the values of hard work, punctuality,
    and neighborly care typical of suburban Michigan. She grew up in a Protestant
    (Methodist) household that emphasized community service, holiday traditions, and
    weekly family meals. The cultural fabric of Macomb County—shaped by automotive
    industry roots, strong labor unions, and seasonal celebrations—has reinforced
    her practical outlook and deep ties to local schools, churches, and neighborhood
    events.
