    trail walking'', ''Attending high-school sports events'', ''Cooking family meals'',
    ''Seasonal holiday decorating'']'
  career_goals: While preparing for retirement, Terri aims to leave a lasting legacy
    by mentoring junior teachers, publishing a collection of grade-appropriate reading
    resources, and serving on the local school board to advocate for practical, community-focused
    policies. She also hopes to develop a community reading hub at the public library
    and consult part-time on curriculum design for nearby schools.
