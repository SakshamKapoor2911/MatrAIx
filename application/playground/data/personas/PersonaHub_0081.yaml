persona_description: A historian who specializes in the study of the Civil War and
  its impact on African Americans, as well as the abolitionist movement. Their research
  interests include the history of slavery, the Emancipation Proclamation, and the
  experiences of African Americans during the Civil War. They are deeply connected
  to the history of the United States and are passionate about preserving and promoting
  the legacy of the Civil War and the struggle for freedom.
