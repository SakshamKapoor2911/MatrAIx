    ''Board Games (Strategy)'', ''Live Music'', ''Hackathons'', ''DIY Electronics
    (Arduino/Raspberry Pi)'']'
  career_goals: Alicia aims to lead an interdisciplinary research team that pushes
    the boundaries of AI for creative expression, publishing high‑impact papers and
    securing competitive grants. She envisions developing novel generative algorithms
    that blend art and science, eventually launching a startup that offers AI‑driven
    creative tools for designers and musicians. Parallel to her professional ambitions,
    she hopes to mentor Latinx women in technology, champion inclusive research practices,
    and shape policy that supports open, collaborative science.
