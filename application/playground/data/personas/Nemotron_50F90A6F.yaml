personas:
  professional: Alicia Gonzalez, a research scientist specializing in machine learning
    and natural language processing, channels her vivid imagination and competitive
    drive into designing generative algorithms that turn massive data sets into striking
    visual narratives, while her relaxed, sometimes disorganized work style lets her
    explore unconventional research paths, even if project timelines occasionally
    slip.
  sports: Alicia Gonzalez, an enthusiastic hiker who spends weekends trekking the
    Butte County trails with the Chico Outdoor Club, also supports the Sacramento
    Kings in basketball, follows the San Francisco 49ers in football, and plays in
    a local amateur soccer league during summer, while maintaining flexibility and
    balance through regular yoga sessions.
  arts: Alicia Gonzalez, an abstract painter and generative digital artist, draws
    creative fuel from the rhythmic pulse of cumbia, the immersive installations of
    James Turrell, the vibrant patterns of Yayoi Kusama, the experimental soundscapes
    of Björk, and the speculative narratives of Ted Chiang, often weaving these influences
    into interactive gallery exhibits and poetry slams.
  travel: Alicia Gonzalez, who mixes meticulous research with spontaneous curiosity,
    favors rugged adventures like hiking Patagonia’s Torres del Paine and exploring
    Granada’s Alhambra, while also enjoying weekend getaways to Lake Tahoe and the
    street‑art‑rich neighborhoods of Portland, balancing a modest travel budget with
    a desire for culturally immersive experiences.
  culinary: Alicia Gonzalez, an intermediate‑to‑advanced home cook, relishes preparing
    bandeja paisa, arepas stuffed with aji amarillo‑spiced pork, and quinoa‑infused
    empanadas, often experimenting with fusion flavors like chimichurri‑marinated
    plantains, while pairing meals with craft coffee and documenting each dish through
    vivid photography.
  core: Alicia Gonzalez fuses scientific precision with artistic chaos, chasing novelty
    in code and canvas, juggling multiple projects with a laid‑back yet competitive
    edge, and occasionally losing track of deadlines while thriving on spontaneous
    bursts of creativity.
background:
  cultural: Alicia was raised in a bilingual Colombian household, with parents who
    immigrated to the United States before she was born. Family gatherings were filled
    with the sounds of cumbia and vallenato, the aromas of bandeja paisa, and stories
    of Colombian festivals like Carnaval de Barranquilla. These traditions instilled
    a strong sense of community, resilience, and a love for storytelling. Fluent in
    both Spanish and English, Alicia frequently bridges cultural perspectives in her
    work, drawing on Colombian notions of collectivism and creativity while navigating
    the innovative tech ecosystem of Chico, California. She stays connected to the
    Latinx community through local cultural events, volunteer tutoring programs, and
    an online network of Colombian scientists.
attributes:
  skills: '[''Machine Learning'', ''Deep Learning'', ''Natural Language Processing'',
