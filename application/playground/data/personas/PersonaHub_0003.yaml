persona_description: A historian or a scholar who is interested in the history of
  the Roman Empire, particularly the early years and the impact of Christianity on
  society. They are knowledgeable about the persecution of Christians in the Roman
  Empire and the story of Saint Maurice, the Roman soldier who refused to participate
  in pagan sacrifices and was eventually martyred. They are also interested in the
  concept of honor, courage, and faithfulness to one's beliefs, which are reflected
  in the story of Saint Maurice.
