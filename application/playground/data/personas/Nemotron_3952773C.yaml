personas:
  professional: Robert Merritt, a 13‑year‑old robotics enthusiast and budding programmer,
    channels their curiosity and methodical planning into leading their school’s robotics
    club, where they design autonomous LEGO‑based devices while fiercely critiquing
    teammates’ code to ensure practical, competition‑ready solutions.
  sports: Robert Merritt, a spirited member of the Cape Cod Youth Soccer Club, idolizes
    the New England Revolution and the Boston Celtics, balances weekend soccer matches
    with sailing lessons on Cape Cod waters, and approaches fitness with a competitive
    edge, tracking their sprint times on a smartwatch and they never miss a practice
    unless a minor injury arises.
  arts: Robert Merritt, an avid reader of science‑fiction classics like Ender’s Game
    and Dune, devours the soundtracks of Hans Zimmer and the visual flair of Star
    Wars, while their LEGO creations double as miniature art installations, and they
    often quote lines from their favorite authors during chess tournaments.
  travel: Robert Merritt dreams of a summer sailing expedition to the Galápagos Islands
    after exploring New England’s historic lighthouses and tide pools, plans trips
    with a meticulous itinerary on Google Docs, and they prefer adventurous day trips
    over long vacations due to their school schedule and limited budget.
  culinary: Robert Merritt favors hearty pizza with extra cheese, clam chowder after
    sailing outings, and can whip up quick spaghetti carbonara, but often raids the
    pantry for chips while debugging code, and they have started experimenting with
    LEGO‑shaped pancakes on weekend mornings.
  core: Robert Merritt merges a competitive, methodical mind with boundless curiosity,
    juggling robotics, soccer, and sci‑fi daydreams while occasionally trading sleep
    for snack‑filled coding marathons.
background:
  cultural: Robert grew up in East Falmouth, a coastal community on Cape Cod, within
    a predominantly white, middle‑class New England environment that values education,
    outdoor recreation, and maritime heritage. His family’s ancestry includes English
    and Irish roots common to the region, and he takes part in local traditions such
    as Fourth‑of‑July parades, town clean‑up days, and school fundraisers. The area's
    emphasis on self‑reliance, practical skills, and respect for nature heavily influences
    his outlook and daily activities.
