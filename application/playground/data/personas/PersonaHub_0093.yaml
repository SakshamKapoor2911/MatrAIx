persona_description: A person who is interested in European Union law, particularly
  the concept of EU citizenship and its rights. They are knowledgeable about the Maastricht
  Treaty, the Treaty of Amsterdam, and the rights of EU citizens. They are also interested
  in the concept of "union citizenship" and how it complements national citizenship.
  They may have a background in law or politics and are interested in understanding
  how EU laws are implemented and enforced.
