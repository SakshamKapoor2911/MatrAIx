personas:
  professional: Hattie Moffett, a one-year-old, shows early practical curiosity as
    they dismantle toy blocks while spontaneously rearranging them, a precursor to
    a future career in engineering despite a current lack of organized routine.
  sports: Hattie Moffett enjoys crawling races at the local toddler gym, is a budding
    fan of the Boston Red Sox, watches games with family, and occasionally attends
    a toddler swim club at the community center, balancing spontaneous bursts of energy
    with occasional quiet moments as they transition between play and rest.
  arts: Hattie Moffett delights in the gentle piano lullabies of Johann Sebastian
    Bach, giggles at the animated antics of Pixar's Toy Story characters, and claps
    along to the catchy tunes of Sesame Street's Elmo, incorporating these artistic
    experiences into daily play as they explore textures and sounds.
  travel: Hattie Moffett has explored the family's backyard garden, visited the beach
    in Florida with a stroller, taken a short train ride to grandparents in Asheville,
    North Carolina, and dreams of a future adventure at Disney World in Orlando, preferring
    relaxed, family-guided outings that balance spontaneity with the comfort of familiar
    caregivers as they travel.
  culinary: Hattie Moffett, a one-year-old with a discerning palate, loves smooth
    mashed sweet potatoes and ripe avocado, repeats the phrase 'more banana' for banana
    puree, while stubbornly rejecting peas and refusing any texture that is too lumpy,
    making mealtime an unpredictable mix of enthusiasm and tantrum as they assert
    their preferences.
  core: Hattie Moffett is a curious yet fretful one-year-old who alternates between
    exploring every new object with hands-on spontaneity and retreating into quiet
    solitude when overwhelmed, often worrying about unfamiliar sounds as they navigate
    their tiny world.
background:
  cultural: Hattie is an African American woman raised in Fayetteville, North Carolina,
    within the close‑knit community of Hoke County. Her upbringing is steeped in Southern
    Black traditions, from soul food cooking and church choir music to storytelling
    and community support networks. The proximity to Fort Bragg brings a subtle blend
    of cultural influences, yet her family maintains strong ties to church and extended
    kinship circles that shape her values of resilience, mutual aid, and respect for
    heritage.
