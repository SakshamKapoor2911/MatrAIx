  career_goals: Although she is retired, Katherine's ambitions focus on maintaining
    her health, independence, and sense of purpose. She aims to stay active within
    the senior center by serving as a mentor for newer volunteers and eventually chairing
    the advisory committee that recommends programs for the elderly. She hopes to
    complete a handwritten memoir of her family's history for future generations and
    to learn digital photography to document local wildlife. She also wants to secure
    a stable financial footing by continuing to manage her expenses wisely and exploring
    low‑risk investment options. Finally, Katherine aspires to travel within Florida—visiting
    museums, botanical gardens, and coastal towns—while keeping a flexible schedule
    that allows spontaneous outings.
