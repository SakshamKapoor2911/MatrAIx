personas:
  professional: Vincent Cruz, a budding mini‑project manager, orchestrates playtime
    with spreadsheets of colored stickers, turning their sandbox into a well‑ordered
    construction site that satisfies their love for curiosity and high standards,
    and they proudly present each completed “project” to family members.
  sports: Vincent Cruz dribbles with enthusiasm on the Little Lions youth soccer team,
    cheers loudly for the local baseball club the Red Sox, and practices balance on
    a backyard mini‑trampoline, reflecting their sociable, outgoing energy and love
    for group activities.
  arts: Vincent Cruz colors detailed dinosaur scenes with precision, sings along to
    Disney movie soundtracks, and stages a favorite scene from "Moana" during playdates,
    showcasing their creative curiosity and enjoyment of collaborative performances.
  travel: Vincent Cruz has explored the local children's museum, splashed in the waves
    at a Florida beach resort, and dreams of a magical visit to Disneyland, preferring
    trips that blend adventure with the comforting presence of family, and they often
    pack a favorite stuffed animal for the journey.
  culinary: Vincent Cruz adores cheesy macaroni, dips carrot sticks into ranch dressing,
    but consistently refuses broccoli, and proudly helps stir batter for banana pancakes,
    reflecting a selective palate tempered by occasional kitchen curiosity.
  core: Vincent Cruz is a curious, organized, and energetic four‑year‑old who balances
    meticulous routines with playful exploration, revels in group activities, saves
    coins with precision, yet occasionally succumbs to picky‑eating habits, and they
    cherish both structure and spontaneity.
background:
  cultural: Vincent grows up in a vibrant Puerto Rican household in San Juan, where
    Spanish and English are spoken interchangeably. His family celebrates local traditions
    such as Fiesta de San Juan, Carnaval, and Día de los Reyes, often sharing music
    like plena, bomba, and salsa. He enjoys classic Puerto Rican dishes like empanadillas
    and arroz con gandules at family gatherings. The island’s tropical environment,
    close‑knit community, and rich cultural heritage shape his outgoing personality,
    love for group activities, and deep appreciation for music and celebration.
