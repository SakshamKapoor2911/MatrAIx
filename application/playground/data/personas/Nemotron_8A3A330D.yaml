personas:
  professional: Mariella Sanchez, a 20‑year‑old bilingual front‑of‑house specialist,
    blends meticulous reservation management with an innate curiosity for local art,
    using their fluency in English and Spanish to craft personalized guest experiences
    that highlight nearby galleries and coffee‑house culture while they calmly multitask
    in a fast‑paced café environment and resolve conflicts with a kind, steady hand.
  sports: Mariella Sanchez stays active through sunrise hikes in Laguna Coast Wilderness,
    weekly Vinyasa classes at Laguna Hills Yoga Studio, and weekend beach‑volleyball
    matches with a Huntington Beach league, cheering the LA Dodgers, LA Lakers, and
    Anaheim Ducks while they log runs with the OC Striders Running Club to maintain
    a balanced fitness routine.
  arts: Mariella Sanchez nurtures their love for the arts by sketching café scenes
    in watercolor, attending open‑mic nights at The Lost Tree, exploring the Orange
    County Museum of Art and Laguna Art Museum, and drawing inspiration from street
    murals by Carlos Alvarez as well as the works of Banksy and Yayoi Kusama, which
    they eagerly discuss with friends.
  travel: Mariella Sanchez prefers thoughtfully planned trips that blend cultural
    immersion with coffee exploration, having visited the highland coffee farms of
    Guatemala and the historic streets of Kyoto, while they save carefully to fund
    future journeys to Colombia’s Sierra Nevada coffee region and the coastal vineyards
    of Napa Valley despite a tight student budget.
  culinary: Mariella Sanchez, an intermediate home cook, delights in perfecting masa‑based
    tamales and rich mole sauce flavored with ancho chilies, cacao nibs, and toasted
    spices, while they experiment with single‑origin pour‑over coffee using a V60,
    savoring notes of citrus from Ethiopian beans and buttery undertones from Guatemalan
    harvests.
  core: Mariella Sanchez, the art‑loving coffee aficionado who balances meticulous
    hospitality work with spontaneous watercolor sketches, often loses track of time
    in galleries and forgets to water their houseplants, even though they swear they’ll
    remember tomorrow.
background:
  cultural: Mariella grew up in a bilingual Mexican‑American household, where Spanish
    was spoken at home and Mexican traditions such as Día de los Muertos, Cinco de
    Mayo celebrations, and family gatherings centered around food were cherished.
    Her parents instilled values of hospitality, community, and respect for elders.
    Living in Fountain Valley, she blends her Mexican heritage with the diverse, laid‑back
    Californian lifestyle, participating in local Latino community events and embracing
    the multicultural vibe of Orange County. This blend influences her love for art,
    food, and the social atmosphere she creates as a hostess.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Reservation
    and seating management'', ''Cash handling and POS operation'', ''Conflict resolution'',
    ''Team collaboration'', ''Time management'', ''Adaptability in fast‑paced settings'',
    ''Basic coffee preparation knowledge'', ''Art and cultural recommendations'',
    ''Social media promotion'', ''Food safety awareness'']'
  hobbies: '[''Visiting art galleries and murals'', ''Sketching and watercolor painting'',
    ''Coffee tasting and brewing experiments'', ''Yoga and mindfulness'', ''Hiking
    in local parks'', ''Volunteering at cultural festivals'', ''Cooking traditional
    Mexican dishes'', ''Attending live music and open‑mic events'']'
  career_goals: She aims to complete her high school diploma through a community college
    program within the next two years, then pursue an associate degree in hospitality
    management. In the short term, Mariella wants to become a lead hostess and eventually
    a floor manager at a high‑end restaurant, where she can mentor new staff and shape
    the guest experience. Long‑term, she envisions opening a café‑gallery hybrid that
    showcases local artists while serving Mexican‑inspired coffee and pastries, creating
    a cultural hub for the community. She also hopes to travel to Mexico to study
    traditional coffee production and culinary techniques, integrating those insights
    into her future business.
