personas:
  professional: Sean Buckley is a seasoned software developer whose methodical approach
    and love for reliable systems drive his work across Java, C# and Python, leveraging
    Agile, rigorous code reviews, and comprehensive documentation to deliver scalable
    applications while mentoring junior developers and preparing for a lead architect
    role.
  sports: Sean Buckley is an avid hiker and fly‑fisher who spends summer weekends
    trekking the Absaroka and Gallatin ranges, cross‑country skis nearby national
    forests in winter, supports the Denver Broncos, Colorado Rockies, and Montana
    Grizzlies, and holds a membership with the Livingston Outdoor Recreation Club,
    where he also enjoys occasional pickleball matches.
  arts: Sean Buckley is a classic‑rock and blues aficionado who spends evenings listening
    to Led Zeppelin, BB King, and The Rolling Stones, reads historical novels by Ken
    Follett and Bernard Cornwell, builds rustic furniture inspired by Sam Maloof,
    and curates a detailed Bachmann model‑railroad layout that reflects his love for
    precision and craftsmanship.
  travel: Sean Buckley is a meticulous planner who prefers structured, nature‑focused
    trips, having already explored Yellowstone, Glacier, and Banff National Parks,
    and now dreams of hiking the Patagonia Torres del Paine circuit and the Scottish
    Highlands, arranging each itinerary months in advance while balancing a modest
    travel budget with his commitment to maintain work‑life equilibrium.
  culinary: Sean Buckley is a competent home cook who transforms garden‑grown vegetables
    into roasted root medleys, grills fresh river trout with rosemary and lemon, prepares
    a hearty wild‑mushroom risotto, and pairs these dishes with craft‑beer selections
    from local breweries such as Great Divide and BridgePort, reflecting his love
    for rustic, flavorful meals.
  core: Sean Buckley is a methodical software veteran who balances a passion for reliable
    code, rugged outdoor pursuits, classic‑rock listening, and perfecting woodworking
    projects, while occasionally splurging on craft‑beer tastings and forgetting to
    schedule dental check‑ups.
background:
  cultural: Sean’s cultural background blends a Midwestern Irish‑American heritage
    with the rugged, community‑centered ethos of Montana’s “Big Sky” country. Raised
    in a small town, he grew up valuing self‑reliance, neighborly cooperation, and
    a deep respect for nature. His family traditions include modest celebrations of
    Irish holidays like St. Patrick’s Day, and a strong work ethic passed down through
    generations of labor‑focused parents. Since moving to Livingston, he has embraced
    the local culture of outdoor recreation, frontier hospitality, and a modest, pragmatic
    approach to life, while integrating his technical career into the region’s growing
    digital economy.
