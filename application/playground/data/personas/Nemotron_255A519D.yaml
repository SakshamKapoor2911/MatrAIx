  career_goals: Sean aims to transition into a lead software architect role within
    the next three to five years, focusing on building scalable, maintainable systems
    for his employer and local businesses. He seeks to obtain AWS Solutions Architect
    certification to broaden his cloud expertise and to mentor a small cohort of junior
    developers, fostering a culture of quality and predictability. Over the longer
    term, he envisions moving into a technical leadership position that balances architectural
    oversight with hands-on coding, while maintaining a stable work‑life balance that
    allows him to spend ample time outdoors. He also hopes to contribute to open‑source
    projects that emphasize reliability and to develop a community‑oriented tech workshop
    series in Livingston.
