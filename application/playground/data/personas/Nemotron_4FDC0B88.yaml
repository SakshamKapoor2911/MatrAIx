  hobbies: '[''Reading Philosophy'', ''Oil Painting'', ''Birdwatching'', ''Hiking'',
    ''Collecting Vintage Cameras'', ''Chess'', ''Stargazing'', ''Meditation'', ''Classical
    Music Listening'']'
  career_goals: Although retired from formal employment, Andrew aims to publish a
    memoir and a collection of poems that reflect his lifelong fascination with abstract
    ideas and the natural world. He plans to expand the small‑group art workshops
    he co‑facilitates at the local community center, introducing participants to digital
    media and astrophotography. He also wishes to become a volunteer docent at the
    nearby heritage museum, sharing stories about the region’s history and his own
    experiences. Learning new artistic tools such as virtual‑reality painting intrigues
    him, and he hopes to mentor his grandchildren in both academic pursuits and creative
    expression.
