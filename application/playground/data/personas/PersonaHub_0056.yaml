persona_description: A dedicated advocate for quality education who is committed to
  ensuring that students receive a well-rounded education that prepares them for success
  in the future. This individual is passionate about science education and believes
  that local control of public education should be based on uniform standards. They
  are also knowledgeable about the development and adoption of Next Generation Science
  Standards and are actively involved in the process of implementing these standards
  in their state. They are dedicated to ensuring that students in their state receive
  a high-quality education that prepares them for success in the global economy.
