  hobbies: '[''vegetable gardening'', ''bird watching'', ''quilting'', ''knitting'',
    ''reading historical fiction'', ''crossword puzzles'', ''playing bridge'', ''volunteering
    at the local library'']'
  career_goals: At 85, Deeva’s primary goal is to preserve her independence and maintain
    a well‑ordered home environment. She wishes to complete the unfinished college
    coursework that will earn her a certificate in business administration, allowing
    her to mentor younger family members in practical finances. She aims to stay digitally
    connected with her children and grandchildren by improving her email and video‑call
    skills. Within her church, she aspires to continue organizing the small‑group
    fellowship meetings, ensuring they run smoothly and predictably. She also hopes
    to contribute her budgeting knowledge to the senior center’s volunteer program,
    reinforcing her reputation as a reliable resource.
