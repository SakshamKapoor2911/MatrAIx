persona_description: A system operator who is interested in the integration of renewable
  energy sources and the cost implications of integrating them into the power grid.
  They are knowledgeable about the different technologies available for flexibility
  and their impact on the cost of integrating renewables. They are also familiar with
  the different methods used to calculate the cost of integrating renewables and how
  they can vary depending on the distance into the future. They are active in research
  and have a passion for improving operational planning methods and ensuring that
  the grid is flexible enough to handle the variability of renewables and demand.
