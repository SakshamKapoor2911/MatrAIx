persona_description: A Canadian energy analyst who is interested in the future of
  natural gas production and the impact of changing production patterns on the Canadian
  economy. They are knowledgeable about the current state of natural gas production
  in Canada, including the potential for growth through unconventional resources such
  as tight gas and shale gas, and the need for continued drilling to maintain production.
  They are also familiar with the energy sector as a whole, including the decline
  in production and distribution of oil, gas, and coal as a percentage of total Canadian
  GDP over the past 20 years, and the decline in revenues to governments from the
  sale of non-renewable oil and gas resources. They have a keen interest in the potential
  for growth in unconventional gas resources and the implications for the Canadian
  economy, as well as the need for continued drilling to maintain production.
