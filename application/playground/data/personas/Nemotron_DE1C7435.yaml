personas:
  professional: Iris Trujillo, a seasoned community volunteer and senior center organizer,
    blends practical budgeting acumen with a love of gardening and a gentle, flexible
    approach to coordinating neighborly programs, all while they prefer small, intimate
    gatherings over rigid schedules.
  sports: Iris Trujillo, a devoted fan of the Atlanta Braves and New Orleans Saints,
    stays active by taking gentle morning walks along their garden path, attending
    a weekly senior bowling night at the community center, and occasionally joining
    the local garden‑walking club, all of which they prefer as low‑impact activities
    that fit their relaxed schedule.
  arts: Iris Trujillo weaves their love of classic country legends like Dolly Parton
    and Johnny Cash, the smooth jazz of Louis Armstrong, and the storytelling of historical
    fiction into their patchwork quilts, often humming the melodies while they stitch
    under the garden’s shade.
  travel: Iris Trujillo prefers leisurely, family‑oriented road trips, reminiscing
    about past visits to Charleston’s historic waterfront and New Orleans’ music scene,
    while they dream of a gentle river cruise along the Mississippi that would let
    them savor sunrise views without the rush of crowded airports.
  culinary: Iris Trujillo expertly bakes buttery pecan pie and ruby‑red peach cobbler,
    cooks garden‑fresh collard greens with smoked ham hocks, and preserves heirloom
    tomatoes and sweet peaches, often adding a pinch of fresh thyme or a splash of
    locally milled cornmeal while they season each dish with love.
  core: Iris Trujillo balances quiet curiosity with a steadfast love for home‑grown
    comforts, often misplacing their glasses while pruning roses, and they greet neighbors
    with fresh biscuits and a warm smile.
background:
  cultural: Iris grew up in the Southern United States, absorbing the region's emphasis
    on hospitality, close‑knit community ties, and church involvement. Her family
    heritage includes generations of white Southern farmers and small-town residents,
    shaping her appreciation for home-grown food, gardening, and preserving traditions.
    While she identifies as white, her surname reflects a multicultural ancestry that
    adds a subtle awareness of diverse cultural influences, though her daily life
    is rooted in classic Southern customs and values.
attributes:
  skills: '["Home cooking", "Gardening", "Volunteer coordination", "Household budgeting",
    "Basic digital literacy"]'
  hobbies: '["Reading historical fiction", "Gardening", "Quilting", "Birdwatching",
    "Classic country, folk, and jazz music", "Baking and preserving", "Small senior
    book-club", "Church study groups and potlucks"]'
  career_goals: Her primary ambitions focus on personal fulfillment and community
    contribution rather than formal employment. She aims to stay mentally sharp by
    learning new technologies, document and preserve her family's stories and recipes
    for future generations, remain an active volunteer supporting neighborhood seniors
    and church programs, and maintain her health and independence so she can continue
    enjoying life with her husband and grandchildren.
