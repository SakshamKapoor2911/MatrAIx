personas:
  professional: Tho Ngo is an aspiring IT support technician who leverages Python
    scripting, hardware troubleshooting, and Arduino prototyping to solve problems
    methodically, balancing curiosity with practicality, while they apply their competitive
    gaming mindset to excel in fast‑paced troubleshooting and future cybersecurity
    challenges.
  sports: Tho Ngo rides the waves at Pacific Beach in the summer and drops into the
    Mission Skate Park year‑round, training with the San Diego Skate Crew, while they
    cheer on the San Diego Padres in baseball and the LA Lakers in basketball, and
    they supplement their active lifestyle with weekly strength‑training sessions
    at a local gym to prevent injuries.
  arts: Tho Ngo captures San Diego’s vibrant street art and coastal sunsets with a
    DSLR, drawing inspiration from photographers like Steve McCurry and Ansel Adams,
    while they admire the visual style of street artists Banksy and Shepard Fairey,
    and they unwind listening to Tame Impala and Da Funk, occasionally quoting lines
    from Wes Anderson’s films during photo critiques.
  travel: Tho Ngo prefers budget‑friendly road trips that blend surf, skate, and culture,
    having explored the cliffs of Big Sur, the surf spots of Hawaii, and the night
    markets of Hanoi, and they dream of a future backpacking adventure through Japan’s
    coastal towns while they meticulously plan itineraries on travel forums to stretch
    every dollar.
  culinary: Tho Ngo is an enthusiastic home chef who whips up fragrant pho broth with
    star‑anise and ginger, assembles crunchy banh mi with pâté, pickled veggies, and
    cilantro, and stir‑fries nasi goreng using kecap manis, fresh chilies, and lime,
    constantly refining techniques through YouTube tutorials, and they occasionally
    order sushi to compare flavors.
  core: Tho Ngo is a tech‑savvy, competition‑driven teenager who blends skateboarding,
    gaming, and DIY electronics into a restless creative routine, yet they habitually
    sacrifice sleep for late‑night coding and hoard spare components that end up cluttering
    their room.
background:
  cultural: Tho is a second‑generation Southeast Asian American, born and raised in
    San Diego to immigrant parents who arrived from Vietnam in the early 2000s. His
    household blends the disciplined work ethic and respect for family common in Vietnamese
    culture with the individualism and openness of Southern California life. Bilingual
    at home, he speaks Vietnamese with his grandparents while using English at school
    and in the broader community. Family gatherings feature traditional celebrations
    such as Tet, where food, music, and storytelling reinforce cultural ties. Growing
    up in a multicultural neighborhood, Tho has also absorbed influences from other
    Asian diaspora groups and the broader Latino and Pacific‑West cultures of San
    Diego, allowing him to navigate diverse social settings with ease. This hybrid
    cultural foundation informs his values—community responsibility, perseverance,
    and a love for sharing his heritage through food and language.
attributes:
  skills: '[''Python programming'', ''Computer hardware troubleshooting'', ''Electronics
    prototyping (Arduino)'', ''Graphic design (Photoshop, Canva)'', ''Bilingual communication
    (English/Vietnamese)'', ''Digital photography'', ''Strategic gaming and tactical
    analysis'', ''Basic culinary techniques (Southeast Asian dishes)'']'
  hobbies: '[''Skateboarding'', ''Surfing'', ''Competitive gaming (League of Legends,
    StarCraft II)'', ''DIY electronics projects'', ''Cooking traditional Southeast
    Asian dishes'', ''Digital photography of coastal and urban scenes'', ''Reading
    tech blogs and listening to industry podcasts'']'
  career_goals: Tho aims to earn his GED within the next year and then enroll in a
    community‑college program for Computer Science or Information Technology. He plans
    to obtain CompTIA A+ and Network+ certifications, positioning himself for entry‑level
    IT support roles. In the longer term, he aspires to transition into cybersecurity,
    leveraging his competitive gaming mindset to excel in Capture‑the‑Flag contests
    and eventually become a network security analyst. Parallel to his tech career,
    he hopes to open a low‑cost electronics repair shop that serves his neighborhood,
    providing affordable services and mentorship for other young people interested
    in hands‑on tech. His ambition is driven by a blend of curiosity about emerging
    technologies and a pragmatic desire to build a stable, community‑oriented livelihood.
