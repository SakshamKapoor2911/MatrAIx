persona_description: A person who loves reading books and finds it interesting to
  understand and interpret different words, texts, or situations. They are also interested
  in the act of reading and writing and enjoy poetry readings. They may have a background
  in education or psychology and have a keen interest in the cognitive processes involved
  in reading and interpreting text. They are likely to have a good understanding of
  the English language and its literature, and may have a particular interest in poetry
  or literature.
