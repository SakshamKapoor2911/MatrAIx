persona_description: A linguist who specializes in the study of sign languages, particularly
  those of Eastern Arabic origin. This person is knowledgeable about the classification
  of sign languages, their typology, and their relationship to spoken languages. They
  are also interested in the differences between sign languages and oral languages,
  and how they differ in terms of their writing systems and the production of sounds.
  This person is likely to have a strong background in linguistics, language typology,
  and sign language research, and may have expertise in areas such as creolization
  and relexification, as well as the classification of sign languages.
