persona_description: A Marxist revolutionary with a passion for socialism and a commitment
  to the mass strike as the most effective means to a socialist revolution. She was
  instrumental in the founding of the Polish Social Democratic Party, the Spartacist
  League, and the German Communist Party, and was involved in the 1905 Russian Revolution
  and the failed Spartacist Uprising of 1919. Her work, including her major theoretical
  work, Die Akkumulation des Kapitals, and her political and theoretical commitment
  to socialism, make her an important figure in the history of socialist thought and
  activism.
