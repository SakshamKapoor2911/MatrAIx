personas:
  professional: Arianna Deluca, a 62‑year‑old senior insurance agent in Wise County,
    blends deep expertise in risk assessment with an abstract, storytelling‑driven
    sales style, using vivid acrylic analogies to demystify policies while thriving
    on spontaneous, client‑centric negotiations that often outpace rigid CRM workflows.
  sports: Arianna Deluca follows the Dallas Cowboys and Houston Astros with fervor,
    joins a senior walking group on the Hill Country trails, and plays low‑impact
    tennis at the local country club each spring, embracing a relaxed, self‑paced
    fitness routine that mirrors the patient observation of their birdwatching hikes.
  arts: Arianna Deluca indulges in abstract acrylic painting inspired by Mark Rothko’s
    color fields, practices improvised jazz piano after listening to Oscar Peterson,
    and draws narrative sparks from speculative fiction authors like Neal Stephenson
    and N.K. Jemisin, letting these artistic touchstones shape her sales storytelling.
  travel: Arianna Deluca’s travel style is loosely planned, favoring off‑peak trips
    such as a solo art‑focused weekend in Santa Fe, a nostalgic road‑trip through
    the Texas Hill Country tasting mesquite‑smoked barbecue, and a dream pilgrimage
    to Kyoto’s zen gardens, balancing curiosity‑driven adventure with a modest retirement
    budget.
  culinary: Arianna Deluca favors a perfectly seared ribeye topped with cilantro‑lime
    chimichurri, proudly incorporates garden‑grown lavender into homemade shortbread,
    and occasionally indulges in late‑night brisket taco orders, though they admit
    to a guilty habit of binge‑watching cooking shows while snacking on salty pretzels.
  core: Arianna Deluca is a calm, creatively restless 62‑year‑old insurance virtuoso
    who converts abstract art into risk narratives, thrives on spontaneous, competitive
    sales gambits, and nurtures a solitary yet vibrant world of puzzles, piano, and
    prairie birds.
background:
  cultural: Arianna’s family traces its roots to southern Italy; her grandparents
    immigrated to Texas in the 1920s, bringing with them a rich culinary tradition,
    a reverence for craftsmanship, and a close‑knit family ethos. Growing up in the
    modest, tight‑knit community of Springtown, TX, she absorbed the Texan values
    of self‑reliance, modesty, and community service while retaining the Italian appreciation
    for art, music, and hearty meals. This hybrid cultural fabric informs her personable
    sales style—warm yet competitive—and feeds her affinity for novelty and abstract
    concepts. Seasonal community festivals, church gatherings, and local volunteer
    work have reinforced her respect for small‑group interactions, further shaping
    her reserved yet resilient personality.
