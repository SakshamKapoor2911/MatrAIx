personas:
  professional: Tucker Baker, a 22‑year‑old metal‑fabrication assembler, leverages
    meticulous blueprint reading, spot‑welding, and basic CNC set‑up skills to keep
    production lines humming, while their calm, methodical nature and penchant for
    reliable structure position them as a natural candidate for future shift supervisor
    duties.
  sports: Tucker Baker avidly follows the Idaho Vandals football team and the Seattle
    Seahawks, joins the Coeur d’Alene Hiking Club for weekend trail hikes, and spends
    free time fishing on Lake Coeur d’Alene and hunting during season, blending competitive
    fandom with rugged outdoor activity.
  arts: Tucker Baker finds creative release building wooden stools, restoring a 1998
    Honda motorcycle, and assembling scale model kits, while their music taste leans
    toward folk‑rock legends like The Avett Brothers and country storyteller Chris
    Stapleton, which often play softly in the workshop.
  travel: Tucker Baker prefers spontaneous, low‑key road trips to nearby natural wonders
    such as Glacier National Park and the Palouse rolling hills, balancing a modest
    travel budget with a love for campfire nights and a wish to eventually explore
    the Canadian Rockies for inspiration.
  culinary: Tucker Baker enjoys cooking hearty meals like cedar‑plank grilled trout,
    smoked chili with black beans, and honey‑glazed pork ribs, boasting competent
    grill and skillet skills and a penchant for fresh, locally sourced potatoes and
    wild mushrooms.
  core: Tucker Baker blends hands‑on technical expertise with a laid‑back love of
    the outdoors, maintaining a calm, structured work ethic while indulging in spontaneous
    fishing trips and DIY projects, all wrapped in a quietly cooperative spirit.
background:
  cultural: Tucker grew up in a working‑class family in Coeur d'Alene, Idaho, a region
    characterized by a blend of rural mountain‑west values, a strong connection to
    outdoor recreation, and a community‑focused ethos. The local culture emphasizes
    self‑reliance, modesty, and practical skills, often reflected in a straightforward,
    no‑frills lifestyle. Growing up white in this area, he absorbed the region’s cultural
    norm of valuing hard work, neighborly cooperation, and a respect for the natural
    environment, which is evident in his love for fishing, hunting, and community
    service.
attributes:
  skills: '[''Blueprint reading'', ''Manual assembly'', ''Spot welding (MIG/TIG)'',
    ''Basic CNC machine operation'', ''Quality inspection'', ''Safety compliance'',
    ''Forklift operation'', ''Inventory management'', ''Team collaboration'', ''Troubleshooting'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Hunting'', ''Woodworking'', ''Motorcycle restoration'',
    ''Model kit assembly'', ''Strategy video gaming'', ''College football watching'',
    ''Community clean‑up volunteering'']'
  career_goals: Tucker aims to advance within the manufacturing sector by first obtaining
    his GED and pursuing a certified production technician program. Over the next
    few years, he aspires to become a shift supervisor, responsible for coordinating
    a small crew and ensuring on‑time delivery of fabricated parts. He plans to earn
    a Journeyman Welder certification and eventually gain proficiency in CNC programming,
    with a longer‑term ambition to open his own modest custom‑fabrication shop that
    serves local contractors and outdoor equipment makers.
