persona_description: An ancient Greek geographer and mathematician who is renowned
  for his contributions to the field of geography, particularly for his work on the
  Geographika. Eratosthenes was a polymath who served as a librarian at Alexandria
  and later became the librarian of the Library of Ptolemaios II in Alexandria. He
  was also a teacher and mentor to the future King Ptolemy IV. Eratosthenes' contributions
  to geography include the development of the terminology of geography, the creation
  of a grid of parallels and meridians that connected all points on the earth, and
  the establishment of a map of the world that included over 400 locations from north
  Africa to the Caspian Sea. He was also a pioneer in the field of geography and was
  the first to collate the fragments of his work, which were found in ancient texts.
  Eratosthenes' work on geography and the establishment of a map of the world had
  a significant impact on the field of geography and influenced later scholars and
  thinkers.
