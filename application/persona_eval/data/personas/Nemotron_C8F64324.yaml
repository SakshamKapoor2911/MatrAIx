  hobbies: '[''Visiting museums and galleries'', ''Digital photography'', ''Poetry
    and journaling'', ''Singing in church choir'', ''Listening to jazz, soul, and
    R&B'', ''Gardening'', ''Volunteer tutoring'']'
  career_goals: Lashonda aims to enroll in a community college program focusing on
    Art History or Cultural Studies, with the long‑term ambition of earning a bachelor's
    degree in Museum Studies or Nonprofit Management. She envisions a career as a
    community museum curator or arts outreach coordinator, dedicated to preserving
    and celebrating African American heritage in the South Carolina Lowcountry. Her
    goal is to eventually help establish a local art center in Orangeburg that offers
    workshops, exhibitions, and mentorship for young artists, while also securing
    scholarships that allow her to continue her education without financial burden.
