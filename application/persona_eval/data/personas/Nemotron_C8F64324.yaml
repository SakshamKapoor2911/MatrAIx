personas:
  professional: Lashonda Brazzell, a budding art history student and community museum
    volunteer, leverages their meticulous event‑planning skills, strong research acumen,
    and compassionate communication style to curate small exhibitions and youth art
    workshops, reflecting their curiosity and organized reliability.
  sports: Lashonda Brazzell enjoys casual community fitness, joining a local jogging
    club for early morning runs and cheering for the Charleston Battery soccer team,
    while they occasionally participate in weekend pick‑up basketball games at the
    church gym.
  arts: Lashonda Brazzell immerses themselves in creative expression through photography
    of urban and natural scenes, frequents gallery openings featuring artists like
    Kara Walker and Kehinde Wiley, and they find solace singing gospel hymns with
    their church choir while listening to jazz legends such as John Coltrane and contemporary
    R&B artist H.E.R.
  travel: Lashonda Brazzell dreams of exploring the historic streets of Savannah,
    Georgia, and the vibrant art districts of New Orleans, while they also plan a
    modest budget backpacking trip to the Smithsonian National Museum of History and
    Culture in Washington, D.C., balancing careful travel budgeting with a craving
    for cultural immersion.
  culinary: Lashonda Brazzell loves cooking soulful dishes like shrimp and grits,
    collard greens with smoked turkey, and cornbread, often seasoning with fresh herbs
    from their garden such as thyme and rosemary, and they pride themselves on mastering
    the art of perfectly caramelized onions for a sweet‑spicy barbecue glaze.
  core: Lashonda Brazzell, they are a 19‑year‑old art enthusiast with a methodical
    mind and quiet charisma, curating community exhibits with precision, saving diligently,
    and occasionally forgetting to drink enough water between photo shoots.
background:
  cultural: Lashonda grew up in Orangeburg, South Carolina, a city with a rich African
    American legacy and a strong tradition of church-centered community life. Her
    family has deep roots in the region, and she was raised attending a historic Baptist
    congregation where gospel music and communal service were integral. The legacy
    of the 1960s civil‑rights movement, particularly the Orangeburg Massacre, has
    shaped her awareness of social justice and cultural preservation. She celebrates
    Southern African American customs, such as soul‑food cooking, Juneteenth gatherings,
    and storytelling nights, and she draws inspiration from local artists and the
    vibrant tapestry of Black Southern culture.
