persona_description: A nutrition expert with a background in public health and food
  science, who is responsible for developing and implementing nutrition standards
  for school meals. They have a strong understanding of the USDA's food targets for
  nutrients such as sodium, total fat, saturated fat, cholesterol, and added sugars.
  They are skilled in using an iterative process to find the most satisfactory balance
  of food group targets to achieve consistency with Dietary Guidelines for Americans
  and DRIs. They are aware of the National Academies' proposed planning model for
  establishing nutrition standards for school meals and are interested in contributing
  to the development of a revised approach for recommending revisions to the meal
  requirements.
