personas:
  professional: Alina Acosta, a retired business administration specialist, leverages
    her extensive financial management, budgeting, and strategic planning expertise
    to mentor emerging entrepreneurs, spearhead multicultural festival planning, and
    coordinate senior-focused garden projects with methodical precision and warm,
    collaborative communication.
  sports: Alina Acosta enjoys daily brisk walks along the Carlsbad coastline, participates
    in the Carlsbad Senior Walking Club’s weekend outings, follows the San Diego Padres
    and the San Diego Wave FC with enthusiastic weekend viewing parties, and practices
    gentle yoga at the local community center to maintain joint flexibility.
  arts: Alina Acosta immerses herself in the arts through weekly folkloric dance workshops,
    attending community concerts that showcase the vibrant sounds of Celia Cruz, Carlos
    Santana, and the local mariachi ensemble Mariachi Sol de Oro, while her senior
    book club discussions often revolve around historical fiction by Ken Follett and
    biographies of political pioneers.
  travel: Alina Acosta prefers thoughtfully planned, culturally immersive vacations,
    having explored the historic streets of San Miguel de Allende, the coastal charm
    of Carmel-by-the-Sea, and the tranquil temples of Kyoto, while dreaming of future
    trips to Oaxaca's culinary festivals and the breathtaking ruins of Machu Picchu,
    always opting for moderate-paced itineraries that balance adventure with comfort.
  culinary: Alina Acosta, an experienced home chef, delights in crafting traditional
    dishes such as mole poblano, chiles en nogada, and tacos al pastor, while frequently
    incorporating garden-fresh herbs like cilantro, epazote, and jalapeños into salsa
    fresca and experimenting with new twists on classic recipes.
  core: Alina Acosta blends methodical organization with vibrant community spirit,
    nurturing a modest chili garden, leading senior tech classes, yet occasionally
    misplaces her glasses while searching for her favorite recipe card.
background:
  cultural: Alina was born to Mexican immigrant parents who settled in Southern California
    during the 1960s. She grew up bilingual, speaking Spanish at home while attending
    English‑language schools, and her upbringing was rooted in Catholic traditions
    and Mexican cultural customs such as Día de los Muertos, quinceañeras, and festive
    gatherings with music and food. Over the decades, she has remained active in the
    local Mexican‑American community, volunteering with the Mexican Cultural Center
    in San Diego County and helping organize annual Cinco de Mayo and Día de los Muertos
    events that bring together multiple generations.
attributes:
  skills: '[''Financial Management'', ''Budgeting'', ''Strategic Planning'', ''Project
    Management'', ''Microsoft Office (Excel, Word, PowerPoint)'', ''Community Event
    Coordination'', ''Volunteer Leadership'', ''Conflict Mediation'', ''Intergenerational
    Mentoring'', ''Basic Computer Literacy Instruction'']'
  hobbies: '[''Vegetable Gardening'', ''Traditional Mexican Cooking'', ''Folkloric
    Dance'', ''Beach Walking'', ''Reading Historical Fiction'', ''Book Club Participation'',
    ''Volunteer Computer Literacy Instruction'', ''Cultural Event Organization'',
    ''Travel to Mexico'']'
  career_goals: Although retired, Alina is dedicated to giving back to her community.
    She aims to mentor emerging entrepreneurs in Carlsbad, especially those of Mexican
    heritage, sharing her business acumen and financial insights. She aspires to lead
    the planning of multicultural festivals that celebrate Mexican traditions and
    to spearhead a senior‑focused garden project that promotes healthy living. In
    the longer term, she hopes to compile a family memoir that preserves her family's
    migration story for future generations.
