personas:
  professional: Amy Badlet is a budding sensory explorer in early childhood development,
    already showing a knack for stacking blocks and solving simple cause‑and‑effect
    puzzles, with their curiosity and high emotional reactivity driving a meticulous
    yet flexible approach to their miniature investigations.
  sports: Amy Badlet delights in toddler gymnastics at the local YMCA and weekly Baby
    Splash swim sessions, cheerfully rooting for the Ohio State Buckeyes and the Monroe
    Mini Kickers, and their competitive streak emerges when they race other babies
    to the top of the padded play structure.
  arts: Amy Badlet enjoys finger‑painting with non‑toxic paints, listening to folk
    lullabies by Woody Guthrie and contemporary children’s songwriter Raffi, and attending
    storytime at the Monroe Public Library where they giggle at Dr. Seuss, showing
    a meticulous color‑smearing technique that hints at an early artistic eye.
  travel: Amy Badlet prefers stroller‑friendly outings, having already visited the
    county fair in Monroe, a weekend family trip to Hocking Hills State Park, and
    a short stay at the Great Wolf Lodge in Pennsylvania, while they daydream (in
    their own way) about a future adventure to Disney World in Orlando, all planned
    around nap schedules and parental budgeting.
  culinary: Amy Badlet loves mashed sweet potatoes with a pinch of cinnamon, pureed
    avocado with a dash of lemon, and expertly squishes banana puree with their hands,
    though they often create a colorful mess while exploring new textures and sometimes
    throw a tantrum when presented with broccoli puree.
  core: Amy Badlet is a one‑year‑old whirlwind of curiosity, artistic mess‑making,
    and intense emotion, constantly probing their world with a skeptical eye, a competitive
    giggle, and a tendency to overreact to sensory overload.
background:
  cultural: Amy is raised in Monroe, Ohio, a predominantly white Midwestern community
    where family bonds, community gatherings, and local traditions such as county
    fairs and church events are important. Her early cultural exposure includes American
    children’s literature, folk songs, and participation in neighborhood activities,
    all of which nurture her appreciation for art and new ideas while reflecting the
    region’s values of modest independence and communal support.
