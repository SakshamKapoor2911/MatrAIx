  career_goals: Stanley aims to transition into senior technology leadership, such
    as Director of IT or Chief Information Officer, where he can drive digital transformation
    initiatives that blend AI and automation with proven operational practices. He
    plans to earn TOGAF and AWS Certified Solutions Architect certifications, and
    to lead a company‑wide migration to cloud‑native services while maintaining operational
    stability. He also aspires to mentor the next generation of analysts, perhaps
    by establishing a corporate apprenticeship program and contributing to local STEM
    outreach. Long‑term, he envisions launching a boutique consultancy focused on
    helping mid‑size firms adopt resilient, flexible IT strategies.
