personas:
  professional: Stanley Bates, a veteran computer systems analyst with over two decades
    of experience, leverages deep expertise in enterprise architecture, cloud platforms,
    and automation while applying a relaxed, curiosity‑driven yet pragmatic approach
    to lead high‑pressure incident response and guide cross‑functional teams toward
    cost‑effective, reliable solutions.
  sports: Stanley Bates supports the Detroit Lions, Tigers and Pistons, rides Sundays
    with the Oakland County Cycling Club, and keeps fit through regular golf rounds
    at the Bloomfield Hills Masters Golf Club and weekend photography hikes, embodying
    a low‑stress, community‑oriented sports lifestyle.
  arts: Stanley Bates cultivates a deep appreciation for visual and musical arts,
    regularly visiting the Detroit Institute of Arts to study works by Van Gogh and
    Monet, snapping landscape photos inspired by Ansel Adams, and unwinding to classic
    rock legends like The Rolling Stones and modern jazz from Miles Davis, while also
    enjoying board‑game nights featuring titles such as Terraforming Mars.
  travel: Stanley Bates prefers meticulously planned road trips that blend his love
    for classic cars with scenic discovery, having recently driven his ’65 Mustang
    along California’s Pacific Coast Highway and explored the historic auto museums
    of Stuttgart, while dreaming of a future journey to Japan’s cherry‑blossom season
    and Norway’s fjords, balancing his work commitments with a desire for purposeful,
    photography‑rich adventures.
  culinary: Stanley Bates enjoys a culinary mix of comfort and innovation, confidently
    preparing Detroit‑style pizza topped with pepperoni and caramelized onions, while
    also experimenting with sous‑vide pork shoulder glazed with miso‑brown sugar and
    a side of rosemary‑infused roasted potatoes, showcasing his knack for blending
    familiar family recipes with bold, global flavors.
  core: Stanley Bates is a calm, curiosity‑driven tech veteran who balances classic‑car
    restoration with spontaneous home‑automation tinkering, often forgetting appointments
    but never missing a critical system deadline.
background:
  cultural: Stanley grew up in the suburban Detroit area, raised in a middle‑class
    family of mixed English and German ancestry. His father worked in automotive manufacturing
    and his mother taught at a public elementary school, instilling in him the Midwestern
    values of hard work, reliability, and community involvement. Living in Bloomfield
    Hills, an affluent enclave known for its strong support of education and the arts,
    he has been exposed to a blend of traditional Midwestern culture and progressive
    technological innovation. He participates in local community events such as the
    Bloomfield Hills Summer Festival and supports the local library’s tech literacy
    programs, reflecting both his regional heritage and his forward‑looking outlook.
