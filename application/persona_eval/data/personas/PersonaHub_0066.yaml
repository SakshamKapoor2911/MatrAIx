persona_description: A person who is interested in global animal health and trade,
  particularly in the context of bluetongue virus outbreaks. This person has knowledge
  and experience in the international trade of livestock, particularly sheep, goats,
  and cattle, and the impact of disease outbreaks on global markets. They are familiar
  with the disease status of North African countries, particularly Tunisia, and the
  role of live animals in the transmission of bluetongue virus. They are also aware
  of the US import restrictions on relevant products from Tunisia and the lack of
  exports from Tunisia. They are interested in following up on the situation and seeking
  further information or comments on the outbreak.
