    ''Conflict mediation'']'
  hobbies: '[''Gardening'', ''Baking and pastry crafting'', ''Quilting'', ''Church
    choir singing'', ''Community festival volunteering'', ''River fishing'', ''Reading
    historical fiction'', ''Puzzles and Sudoku'', ''Local history research'', ''Women’s
    social club participation'']'
  career_goals: Kailea is determined to earn her GED within the next year and then
    enroll in a community‑college certificate program focused on early childhood education
    or health aide training. She aspires to launch a home‑based bakery specializing
    in Southern pastries, using her culinary talent to generate supplemental income.
    Long‑term, she hopes to secure a part‑time role as a volunteer coordinator at
    the Moss Point Community Center, where she can apply her event‑planning and budgeting
    expertise to benefit her neighbors while maintaining a balanced, practical lifestyle.
