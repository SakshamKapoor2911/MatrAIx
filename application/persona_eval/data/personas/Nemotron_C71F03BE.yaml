  hobbies: '[''Drawing and watercolor painting'', ''Reading fantasy/adventure books'',
    ''Exploring nature and collecting specimens'', ''Building LEGO constructions'',
    ''Simple science experiments'', ''Playing piano'', ''Listening to classical and
    instrumental music'', ''Scratch Jr. storytelling'', ''Watching nature documentaries'']'
  career_goals: Coy dreams of a future where she can merge her love for art with her
    curiosity about the natural world. She often talks about becoming an illustrator
    who creates picture books about animals and ecosystems, or a wildlife researcher
    discovering new ways to protect local habitats. She is also fascinated by the
    idea of designing educational games that teach science through storytelling and
    visual art. Though she prefers quiet, one‑on‑one interactions, she hopes to share
    her discoveries and creations with friends, family, and eventually a wider audience,
    staying true to her independent and exploratory spirit.
