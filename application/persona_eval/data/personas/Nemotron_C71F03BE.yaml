personas:
  professional: Coy Hough, an aspiring junior creator, merges storytelling with hands-on
    building by drawing, watercolor painting, constructing LEGO worlds, and coding
    short interactive tales on Scratch Jr.; their boundless curiosity fuels relentless
    experimentation while their love of quiet solitude enables deep focus, even though
    they often shrug off rigid schedules and deadlines.
  sports: Coy Hough, a nature-loving explorer, spends weekends hiking local forest
    trails and participates in the town’s youth soccer program, the Greenfield Gators,
    while also joining the Junior Scouts where they practice basic orienteering, preferring
    solitary bike rides over team drills but cheering on the nearby children’s baseball
    team, the Riverdale Rams, from the sidelines.
  arts: Coy Hough channels creativity through watercolor skies reminiscent of Claude
    Monet, reads fantasy adventures by J.K. Rowling and C.S. Lewis, composes simple
    piano melodies inspired by Beethoven’s Moonlight Sonata, studies the animation
    of Hayao Miyazaki, and admires Yayoi Kusama’s vibrant patterns, often sketching
    insects discovered in the woods to blend scientific curiosity with artistic expression.
  travel: Coy Hough, a budding explorer, favors quiet nature getaways such as family
    weekends at the nearby lake cabin, day hikes in the Great Smoky Mountains, and
    a recent field trip along the Blue Ridge Parkway, while daydreaming about witnessing
    the Aurora Borealis over Iceland and walking among the towering sequoias in California’s
    Redwood National Park; travel planning is impulse-driven, guided by curiosity
    about insects and rocks rather than strict itineraries.
  culinary: Coy Hough loves colorful meals, often requesting blueberry pancakes, rainbow
    veggie wraps with bell peppers and carrots, and enjoys customizing cupcakes with
    bright frosting, while occasionally mixing paint hues with food for fun—a habit
    that leaves a small, splattered kitchen mess but fuels their love for experimental,
    visually striking cuisine.
  core: Coy Hough is a quiet, curiosity-driven eight-yearer who transforms solitary
    imagination into vivid art, mini-science experiments, and whimsical digital stories,
    all while juggling a love of nature, impulsive snack splurges, and a penchant
    for bright colors.
background:
  cultural: Coy was raised in a white, Midwestern family in Warsaw, Indiana, a small
    town in Kosciusko County known for its close‑knit community and agricultural roots.
    Her family’s heritage includes German and Irish ancestry, typical of the region,
    and they value self‑reliance, education, and quiet family time. Local traditions
    such as the county fair, church gatherings, and school events shape her sense
    of community, although Coy often prefers the calm of her own space. The surrounding
    countryside provides ample opportunities for nature walks and outdoor observation,
    reinforcing her appreciation for quiet, solitary exploration. Exposure to typical
    American media, school curricula, and occasional visits to regional museums adds
    a broader cultural perspective, while her family's emphasis on personal independence
    nurtures her spontaneous and unconventional thinking.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Sketching and watercolor
