persona_description: A geologist or environmental historian interested in the study
  of rock formations, geologic history, and the impact of environmental changes on
  the Earth's surface. This individual is fascinated by the stories and histories
  that rocks and pebbles can tell and is drawn to the scientific and cultural significance
  of these natural artifacts. They appreciate the beauty and complexity of geological
  formations and are inspired by the ways in which rocks and other materials can reveal
  information about past climates, environments, and the evolution of the Earth.
