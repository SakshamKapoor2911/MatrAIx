persona_description: A person who is familiar with the concept of parallel constraints
  in mechanical engineering, particularly with the specific details and procedures
  for setting up and using them. They have experience working with constraint blocks,
  understanding the mechanics of relative motion between bodies, and being able to
  connect constraint blocks to sensors to measure reaction forces and torques. They
  are likely to have a strong background in physics and mechanics, and may have worked
  with other types of constraints in their previous work.
