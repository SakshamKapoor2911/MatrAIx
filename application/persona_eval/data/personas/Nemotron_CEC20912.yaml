personas:
  professional: Julia Deleon, a 30‑year‑old mechanical engineer specializing in sustainable
    product development, leverages her expertise in SolidWorks, ANSYS, Python, and
    lean manufacturing to lead cross‑functional teams that fuse engineering precision
    with aesthetic design, and they ensure every project meets rigorous environmental
    standards while delivering client‑focused solutions.
  sports: Julia Deleon enjoys weekend hikes in Bernheim Arboretum and the Red River
    Gorge, jogs with the Louisville “Trailblazers” running club, proudly supports
    the Louisville Cardinals basketball team, and they schedule their fitness sessions
    early mornings to preserve solitary recharge time.
  arts: Julia Deleon frequently explores contemporary galleries such as the Speed
    Art Museum, creates watercolor paintings inspired by the Ohio River’s mist, follows
    the works of Kehinde Wiley and musician St. Vincent, attends monthly folk music
    nights at the historic Bluegrass Junction, and they find that artistic immersion
    fuels their engineering creativity.
  travel: Julia Deleon prefers meticulously planned road trips that blend sustainability
    with adventure, having recently driven to Iceland to tour geothermal power plants,
    while also savoring short getaways to Asheville’s craft breweries and the Appalachian
    Trail, and they balance a mid‑level salary that limits extended overseas stays.
  culinary: Julia Deleon enjoys cooking moderate‑skill meals like shrimp and chorizo
    paella and bison burger sliders with a tangy bourbon glaze, delights in sourcing
    fresh heirloom tomatoes and microgreens at the local farmer’s market, occasionally
    orders the famous Hot Brown sandwich as nostalgic comfort, and they relish sharing
    their culinary creations at small gatherings with close friends.
  core: Julia Deleon blends a meticulous engineering mind with a quiet artistic soul,
    juggling eco‑focused career ambitions, a habit of collecting vintage drafting
    pens, and a love for solitary hikes that reset their creative circuits, and they
    often find themselves lost in detailed sketches late into the night.
background:
  cultural: Julia was born and raised in the greater Louisville metropolitan area,
    growing up in the suburban community of Shepherdsville, Kentucky. Her family is
    of mixed European ancestry—her mother’s side includes Irish roots while her father’s
    lineage traces to Spanish heritage, reflected in the Deleon surname. The household
    valued education, self‑reliance, and community involvement, fostering both an
    analytical mindset and an appreciation for the arts. Local cultural influences
    such as Kentucky’s tradition of folk music, regional crafts, and a strong volunteer
    ethic shaped her sense of responsibility and collaborative spirit, while her exposure
    to diverse cultural events in Louisville broadened her openness to unconventional
    ideas.
