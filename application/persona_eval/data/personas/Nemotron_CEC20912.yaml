  career_goals: Julia aims to become a senior lead engineer within the next five years,
    steering large‑scale sustainable product initiatives at a manufacturing firm or
    consultancy. She plans to earn her Professional Engineer license, deepen expertise
    in renewable energy systems, and eventually oversee a multidisciplinary team that
    integrates engineering precision with aesthetic considerations. Long‑term, she
    envisions establishing her own boutique engineering consultancy focused on eco‑friendly
    design solutions for small‑town infrastructure projects in Kentucky.
