persona_description: A metallurgist or materials scientist who specializes in the
  processing and application of rare earth elements, particularly niobium, titanium,
  and tantalum. They are skilled in the development and optimization of microalloyed
  steels and the use of these elements in steel alloys to improve mechanical properties
  and reduce weight. They may also have experience in the extraction and processing
  of these elements from natural resources or ores.
