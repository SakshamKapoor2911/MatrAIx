personas:
  professional: Milton Wells, a retired handyman and avid community mentor, channels
    their meticulous carpentry, plumbing, and mechanical troubleshooting skills into
    leading senior‑center workshops and coordinating volunteer events with the precision
    of a seasoned project manager.
  sports: Milton Wells follows the Oklahoma City Thunder and the Dallas Cowboys with
    devoted enthusiasm, joins the local senior center’s weekly low‑impact walking
    club, and treats weekend fishing trips on nearby lakes as both sport and meditation,
    while rarely attending live high‑school football games because of early evening
    fatigue.
  arts: Milton Wells captures the rolling prairie’s muted hues through a vintage Nikon,
    immerses themselves in the historical biographies of David McCullough and the
    paintings of Grant Wood, enjoys the mellow twang of Merle Haggard at church socials,
    and occasionally debates the merits of Ansel Adams’ photographic techniques over
    a cup of strong black coffee.
  travel: Milton Wells prefers meticulously planned road trips, having already explored
    the red rocks of Sedona, the wildflower‑laden fields of the Flint Hills, and the
    bustling Tulsa State Fair, while dreaming of a future pilgrimage to the Grand
    Canyon’s sunrise viewpoint, always booking budget motels and packing a folding
    garden stool for impromptu sketching.
  culinary: Milton Wells delights in cooking garden‑fresh vegetable stew, fried catfish
    with homemade tartar sauce, and cornbread with a dash of honey, expertly slicing
    tomatoes for salads but sometimes over‑waters their lettuce, leading to occasional
    wilted greens.
  core: Milton Wells is a methodical 73‑year‑old who blends hands‑on projects, prairie
    photography, and steadfast community service with a habit of over‑watering their
    garden and misplacing receipts.
background:
  cultural: Milton grew up in a middle‑class, white, Protestant family in Oklahoma
    City, absorbing the region’s values of hard work, modesty, and community service.
    The blend of Mid‑western practicality and Southern hospitality of Oklahoma shaped
    his respect for tradition, love of outdoor recreation, and commitment to helping
    neighbors. His cultural upbringing emphasizes self‑reliance, respect for elders,
    and participation in church and local civic activities.
