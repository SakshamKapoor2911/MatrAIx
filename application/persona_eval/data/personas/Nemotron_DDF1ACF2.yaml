personas:
  professional: Osvaldo Vargas is a civil engineer who blends rigorous structural
    analysis and BIM expertise with a curious, people‑focused, bilingual outreach
    style, leading community‑centric infrastructure projects that embed public art
    and sustainable practices while juggling the pressures of a senior‑track career,
    and they inspire their multidisciplinary teams to think beyond the blueprint.
  sports: Osvaldo Vargas plays forward on a co‑ed soccer league, hikes the Kettle
    Moraine State Forest in summer, snow‑shoes local trails in winter, and roots for
    the Milwaukee Brewers, the Milwaukee Bucks, and the Green Bay Packers while occasionally
    cheering on the Milwaukee Wave indoor soccer team, and they thrive on the camaraderie
    of team sports.
  arts: Osvaldo Vargas attends gallery openings featuring works by Georgia O'Keeffe
    and local muralists, sketches cityscapes with watercolors inspired by Ansel Adams'
    tonal mastery, listens to the vibrant rhythms of Juan Luis Guerra and the contemporary
    jazz of Kamasi Washington, and finds cinematic inspiration in the sci‑fi worlds
    of Denis Villeneuve, all of which fuel their own creative projects, and they often
    share these experiences with friends over coffee.
  travel: Osvaldo Vargas plans trips with the same precision he applies to project
    schedules, favoring weekend getaways to the Door County vineyards, longer road
    trips to the red‑rock landscapes of Sedona, and has a bucket‑list that includes
    exploring the Andean highlands and savoring the coastal breezes of the Pacific
    Northwest, and they balance adventure with family commitments by booking well
    in advance.
  culinary: Osvaldo Vargas cooks with confidence, mastering traditional dishes like
    encebollado, ceviche with lime, cilantro, and ají, corn‑based succotash, and plantain
    frittata while experimenting with Wisconsin cheese curds and locally sourced trout,
    and they love pairing meals with a crisp Riesling or a cold craft pilsner.
  core: Osvaldo Vargas is a community‑oriented civil engineer who balances precise
    technical work with vibrant cultural expression, loves soccer and art, and constantly
    seeks sustainable, inclusive solutions while occasionally over‑committing to projects
    and coffee, and they remain driven by a deep sense of service.
background:
  cultural: Osvaldo is a first‑generation Ecuadorian‑American who grew up bilingual,
    speaking Spanish at home while mastering English in school. He retains strong
    ties to Ecuadorian traditions, celebrating Carnaval, Día de los Difuntos, and
    family feasts centered on corn, plantains, and seafood. His Catholic upbringing
    influences his appreciation for community rituals and charitable service. Since
    moving to Menomonee Falls, he has blended his heritage with Midwestern values,
    embracing local customs like county fairs, winter snow‑shoeing, and neighborhood
    volunteer projects. He often serves as a cultural bridge, organizing Hispanic
    heritage events at the local community center and introducing his colleagues to
    Ecuadorian music, dance, and cuisine, fostering inclusive dialogue and mutual
    respect.
