    ''Wisconsin building code compliance'', ''Sustainable design (LEED)'', ''Bilingual
    communication (Spanish/English)'', ''Team leadership'', ''Community engagement'',
    ''Conflict resolution'', ''Public art integration'']'
  hobbies: '[''Soccer (community league)'', ''Habitat for Humanity volunteering'',
    ''Art gallery visits'', ''Sketching and watercolor painting'', ''Photography of
    architecture and nature'', ''Hiking in Wisconsin state parks'', ''Cooking Ecuadorian
    cuisine'', ''Family potlucks and community food sharing'', ''Reading science‑fiction
    and tech podcasts'', ''Sustainable‑living workshops'']'
  career_goals: Osvaldo aims to secure his Professional Engineer (PE) license within
    the next two years and transition into a senior project‑manager role overseeing
    large‑scale, climate‑resilient infrastructure in the Greater Milwaukee area. He
    aspires to lead multidisciplinary teams that embed sustainable practices and culturally
    responsive design—particularly projects that weave local art and community narratives
    into public spaces. Long‑term, he envisions establishing a consulting firm that
    helps municipalities create inclusive, green infrastructure while mentoring the
    next generation of engineers, especially those from underrepresented backgrounds.
