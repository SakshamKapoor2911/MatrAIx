personas:
  professional: Nicole Bennett is a curious, organized high‑school senior who channels
    their love of visual storytelling into event coordination, digital illustration,
    and social‑media content creation, mastering Adobe Photoshop and Canva while they
    plan to pursue a graphic design degree and eventually launch a youth‑focused art
    collective.
  sports: Nicole Bennett is an enthusiastic supporter of the Los Angeles Lakers and
    Dodgers, plays varsity volleyball at school, and they frequently join weekend
    community basketball pick‑ups at the local park while maintaining a regular jog
    through the Verdugo Mountains to balance their artistic pursuits with fitness.
  arts: Nicole Bennett immerses themselves in creative expression by sketching murals
    inspired by Jean‑Michel Basquiat and local LA muralist Mear One, curating playlists
    that flow from classic soul legends like Marvin Gaye to contemporary hip‑hop icons
    such as Kendrick Lamar, performing in their school’s theater club, and devouring
    graphic novels like 'Saga' and 'Monstress' to fuel their own storytelling style.
  travel: Nicole Bennett prefers short, budget‑friendly road trips, spending weekends
    exploring the vibrant street art of Venice Beach, taking a day‑trip to Santa Barbara’s
    historic Mission for photography, and dreaming of a future pilgrimage to New Orleans
    to soak in its jazz heritage and Creole cuisine once they secure a community‑college
    scholarship.
  culinary: Nicole Bennett, an adventurous home cook, loves whipping up kimchi fried
    rice with sweet soy glaze, mastering shrimp tacos with mango salsa, and perfecting
    a weekend brunch of chicken and waffles topped with maple‑bacon drizzle, often
    sourcing fresh herbs from the local farmer’s market to supplement their palate
    for bold flavors.
  core: Nicole Bennett is a curious, organized teen who blends artistic passion with
    community spirit, balancing relentless creativity, meticulous planning, and a
    dash of impulsive sneaker‑shopping, and they often juggle multiple projects at
    once.
background:
  cultural: Nicole identifies as African American. Her family’s roots trace back to
    the Great Migration, with grandparents who moved from the Southern United States
    to California in the 1960s. Growing up in La Verne, she has been immersed in the
    vibrant Black cultural scene of Los Angeles County—celebrating Juneteenth, attending
    local Black art festivals, and participating in church‑based youth programs. Her
    heritage informs her appreciation for Black visual art, music, and storytelling,
    and she draws inspiration from both historic African American artists and contemporary
    creators from the West Coast.
attributes:
