  hobbies: '[''visiting art galleries'', ''sketching and drawing'', ''digital illustration'',
    ''bullet journaling'', ''theater club participation'', ''volunteering at community
    events'', ''photography'', ''reading graphic novels and poetry'', ''exploring
    music and creating playlists'', ''attending open‑mic nights'']'
  career_goals: Nicole aims to earn her GED within the next year, then enroll in a
    community college program in graphic design or visual communications. She aspires
    to build a portfolio that blends fine art with digital media, eventually securing
    a position as a junior graphic designer at a creative agency in Los Angeles. Long‑term,
    she envisions founding a youth‑focused art collective that provides mentorship
    and exhibition opportunities for underserved Black teenagers, while also pursuing
    a bachelor's degree in visual arts or art education.
