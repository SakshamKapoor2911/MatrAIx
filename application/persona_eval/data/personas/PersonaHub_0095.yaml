persona_description: A skilled machinist or toolmaker who specializes in the use of
  high carbon steel, particularly in the formation of hardened steel articles. They
  are proficient in the use of heat treatments such as quenching and tempering to
  achieve the desired properties of the finished articles. They are also knowledgeable
  about the formation of metastable Martensite during quenching and the reduction
  of the fraction of this to the desired amount during tempering. They are likely
  to be interested in articles such as tools, machine parts, and forming and machining
  processes.
