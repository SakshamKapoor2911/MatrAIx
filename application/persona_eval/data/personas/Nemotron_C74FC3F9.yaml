personas:
  professional: Keng Dayrit blends hands‑on handyman expertise, meticulous household
    budgeting, and fluent bilingual communication to spearhead community cooking workshops
    that teach traditional southeast Asian recipes while promoting mental‑well‑being
    for seniors, channeling their curious, organized yet flexible nature into reliable,
    creative project leadership.
  sports: Keng Dayrit jogs along the Queensboro Bridge each spring, joins a local
    Saturday morning basketball pickup with the Astoria Hoops Club, follows the New
    York Knicks and New York Mets faithfully, and occasionally participates in a community
    adult recreational soccer league, balancing moderate fitness routines with a love
    for city team spirit.
  arts: Keng Dayrit frequents avant‑garde galleries featuring installations by Yayoi
    Kusama and immersive works by James Turrell, captures gritty Queens street scenes
    reminiscent of Bruce Davidson's style, and curates eclectic playlists alternating
    between John Coltrane's modal jazz and contemporary southeast Asian fusion bands
    like The Rich Kids, weaving artistic curiosity into daily life.
  travel: Keng Dayrit plans trips with a spreadsheet of must‑see museums yet leaves
    room for spontaneous street‑food detours, has explored the historic districts
    of Savannah, the vineyards of Hudson Valley, the jazz clubs of New Orleans, and
    recently returned from a culinary pilgrimage to Kyoto to study traditional tea
    ceremony, balancing curiosity with budget sensibility.
  culinary: Keng Dayrit, an adept home cook, masterfully blends heritage dishes—like
    lemongrass‑scented pork adobo and pho‑style broth enriched with star anise and
    cilantro—into inventive fusion plates featuring roasted sweet potatoes, miso‑glazed
    eggplant, and fresh basil, while regularly experimenting with heirloom tomatoes,
    kaffir lime leaves, and chili‑infused honey.
  core: Keng Dayrit is a creatively restless, anxiety‑prone 49‑year‑old who balances
    a disciplined budget and handyman duties with nightly experiments in fusion cuisine
    and impromptu art gallery trips, yet often succumbs to late‑night snack binges
    and occasional impulse buys of avant‑garde prints.
background:
  cultural: Keng is a first‑generation Filipino‑Vietnamese American whose family migrated
    to Queens in the early 1990s. He grew up in a multilingual household where Tagalog
    and Vietnamese were spoken alongside English, fostering a strong sense of diaspora
    identity. Family gatherings centered around traditional meals like adobo, lumpia,
    phở, and bánh mì, while celebrations of Christmas Eve (Noche Buena) and Tet reinforced
    cultural continuity. The vibrant multicultural environment of Queens Village,
    with its diverse Asian communities, has shaped his appreciation for both his heritage
    and the broader American cultural landscape, influencing his values of family
    cohesion, community service, and openness to new artistic experiences.
attributes:
  skills: '["Traditional Southeast Asian cooking (Filipino, Vietnamese)", "Creative
    recipe experimentation", "Basic handyman repairs (plumbing, electrical, carpentry)",
    "Bilingual communication (English, Tagalog, conversational Vietnamese)", "Household
    budgeting and financial organization", "Community volunteering (senior center
    meals and cultural events)", "Basic computer and internet navigation for art research",
    "Art appreciation and informal critique"]'
  hobbies: '["Visiting art galleries and museums", "Experimenting with fusion cooking",
    "Herb and vegetable gardening", "Photography of urban landscapes", "Listening
    to Southeast Asian and jazz music", "Attending Filipino and Vietnamese cultural
    festivals", "Practicing mindfulness and yoga to manage anxiety"]'
  career_goals: Keng aims to formalize his community involvement by launching a neighborhood
    cooking workshop that teaches traditional Southeast Asian cuisine and promotes
    mental‑well‑being through shared meals. He aspires to obtain a community health
    outreach certification focused on supporting Asian‑American seniors coping with
    anxiety and depression. Alongside these goals, Keng wishes to develop a new artistic
    skill—watercolor painting—to further channel his emotional reactivity into constructive
    creativity.
