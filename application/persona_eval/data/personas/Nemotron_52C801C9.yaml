personas:
  professional: Mikala Langley, a 19‑year‑old aspiring archival specialist, leverages
    their meticulous literature‑review expertise, proficiency with digital archiving
    tools like Omeka, and a methodical project‑management style to coordinate university
    museum exhibits while fostering inclusive community outreach.
  sports: Mikala Langley follows the Carolina Hurricanes and the Durham Bulls, joins
    a local yoga studio for twice‑weekly gentle yoga sessions, and occasionally participates
    in intramural soccer at campus, viewing structured physical activity as a calming
    counterbalance to their academic rigor.
  arts: Mikala Langley regularly attends productions at the Cary Theater, finds inspiration
    in the works of Jane Austen, James Joyce, and the music of Sufjan Stevens and
    Debussy, and often cites the cinematic performances of Frances McDormand as integral
    to their appreciation of nuanced storytelling.
  travel: Mikala Langley prefers meticulously planned trips to historically rich destinations,
    having explored Washington D.C., Boston, and the historic streets of Edinburgh,
    while dreaming of future journeys to Florence for Renaissance art and Kyoto for
    its garden aesthetics, balancing budget constraints with a love for cultural immersion.
  culinary: Mikala Langley delights in baking precise pastries such as croissants,
    sourdough bread, and almond frangipane tarts, often using rye flour, butter, and
    a starter culture, while also experimenting with garden‑fresh herbs in seasonal
    soups, reflecting both their methodical cooking style and love for tactile, comforting
    food.
  core: Mikala Langley is a detail‑driven young archivist whose love for structured
    routines, anxiety‑managed mindfulness, and precise baking creates a uniquely organized
    yet emotionally sensitive outlook on life.
background:
  cultural: Mikala comes from a middle‑class white family rooted in the suburban culture
    of Cary, North Carolina. Her upbringing reflects a blend of Southern hospitality
    and the progressive, tech‑savvy environment of the Research Triangle. Her parents
    placed a strong emphasis on education, punctuality, and communal responsibility,
    which fostered her organized and reliable disposition. She grew up participating
    in local festivals, attending community theater, and engaging in volunteer projects
    that celebrate the region’s colonial and civil‑rights heritage. While she identifies
    with mainstream American cultural norms, she also appreciates the diverse artistic
    influences present in the Triangle, shaping a worldview that values both tradition
    and inclusive storytelling.
attributes:
  skills: '["Literature Review", "Critical Writing", "Project Management", "Digital
    Archiving", "Public Speaking", "Event Coordination", "Community Outreach"]'
  hobbies: '["Reading", "Journaling", "Baking", "Gardening", "Yoga", "Meditation",
    "Volunteer work at historical society", "Live theater", "Puzzle solving"]'
  career_goals: Mikala aims to secure a full‑time role as an archival specialist or
    museum collections coordinator within the Research Triangle area, where she can
    apply her structured approach to preserving cultural heritage. She plans to enroll
    in a master's program in Museum Studies or Library Science within the next two
    years to deepen her technical expertise. Long‑term, she envisions leading a community‑focused
    exhibition series that highlights regional history while fostering inclusive dialogue.
    She also hopes to develop a routine that supports her mental health, seeking a
    stable work environment with clear expectations and opportunities for professional
    development.
