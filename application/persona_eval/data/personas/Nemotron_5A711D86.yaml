personas:
  professional: Yesenia is a seasoned marketing manager who leverages data‑driven
    campaigns, bilingual communication, and meticulous process design to deliver consistent
    results for small businesses, while their preference for routine and cautious
    optimism keeps the team grounded and on schedule.
  sports: Yesenia enjoys low‑impact fitness through weekly walks with the local senior
    walking club, follows the Los Angeles Dodgers and the Sacramento Kings for a touch
    of excitement, and joins a community garden fitness class that mixes light resistance
    work with horticulture, preferring routine over high‑intensity competition.
  arts: Yesenia finds artistic fulfillment in listening to classic mariachi recordings
    by Vicente Fernández and Pedro Infante, admiring the murals of Diego Rivera, and
    participating in the church choir where they rehearse traditional hymns, all of
    which reinforce a sense of cultural continuity and personal calm.
  travel: Yesenia prefers meticulously planned trips that blend relaxation with cultural
    immersion, having revisited the historic streets of Guanajuato and explored the
    vineyards of Napa Valley, while dreaming of a pilgrimage to Oaxaca’s Day of the
    Dead festivities once their consulting schedule allows a slower pace.
  culinary: Yesenia excels in preparing authentic dishes such as tamales de elote,
    mole poblano, and fresh ceviche with nopal and lime, often sourcing ingredients
    from the local farmer’s market, and delights in sharing these meals at family
    gatherings, though they occasionally over‑salt a batch of salsas in their enthusiasm.
  core: Yesenia is a routine‑driven, anxiety‑prone marketing veteran who finds solace
    in gardening, journaling, and knitting, yet tends to postpone emails until late
    evenings, resulting in occasional night‑time stress.
background:
  cultural: Yesenia is a first‑generation Mexican American whose family roots trace
    back to Jalisco. Growing up in a close‑knit family, she was immersed in Mexican
    customs, Catholic traditions, and community solidarity. In Hanford, California,
    she actively preserves her heritage by celebrating Dia de los Muertos, cooking
    family recipes, and supporting local Latino festivals. Her bilingual fluency and
    deep cultural understanding inform both her personal life and professional approach,
    allowing her to connect authentically with the Mexican‑American community she
    serves.
attributes:
  skills: '[''Strategic marketing planning'', ''Brand management'', ''Email and direct‑mail
