    and financial oversight'', ''Bilingual (Spanish/English) communication'', ''Community
    outreach and partnership building'', ''Team leadership and project coordination'',
    ''Traditional media advertising (print, radio)'', ''Event planning for small community
    gatherings'']'
  hobbies: '[''Traditional Mexican cooking'', ''Gardening'', ''Knitting and crochet'',
    ''Church choir participation'', ''Small‑group book club (Mexican history)'', ''Volunteering
    at community center'', ''Walking at local farmers’ market'', ''Listening to mariachi
    music'', ''Daily journaling'']'
  career_goals: At this stage, Yesenia aims to solidify her legacy by mentoring younger
    marketers and shaping a regional marketing cooperative that supports Mexican‑owned
    small businesses. She aspires to transition into a consulting role that allows
    her to apply her tried‑and‑true expertise while maintaining a balanced schedule
    that mitigates her anxiety. Ultimately, she hopes to champion culturally resonant
    marketing initiatives that preserve heritage and drive economic stability for
    her community.
