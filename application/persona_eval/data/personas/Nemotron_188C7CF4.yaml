personas:
  professional: Jose Bonnet, a bilingual project coordinator famed for orchestrating
    community outreach campaigns and digital‑marketing initiatives, they blend their
    practical problem‑solving with a curiosity for emerging tools, channel their competitive
    streak into measurable results, and apply a healthy dose of skepticism to vet
    partnerships before committing resources.
  sports: Jose Bonnet, a forward for the North Attleboro United Soccer Club, they
    devote weekends to competitive matches, passionately follow the New England Revolution
    in the MLS, cheer the Boston Red Sox during baseball season, and supplement their
    training with trail runs on the Bay Path, balancing team play with individual
    endurance workouts.
  arts: Jose Bonnet, an avid salsa and bachata dancer, they channel their love of
    rhythm into nightly sessions at the local Latin dance hall, curate playlists featuring
    Marc Anthony, Carlos Vives, and classic boleros, and regularly attend performances
    at the Boston Symphony Orchestra, letting music and movement shape both their
    social life and creative outlet.
  travel: Jose Bonnet, who balances meticulous trip planning with spur‑of‑the‑moment
    escapes, they have explored Quito and Bogotá to reconnect with family roots, dream
    of trekking Patagonia’s Torres del Paine, and frequently retreat to Cape Cod for
    breezy New England beach getaways, all while budgeting travel costs through a
    dedicated savings envelope.
  culinary: Jose Bonnet, a passionate home chef, they perfect traditional dishes like
    ceviche de camarón, seco de pollo with ají and cilantro, and llapingachos stuffed
    with cheese, while incorporating locally sourced vegetables and sprinkling roasted
    chilies to add an extra kick to each meal.
  core: Jose Bonnet, a charismatic, competition‑driven community advocate, they blend
    a love for soccer, salsa, and spicy cuisine with a pragmatic, skeptical eye toward
    new opportunities, and often juggle too many projects yet never miss a beat.
background:
  cultural: Born to Ecuadorian parents, Jose grew up in a bilingual household where
    Spanish was spoken at home and English at school. His family maintains strong
    ties to Ecuadorian customs, celebrating events like Carnaval, Día de los Difuntos,
    and the Feast of the Virgen del Carmen with food, music, and communal gatherings.
    This heritage instilled in him values of hospitality, resilience, and a deep appreciation
    for music and cuisine. Living in North Attleboro, Massachusetts, he blends these
    traditions with New England’s community spirit, participating in local cultural
    festivals and integrating his Ecuadorian identity into his social and professional
    life.
