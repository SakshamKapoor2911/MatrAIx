persona_description: An Extension Specialist at Colorado State University Extension
  who specializes in managing pests and diseases in field corn, particularly Western
  Bean Cutworm and Spider Mites. The Extension Specialist is responsible for monitoring
  moth populations, managing pest infestations, and providing economic thresholds
  for treatment decisions. They are knowledgeable about the life cycle of the pests,
  the appropriate insecticides for control, and the importance of monitoring for spider
  mites and Banks Grass Mite. The Extension Specialist also conducts scouting for
  eggs of Western Bean Cutworm in corn and recommends effective insecticide products
  for both corn and dry beans.
