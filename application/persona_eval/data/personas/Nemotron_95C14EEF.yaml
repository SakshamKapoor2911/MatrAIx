personas:
  professional: Miguel Perezramos, a retired handyman‑turned‑community mentor, blends
    decades of carpentry, plumbing, and electrical know‑how with a love for storytelling,
    guiding neighbors through home‑repair workshops while improvising when plans go
    awry, a habit fueled by his practical curiosity and relaxed approach to obligations.
  sports: Miguel Perezramos enjoys gentle morning walks with his wife, joins the local
    senior fishing club at Lake Lavon for weekend angling, follows the Dallas Cowboys
    for football, and supports the Houston Astros in baseball, treating exercise as
    a social ritual rather than a rigorous regimen.
  arts: Miguel Perezramos immerses himself in bomba and plena rhythms, frequently
    listening to classics by Celia Cruz and Willie Colón, attends the Spring cultural
    festival where local folk dancers perform, and delights in recounting folklore
    at storytelling evenings, finding solace in the vibrant beats that echo his island
    memories.
  travel: Miguel Perezramos prefers short, well‑planned trips to familiar places,
    such as a yearly pilgrimage to the historic town of San Antonio, a recent visit
    to the Florida Keys to revisit coastal lighthouses, and he dreams of a tranquil
    cruise through the Caribbean, balancing his limited mobility with a desire for
    gentle adventure.
  culinary: Miguel Perezramos, an avid home cook, delights in preparing mofongo with
    fried plantains, arroz con gandules seasoned with sofrito, and pasteles wrapped
    in banana leaves, often seasoning dishes with cilantro, adobo, and a pinch of
    cumin, while they relish tasting the flavors of fresh herbs from their garden.
  core: Miguel Perezramos is a nostalgic handyman‑mentor who, despite occasional anxiety‑driven
    forgetfulness and a penchant for disorganization, fuels his days with garden herbs,
    vibrant music, and community storytelling, leaving a lingering scent of sofrito
    wherever they go.
background:
  cultural: Miguel was born to Puerto Rican parents and grew up immersed in the island’s
    vibrant culture. He is bilingual in Spanish and English, with a strong Catholic
    upbringing that shaped his values of family, community, and hospitality. Traditional
    Puerto Rican holidays, music, and food remain central to his identity. Since moving
    to Spring, Texas, he has blended his heritage with local customs, preserving Spanish-language
    recipes and festivals while participating in neighborhood gatherings. His cultural
    background informs his love for storytelling, communal meals, and a deep appreciation
    for the rhythms of Caribbean music.
attributes:
  skills: '[''Home repair (plumbing, electrical, carpentry)'', ''Gardening (herbs,
    tropical plants)'', ''Puerto Rican cooking (mofongo, arroz con gandules, pasteles)'',
    ''Basic computer use (email, video calls, social media)'', ''Community volunteering
    (storytelling, senior center)'', ''Vehicle maintenance (oil changes, tire rotations)'']'
  hobbies: '[''Gardening (herbs, tropical plants)'', ''Cooking Puerto Rican dishes'',
    ''Listening to bomba, plena, and salsa music'', ''Attending church services and
    cultural festivals'', ''Community storytelling events'', ''Fishing at local lakes'',
    ''Reading historical biographies'', ''Walking with spouse'']'
  career_goals: Miguel’s primary ambition is to stay actively engaged and emotionally
    balanced in his later years. He aims to share his cultural heritage by leading
    a small cooking club for neighbors, documenting his life story in a memoir, and
    mentoring younger volunteers at the senior center. He also wishes to improve his
    mental health by practicing mindfulness techniques, attending regular counseling,
    and maintaining a routine of gentle exercise such as daily walks. Though he is
    retired, he hopes to remain a valued resource in his community and to leave a
    tangible legacy of Puerto Rican traditions for his grandchildren and the broader
    Spring, TX neighborhood.
