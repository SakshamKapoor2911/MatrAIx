personas:
  professional: David Mckethan, a seasoned retail cashier renowned for rapid cash
    handling, POS expertise, and mentoring new staff, is channeling his balanced curiosity
    and practical mindset into a shift‑lead or assistant manager role while pursuing
    an associate degree in business administration and dreaming of opening a community‑centric
    convenience store.
  sports: David Mckethan enjoys weekly pickup basketball at the neighborhood park,
    cheers the Charlotte Hornets and NC State Wolfpack, and is a member of the local
    community center’s adult basketball league, preferring the camaraderie of informal
    play over regimented gym routines.
  arts: David Mckethan finds creative expression leading the church choir while humming
    to Aretha Franklin, Marvin Gaye, and John Coltrane, mixes Kendrick Lamar and J. Cole
    into their playlists, and unwinds with classic R&B‑infused films like The Color
    Purple and Dreamgirls, which reinforce their sense of community and personal rhythm.
  travel: David Mckethan favors flexible weekend road trips to Southern gems such
    as Asheville’s craft breweries, Charleston’s historic waterfront, and the Blue
    Ridge Parkway, driving the family’s old sedan on a modest budget while seeking
    local barbecue joints and small music festivals that echo their love of community
    gatherings.
  culinary: David Mckethan’s culinary passion centers on smoking ribs with hickory
    chips, perfecting collard greens seasoned with smoked paprika, and serving buttery
    cornbread, while they regularly experiment with soulful twists like jalapeño‑infused
    mac & cheese, proudly hosting neighborhood barbecues that double as community
    gatherings.
  core: David Mckethan blends a love for lively community gatherings, spontaneous
    grill‑side feasts, and a practical retail hustle with a lingering worry‑prone
    streak that fuels both disciplined financial steps and occasional stress‑filled
    late nights.
background:
  cultural: David’s cultural identity is shaped by his African‑American heritage in
    the Southern context of Angier, North Carolina. He grew up immersed in the traditions
    of Southern Black church life, gospel music, and close‑knit family gatherings.
    Community events like the county fair, church picnics, and neighborhood barbecues
    are central to his social world. He values the storytelling and resilience passed
    down through generations, and he often reflects on the history of Black life in
    rural North Carolina while navigating contemporary challenges. His cultural background
    informs his emphasis on community support, hospitality, and a strong sense of
    pride in his roots.
