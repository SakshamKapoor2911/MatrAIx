  career_goals: David aims to transition from a front‑line cashier to a supervisory
    role within the next two to three years, targeting a shift lead or assistant manager
    position. He plans to complete his associate degree in business administration
    at a local community college to strengthen his managerial credentials. In the
    longer term, he envisions opening a small neighborhood convenience store or coffee
    kiosk that reflects his community roots and offers a welcoming gathering spot.
    He also hopes to develop better stress‑management habits to reduce worry and maintain
    a healthier work‑life balance for his family.
