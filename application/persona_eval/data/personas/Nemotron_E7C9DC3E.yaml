personas:
  professional: Raki Roseberry, a licensed massage therapist with an Associate of
    Applied Science and a budding holistic health scholar, combines evidence‑based
    deep‑tissue, myofascial release, and lymphatic drainage with a methodical client‑assessment
    process and meticulous scheduling, while strategically planning a boutique wellness
    center in Indianapolis that offers affordable somatic care, stress‑management
    workshops, and culturally responsive health education for underserved neighborhoods.
  sports: Raki Roseberry keeps fit through a disciplined mix of sunrise yoga, half‑marathon
    training runs, and a membership in the Indianapolis Canoe Club’s recreational
    paddle‑boarding group, while cheering for the Indianapolis Colts in football season
    and the Pacers in basketball, and occasionally joining community cycling events
    during the spring.
  arts: Raki Roseberry unwinds by soaking in the soulful improvisations of John Coltrane
    and Kamasi Washington at local Indianapolis jazz lounges, curating a home library
    of psychology titles from Brené Brown to Daniel Kahneman, and attending contemporary
    art exhibitions at the Indianapolis Museum of Art, allowing these creative influences
    to inform their therapeutic approach.
  travel: Raki Roseberry prefers carefully planned, mid‑range getaways that blend
    restorative retreats with cultural immersion, having already explored the jazz
    heritage of New Orleans, the tea gardens of Kyoto, and the red rocks of Sedona,
    while dreaming of a future wellness‑focused road trip through the national parks
    of the American Southwest.
  culinary: Raki Roseberry enjoys experimenting in the kitchen with modern twists
    on classic soul‑food, such as collard‑green quinoa bowls, sweet‑potato‑ginger
    mash, and jalapeño‑infused cornbread, sourcing fresh herbs and heirloom tomatoes
    from the Indianapolis City Market and pairing dishes with craft sodas or natural
    wines.
  core: Raki Roseberry, a diligent massage therapist with a meticulous mind and a
    love for jazz, yoga, and soulful cooking, channels their anxiety into organized
    self‑care routines while dreaming of a community‑focused wellness hub.
background:
  cultural: Raki identifies as African‑American and grew up immersed in the rich cultural
    tapestry of Indianapolis’s historic Black neighborhoods, especially the Indiana
    Avenue corridor. Family gatherings centered around church, gospel music, and communal
    meals have instilled in her a deep sense of community responsibility and an awareness
    of the health disparities affecting Black residents. She draws on this heritage
    by integrating culturally sensitive communication into her practice, honoring
    traditions such as storytelling and shared meals, and actively participating in
    local initiatives that promote wellness and economic empowerment within the Black
    community.
attributes:
  skills: '[''Swedish massage'', ''Deep tissue therapy'', ''Sports massage'', ''Myofascial
    release'', ''Lymphatic drainage'', ''Reflexology'', ''Anatomical assessment'',
    ''Client intake documentation'', ''Business management'', ''First Aid and CPR'']'
  hobbies: '[''Yoga'', ''Gardening succulent plants'', ''Reading psychology and self‑help
    books'', ''Journaling'', ''Cooking modern soul food'', ''Attending jazz concerts'',
    ''Volunteering at community health fairs'', ''Walking in local parks'']'
  career_goals: Raki aims to earn a Bachelor’s degree in Holistic Health to broaden
    her therapeutic toolkit, and she aspires to open a boutique wellness center in
    Indianapolis that offers affordable massage services, stress‑management workshops,
    and culturally responsive health education for underserved Black communities.
    She envisions becoming a certified clinical therapist specializing in chronic
    pain for women of color and publishing articles that bridge traditional massage
    practices with modern neuroscience. Long‑term, she hopes to mentor aspiring therapists,
    champion mental‑health awareness, and eventually collaborate with local healthcare
    providers to integrate somatic care into primary health services.
