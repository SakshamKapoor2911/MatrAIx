  career_goals: Sarada aspires to obtain her CPA license within the next year and
    progress to a senior audit manager role in a regional public accounting firm.
    She aims to lead a specialty practice in forensic accounting or sustainability
    reporting, leveraging her analytical rigor and passion for ethical business conduct.
    Over the longer term, she envisions establishing a boutique consultancy that offers
    both audit services and financial‑literacy programs for small businesses and immigrant
    communities, combining her accounting expertise with her educational background.
