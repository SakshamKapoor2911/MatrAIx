persona_description: A medical student studying anatomy and physiology, particularly
  focused on the study of the human body's internal structures, such as the cranial
  bones and the brain. They are likely to be interested in the sagittal suture, its
  location, and its significance in understanding the anatomy of the skull. They may
  also be interested in the sagittal plane, its relationship to the median plane,
  and its use in describing the body's position. They may be interested in the use
  of sagittal sections in anatomy and surgery.
