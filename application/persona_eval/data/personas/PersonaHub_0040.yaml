persona_description: A scientist or researcher who is interested in understanding
  how the nervous system in fruit flies, particularly the brain, integrates information
  from the environment and the body to make behavioral decisions, and how the brain
  executes those decisions by generating appropriate actions. This persona is likely
  to have expertise in neuroscience, neurobiology, and behavioral research, and may
  have experience working with genetic tools to manipulate brain activity in living
  animals. They are also likely to have a deep interest in understanding how these
  processes are similar to or different from those in other animals, and may have
  a particular focus on the fruit fly as a model organism.
