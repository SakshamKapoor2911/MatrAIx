personas:
  professional: Michele Jimmerson, a 43‑year‑old licensed architect with a graduate
    MBA, channels their disciplined workflow and love of routine into systematic project
    planning, advanced BIM modeling, and cost‑controlled delivery, aiming to become
    a principal partner while championing sustainable residential design and LEED
    AP certification.
  sports: Michele Jimmerson, a 43‑year‑old who prefers low‑impact fitness, embraces
    restorative yoga three times a week, joins a community tennis club for weekend
    matches, follows the Seattle Seahawks (NFL) and the Portland Timbers (MLS) avidly,
    and occasionally hikes local trails during summer months to balance sedentary
    work.
  arts: Michele Jimmerson, a lover of orderly aesthetic, devotes evenings to reading
    classic literature by Jane Austen and architectural treatises by Le Corbusier,
    attends quarterly exhibitions at the Museum of Modern Art showcasing works by
    Anselm Kiefer, and enjoys listening to chamber music by Mozart while baking precise
    French pastries.
  travel: Michele Jimmerson, a methodical traveler at 43, plans trips on a spreadsheet,
    has explored the historic streets of Kyoto and the Art Nouveau neighborhoods of
    Barcelona for architectural inspiration, and hopes to visit the sustainable eco‑village
    of Tamera in Portugal when their boutique practice stabilizes.
  culinary: Michele Jimmerson, a meticulous home baker, perfects croissants using
    high‑gluten flour, butter, and a precise lamination schedule, delights in seasonal
    ratatouille crafted from garden‑grown zucchini, bell peppers, and heirloom tomatoes,
    and prefers farm‑to‑table diners that source organic produce.
  core: Michele Jimmerson, a 43‑year‑old architect who navigates life with regimented
    precision, an aversion to chaos, a penchant for puzzle‑solving, and a chronic
    habit of over‑checking spreadsheets.
background:
  cultural: Michele was raised in a middle‑class, white Midwestern family in the Chicago
    suburbs, with deep roots in German‑Irish ancestry that emphasize practicality,
    modesty, and a strong work ethic. The cultural environment of Elmhurst and DuPage
    County reinforced her appreciation for routine, community involvement, and traditional
    values. Her upbringing combined respectful adherence to local customs with an
    emphasis on education and self‑improvement, shaping her disciplined, pragmatic
    outlook and her commitment to balancing personal achievement with family responsibilities.
attributes:
  skills: '["BIM Modeling (Revit)", "AutoCAD Drafting", "Construction Documentation",
    "Cost Estimation and Budget Management", "Project Scheduling and Workflow Optimization",
    "LEED Sustainable Design", "Building Code Compliance", "Team Leadership and Mentoring",
    "Strategic Business Planning", "Client Relations and Negotiation"]'
  hobbies: '["Reading architectural journals and classic literature", "Vegetable gardening",
    "Baking precise pastries", "Restorative yoga", "Jigsaw and logic puzzles", "Historical
    preservation volunteer work", "Attending small community book clubs"]'
  career_goals: Michele aims to transition into a senior leadership role where she
    can shape the strategic direction of an architecture firm, ultimately becoming
    a principal partner or founding her own boutique practice focused on sustainable
    residential and small‑scale commercial projects. She seeks to formalize her expertise
    with LEED AP certification and to implement standardized, efficiency‑driven processes
    that reduce project risk and cost overruns. Mentoring younger architects and fostering
    a collaborative yet disciplined studio culture are also central to her long‑term
    vision.
