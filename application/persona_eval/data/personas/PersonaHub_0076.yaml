persona_description: An aerospace engineer specializing in the development of wearable
  technology for assessing sensorimotor function in parabolic flight and spaceflight
  environments. This person is skilled in engineering evaluation, portable device
  design, and the integration of portable devices into a portable system. They have
  developed a unique device and protocol for measuring oculomotor responses and spatial
  orientation in a noisy environment, including the use of a portable 3D head-mounted
  display, rate sensors, accelerometers, data acquisition card, and a small user interface
  box. They have also developed algorithms for tracking head and body movement in
  an environment where gravity cannot be used as a reliable reference vector, and
  for comparing body orientation to actual orientation in photographs.
