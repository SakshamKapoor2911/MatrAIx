    and informal teaching'']'
  hobbies: '[''Ballet Folklórico dance'', ''cooking Mexican cuisine and fusion dishes'',
    ''visiting art galleries and museums'', ''photography of everyday life'', ''gardening
    and growing herbs'', ''reading multicultural literature'', ''volunteering at community
    events and youth programs'', ''organizing neighborhood potlucks'']'
  career_goals: Maria aspires to turn her informal expertise into a formal role that
    strengthens cultural ties and supports her community. She aims to obtain a GED
    or a certificate in community development or hospitality within the next two years,
    after which she hopes to become a community outreach coordinator for a local arts
    center or a cultural programming assistant at the Gwinnett County Parks and Recreation
    department. Parallel to this, she dreams of launching a home-based catering business
    that offers authentic Mexican dishes and culinary workshops, providing employment
    opportunities for other Mexican-American families in Lilburn. In the longer term,
    Maria envisions leading a multicultural community hub that combines art exhibitions,
    dance classes, and food festivals, fostering dialogue and creative expression
    across the region.
