personas:
  professional: Maria Buendia, a 34‑year‑old community‑focused event planner, leverages
    their bilingual fluency, methodical budgeting expertise, and passion for the arts
    to design inclusive festivals, workshops, and cultural programs for a local arts
    center, while actively pursuing certification in community development to transition
    into a formal outreach coordinator role.
  sports: Maria Buendia, a 34‑year‑old, stays active by practicing yoga at a downtown
    studio, follows the Atlanta Falcons and Atlanta Hawks avidly, and participates
    in a co‑ed recreational soccer league each spring, balancing team camaraderie
    with their energetic social life.
  arts: Maria Buendia, a 34‑year‑old, immerses themselves in the local art scene by
    attending monthly exhibitions at the School of the Arts, honing watercolor and
    pottery skills, performing in a traditional folk‑dance troupe, and drawing inspiration
    from artists such as Georgia O’Keeffe, Claude Monet, and Jackson Pollock while
    leading a multicultural book club that explores works by Toni Morrison, Haruki
    Murakami, and Chimamanda Ngozi Adichie.
  travel: Maria Buendia, a 34‑year‑old, prefers weekend road trips to the Appalachian
    foothills, annual cultural escapes to Savannah’s historic district, and occasional
    European getaways to Barcelona and Lisbon, planning each journey meticulously
    to balance budget constraints with a thirst for immersive experiences.
  culinary: Maria Buendia, a 34‑year‑old, blends heritage recipes like corn‑based
    dumplings and smoky paprika sauces with contemporary twists, regularly hosts themed
    dinner nights featuring dishes such as herb‑crusted chicken with citrus glaze,
    cilantro‑lime rice, and avocado salsa, and delights in experimenting with ingredients
    like fresh cilantro, sweet bell peppers, and heirloom tomatoes.
  core: Maria Buendia, a 34‑year‑old, channels their curiosity and methodical energy
    into weaving art, food, and community together, yet they occasionally hoard seldom‑used
    kitchen gadgets and forget to water their garden during particularly busy weeks.
background:
  cultural: Maria was raised in a Mexican-American household steeped in the traditions
    of her ancestors. She grew up speaking Spanish at home and celebrating cultural
    holidays such as Día de los Muertos, Mexican Independence Day, and Las Posadas,
    often involving elaborate altars, music, and family recipes. Her family's strong
    emphasis on hospitality and community gatherings shaped her worldview, making
    her a natural host and organizer. While living in Lilburn, Georgia, she maintains
    close ties with the local Mexican community, attending events at the Georgia Mexican
    Consulate and collaborating with cultural organizations to preserve and share
    her heritage. Maria’s Catholic upbringing influences her participation in church
    activities, which serve as a hub for both spiritual and social connections. She
    blends the vibrancy of Mexican artistic expressions—colorful textiles, folk art,
    and storytelling—with the diverse cultural landscape of Gwinnett County, fostering
    cross-cultural exchange in her everyday life.
attributes:
