    club", "Visiting local museum exhibitions"]'
  career_goals: Thomas dreams of becoming an artist who creates comic books and illustrations
    that tell stories, and he also imagines a future as an engineer or inventor who
    designs useful gadgets. He hopes to combine his love for art and problem‑solving
    to make things that help people. At the same time, he wants to be someone who
    can support his friends and community, perhaps as a teacher or a community organizer,
    so that others feel safe and valued.
