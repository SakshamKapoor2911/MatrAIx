personas:
  professional: Thomas Gatlin, a budding young visual storyteller, blends meticulous
    sketching with imaginative world‑building, turning classroom assignments into
    vivid comic‑strip projects; they channel their curiosity and love of structure
    into art that feels both organized and whimsical.
  sports: Thomas Gatlin plays on the Oakwood Rangers youth soccer team, practices
    dribbling after school, and cheers for the Dallas Cowboys during family football
    nights; their approach to fitness is playful—favoring backyard tag games over
    structured workouts—and they often sketch game strategies in their sketchbook.
  arts: Thomas Gatlin draws inspiration from the vivid panels of the graphic novel
    "Amulet," the whimsical animation of Studio Ghibli's "My Neighbor Totoro," and
    the acoustic tunes of Chris Stapleton and Mumford & Sons; they relish visiting
    kid‑friendly museum exhibits featuring Andy Warhol prints and spend weekends recreating
    favorite scenes in their sketchbook.
  travel: Thomas Gatlin enjoys family road trips to places like the Grand Canyon and
    the local science museum, favors the security of traveling with parents over solo
    adventures, and dreams of visiting Tokyo to explore its anime cafés and the historic
    castles of Scotland.
  culinary: Thomas Gatlin loves homemade mac and cheese topped with cheddar, peanut
    butter and jelly sandwiches, and weekend pancakes drizzled with maple syrup, often
    helping stir batter while getting distracted by music; they proudly claim the
    title of "junior chef" after successfully baking chocolate chip cookies with Mom.
  core: Thomas Gatlin is a quietly curious nine‑year‑old artist who transforms backyard
    bug‑watching into sketchbook adventures, meticulously saves allowance for LEGO,
    yet worries about every school project.
background:
  cultural: Thomas is a white American boy growing up in Royse City, a small community
    in Hunt County, Texas. His family reflects typical Southern‑Texas values, emphasizing
    kindness, cooperation, and responsibility. He participates in community events
    like school fairs, local church activities, and regional celebrations such as
    the State Fair of Texas. He enjoys Texas traditions such as backyard barbecues,
    listening to country music, and attending Friday night high‑school football games
    with his family. The region’s easy access to outdoor spaces and natural trails
    encourages his love of exploring nature. While his community is predominantly
    white, Thomas is exposed to a mix of Texan cultural influences that shape his
    respectful and considerate demeanor.
