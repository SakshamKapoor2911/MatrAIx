schemaVersion: "1.0"
id: acupuncture_attitudes_v1
title: "Acupuncture Attitudes Survey"
description: "People's experiences with and attitudes toward acupuncture as a wellness practice."
questions:
  - id: q0
    prompt: "Have you ever tried acupuncture?"
    type: single_choice
    construct: have_ever_tried_acupuncture
    required: true
    options:
      - id: "a"
        label: "Yes, I go regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Yes, but only once or twice"
      - id: "d"
        label: "No, but I'm open to it"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "How long ago did you first try acupuncture?"
    type: single_choice
    construct: long_ago_did_first_try
    required: true
    options:
      - id: "a"
        label: "Within the past year"
      - id: "b"
        label: "1 to 3 years ago"
      - id: "c"
        label: "4 to 10 years ago"
      - id: "d"
        label: "More than 10 years ago"
      - id: "e"
        label: "I have never tried it"
  - id: q2
    prompt: "In a typical year, about how often do you get acupuncture?"
    type: single_choice
    construct: typical_year_often_get_acupuncture
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Once or twice a year"
      - id: "c"
        label: "Every few months"
      - id: "d"
        label: "About once a month"
      - id: "e"
        label: "Two or more times a month"
