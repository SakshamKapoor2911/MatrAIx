version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "application/news-subscription-decision"

[metadata]
difficulty = "medium"
type = "os-app"
os = "ios"
domain = "software"
tags = [
  "apple news",
  "News+",
  "subscription conversion",
  "Get Started",
  "features and pricing",
  "offer page browse",
]


[ios]
device_type = "iPhone-17"
runtime = "iOS-26-4"

[verifier]
timeout_sec = 180.0

# Best-effort verifier-side LLM signal extraction (conversion-barrier facets).
# Resolved from the host env at verify time; if unset or unreachable the verifier
# skips the signals and still passes on its deterministic facts.
[verifier.env]
OPENAI_API_KEY = "${OPENAI_API_KEY}"
MODEL_NAME = "gpt-4o-mini"

[agent]
timeout_sec = 1800.0

[environment]
definition = "application/shared-os-app-mac-ios"
cpus = 4
memory_mb = 4096
storage_mb = 40960
gpus = 0

[environment.healthcheck]
command = "mkdir -p /app/output"
timeout_sec = 30.0
retries = 3
