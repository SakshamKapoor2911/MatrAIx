artifactName: user_feedback.json
instructions: |
  Reflect honestly as the persona after finishing the News+ offer review.
  Focus on whether browsing the full page plus re-checking features and pricing
  was enough to decide, and whether Get Started felt worth tapping.
fields:
  - key: needConstraintSatisfaction
    prompt: Did browsing the full offer and returning to features/pricing give you enough to decide?
    kind: enum
    choices: [yes, partially, no]
  - key: personalPreferenceSatisfaction
    prompt: Did the features and pricing match how you actually consume news?
    kind: enum
    choices: [yes, partially, no]
  - key: overallExperienceRating
    prompt: Overall, how would you rate this subscription decision experience from 1 to 10?
    kind: integer
    minimum: 1
    maximum: 10
    explanation:
      key: reason
      prompt: Briefly explain the rating — especially what would change whether you tap Get Started.
  - key: trustLevel
    prompt: "Optional: how much did you trust the offer's value claim from 1 to 10?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: effortRating
    prompt: "Optional: how effortful the browse + return-to-pricing flow felt from 1 to 10 (higher = more effort)?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: clarityOfNextStep
    prompt: "Optional: was it clear that Get Started meant starting a subscription?"
    kind: boolean
    required: false
