schemaVersion: "1.0"
id: browser_devtools_usage_v1
title: "Browser Developer Tools Usage Survey"
description: "How developers use browser developer tools such as Chrome DevTools and Firefox Developer Tools, including which panels and features they rely on."
questions:
  - id: q0
    prompt: "How often do you open browser developer tools?"
    type: single_choice
    construct: often_open_browser_developer_tools
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Almost never"
  - id: q1
    prompt: "How long have you been using browser developer tools?"
    type: single_choice
    construct: long_have_been_using_browser
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which best describes your work with the web?"
    type: single_choice
    construct: best_describes_work_web
    required: true
    options:
      - id: "a"
        label: "Front-end developer"
      - id: "b"
        label: "Full-stack developer"
      - id: "c"
        label: "Web designer"
      - id: "d"
        label: "QA or test engineer"
      - id: "e"
        label: "Back-end developer who touches the front end"
      - id: "f"
        label: "I use DevTools occasionally"
  - id: q3
    prompt: "Which browser's developer tools do you use most often?"
    type: single_choice
    construct: browser_s_developer_tools_use
    required: true
    options:
      - id: "a"
        label: "Chrome DevTools"
      - id: "b"
        label: "Firefox Developer Tools"
      - id: "c"
        label: "Edge DevTools"
      - id: "d"
        label: "Safari Web Inspector"
      - id: "e"
        label: "Other"
  - id: q4
    prompt: "Which browsers' developer tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: browsers_developer_tools_have_used
    required: true
    options:
      - id: "a"
        label: "Chrome DevTools"
      - id: "b"
        label: "Firefox Developer Tools"
      - id: "c"
        label: "Edge DevTools"
      - id: "d"
        label: "Safari Web Inspector"
      - id: "e"
        label: "Brave DevTools"
      - id: "f"
        label: "Arc or another Chromium browser"
      - id: "g"
        label: "None"
  - id: q5
    prompt: "Which DevTools panels do you use regularly? (Select all that apply)"
    type: multi_choice
    construct: devtools_panels_use_regularly_select
    required: true
    options:
      - id: "a"
        label: "Elements / Inspector"
      - id: "b"
        label: "Console"
      - id: "c"
        label: "Network"
      - id: "d"
        label: "Sources / Debugger"
      - id: "e"
        label: "Performance"
      - id: "f"
        label: "Memory"
      - id: "g"
        label: "Application / Storage"
      - id: "h"
        label: "Lighthouse"
      - id: "i"
        label: "Accessibility"
  - id: q6
    prompt: "Which DevTools features do you use for debugging? (Select all that apply)"
    type: multi_choice
    construct: devtools_features_use_debugging_select
    required: true
    options:
      - id: "a"
        label: "Breakpoints"
      - id: "b"
        label: "Console logging"
      - id: "c"
        label: "Watch expressions"
      - id: "d"
        label: "Call stack inspection"
      - id: "e"
        label: "Conditional breakpoints"
      - id: "f"
        label: "Network request inspection"
      - id: "g"
        label: "Blackboxing / ignore lists"
      - id: "h"
        label: "Source maps"
  - id: q7
    prompt: "What do you most commonly use DevTools for? (Select all that apply)"
    type: multi_choice
    construct: most_commonly_use_devtools_select
    required: true
    options:
      - id: "a"
        label: "Inspecting and editing the DOM"
      - id: "b"
        label: "Tweaking CSS live"
      - id: "c"
        label: "Debugging JavaScript"
      - id: "d"
        label: "Inspecting network requests"
      - id: "e"
        label: "Measuring performance"
      - id: "f"
        label: "Testing responsive layouts"
      - id: "g"
        label: "Auditing accessibility"
      - id: "h"
        label: "Inspecting storage and cookies"
  - id: q8
    prompt: "Which device or responsive testing features do you use? (Select all that apply)"
