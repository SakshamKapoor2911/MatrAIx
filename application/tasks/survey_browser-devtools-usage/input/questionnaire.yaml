        label: "Lighthouse"
      - id: "b"
        label: "Performance panel / flame charts"
      - id: "c"
        label: "Core Web Vitals overlay"
      - id: "d"
        label: "Coverage tool"
      - id: "e"
        label: "Memory profiler"
      - id: "f"
        label: "WebPageTest or external tools"
      - id: "g"
        label: "None"
  - id: q10
