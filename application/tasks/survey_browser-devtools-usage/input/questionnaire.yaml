      - id: "b"
        label: "Network throttling"
      - id: "c"
        label: "CPU throttling"
      - id: "d"
        label: "Device emulation (touch, orientation)"
      - id: "e"
        label: "Geolocation override"
      - id: "f"
        label: "I test on real devices instead"
      - id: "g"
        label: "I don't use these"
  - id: q9
    prompt: "Which performance or auditing tools do you use? (Select all that apply)"
    type: multi_choice
    construct: performance_auditing_tools_use_select
    required: true
    options:
