        label: "On the job"
      - id: "b"
        label: "Online courses or documentation"
      - id: "c"
        label: "A course or bootcamp"
      - id: "d"
        label: "School or university"
      - id: "e"
        label: "A colleague or mentor"
      - id: "f"
