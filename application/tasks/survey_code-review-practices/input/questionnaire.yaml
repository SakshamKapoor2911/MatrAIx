schemaVersion: "1.0"
id: code_review_practices_v1
title: "Code Review Practices Survey"
description: "How developers and teams conduct code review, including the tools, turnaround, standards, and attitudes involved."
questions:
  - id: q0
    prompt: "How often do you participate in code review (as author or reviewer)?"
    type: single_choice
    construct: often_participate_code_review_as
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just starting to do code review"
      - id: "e"
        label: "I rarely participate in code review"
  - id: q1
    prompt: "How long have you been participating in code review?"
    type: single_choice
    construct: long_have_been_participating_code
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes your primary role?"
    type: single_choice
    construct: best_describes_primary_role
    required: true
    options:
      - id: "a"
        label: "Front-end developer"
      - id: "b"
        label: "Back-end developer"
      - id: "c"
        label: "Full-stack developer"
      - id: "d"
        label: "Engineering manager or lead"
      - id: "e"
        label: "DevOps or platform engineer"
      - id: "f"
        label: "I contribute code occasionally"
  - id: q3
    prompt: "What is your typical relationship to code review?"
    type: single_choice
    construct: typical_relationship_code_review
    required: true
    options:
      - id: "a"
        label: "I mostly review others' code"
      - id: "b"
        label: "My code is mostly reviewed by others"
      - id: "c"
        label: "I both review and get reviewed roughly equally"
      - id: "d"
        label: "I rarely take part in code review"
  - id: q4
    prompt: "On which platform do most of your code reviews happen?"
    type: single_choice
    construct: platform_most_code_reviews_happen
    required: true
    options:
      - id: "a"
        label: "GitHub pull requests"
      - id: "b"
        label: "GitLab merge requests"
      - id: "c"
        label: "Bitbucket pull requests"
      - id: "d"
        label: "Gerrit"
      - id: "e"
        label: "Azure DevOps"
      - id: "f"
        label: "Other"
  - id: q5
    prompt: "Which code review platforms have you used? (Select all that apply)"
    type: multi_choice
    construct: code_review_platforms_have_used
    required: true
    options:
      - id: "a"
        label: "GitHub"
      - id: "b"
        label: "GitLab"
      - id: "c"
        label: "Bitbucket"
      - id: "d"
        label: "Gerrit"
      - id: "e"
        label: "Azure DevOps"
      - id: "f"
        label: "Review Board"
      - id: "g"
        label: "Phabricator"
      - id: "h"
        label: "None"
  - id: q6
    prompt: "Which supporting tools does your review process use? (Select all that apply)"
    type: multi_choice
    construct: supporting_tools_does_review_process
    required: true
    options:
      - id: "a"
        label: "Linters (ESLint, Ruff, etc.)"
      - id: "b"
        label: "Static analysis (SonarQube, CodeQL)"
      - id: "c"
        label: "Formatters (Prettier, Black)"
      - id: "d"
        label: "Danger or policy bots"
      - id: "e"
        label: "AI review assistants (CodeRabbit, Copilot, etc.)"
      - id: "f"
        label: "Coverage reporting"
      - id: "g"
        label: "None"
  - id: q7
    prompt: "Which CI checks are required before merging in your team? (Select all that apply)"
    type: multi_choice
    construct: ci_checks_required_before_merging
    required: true
    options:
      - id: "a"
        label: "Automated tests pass"
      - id: "b"
        label: "Linting passes"
      - id: "c"
        label: "Type checking passes"
      - id: "d"
        label: "Coverage threshold met"
      - id: "e"
        label: "Security scan passes"
      - id: "f"
        label: "Successful build"
      - id: "g"
        label: "None required"
  - id: q8
    prompt: "What do you focus on most when reviewing code? (Select all that apply)"
    type: multi_choice
    construct: focus_most_when_reviewing_code
    required: true
    options:
      - id: "a"
        label: "Correctness and logic"
      - id: "b"
        label: "Readability and style"
      - id: "c"
        label: "Security"
      - id: "d"
        label: "Performance"
      - id: "e"
        label: "Test coverage"
      - id: "f"
        label: "Architecture and design"
      - id: "g"
        label: "Documentation"
  - id: q9
    prompt: "How large is a typical pull request in your team?"
    type: single_choice
    construct: large_typical_pull_request_team
    required: true
    options:
      - id: "a"
        label: "Very small (under 50 lines)"
      - id: "b"
        label: "Small (50 to 200 lines)"
      - id: "c"
        label: "Medium (200 to 500 lines)"
      - id: "d"
        label: "Large (500 to 1,000 lines)"
      - id: "e"
        label: "Very large (over 1,000 lines)"
  - id: q10
    prompt: "What is the typical turnaround time for a first review in your team?"
    type: single_choice
    construct: typical_turnaround_time_first_review
    required: true
    options:
      - id: "a"
        label: "Within an hour"
      - id: "b"
        label: "Within a few hours"
      - id: "c"
        label: "Within a day"
      - id: "d"
        label: "One to three days"
      - id: "e"
        label: "More than three days"
  - id: q11
    prompt: "How many reviewers are typically required to approve a change?"
    type: single_choice
    construct: many_reviewers_typically_required_approv
    required: true
    options:
      - id: "a"
        label: "None required"
      - id: "b"
        label: "One reviewer"
      - id: "c"
        label: "Two reviewers"
      - id: "d"
        label: "Three or more reviewers"
      - id: "e"
        label: "It varies by change"
  - id: q12
    prompt: "Does your team use pull-request templates or checklists?"
    type: single_choice
    construct: does_team_use_pull_request
    required: true
    options:
      - id: "a"
        label: "Yes, always"
      - id: "b"
        label: "Yes, sometimes"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I'm not sure"
  - id: q13
    prompt: "Does your team use AI-assisted code review?"
    type: single_choice
    construct: does_team_use_ai_assisted
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but we're considering it"
      - id: "d"
        label: "No"
  - id: q14
    prompt: "How are review comments typically resolved?"
    type: single_choice
    construct: review_comments_typically_resolved
    required: true
    options:
      - id: "a"
        label: "Author addresses each comment before merge"
      - id: "b"
        label: "Author addresses major comments, defers minor ones"
      - id: "c"
        label: "Comments are discussed synchronously"
      - id: "d"
        label: "Comments are often left unresolved"
      - id: "e"
        label: "It varies widely"
  - id: q15
    prompt: "About how many pull requests do you review in a typical week? Please enter a number."
    type: free_text
    construct: many_pull_requests_review_typical
    required: true
  - id: q16
    prompt: "Roughly how many hours pass before your pull requests get a first review? Please enter a number."
