        label: "Under $10"
      - id: "b"
        label: "$10 to $14"
      - id: "c"
        label: "$15 to $19"
      - id: "d"
        label: "$20 to $29"
      - id: "e"
        label: "$30 or more"
      - id: "f"
        label: "Not sure"
  - id: q10
    prompt: "About how much do you pay for renters insurance per month, in U.S. dollars? Please enter a whole number."
    type: free_text
    construct: much_pay_renters_insurance_per
    required: true
