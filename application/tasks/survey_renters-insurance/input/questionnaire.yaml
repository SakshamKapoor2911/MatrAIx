schemaVersion: "1.0"
id: renters_insurance_v1
title: "Renters Insurance Survey"
description: "How renters obtain, understand, and evaluate renters insurance, and what drives their coverage, provider, and claims decisions."
questions:
  - id: q0
    prompt: "Which best describes your current housing situation?"
    type: single_choice
    construct: best_describes_current_housing_situation
    required: true
    options:
      - id: "a"
        label: "I rent an apartment"
      - id: "b"
        label: "I rent a house or townhouse"
      - id: "c"
        label: "I rent a room or share a rental"
      - id: "d"
        label: "I own my home"
      - id: "e"
        label: "I live with family and do not pay rent"
  - id: q1
    prompt: "Do you currently have an active renters insurance policy?"
    type: single_choice
    construct: currently_have_active_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, I have an active renters insurance policy"
      - id: "b"
        label: "No, but I had one in the past"
      - id: "c"
        label: "No, I have never had renters insurance"
      - id: "d"
        label: "Not sure"
  - id: q2
    prompt: "How long have you had renters insurance (current or most recent policy)?"
    type: single_choice
    construct: long_have_had_renters_insurance
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I have never had it"
  - id: q3
    prompt: "Does your lease or landlord require you to carry renters insurance?"
    type: single_choice
    construct: does_lease_landlord_require_carry
    required: true
    options:
      - id: "a"
        label: "Yes, required with proof of coverage"
      - id: "b"
        label: "Recommended but not required"
      - id: "c"
        label: "No"
      - id: "d"
        label: "Not sure"
  - id: q4
    prompt: "For which reasons do you carry (or would you carry) renters insurance? (Select all that apply)"
    type: multi_choice
    construct: reasons_carry_would_carry_renters
    required: true
    options:
      - id: "a"
        label: "Protect my belongings from theft"
      - id: "b"
        label: "Protect belongings from fire or smoke"
      - id: "c"
        label: "Cover water damage"
      - id: "d"
        label: "Personal liability if someone is injured"
      - id: "e"
        label: "Required by my lease"
      - id: "f"
        label: "Temporary living costs if displaced"
      - id: "g"
        label: "Coverage for electronics and laptops"
      - id: "h"
        label: "Peace of mind"
  - id: q5
    prompt: "How often do you review your renters insurance coverage?"
    type: single_choice
    construct: often_review_renters_insurance_coverage
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Only when renewing"
      - id: "c"
        label: "Once a year"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Whenever my situation changes"
  - id: q6
    prompt: "Who is your current renters insurance provider?"
    type: single_choice
    construct: who_current_renters_insurance_provider
    required: true
    options:
      - id: "a"
        label: "Lemonade"
      - id: "b"
        label: "State Farm"
      - id: "c"
        label: "Allstate"
      - id: "d"
        label: "GEICO"
      - id: "e"
        label: "Progressive"
      - id: "f"
        label: "USAA"
      - id: "g"
        label: "Liberty Mutual"
      - id: "h"
        label: "Nationwide"
      - id: "i"
        label: "Farmers"
      - id: "j"
        label: "Another company"
      - id: "k"
        label: "I do not have renters insurance"
  - id: q7
    prompt: "Which providers did you get quotes from before choosing a policy? (Select all that apply)"
    type: multi_choice
    construct: providers_did_get_quotes_from
    required: true
    options:
      - id: "a"
        label: "Lemonade"
      - id: "b"
        label: "State Farm"
      - id: "c"
        label: "Allstate"
      - id: "d"
        label: "GEICO"
      - id: "e"
        label: "Progressive"
      - id: "f"
        label: "USAA"
      - id: "g"
        label: "Liberty Mutual"
      - id: "h"
        label: "Nationwide"
      - id: "i"
        label: "An independent agent"
      - id: "j"
        label: "A comparison website such as Policygenius"
      - id: "k"
        label: "I did not compare quotes"
  - id: q8
    prompt: "How did you purchase your renters insurance policy?"
    type: single_choice
    construct: did_purchase_renters_insurance_policy
    required: true
    options:
      - id: "a"
        label: "Online directly from the insurer"
      - id: "b"
        label: "Through the insurer's mobile app"
      - id: "c"
        label: "Through a local or captive agent"
      - id: "d"
        label: "Through an independent broker"
      - id: "e"
        label: "Bundled with my auto insurance"
      - id: "f"
        label: "Arranged through my landlord or property manager"
  - id: q9
    prompt: "About how much do you pay for renters insurance per month?"
    type: single_choice
    construct: much_pay_renters_insurance_per
    required: true
    options:
