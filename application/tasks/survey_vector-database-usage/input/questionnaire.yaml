        label: "Retrieval-augmented generation (RAG)"
      - id: "b"
        label: "Semantic document search"
      - id: "c"
        label: "Recommendations"
      - id: "d"
        label: "Image or multimodal search"
      - id: "e"
        label: "Chatbot or agent memory"
      - id: "f"
        label: "Anomaly or duplicate detection"
