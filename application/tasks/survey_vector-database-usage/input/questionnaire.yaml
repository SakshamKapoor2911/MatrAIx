        label: "Pinecone"
      - id: "b"
        label: "Weaviate"
      - id: "c"
        label: "pgvector (PostgreSQL)"
      - id: "d"
        label: "Chroma"
      - id: "e"
        label: "Qdrant"
      - id: "f"
        label: "Milvus"
      - id: "g"
        label: "Redis"
      - id: "h"
        label: "Elasticsearch or OpenSearch"
      - id: "i"
        label: "FAISS"
      - id: "j"
