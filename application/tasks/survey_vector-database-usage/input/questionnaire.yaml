schemaVersion: "1.0"
id: vector_database_usage_v1
title: "Vector Database Usage Survey"
description: "How developers choose and use vector databases for retrieval-augmented generation, semantic search, and other AI applications."
questions:
  - id: q0
    prompt: "How often do you work with vector databases?"
    type: single_choice
    construct: often_work_vector_databases
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "I am just learning them"
      - id: "f"
        label: "I don't work with vector databases"
  - id: q1
    prompt: "How long have you worked with vector databases?"
    type: single_choice
    construct: long_have_worked_vector_databases
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "More than 2 years"
      - id: "e"
        label: "I'm just getting started"
  - id: q2
    prompt: "What is your primary use case for vector databases?"
    type: single_choice
    construct: primary_use_case_vector_databases
    required: true
    options:
