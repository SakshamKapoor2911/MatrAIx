schemaVersion: "1.0"
id: recovery_wearables_v1
title: "Recovery Wearables Survey"
description: "How people use recovery-focused wearables such as Whoop, Oura, and Garmin, the metrics they track, and their attitudes toward the data."
questions:
  - id: q0
    prompt: "Do you currently use a recovery-focused wearable (such as a fitness ring or strap that tracks sleep and recovery)?"
    type: single_choice
    construct: currently_use_recovery_focused_wearable
    required: true
    options:
      - id: "a"
        label: "Yes, I wear one daily"
      - id: "b"
        label: "Yes, but not every day"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you used a recovery wearable?"
    type: single_choice
    construct: long_have_used_recovery_wearable
    required: true
    options:
      - id: "a"
        label: "I do not use one"
      - id: "b"
        label: "Less than 6 months"
      - id: "c"
        label: "6 months to 1 year"
      - id: "d"
        label: "1 to 3 years"
      - id: "e"
        label: "More than 3 years"
  - id: q2
    prompt: "Which recovery or fitness wearables do you currently use? (Select all that apply)"
    type: multi_choice
    construct: recovery_fitness_wearables_currently_use
    required: true
    options:
      - id: "a"
        label: "Whoop"
      - id: "b"
        label: "Oura Ring"
      - id: "c"
        label: "Garmin watch"
      - id: "d"
        label: "Apple Watch"
      - id: "e"
        label: "Fitbit"
      - id: "f"
        label: "Samsung Galaxy Watch"
      - id: "g"
        label: "Ultrahuman Ring"
      - id: "h"
        label: "None of these"
  - id: q3
    prompt: "Which device do you rely on most for recovery insights?"
    type: single_choice
    construct: device_rely_most_recovery_insights
    required: true
    options:
      - id: "a"
        label: "Whoop"
      - id: "b"
        label: "Oura Ring"
      - id: "c"
        label: "Garmin watch"
      - id: "d"
        label: "Apple Watch"
      - id: "e"
        label: "Fitbit"
      - id: "f"
        label: "Another device"
      - id: "g"
        label: "I do not use one"
  - id: q4
    prompt: "What was your main reason for starting to use a recovery wearable?"
    type: single_choice
    construct: was_main_reason_starting_use
    required: true
    options:
      - id: "a"
        label: "Improve sleep"
      - id: "b"
        label: "Optimize training and workouts"
      - id: "c"
        label: "Reduce stress"
      - id: "d"
        label: "General health awareness"
      - id: "e"
        label: "Curiosity about the technology"
      - id: "f"
        label: "I do not use one"
  - id: q5
    prompt: "Which metrics do you regularly track? (Select all that apply)"
    type: multi_choice
    construct: metrics_regularly_track_select_all
    required: true
    options:
      - id: "a"
        label: "Sleep duration and stages"
      - id: "b"
        label: "Heart rate variability (HRV)"
      - id: "c"
        label: "Resting heart rate"
      - id: "d"
        label: "Recovery or readiness score"
      - id: "e"
        label: "Strain or activity load"
      - id: "f"
