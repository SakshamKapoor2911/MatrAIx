    prompt: "Do you currently use any protein supplements (powders, ready-to-drink shakes, or protein bars)?"
    type: single_choice
    construct: currently_use_any_protein_supplements
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I used to"
      - id: "d"
        label: "No, and I never have"
  - id: q1
    prompt: "How long have you been using protein supplements?"
    type: single_choice
    construct: long_have_been_using_protein
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't use them"
