schemaVersion: "1.0"
id: employee_assistance_programs_v1
title: "Employee Assistance Programs Survey"
description: "Employee awareness, understanding, and use of workplace employee assistance program (EAP) wellness resources."
questions:
  - id: q0
    prompt: "Does your employer offer an employee assistance program (EAP)?"
    type: single_choice
    construct: does_employer_offer_employee_assistance
    required: true
    options:
      - id: "a"
        label: "Yes, and I know what it offers"
      - id: "b"
        label: "Yes, but I am unsure what it offers"
      - id: "c"
        label: "No, my employer does not offer one"
      - id: "d"
        label: "I don't know"
      - id: "e"
        label: "I am not currently employed"
  - id: q1
    prompt: "How familiar are you with what your workplace EAP provides?"
    type: single_choice
    construct: familiar_workplace_eap_provides
    required: true
    options:
      - id: "a"
        label: "Very familiar"
      - id: "b"
        label: "Somewhat familiar"
      - id: "c"
        label: "Slightly familiar"
      - id: "d"
        label: "Not familiar at all"
  - id: q2
    prompt: "How did you first learn about your workplace EAP?"
    type: single_choice
    construct: did_first_learn_workplace_eap
    required: true
    options:
      - id: "a"
        label: "During onboarding or orientation"
      - id: "b"
        label: "From HR communications"
      - id: "c"
        label: "From a manager or coworker"
      - id: "d"
        label: "From the company intranet or benefits portal"
      - id: "e"
        label: "I learned about it when I needed it"
      - id: "f"
        label: "I have not learned about it"
  - id: q3
    prompt: "Have you ever used your workplace EAP services?"
    type: single_choice
    construct: have_ever_used_workplace_eap
    required: true
    options:
      - id: "a"
        label: "Yes, more than once"
      - id: "b"
        label: "Yes, once"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, I have never considered it"
  - id: q4
    prompt: "Which EAP services are you aware your employer offers? (Select all that apply)"
    type: multi_choice
