schemaVersion: "1.0"
id: local_llm_running_v1
title: "Local LLM Running Survey"
description: "How enthusiasts and developers run local and open large language models on their own hardware, including tools, models, and hardware constraints."
questions:
  - id: q0
    prompt: "How often do you run large language models locally on your own hardware?"
    type: single_choice
    construct: often_run_large_language_models
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "I have tried it but rarely do"
      - id: "f"
        label: "I don't run models locally"
  - id: q1
    prompt: "How long have you been running local LLMs?"
    type: single_choice
    construct: long_have_been_running_local
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "More than 2 years"
      - id: "e"
        label: "I'm just getting started"
  - id: q2
    prompt: "What is your main reason for running LLMs locally?"
    type: single_choice
    construct: main_reason_running_llms_locally
    required: true
    options:
      - id: "a"
        label: "Privacy and data control"
      - id: "b"
        label: "Avoiding subscription or API costs"
      - id: "c"
        label: "Working offline"
      - id: "d"
        label: "Customization and fine-tuning"
      - id: "e"
        label: "Experimentation and learning"
      - id: "f"
        label: "Avoiding content restrictions"
  - id: q3
    prompt: "Which local LLM tool or runtime do you use most often?"
    type: single_choice
    construct: local_llm_tool_runtime_use
    required: true
    options:
      - id: "a"
        label: "Ollama"
      - id: "b"
        label: "LM Studio"
      - id: "c"
        label: "llama.cpp"
      - id: "d"
        label: "GPT4All"
      - id: "e"
        label: "text-generation-webui (oobabooga)"
      - id: "f"
        label: "Jan"
      - id: "g"
        label: "KoboldCpp"
      - id: "h"
        label: "vLLM"
      - id: "i"
        label: "Other"
  - id: q4
    prompt: "Which local LLM tools have you used? (Select all that apply)"
    type: multi_choice
    construct: local_llm_tools_have_used
    required: true
    options:
      - id: "a"
        label: "Ollama"
      - id: "b"
        label: "LM Studio"
      - id: "c"
        label: "llama.cpp"
      - id: "d"
        label: "GPT4All"
      - id: "e"
        label: "text-generation-webui (oobabooga)"
      - id: "f"
        label: "Jan"
      - id: "g"
        label: "KoboldCpp"
      - id: "h"
        label: "vLLM"
      - id: "i"
        label: "LocalAI"
      - id: "j"
