schemaVersion: "1.0"
id: umbrella_insurance_v1
title: "Umbrella Insurance Survey"
description: "Awareness, ownership, and attitudes toward personal umbrella liability insurance and the assets and risks it is meant to protect."
questions:
  - id: q0
    prompt: "Before this survey, how familiar were you with personal umbrella (excess liability) insurance?"
    type: single_choice
    construct: before_this_survey_familiar_were
    required: true
    options:
      - id: "a"
        label: "Very familiar"
      - id: "b"
        label: "Somewhat familiar"
      - id: "c"
        label: "Had heard of it only"
      - id: "d"
        label: "Never heard of it"
  - id: q1
    prompt: "Do you currently have a personal umbrella liability insurance policy?"
    type: single_choice
    construct: currently_have_personal_umbrella_liabili
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have considered it"
      - id: "c"
        label: "No, and I have not considered it"
      - id: "d"
        label: "Not sure"
  - id: q2
    prompt: "Do you currently have the underlying home/renters and auto insurance that an umbrella policy sits on top of?"
    type: single_choice
    construct: currently_have_underlying_home_renters
    required: true
    options:
      - id: "a"
        label: "Both home/renters and auto"
      - id: "b"
        label: "Only auto"
      - id: "c"
        label: "Only home/renters"
      - id: "d"
        label: "Neither"
      - id: "e"
        label: "Not sure"
  - id: q3
    prompt: "What made you consider or purchase umbrella insurance? (Select all that apply)"
    type: multi_choice
    construct: made_consider_purchase_umbrella_insuranc
    required: true
    options:
      - id: "a"
        label: "Protecting savings and assets"
      - id: "b"
        label: "Owning a home"
      - id: "c"
        label: "Having teen drivers"
      - id: "d"
        label: "Owning a swimming pool"
      - id: "e"
        label: "Owning a dog"
      - id: "f"
        label: "Renting out property"
      - id: "g"
        label: "Being a board member or volunteer"
      - id: "h"
        label: "A high public profile"
