schemaVersion: "1.0"
id: donor_advised_giving_v1
title: "Donor-Advised Giving Survey"
description: "How people use donor-advised funds and other structured vehicles to organize, fund, and direct their charitable giving."
questions:
  - id: q0
    prompt: "Do you currently have a donor-advised fund (DAF)?"
    type: single_choice
    construct: currently_have_donor_advised_fund
    required: true
    options:
      - id: "a"
        label: "Yes, one fund"
      - id: "b"
        label: "Yes, more than one fund"
      - id: "c"
        label: "No, but I'm actively considering one"
      - id: "d"
        label: "No, but I've heard of them"
      - id: "e"
        label: "No, and I'm not familiar with them"
  - id: q1
    prompt: "How long have you had or used a donor-advised fund?"
    type: single_choice
    construct: long_have_had_used_donor
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which provider holds your donor-advised fund?"
    type: single_choice
    construct: provider_holds_donor_advised_fund
    required: true
    options:
      - id: "a"
        label: "Fidelity Charitable"
      - id: "b"
        label: "Schwab Charitable"
      - id: "c"
        label: "Vanguard Charitable"
      - id: "d"
        label: "A community foundation"
      - id: "e"
        label: "National Philanthropic Trust"
      - id: "f"
        label: "A faith-based or affinity fund"
      - id: "g"
        label: "Another provider"
      - id: "h"
        label: "I don't currently have one"
  - id: q3
    prompt: "Which giving vehicles do you use for your charitable giving? (Select all that apply)"
    type: multi_choice
    construct: giving_vehicles_use_charitable_giving
    required: true
    options:
      - id: "a"
        label: "A donor-advised fund"
      - id: "b"
        label: "Direct cash or card donations"
      - id: "c"
        label: "Qualified charitable distributions from an IRA"
      - id: "d"
        label: "Appreciated stock or securities"
      - id: "e"
        label: "A private foundation"
      - id: "f"
        label: "A charitable trust"
      - id: "g"
        label: "Workplace giving or payroll deduction"
      - id: "h"
        label: "Crowdfunding platforms"
  - id: q4
    prompt: "Roughly how much do you give to charity in a typical year, in U.S. dollars? Please enter a number."
    type: free_text
    construct: roughly_much_give_charity_typical
    required: true
  - id: q5
    prompt: "How did you first learn about donor-advised funds? (Select all that apply)"
    type: multi_choice
    construct: did_first_learn_donor_advised
    required: true
    options:
      - id: "a"
        label: "A financial advisor"
      - id: "b"
        label: "An accountant or tax professional"
      - id: "c"
        label: "My brokerage or bank"
      - id: "d"
        label: "Friends or family"
      - id: "e"
        label: "Online research or media"
      - id: "f"
        label: "A charity I support"
      - id: "g"
        label: "My employer"
  - id: q6
    prompt: "What do you typically contribute to your fund? (Select all that apply)"
    type: multi_choice
    construct: typically_contribute_fund_select_all
    required: true
    options:
      - id: "a"
        label: "Cash"
      - id: "b"
        label: "Appreciated stocks or mutual funds"
      - id: "c"
        label: "Proceeds from selling a business or property"
      - id: "d"
        label: "Cryptocurrency"
      - id: "e"
        label: "Other non-cash assets"
      - id: "f"
        label: "I haven't contributed yet"
  - id: q7
    prompt: "How often do you contribute to your donor-advised fund?"
    type: single_choice
    construct: often_contribute_donor_advised_fund
    required: true
    options:
      - id: "a"
        label: "Multiple times a year"
      - id: "b"
        label: "Once a year"
      - id: "c"
        label: "Every few years"
      - id: "d"
        label: "Only once so far"
      - id: "e"
        label: "I haven't contributed yet"
  - id: q8
    prompt: "How often do you recommend grants from your fund to charities?"
    type: single_choice
    construct: often_recommend_grants_from_fund
    required: true
    options:
      - id: "a"
        label: "Monthly or more often"
      - id: "b"
        label: "A few times a year"
      - id: "c"
        label: "Once a year"
      - id: "d"
        label: "Less than once a year"
      - id: "e"
        label: "I haven't made any grants yet"
  - id: q9
