        label: "Personal or family values"
      - id: "b"
        label: "Charity ratings like Charity Navigator"
      - id: "c"
        label: "Recommendations from friends or family"
      - id: "d"
        label: "Religious or community ties"
      - id: "e"
        label: "Causes tied to personal experience"
      - id: "f"
        label: "Requests or appeals I receive"
      - id: "g"
        label: "Advice from a financial advisor"
  - id: q10
