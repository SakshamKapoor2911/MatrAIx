    type: single_choice
    construct: invest_assets_fund_potential_growth
    required: true
    options:
      - id: "a"
        label: "Yes, mostly in growth investments"
      - id: "b"
        label: "Yes, in a balanced allocation"
      - id: "c"
        label: "Yes, in conservative investments"
      - id: "d"
