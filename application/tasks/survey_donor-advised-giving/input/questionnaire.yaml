        label: "Religious organizations"
      - id: "b"
        label: "Education"
      - id: "c"
        label: "Health and medical research"
      - id: "d"
        label: "Human services and poverty relief"
      - id: "e"
        label: "Arts and culture"
      - id: "f"
        label: "Environment and animals"
      - id: "g"
        label: "International aid"
      - id: "h"
        label: "Civil rights and advocacy"
