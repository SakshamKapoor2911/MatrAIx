schemaVersion: "1.0"
id: bankruptcy_attitudes_v1
title: "Personal Bankruptcy Attitudes Survey"
description: "Public attitudes toward personal bankruptcy, the stigma surrounding it, and respondents' own experience considering or filing Chapter 7 or Chapter 13."
questions:
  - id: q0
    prompt: "Which of the following best describes your personal experience with bankruptcy?"
    type: single_choice
    construct: following_best_describes_personal_experi
    required: true
    options:
      - id: "a"
        label: "I have filed for personal bankruptcy"
      - id: "b"
        label: "I consulted an attorney but did not file"
      - id: "c"
        label: "I have seriously considered filing"
      - id: "d"
        label: "A close family member or friend has filed"
      - id: "e"
        label: "I have no personal or close connection to bankruptcy"
  - id: q1
    prompt: "How familiar are you with the difference between Chapter 7 and Chapter 13 bankruptcy?"
    type: single_choice
    construct: familiar_difference_between_chapter_7
    required: true
    options:
      - id: "a"
        label: "Not at all familiar"
      - id: "b"
        label: "Slightly familiar"
      - id: "c"
        label: "Moderately familiar"
      - id: "d"
        label: "Very familiar"
      - id: "e"
        label: "Extremely familiar"
  - id: q2
    prompt: "Have you ever seriously worried that you might need to file for bankruptcy?"
    type: single_choice
    construct: have_ever_seriously_worried_that
    required: true
    options:
      - id: "a"
        label: "Yes, currently"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but it has crossed my mind"
      - id: "d"
        label: "No, never"
  - id: q3
    prompt: "How would you describe your current level of debt-related stress?"
    type: single_choice
    construct: would_describe_current_level_debt
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "Low"
      - id: "c"
        label: "Moderate"
      - id: "d"
        label: "High"
      - id: "e"
        label: "Overwhelming"
  - id: q4
    prompt: "Which types of debt cause you (or have caused you) the most stress? (Select all that apply)"
    type: multi_choice
    construct: types_debt_cause_have_caused
    required: true
    options:
      - id: "a"
        label: "Credit card debt"
      - id: "b"
        label: "Medical bills"
      - id: "c"
        label: "Mortgage or housing debt"
      - id: "d"
        label: "Auto loans"
      - id: "e"
        label: "Student loans"
      - id: "f"
        label: "Personal or payday loans"
      - id: "g"
        label: "Business debt"
      - id: "h"
        label: "Tax debt"
      - id: "i"
        label: "None"
  - id: q5
    prompt: "What triggered (or could trigger) serious consideration of bankruptcy? (Select all that apply)"
    type: multi_choice
    construct: triggered_could_trigger_serious_consider
    required: true
    options:
      - id: "a"
        label: "Job loss or reduced income"
      - id: "b"
        label: "Overwhelming medical bills"
      - id: "c"
        label: "Divorce or separation"
      - id: "d"
        label: "A failed business"
      - id: "e"
        label: "Accumulated credit card debt"
      - id: "f"
        label: "Foreclosure or eviction risk"
      - id: "g"
        label: "An unexpected emergency expense"
      - id: "h"
        label: "Not applicable"
  - id: q6
    prompt: "If you filed or considered filing, which professionals did you consult? (Select all that apply)"
    type: multi_choice
    construct: if_filed_considered_filing_professionals
    required: true
    options:
      - id: "a"
        label: "A bankruptcy attorney"
      - id: "b"
        label: "A nonprofit credit counselor"
      - id: "c"
        label: "A financial advisor"
      - id: "d"
        label: "Legal aid or a free clinic"
      - id: "e"
        label: "Online research only"
      - id: "f"
        label: "I did not consult anyone"
      - id: "g"
        label: "Not applicable"
  - id: q7
    prompt: "Which chapter of bankruptcy did you file or most seriously consider?"
    type: single_choice
    construct: chapter_bankruptcy_did_file_most
    required: true
    options:
      - id: "a"
        label: "Chapter 7 (liquidation)"
      - id: "b"
        label: "Chapter 13 (repayment plan)"
      - id: "c"
        label: "I was unsure which applied to me"
      - id: "d"
        label: "Not applicable"
  - id: q8
    prompt: "At the time you were most worried, approximately what was your total debt?"
    type: single_choice
    construct: time_were_most_worried_approximately
    required: true
    options:
      - id: "a"
        label: "Less than $10,000"
      - id: "b"
        label: "$10,000 to $24,999"
      - id: "c"
        label: "$25,000 to $49,999"
      - id: "d"
        label: "$50,000 to $99,999"
      - id: "e"
        label: "$100,000 or more"
      - id: "f"
        label: "Not applicable"
      - id: "g"
        label: "Prefer not to say"
  - id: q9
    prompt: "If you filed, approximately how much did you pay in attorney and filing costs? (Enter a whole-dollar number, or 0 if not applicable.)"
    type: free_text
    construct: if_filed_approximately_much_did
    required: true
  - id: q10
    prompt: "If you filed, how did you pay for the process?"
    type: single_choice
    construct: if_filed_did_pay_process
    required: true
    options:
