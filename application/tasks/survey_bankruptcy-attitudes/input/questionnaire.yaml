        label: "Savings"
      - id: "b"
        label: "Help from family or friends"
      - id: "c"
        label: "A payment plan with the attorney"
      - id: "d"
        label: "Legal aid or pro bono help"
      - id: "e"
        label: "I have not filed"
  - id: q11
    prompt: "Which alternatives to bankruptcy did you try or seriously consider? (Select all that apply)"
    type: multi_choice
    construct: alternatives_bankruptcy_did_try_seriousl
    required: true
    options:
      - id: "a"
        label: "Debt consolidation loan"
      - id: "b"
        label: "Debt settlement program"
      - id: "c"
        label: "Nonprofit credit counseling"
      - id: "d"
        label: "Selling assets"
      - id: "e"
        label: "Borrowing from family or friends"
      - id: "f"
        label: "Taking on a second job or side income"
      - id: "g"
        label: "Negotiating directly with creditors"
      - id: "h"
        label: "None of these"
  - id: q12
