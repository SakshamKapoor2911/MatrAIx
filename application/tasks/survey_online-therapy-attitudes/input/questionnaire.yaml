schemaVersion: "1.0"
id: online_therapy_attitudes_v1
title: "Online Therapy Attitudes Survey"
description: "Consumer awareness, preferences, and attitudes toward online and virtual therapy services."
questions:
  - id: q0
    prompt: "How familiar are you with online or virtual therapy services?"
    type: single_choice
    construct: familiar_online_virtual_therapy_services
    required: true
    options:
      - id: "a"
        label: "Very familiar"
      - id: "b"
        label: "Somewhat familiar"
      - id: "c"
        label: "I have heard of them but know little"
      - id: "d"
        label: "Not familiar at all"
  - id: q1
    prompt: "Have you ever used an online or virtual therapy service?"
    type: single_choice
    construct: have_ever_used_online_virtual
    required: true
    options:
      - id: "a"
        label: "Yes, currently"
      - id: "b"
        label: "Yes, in the past"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, and I have not considered it"
  - id: q2
    prompt: "In the past 12 months, about how many online or virtual therapy sessions have you attended? Please enter a number (enter 0 if none)."
    type: free_text
    construct: past_12_months_many_online
    required: true
  - id: q3
    prompt: "How did you first learn about online therapy services?"
    type: single_choice
    construct: did_first_learn_online_therapy
    required: true
    options:
      - id: "a"
        label: "A friend or family member"
      - id: "b"
        label: "Social media"
      - id: "c"
        label: "An online search or advertisement"
      - id: "d"
        label: "A doctor or health provider"
      - id: "e"
        label: "Through my employer or insurance"
      - id: "f"
        label: "A podcast, article, or news story"
  - id: q4
    prompt: "Which online therapy services have you heard of? (Select all that apply)"
    type: multi_choice
    construct: online_therapy_services_have_heard
    required: true
    options:
      - id: "a"
        label: "BetterHelp"
      - id: "b"
        label: "Talkspace"
      - id: "c"
        label: "Cerebral"
      - id: "d"
        label: "Teladoc"
      - id: "e"
        label: "Amwell"
      - id: "f"
        label: "MDLIVE"
      - id: "g"
        label: "Brightside"
      - id: "h"
        label: "A local provider's telehealth option"
      - id: "i"
        label: "None of these"
  - id: q5
    prompt: "Which online therapy services have you used? (Select all that apply)"
    type: multi_choice
    construct: online_therapy_services_have_used
    required: true
