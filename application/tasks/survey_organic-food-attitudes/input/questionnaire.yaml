    prompt: "How often do you buy organic food?"
    type: single_choice
    construct: often_buy_organic_food
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Almost always"
  - id: q1
    prompt: "How long have you been buying organic food regularly?"
    type: single_choice
    construct: long_have_been_buying_organic
    required: true
    options:
      - id: "a"
        label: "I do not buy it regularly"
      - id: "b"
        label: "Less than 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
