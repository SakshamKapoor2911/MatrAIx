        label: "Automatic deploys on Git push"
      - id: "b"
        label: "A CI/CD pipeline"
      - id: "c"
        label: "A CLI tool"
      - id: "d"
        label: "Manual file uploads (FTP, SFTP)"
      - id: "e"
        label: "A control panel (cPanel, etc.)"
      - id: "f"
        label: "Containers or Kubernetes"
  - id: q11
