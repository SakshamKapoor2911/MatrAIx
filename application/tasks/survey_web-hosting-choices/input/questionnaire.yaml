        label: "Static websites"
      - id: "b"
        label: "Dynamic web applications"
      - id: "c"
        label: "APIs or backend services"
      - id: "d"
        label: "Databases"
      - id: "e"
        label: "A personal blog or portfolio"
      - id: "f"
        label: "E-commerce sites"
      - id: "g"
        label: "Side projects"
      - id: "h"
        label: "Client or business sites"
