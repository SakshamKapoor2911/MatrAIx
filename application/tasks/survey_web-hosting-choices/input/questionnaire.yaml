schemaVersion: "1.0"
id: web_hosting_choices_v1
title: "Web Hosting Choices Survey"
description: "How developers and site owners choose and use web hosting providers and platforms."
questions:
  - id: q0
    prompt: "How often do you set up or manage web hosting?"
    type: single_choice
    construct: often_set_up_manage_web
    required: true
    options:
      - id: "a"
        label: "Regularly, as part of my main work"
      - id: "b"
        label: "Occasionally for projects"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "I am just learning"
      - id: "e"
        label: "I don't manage web hosting"
  - id: q1
    prompt: "How long have you been managing web hosting?"
    type: single_choice
    construct: long_have_been_managing_web
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which type of hosting do you use most often?"
    type: single_choice
    construct: type_hosting_use_most_often
    required: true
    options:
      - id: "a"
        label: "A platform-as-a-service (Vercel, Netlify, etc.)"
      - id: "b"
        label: "A cloud provider (AWS, GCP, Azure)"
      - id: "c"
        label: "A VPS (virtual private server)"
      - id: "d"
        label: "Shared hosting"
      - id: "e"
        label: "A managed WordPress or app host"
      - id: "f"
        label: "Self-hosted on my own hardware"
  - id: q3
    prompt: "Which hosting provider do you use most often?"
    type: single_choice
    construct: hosting_provider_use_most_often
    required: true
    options:
      - id: "a"
        label: "Vercel"
      - id: "b"
        label: "Netlify"
      - id: "c"
        label: "Cloudflare Pages"
      - id: "d"
        label: "AWS"
      - id: "e"
        label: "DigitalOcean"
      - id: "f"
        label: "A shared host (Bluehost, HostGator, etc.)"
      - id: "g"
        label: "Hetzner or Linode"
      - id: "h"
        label: "GitHub Pages"
      - id: "i"
        label: "Other"
  - id: q4
    prompt: "Which hosting providers have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: hosting_providers_have_used_past
    required: true
    options:
      - id: "a"
        label: "Vercel"
      - id: "b"
        label: "Netlify"
      - id: "c"
        label: "Cloudflare Pages"
      - id: "d"
        label: "AWS"
      - id: "e"
        label: "Google Cloud"
      - id: "f"
        label: "Microsoft Azure"
      - id: "g"
        label: "DigitalOcean"
      - id: "h"
        label: "Hetzner"
      - id: "i"
        label: "Linode or Akamai"
      - id: "j"
        label: "A shared hosting provider"
      - id: "k"
