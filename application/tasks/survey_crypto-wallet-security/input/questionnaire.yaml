    required: true
    options:
      - id: "a"
        label: "Yes, and it worked"
      - id: "b"
        label: "Yes, but I had problems"
      - id: "c"
        label: "No, but I know how"
      - id: "d"
        label: "No, and I am not sure how"
      - id: "e"
        label: "Not applicable"
  - id: q13
    prompt: "How much do you agree: Not your keys, not your coins — self-custody is essential."
