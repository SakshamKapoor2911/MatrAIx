schemaVersion: "1.0"
id: crypto_wallet_security_v1
title: "Crypto Wallet Security Survey"
description: "How cryptocurrency owners secure their holdings across exchanges, software wallets, and self-custody."
questions:
  - id: q0
    prompt: "Do you currently own any cryptocurrency?"
    type: single_choice
    construct: currently_own_any_cryptocurrency
    required: true
    options:
      - id: "a"
        label: "Yes, a significant amount"
      - id: "b"
        label: "Yes, a small amount"
      - id: "c"
        label: "I used to but no longer do"
      - id: "d"
        label: "No, but I plan to buy some"
      - id: "e"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "How long have you owned cryptocurrency?"
    type: single_choice
    construct: long_have_owned_cryptocurrency
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 6 years"
      - id: "e"
        label: "More than 6 years"
      - id: "f"
        label: "I have never owned cryptocurrency"
  - id: q2
    prompt: "Where do you keep most of your cryptocurrency?"
    type: single_choice
    construct: where_keep_most_cryptocurrency
    required: true
    options:
      - id: "a"
        label: "On a centralized exchange"
      - id: "b"
        label: "In a software wallet I control"
      - id: "c"
        label: "On a hardware wallet"
      - id: "d"
        label: "Split across several of these"
      - id: "e"
        label: "I do not currently hold any"
  - id: q3
    prompt: "Which best describes your custody approach?"
    type: single_choice
    construct: best_describes_custody_approach
    required: true
    options:
      - id: "a"
        label: "Fully self-custody — I control my own keys"
      - id: "b"
        label: "Mostly self-custody, some on exchanges"
      - id: "c"
        label: "Roughly evenly split"
      - id: "d"
        label: "Mostly on exchanges"
      - id: "e"
        label: "Entirely on exchanges"
  - id: q4
    prompt: "Which centralized exchanges do you use? (Select all that apply)"
    type: multi_choice
    construct: centralized_exchanges_use_select_all
    required: true
    options:
      - id: "a"
        label: "Coinbase"
      - id: "b"
        label: "Kraken"
      - id: "c"
        label: "Binance or Binance.US"
      - id: "d"
        label: "Gemini"
      - id: "e"
        label: "Crypto.com"
      - id: "f"
        label: "Robinhood"
      - id: "g"
        label: "Bitstamp"
      - id: "h"
        label: "I do not use exchanges"
  - id: q5
    prompt: "Which software or mobile wallets do you use? (Select all that apply)"
    type: multi_choice
    construct: software_mobile_wallets_use_select
    required: true
    options:
      - id: "a"
        label: "MetaMask"
      - id: "b"
        label: "Coinbase Wallet"
      - id: "c"
        label: "Trust Wallet"
      - id: "d"
        label: "Phantom"
      - id: "e"
        label: "Exodus"
      - id: "f"
        label: "Rabby"
      - id: "g"
        label: "Rainbow"
      - id: "h"
        label: "I do not use a software wallet"
  - id: q6
    prompt: "Which hardware wallets do you own or use? (Select all that apply)"
    type: multi_choice
    construct: hardware_wallets_own_use_select
    required: true
    options:
      - id: "a"
        label: "Ledger Nano S or Nano X"
      - id: "b"
        label: "Trezor Model One or Model T"
      - id: "c"
        label: "Coldcard"
      - id: "d"
        label: "Keystone"
      - id: "e"
        label: "BitBox"
      - id: "f"
        label: "GridPlus Lattice"
      - id: "g"
        label: "I do not own a hardware wallet"
  - id: q7
    prompt: "Which security measures do you currently use? (Select all that apply)"
    type: multi_choice
    construct: security_measures_currently_use_select
    required: true
    options:
      - id: "a"
        label: "Hardware wallet for cold storage"
      - id: "b"
        label: "Two-factor authentication on exchanges"
      - id: "c"
        label: "A hardware security key (YubiKey, etc.)"
      - id: "d"
        label: "A separate email for crypto accounts"
      - id: "e"
        label: "A password manager"
      - id: "f"
        label: "A passphrase (25th word) on my seed"
      - id: "g"
        label: "A multi-signature wallet"
      - id: "h"
        label: "None of these"
  - id: q8
    prompt: "How do you store your seed phrase or recovery words? (Select all that apply)"
    type: multi_choice
    construct: store_seed_phrase_recovery_words
    required: true
    options:
      - id: "a"
        label: "Written on paper"
      - id: "b"
        label: "Stamped or engraved on metal"
      - id: "c"
        label: "In an encrypted digital file"
      - id: "d"
        label: "In a password manager"
      - id: "e"
        label: "Memorized"
      - id: "f"
        label: "In a bank safe deposit box"
      - id: "g"
        label: "Split across multiple locations"
      - id: "h"
        label: "I do not have a seed phrase"
  - id: q9
    prompt: "How many separate crypto wallets do you actively use? Please enter a number."
    type: free_text
    construct: many_separate_crypto_wallets_actively
    required: true
  - id: q10
    prompt: "About what percentage of your crypto is held in cold storage (offline)?"
    type: single_choice
    construct: percentage_crypto_held_cold_storage
    required: true
    options:
      - id: "a"
        label: "0 percent"
      - id: "b"
        label: "1 to 25 percent"
      - id: "c"
        label: "26 to 50 percent"
      - id: "d"
        label: "51 to 75 percent"
      - id: "e"
        label: "76 to 99 percent"
      - id: "f"
        label: "100 percent"
  - id: q11
