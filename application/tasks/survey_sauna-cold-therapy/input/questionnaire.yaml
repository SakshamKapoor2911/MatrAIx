schemaVersion: "1.0"
id: sauna_cold_therapy_v1
title: "Sauna and Cold Therapy Survey"
description: "How people use and feel about saunas, cold plunges, and other hot-and-cold recovery practices."
questions:
  - id: q0
    prompt: "Do you currently use a sauna or cold-therapy practice?"
    type: single_choice
    construct: currently_use_sauna_cold_therapy
    required: true
    options:
      - id: "a"
        label: "Yes, both sauna and cold therapy"
      - id: "b"
        label: "Yes, sauna only"
      - id: "c"
        label: "Yes, cold therapy only"
      - id: "d"
        label: "No, but I'm interested"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "How long have you been using sauna or cold therapy?"
    type: single_choice
    construct: long_have_been_using_sauna
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't use either"
  - id: q2
    prompt: "In a typical week, how often do you use a sauna?"
    type: single_choice
    construct: typical_week_often_use_sauna
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Less than once a week"
      - id: "c"
        label: "1 to 2 times"
      - id: "d"
        label: "3 to 4 times"
      - id: "e"
        label: "5 or more times"
  - id: q3
