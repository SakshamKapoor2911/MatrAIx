schemaVersion: "1.0"
id: javascript_runtime_preference_v1
title: "JavaScript Runtime Preference Survey"
description: "How developers choose, use, and evaluate JavaScript runtimes such as Node.js, Deno, and Bun."
questions:
  - id: q0
    prompt: "How often do you write or run server-side JavaScript or TypeScript?"
    type: single_choice
    construct: often_write_run_server_side
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just learning"
      - id: "e"
        label: "I rarely do"
  - id: q1
    prompt: "How long have you worked with JavaScript runtimes?"
    type: single_choice
    construct: long_have_worked_javascript_runtimes
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes your primary role?"
    type: single_choice
    construct: best_describes_primary_role
    required: true
    options:
      - id: "a"
        label: "Back-end developer"
      - id: "b"
        label: "Full-stack developer"
      - id: "c"
        label: "Front-end developer who also runs tooling"
      - id: "d"
        label: "DevOps or platform engineer"
      - id: "e"
        label: "I write JavaScript occasionally"
  - id: q3
    prompt: "Which JavaScript runtime do you use most often?"
    type: single_choice
    construct: javascript_runtime_use_most_often
    required: true
    options:
      - id: "a"
        label: "Node.js"
      - id: "b"
        label: "Deno"
      - id: "c"
        label: "Bun"
      - id: "d"
        label: "A cloud edge runtime (Workers, etc.)"
      - id: "e"
        label: "Other"
  - id: q4
    prompt: "Which JavaScript runtimes have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: javascript_runtimes_have_used_past
    required: true
