schemaVersion: "1.0"
id: tax_refund_usage_v1
title: "Tax Refund Usage Survey"
description: "How people receive their federal tax refunds and decide whether to save, spend, invest, or pay down debt with them."
questions:
  - id: q0
    prompt: "Did you receive a federal tax refund this year?"
    type: single_choice
    construct: did_receive_federal_tax_refund
    required: true
    options:
      - id: "a"
        label: "Yes, I received a refund"
      - id: "b"
        label: "No, I owed money"
      - id: "c"
        label: "No, my return broke even"
      - id: "d"
        label: "I haven't filed yet"
      - id: "e"
        label: "I'm not sure"
  - id: q1
    prompt: "In how many of the last five years have you received a tax refund?"
    type: single_choice
    construct: many_last_five_years_have
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 or 2 years"
      - id: "c"
        label: "3 or 4 years"
      - id: "d"
        label: "All five years"
      - id: "e"
        label: "I'm not sure"
  - id: q2
    prompt: "How did you file your most recent tax return?"
    type: single_choice
    construct: did_file_most_recent_tax
    required: true
    options:
      - id: "a"
        label: "Do-it-yourself tax software"
      - id: "b"
        label: "A paid tax preparer or accountant"
      - id: "c"
        label: "A free filing program"
      - id: "d"
        label: "By paper, on my own"
      - id: "e"
        label: "Someone in my family filed for me"
  - id: q3
    prompt: "Which tax software or service did you use most recently?"
    type: single_choice
    construct: tax_software_service_did_use
    required: true
    options:
      - id: "a"
        label: "TurboTax"
      - id: "b"
        label: "H&R Block"
      - id: "c"
        label: "TaxAct"
      - id: "d"
        label: "FreeTaxUSA"
      - id: "e"
        label: "IRS Free File or Direct File"
      - id: "f"
        label: "A local accountant or CPA"
      - id: "g"
        label: "A national tax-prep chain"
      - id: "h"
        label: "Other"
  - id: q4
    prompt: "How did you receive (or expect to receive) your refund?"
    type: single_choice
    construct: did_receive_expect_receive_refund
    required: true
    options:
      - id: "a"
        label: "Direct deposit to a bank account"
      - id: "b"
        label: "A paper check in the mail"
      - id: "c"
        label: "Loaded onto a prepaid or refund card"
      - id: "d"
        label: "Split across multiple accounts"
      - id: "e"
        label: "A refund advance loan"
