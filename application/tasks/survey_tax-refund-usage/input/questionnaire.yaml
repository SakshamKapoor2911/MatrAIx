    prompt: "About how large was your most recent refund, in U.S. dollars? Please enter a number."
    type: free_text
    construct: large_was_most_recent_refund
    required: true
  - id: q6
    prompt: "How does this year's refund compare to what you expected?"
    type: single_choice
