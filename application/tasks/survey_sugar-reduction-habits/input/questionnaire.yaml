schemaVersion: "1.0"
id: sugar_reduction_habits_v1
title: "Sugar Reduction Habits Survey"
description: "How people reduce their sugar intake, the substitutes they use, and what motivates them."
questions:
  - id: q0
    prompt: "Are you currently trying to reduce the amount of sugar you eat or drink?"
    type: single_choice
    construct: currently_trying_reduce_amount_sugar
    required: true
    options:
      - id: "a"
        label: "Yes, actively"
      - id: "b"
        label: "Yes, but casually"
      - id: "c"
        label: "No, but I have in the past"
      - id: "d"
        label: "No, but I am considering it"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you been trying to reduce your sugar intake?"
    type: single_choice
    construct: long_have_been_trying_reduce
    required: true
    options:
      - id: "a"
        label: "Less than 1 month"
      - id: "b"
        label: "1 to 6 months"
      - id: "c"
        label: "6 months to 1 year"
      - id: "d"
        label: "1 to 3 years"
      - id: "e"
        label: "More than 3 years"
      - id: "f"
        label: "This does not apply to me"
  - id: q2
    prompt: "How would you describe your current sugar intake?"
    type: single_choice
    construct: would_describe_current_sugar_intake
    required: true
    options:
      - id: "a"
        label: "Very low"
      - id: "b"
        label: "Low"
      - id: "c"
        label: "Moderate"
      - id: "d"
        label: "High"
      - id: "e"
        label: "Very high"
  - id: q3
    prompt: "How often do you drink sugar-sweetened beverages (regular soda, sweet tea, sports drinks)?"
    type: single_choice
    construct: often_drink_sugar_sweetened_beverages
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Once a day"
      - id: "e"
        label: "Several times a day"
  - id: q4
    prompt: "What first motivated you to cut back on sugar?"
    type: single_choice
    construct: first_motivated_cut_back_sugar
    required: true
    options:
      - id: "a"
        label: "Weight management"
      - id: "b"
        label: "General health"
      - id: "c"
        label: "Blood sugar concerns"
      - id: "d"
        label: "Dental health"
      - id: "e"
        label: "Energy levels"
      - id: "f"
        label: "A doctor's recommendation"
      - id: "g"
        label: "This does not apply to me"
  - id: q5
    prompt: "Which reasons motivate you to reduce sugar? (Select all that apply)"
    type: multi_choice
    construct: reasons_motivate_reduce_sugar_select
    required: true
    options:
      - id: "a"
        label: "Manage or lose weight"
      - id: "b"
        label: "General health"
      - id: "c"
        label: "Manage blood sugar"
      - id: "d"
        label: "Dental health"
      - id: "e"
        label: "More stable energy"
      - id: "f"
        label: "Reduce cravings"
      - id: "g"
        label: "Skin or complexion"
      - id: "h"
        label: "Doctor's advice"
      - id: "i"
        label: "None of these"
  - id: q6
    prompt: "Which strategies do you use to cut back on sugar? (Select all that apply)"
    type: multi_choice
    construct: strategies_use_cut_back_sugar
    required: true
    options:
      - id: "a"
        label: "Reading nutrition labels for added sugar"
      - id: "b"
        label: "Swapping soda for water or unsweetened drinks"
      - id: "c"
        label: "Using sugar substitutes"
      - id: "d"
        label: "Cutting back on desserts and sweets"
      - id: "e"
        label: "Cooking more from scratch"
      - id: "f"
        label: "Buying fewer packaged or processed foods"
      - id: "g"
        label: "Avoiding sugary breakfast foods"
      - id: "h"
        label: "Portion control"
      - id: "i"
        label: "I do not use any strategies"
  - id: q7
    prompt: "Which sugar substitutes or sweeteners do you use? (Select all that apply)"
    type: multi_choice
    construct: sugar_substitutes_sweeteners_use_select
    required: true
    options:
      - id: "a"
        label: "Stevia"
      - id: "b"
        label: "Monk fruit"
      - id: "c"
        label: "Erythritol"
      - id: "d"
        label: "Allulose"
      - id: "e"
        label: "Sucralose (Splenda)"
      - id: "f"
        label: "Aspartame (Equal)"
      - id: "g"
        label: "Honey or maple syrup"
      - id: "h"
        label: "I use no substitutes"
  - id: q8
    prompt: "Which sugar-free or reduced-sugar products do you regularly buy? (Select all that apply)"
    type: multi_choice
    construct: sugar_free_reduced_sugar_products
    required: true
    options:
