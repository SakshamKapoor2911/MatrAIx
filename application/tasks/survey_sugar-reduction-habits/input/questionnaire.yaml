        label: "Diet or zero-sugar sodas"
      - id: "b"
        label: "Sugar-free gum or candy"
      - id: "c"
        label: "Reduced-sugar yogurt"
      - id: "d"
        label: "Low-sugar protein or snack bars"
      - id: "e"
        label: "Unsweetened plant or dairy milk"
      - id: "f"
        label: "Sugar-free coffee syrups or creamers"
      - id: "g"
        label: "Low-sugar cereals"
      - id: "h"
        label: "I do not buy these products"
  - id: q9
    prompt: "How often do you check the added-sugar line on nutrition labels?"
    type: single_choice
    construct: often_check_added_sugar_line
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q10
