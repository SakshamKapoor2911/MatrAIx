        label: "Sell-to-cover shares automatically"
      - id: "b"
        label: "Pay quarterly estimated taxes"
      - id: "c"
        label: "Set aside cash for the tax bill"
      - id: "d"
        label: "Increase paycheck withholding"
      - id: "e"
        label: "Work with a CPA or tax advisor"
      - id: "f"
