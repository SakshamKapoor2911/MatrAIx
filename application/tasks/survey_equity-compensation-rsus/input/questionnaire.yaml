schemaVersion: "1.0"
id: equity_compensation_rsus_v1
title: "Equity Compensation and RSUs Survey"
description: "How employees receive and manage restricted stock units and stock options, including vesting, sell strategy, and their understanding of the mechanics and taxes."
questions:
  - id: q0
    prompt: "Do you currently receive equity compensation from an employer?"
    type: single_choice
    construct: currently_receive_equity_compensation_fr
    required: true
    options:
      - id: "a"
        label: "Yes, RSUs"
      - id: "b"
        label: "Yes, stock options"
      - id: "c"
        label: "Yes, both RSUs and options"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "Which forms of equity compensation do you currently hold or have been granted? (Select all that apply)"
    type: multi_choice
    construct: forms_equity_compensation_currently_hold
    required: true
    options:
      - id: "a"
        label: "Restricted stock units (RSUs)"
      - id: "b"
        label: "Incentive stock options (ISOs)"
      - id: "c"
        label: "Non-qualified stock options (NSOs)"
      - id: "d"
        label: "Restricted stock awards (RSAs)"
      - id: "e"
        label: "Stock appreciation rights (SARs)"
      - id: "f"
        label: "Employee stock purchase plan (ESPP) shares"
      - id: "g"
        label: "Performance stock units (PSUs)"
      - id: "h"
        label: "None"
  - id: q2
    prompt: "Is the company whose equity you hold publicly traded or private?"
    type: single_choice
    construct: company_whose_equity_hold_publicly
    required: true
    options:
      - id: "a"
        label: "Publicly traded"
      - id: "b"
        label: "Private"
      - id: "c"
        label: "A mix (I hold equity in more than one)"
      - id: "d"
        label: "Not applicable"
  - id: q3
    prompt: "How long have you received equity compensation?"
    type: single_choice
    construct: long_have_received_equity_compensation
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "Not applicable"
  - id: q4
    prompt: "How well do you understand how your equity compensation vests and is taxed?"
    type: single_choice
    construct: well_understand_equity_compensation_vest
    required: true
    options:
      - id: "a"
        label: "Not at all well"
      - id: "b"
        label: "Slightly well"
      - id: "c"
        label: "Moderately well"
      - id: "d"
        label: "Very well"
      - id: "e"
        label: "Extremely well"
  - id: q5
    prompt: "What vesting schedule applies to most of your equity?"
    type: single_choice
    construct: vesting_schedule_applies_most_equity
    required: true
    options:
      - id: "a"
        label: "4-year vest with a 1-year cliff"
      - id: "b"
        label: "4-year vest, monthly or quarterly"
      - id: "c"
        label: "Annual vesting"
      - id: "d"
        label: "Performance- or milestone-based"
      - id: "e"
        label: "Another schedule"
      - id: "f"
        label: "Don't know / not applicable"
  - id: q6
    prompt: "Approximately what is the annual dollar value of your equity grants (at grant)? (Enter a whole-dollar number, or 0 if none.)"
    type: free_text
    construct: approximately_annual_dollar_value_equity
    required: true
  - id: q7
    prompt: "Roughly what share of your total compensation is equity?"
    type: single_choice
    construct: roughly_share_total_compensation_equity
    required: true
    options:
      - id: "a"
        label: "Less than 10%"
      - id: "b"
        label: "10% to 24%"
      - id: "c"
        label: "25% to 49%"
      - id: "d"
        label: "50% or more"
      - id: "e"
        label: "Don't know"
  - id: q8
    prompt: "When your RSUs vest, what do you typically do?"
    type: single_choice
    construct: when_rsus_vest_typically
    required: true
    options:
      - id: "a"
        label: "Sell all of the vested shares right away"
      - id: "b"
        label: "Sell some and hold the rest"
      - id: "c"
        label: "Hold all of the shares"
      - id: "d"
        label: "Only sell enough to cover taxes (sell-to-cover)"
      - id: "e"
        label: "Not applicable"
  - id: q9
    prompt: "For stock options, what is your typical exercise strategy?"
    type: single_choice
    construct: stock_options_typical_exercise_strategy
    required: true
    options:
      - id: "a"
        label: "Exercise and hold"
      - id: "b"
        label: "Exercise and sell the same day"
      - id: "c"
        label: "Wait until a liquidity event (IPO or acquisition)"
      - id: "d"
        label: "I have not exercised any options"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "What drives your decision to sell or hold vested equity? (Select all that apply)"
    type: multi_choice
    construct: drives_decision_sell_hold_vested
    required: true
    options:
      - id: "a"
        label: "Diversifying away from company stock"
      - id: "b"
        label: "Belief in the company's future"
      - id: "c"
        label: "Meeting a specific financial goal"
      - id: "d"
        label: "Minimizing taxes"
      - id: "e"
        label: "Locking in gains"
      - id: "f"
        label: "Needing the cash"
      - id: "g"
        label: "Advice from a financial advisor"
      - id: "h"
        label: "Not applicable"
  - id: q11
    prompt: "Do you use a 10b5-1 trading plan to sell your shares?"
    type: single_choice
    construct: use_10b5_1_trading_plan
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "I don't know what that is"
      - id: "d"
        label: "Not applicable"
  - id: q12
