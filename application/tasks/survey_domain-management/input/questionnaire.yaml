        label: "A / AAAA records"
      - id: "b"
        label: "CNAME records"
      - id: "c"
        label: "MX records (email)"
      - id: "d"
        label: "TXT records (SPF, DKIM, verification)"
      - id: "e"
        label: "Nameserver (NS) records"
      - id: "f"
        label: "CAA records"
      - id: "g"
        label: "I use presets and rarely edit records"
      - id: "h"
        label: "I don't configure DNS myself"
  - id: q12
    prompt: "How do you handle WHOIS privacy for your domains?"
