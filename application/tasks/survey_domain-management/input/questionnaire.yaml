schemaVersion: "1.0"
id: domain_management_v1
title: "Domain Management Survey"
description: "How people register domain names and manage DNS across registrars such as Namecheap, Cloudflare, GoDaddy, and Porkbun."
questions:
  - id: q0
    prompt: "How often do you register or manage domain names?"
    type: single_choice
    construct: often_register_manage_domain_names
    required: true
    options:
      - id: "a"
        label: "Regularly, as part of my main work"
      - id: "b"
        label: "Occasionally for projects"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "I am just learning"
      - id: "e"
        label: "I don't manage domains"
  - id: q1
    prompt: "How long have you been registering or managing domains?"
    type: single_choice
    construct: long_have_been_registering_managing
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which registrar do you use most often?"
    type: single_choice
    construct: registrar_use_most_often
    required: true
    options:
      - id: "a"
        label: "Namecheap"
      - id: "b"
        label: "Cloudflare Registrar"
      - id: "c"
        label: "GoDaddy"
      - id: "d"
        label: "Google Domains / Squarespace Domains"
      - id: "e"
        label: "Porkbun"
      - id: "f"
        label: "Name.com"
      - id: "g"
        label: "Gandi"
      - id: "h"
        label: "My hosting provider"
      - id: "i"
        label: "Other"
  - id: q3
    prompt: "Which registrars have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: registrars_have_used_past_year
    required: true
    options:
      - id: "a"
        label: "Namecheap"
      - id: "b"
        label: "Cloudflare Registrar"
      - id: "c"
        label: "GoDaddy"
      - id: "d"
        label: "Squarespace Domains (formerly Google Domains)"
      - id: "e"
        label: "Porkbun"
      - id: "f"
        label: "Name.com"
      - id: "g"
        label: "Gandi"
      - id: "h"
        label: "Hover"
      - id: "i"
        label: "A hosting provider's registrar"
      - id: "j"
        label: "None of these"
  - id: q4
    prompt: "Which registrars are you interested in trying next? (Select all that apply)"
    type: multi_choice
    construct: registrars_interested_trying_next_select
    required: true
    options:
      - id: "a"
        label: "Cloudflare Registrar"
      - id: "b"
        label: "Porkbun"
      - id: "c"
        label: "Namecheap"
      - id: "d"
        label: "Gandi"
      - id: "e"
        label: "Hover"
      - id: "f"
        label: "I'm happy with what I use"
  - id: q5
    prompt: "Where do you manage your DNS records?"
    type: single_choice
    construct: where_manage_dns_records
    required: true
    options:
      - id: "a"
        label: "Cloudflare"
      - id: "b"
        label: "At my registrar"
      - id: "c"
        label: "At my hosting provider"
      - id: "d"
        label: "A dedicated DNS provider (Route 53, NS1, etc.)"
      - id: "e"
        label: "I don't manage DNS directly"
  - id: q6
    prompt: "About how many domains do you currently own or manage? Please enter a number."
    type: free_text
    construct: many_domains_currently_own_manage
    required: true
  - id: q7
    prompt: "About how much do you spend on domain registrations per year, in US dollars? Please enter a number."
    type: free_text
    construct: much_spend_domain_registrations_per
    required: true
  - id: q8
    prompt: "What do you use your domains for? (Select all that apply)"
    type: multi_choice
    construct: use_domains_select_all_that
    required: true
    options:
      - id: "a"
        label: "Personal websites or blogs"
      - id: "b"
        label: "Business or client websites"
      - id: "c"
        label: "Email addresses"
      - id: "d"
        label: "Side projects"
      - id: "e"
        label: "Redirects or short links"
      - id: "f"
        label: "Protecting a brand or name"
      - id: "g"
        label: "Investing or reselling"
      - id: "h"
        label: "APIs or internal services"
  - id: q9
    prompt: "Which top-level domains do you use? (Select all that apply)"
    type: multi_choice
    construct: top_level_domains_use_select
    required: true
    options:
      - id: "a"
        label: ".com"
      - id: "b"
        label: ".net or .org"
      - id: "c"
        label: ".io"
      - id: "d"
        label: ".dev or .app"
      - id: "e"
        label: ".co"
      - id: "f"
        label: "A country-code TLD (.us, .uk, etc.)"
      - id: "g"
        label: "A newer TLD (.xyz, .me, etc.)"
      - id: "h"
        label: "Other"
  - id: q10
    prompt: "Why did you choose your primary registrar?"
    type: single_choice
    construct: why_did_choose_primary_registrar
    required: true
    options:
      - id: "a"
        label: "Low prices and renewal costs"
      - id: "b"
        label: "Good management interface"
      - id: "c"
        label: "Free WHOIS privacy"
      - id: "d"
        label: "Bundled with hosting or other services"
      - id: "e"
        label: "Reputation and trust"
      - id: "f"
        label: "Familiarity or prior use"
  - id: q11
    prompt: "Which DNS record types do you regularly configure? (Select all that apply)"
    type: multi_choice
    construct: dns_record_types_regularly_configure
    required: true
    options:
