schemaVersion: "1.0"
id: infrastructure_as_code_tools_v1
title: "Infrastructure as Code Tools Survey"
description: "How engineers adopt, use, and evaluate infrastructure-as-code tools such as Terraform, OpenTofu, Pulumi, Ansible, CloudFormation, and CDK."
questions:
  - id: q0
    prompt: "How often do you write or maintain infrastructure-as-code?"
    type: single_choice
    construct: often_write_maintain_infrastructure_as
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I don't use infrastructure-as-code"
  - id: q1
    prompt: "How long have you been using infrastructure-as-code tools?"
    type: single_choice
    construct: long_have_been_using_infrastructure
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which best describes your relationship to infrastructure-as-code?"
    type: single_choice
    construct: best_describes_relationship_infrastructu
    required: true
    options:
      - id: "a"
        label: "Platform or DevOps engineer who owns IaC"
      - id: "b"
        label: "Software engineer who writes IaC for my own services"
      - id: "c"
        label: "Site reliability engineer"
      - id: "d"
        label: "Cloud or infrastructure architect"
      - id: "e"
        label: "Manager or lead who reviews IaC"
      - id: "f"
        label: "I use it only occasionally"
  - id: q3
    prompt: "Which infrastructure-as-code tool do you use most often?"
    type: single_choice
    construct: infrastructure_as_code_tool_use
    required: true
    options:
      - id: "a"
        label: "Terraform"
      - id: "b"
        label: "OpenTofu"
      - id: "c"
        label: "Pulumi"
      - id: "d"
        label: "Ansible"
      - id: "e"
        label: "AWS CloudFormation"
      - id: "f"
        label: "AWS CDK"
      - id: "g"
        label: "Other"
