schemaVersion: "1.0"
id: defi_usage_v1
title: "Decentralized Finance (DeFi) Survey"
description: "How people adopt, use, and evaluate decentralized finance protocols for lending, trading, and yield."
questions:
  - id: q0
    prompt: "Have you ever used a decentralized finance (DeFi) protocol?"
    type: single_choice
    construct: have_ever_used_decentralized_finance
    required: true
    options:
      - id: "a"
        label: "Yes, I use DeFi regularly"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "I have tried it once or twice"
      - id: "d"
        label: "No, but I am interested in trying"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you been using DeFi protocols?"
    type: single_choice
    construct: long_have_been_using_defi
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 4 years"
      - id: "e"
        label: "5 years or more"
      - id: "f"
        label: "I have never used DeFi"
  - id: q2
    prompt: "How often do you interact with DeFi protocols?"
    type: single_choice
    construct: often_interact_defi_protocols
    required: true
    options:
      - id: "a"
        label: "Multiple times a day"
      - id: "b"
        label: "Daily"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q3
    prompt: "Which best describes your primary reason for using DeFi?"
    type: single_choice
    construct: best_describes_primary_reason_using
    required: true
    options:
      - id: "a"
        label: "Earning yield on my assets"
      - id: "b"
        label: "Trading and swapping tokens"
      - id: "c"
        label: "Borrowing against my crypto"
      - id: "d"
        label: "Providing liquidity"
      - id: "e"
        label: "Ideological support for decentralization"
      - id: "f"
        label: "Speculation and higher returns"
  - id: q4
    prompt: "Which blockchains do you use for DeFi activity? (Select all that apply)"
