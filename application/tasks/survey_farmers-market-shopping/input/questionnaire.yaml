schemaVersion: "1.0"
id: farmers_market_shopping_v1
title: "Farmers Market Shopping Survey"
description: "How people shop at farmers markets for fresh and local food, including their frequency and motivations."
questions:
  - id: q0
    prompt: "How often do you shop at a farmers market?"
    type: single_choice
    construct: often_shop_farmers_market
    required: true
    options:
      - id: "a"
        label: "Every week"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "Once a month"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely or never"
  - id: q1
    prompt: "How long have you been shopping at farmers markets?"
    type: single_choice
    construct: long_have_been_shopping_farmers
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 3 years"
      - id: "c"
        label: "4 to 10 years"
      - id: "d"
        label: "More than 10 years"
      - id: "e"
        label: "I don't shop at farmers markets"
  - id: q2
    prompt: "During which seasons do you visit farmers markets? (Select all that apply)"
    type: multi_choice
    construct: during_seasons_visit_farmers_markets
    required: true
    options:
      - id: "a"
        label: "Spring"
      - id: "b"
        label: "Summer"
      - id: "c"
        label: "Fall"
      - id: "d"
        label: "Winter (indoor or year-round market)"
  - id: q3
    prompt: "How far do you typically travel to reach a farmers market?"
    type: single_choice
    construct: far_typically_travel_reach_farmers
    required: true
    options:
      - id: "a"
        label: "Less than 1 mile"
      - id: "b"
        label: "1 to 5 miles"
      - id: "c"
        label: "6 to 15 miles"
      - id: "d"
        label: "More than 15 miles"
  - id: q4
    prompt: "About how much do you typically spend on a single farmers market visit, in U.S. dollars? Please enter a number."
    type: free_text
    construct: much_typically_spend_single_farmers
    required: true
  - id: q5
    prompt: "What do you usually buy at farmers markets? (Select all that apply)"
    type: multi_choice
    construct: usually_buy_farmers_markets_select
    required: true
    options:
      - id: "a"
        label: "Fresh vegetables"
      - id: "b"
        label: "Fresh fruit"
      - id: "c"
        label: "Eggs"
      - id: "d"
        label: "Meat or poultry"
      - id: "e"
        label: "Dairy or cheese"
      - id: "f"
        label: "Baked goods"
      - id: "g"
        label: "Honey, jam, or preserves"
      - id: "h"
        label: "Flowers or plants"
      - id: "i"
        label: "Prepared or ready-to-eat food"
  - id: q6
