    type: multi_choice
    construct: motivates_shop_farmers_markets_select
    required: true
    options:
      - id: "a"
        label: "Freshness and quality"
      - id: "b"
        label: "Supporting local farmers"
      - id: "c"
        label: "Buying organic or pesticide-free food"
      - id: "d"
        label: "Environmental sustainability"
      - id: "e"
        label: "The community atmosphere"
      - id: "f"
        label: "Trying seasonal or unusual produce"
      - id: "g"
        label: "Knowing where my food comes from"
