        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Rarely — it just runs on its own"
      - id: "e"
        label: "I don't have a home server or NAS yet"
  - id: q1
    prompt: "How long have you run a home server or NAS?"
    type: single_choice
    construct: long_have_run_home_server
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
