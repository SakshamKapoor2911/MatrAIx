schemaVersion: "1.0"
id: workplace_financial_wellness_v1
title: "Workplace Financial Wellness Survey"
description: "How employees learn about, use, and value the financial wellness benefits and programs their employers provide."
questions:
  - id: q0
    prompt: "Does your employer offer any financial wellness benefits or programs?"
    type: single_choice
    construct: does_employer_offer_any_financial
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, at least one"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I'm not sure"
      - id: "e"
        label: "I'm not currently employed"
  - id: q1
    prompt: "How many years have you been at your current employer? Please enter a number."
    type: free_text
    construct: many_years_have_been_current
    required: true
  - id: q2
    prompt: "Which financial wellness benefits does your employer offer? (Select all that apply)"
    type: multi_choice
    construct: financial_wellness_benefits_does_employe
    required: true
    options:
      - id: "a"
        label: "A 401(k) or similar retirement plan"
      - id: "b"
        label: "Employer retirement matching"
      - id: "c"
        label: "Financial education workshops or seminars"
      - id: "d"
        label: "Access to a financial coach or advisor"
      - id: "e"
        label: "Student loan repayment assistance"
      - id: "f"
        label: "Emergency savings programs"
      - id: "g"
        label: "Earned wage access or on-demand pay"
      - id: "h"
        label: "Debt management or counseling"
      - id: "i"
        label: "I don't know of any"
  - id: q3
    prompt: "Which financial wellness tools or providers does your employer use, if any? (Select all that apply)"
    type: multi_choice
    construct: financial_wellness_tools_providers_does
    required: true
    options:
      - id: "a"
        label: "Fidelity"
      - id: "b"
        label: "Vanguard"
      - id: "c"
        label: "Empower"
      - id: "d"
        label: "SoFi at Work"
      - id: "e"
        label: "Financial Finesse"
      - id: "f"
        label: "Origin or a similar platform"
      - id: "g"
        label: "An in-house program"
      - id: "h"
        label: "I don't know"
  - id: q4
    prompt: "How did you first learn about your employer's financial wellness benefits? (Select all that apply)"
    type: multi_choice
    construct: did_first_learn_employer_s
    required: true
    options:
      - id: "a"
        label: "New-hire onboarding"
      - id: "b"
        label: "Open enrollment materials"
      - id: "c"
        label: "Email or company newsletter"
      - id: "d"
        label: "A manager or HR representative"
      - id: "e"
        label: "A coworker"
      - id: "f"
        label: "A benefits portal or app"
      - id: "g"
        label: "I found out on my own"
  - id: q5
    prompt: "Which financial wellness benefits have you actually used? (Select all that apply)"
    type: multi_choice
    construct: financial_wellness_benefits_have_actuall
    required: true
    options:
      - id: "a"
        label: "The retirement plan"
      - id: "b"
        label: "Financial education workshops"
      - id: "c"
        label: "A financial coach or advisor"
      - id: "d"
        label: "Student loan assistance"
      - id: "e"
        label: "An emergency savings program"
      - id: "f"
