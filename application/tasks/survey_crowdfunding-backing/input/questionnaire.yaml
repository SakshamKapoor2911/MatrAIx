        label: "Kickstarter"
      - id: "b"
        label: "GoFundMe"
      - id: "c"
        label: "Indiegogo"
      - id: "d"
        label: "Patreon"
      - id: "e"
        label: "Fundrazr"
      - id: "f"
        label: "Crowdfunder"
      - id: "g"
        label: "GiveSendGo"
      - id: "h"
