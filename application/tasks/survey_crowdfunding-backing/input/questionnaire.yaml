    prompt: "Have you ever backed or donated to a crowdfunding campaign?"
    type: single_choice
    construct: have_ever_backed_donated_crowdfunding
    required: true
    options:
      - id: "a"
        label: "Yes, many times"
      - id: "b"
        label: "Yes, a few times"
      - id: "c"
        label: "Yes, once"
      - id: "d"
        label: "No, but I have considered it"
      - id: "e"
        label: "No, and I have not considered it"
  - id: q1
    prompt: "How long have you been backing crowdfunding campaigns?"
    type: single_choice
    construct: long_have_been_backing_crowdfunding
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I have never backed one"
  - id: q2
    prompt: "In the past 12 months, how many campaigns have you backed?"
    type: single_choice
    construct: past_12_months_many_campaigns
    required: true
    options:
