        label: "Tax software estimates it for me"
      - id: "b"
        label: "My accountant tells me the amount"
      - id: "c"
        label: "I use the IRS Form 1040-ES worksheet"
      - id: "d"
        label: "I set aside a fixed percentage of income"
      - id: "e"
        label: "I estimate it roughly on my own"
