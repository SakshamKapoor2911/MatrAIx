schemaVersion: "1.0"
id: quarterly_estimated_taxes_v1
title: "Quarterly Estimated Taxes Survey"
description: "How self-employed and 1099 earners calculate, save for, pay, and manage quarterly estimated taxes."
questions:
  - id: q0
    prompt: "Do you currently make quarterly estimated federal tax payments?"
    type: single_choice
    construct: currently_make_quarterly_estimated_feder
    required: true
    options:
      - id: "a"
        label: "Yes, every quarter"
      - id: "b"
        label: "Yes, but not every quarter"
      - id: "c"
        label: "No, but I think I should"
      - id: "d"
        label: "No, and I don't believe I need to"
      - id: "e"
        label: "I'm not sure whether I need to"
  - id: q1
    prompt: "How long have you been dealing with estimated taxes?"
    type: single_choice
    construct: long_have_been_dealing_estimated
    required: true
    options:
      - id: "a"
        label: "This is my first year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes the income that leads you to owe estimated taxes?"
    type: single_choice
    construct: best_describes_income_that_leads
    required: true
    options:
      - id: "a"
        label: "Full-time self-employment or freelancing"
      - id: "b"
        label: "A side business alongside a W-2 job"
      - id: "c"
        label: "Gig or platform work"
      - id: "d"
        label: "Investment, dividend, or rental income"
      - id: "e"
        label: "A mix of several sources"
  - id: q3
    prompt: "About what share of your total household income comes from self-employment or 1099 work?"
    type: single_choice
    construct: share_total_household_income_comes
    required: true
    options:
      - id: "a"
        label: "Less than 10%"
      - id: "b"
        label: "10% to 25%"
      - id: "c"
        label: "26% to 50%"
      - id: "d"
        label: "51% to 75%"
      - id: "e"
        label: "More than 75%"
  - id: q4
    prompt: "Which types of income require you to make estimated payments? (Select all that apply)"
    type: multi_choice
    construct: types_income_require_make_estimated
    required: true
    options:
