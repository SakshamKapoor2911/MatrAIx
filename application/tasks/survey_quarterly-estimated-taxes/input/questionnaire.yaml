        label: "Freelance or consulting fees"
      - id: "b"
        label: "Small business or sole-proprietor profit"
      - id: "c"
        label: "Gig platform earnings (rideshare, delivery, etc.)"
      - id: "d"
        label: "Rental property income"
      - id: "e"
        label: "Investment or capital gains income"
      - id: "f"
        label: "Dividend or interest income"
      - id: "g"
        label: "Royalties or licensing income"
      - id: "h"
        label: "Cryptocurrency gains"
