schemaVersion: "1.0"
id: nft_ownership_v1
title: "NFT Ownership Survey"
description: "How people buy, hold, and think about non-fungible tokens, including the marketplaces they use, their motivations, and their attitudes toward the space."
questions:
  - id: q0
    prompt: "Which of the following best describes your experience with NFTs?"
    type: single_choice
    construct: following_best_describes_experience_nfts
    required: true
    options:
      - id: "a"
        label: "I currently own one or more NFTs"
      - id: "b"
        label: "I owned NFTs before but have sold them all"
      - id: "c"
        label: "I am considering buying my first NFT"
      - id: "d"
        label: "I have never owned NFTs but I am interested"
      - id: "e"
        label: "I have never owned NFTs and am not interested"
  - id: q1
    prompt: "How long have you been involved with NFTs?"
    type: single_choice
    construct: long_have_been_involved_nfts
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 to 12 months"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 4 years"
      - id: "e"
        label: "5 or more years"
      - id: "f"
        label: "Not applicable"
  - id: q2
    prompt: "About how many NFTs do you currently own?"
    type: single_choice
    construct: many_nfts_currently_own
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 to 2"
      - id: "c"
        label: "3 to 10"
      - id: "d"
        label: "11 to 50"
      - id: "e"
        label: "51 to 200"
      - id: "f"
        label: "More than 200"
  - id: q3
    prompt: "How did you first get into NFTs? (Select all that apply)"
    type: multi_choice
    construct: did_first_get_into_nfts
    required: true
    options:
      - id: "a"
        label: "A friend or family member"
      - id: "b"
        label: "Social media (X/Twitter, Instagram, TikTok)"
      - id: "c"
        label: "A YouTube or crypto influencer"
      - id: "d"
        label: "A Discord community"
      - id: "e"
        label: "News coverage or articles"
      - id: "f"
        label: "Through crypto trading I already did"
      - id: "g"
        label: "A game or brand I follow"
  - id: q4
    prompt: "How well do you understand how NFTs and the blockchain behind them work?"
    type: single_choice
    construct: well_understand_nfts_blockchain_behind
    required: true
    options:
      - id: "a"
        label: "Not at all well"
      - id: "b"
        label: "Slightly well"
      - id: "c"
        label: "Moderately well"
      - id: "d"
        label: "Very well"
      - id: "e"
        label: "Extremely well"
