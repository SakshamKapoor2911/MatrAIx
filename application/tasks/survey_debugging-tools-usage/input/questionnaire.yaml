      - id: "a"
        label: "Print or logging statements"
      - id: "b"
        label: "Breakpoints and stepping"
      - id: "c"
        label: "Conditional breakpoints"
      - id: "d"
        label: "Watch expressions"
      - id: "e"
        label: "Rubber-duck debugging"
      - id: "f"
        label: "Bisecting with git bisect"
      - id: "g"
        label: "Profiling"
      - id: "h"
        label: "Reading stack traces carefully"
      - id: "i"
        label: "Adding assertions"
