schemaVersion: "1.0"
id: debugging_tools_usage_v1
title: "Debugging Tools Usage Survey"
description: "How developers debug software, including the tools, techniques, and habits they rely on."
questions:
  - id: q0
    prompt: "How often do you debug code?"
    type: single_choice
    construct: often_debug_code
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "Every day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Rarely"
  - id: q1
    prompt: "How long have you been debugging software professionally or as a hobby?"
    type: single_choice
    construct: long_have_been_debugging_software
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes your relationship to debugging?"
    type: single_choice
    construct: best_describes_relationship_debugging
    required: true
    options:
      - id: "a"
        label: "I debug complex systems as a core part of my job"
      - id: "b"
        label: "I debug my own application code regularly"
      - id: "c"
        label: "I mostly debug while learning"
      - id: "d"
        label: "I debug only occasionally"
      - id: "e"
        label: "I rarely debug"
  - id: q3
    prompt: "What is your primary way of debugging?"
    type: single_choice
    construct: primary_way_debugging
    required: true
    options:
      - id: "a"
        label: "Print or logging statements"
      - id: "b"
        label: "An interactive IDE debugger"
      - id: "c"
        label: "Browser developer tools"
      - id: "d"
        label: "A command-line debugger (gdb, lldb, pdb)"
      - id: "e"
        label: "Reading code and reasoning through it"
      - id: "f"
        label: "It varies widely"
  - id: q4
    prompt: "Which debugger or debugging tool do you use most often?"
    type: single_choice
    construct: debugger_debugging_tool_use_most
    required: true
    options:
      - id: "a"
        label: "VS Code debugger"
      - id: "b"
        label: "JetBrains IDE debugger"
      - id: "c"
        label: "Chrome DevTools"
      - id: "d"
        label: "Visual Studio debugger"
      - id: "e"
        label: "gdb or lldb"
      - id: "f"
        label: "pdb (Python)"
      - id: "g"
        label: "Delve (Go)"
      - id: "h"
        label: "Browser framework devtools (React, Vue)"
      - id: "i"
        label: "Other"
      - id: "j"
        label: "I don't use a dedicated debugger"
  - id: q5
    prompt: "Which debugging techniques do you regularly use? (Select all that apply)"
    type: multi_choice
    construct: debugging_techniques_regularly_use_selec
    required: true
