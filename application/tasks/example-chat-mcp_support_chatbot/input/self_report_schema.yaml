artifactName: user_feedback.json
instructions: |
  Reflect honestly as the persona after using the support chatbot.
  Focus on whether the answer was useful, clear, and moved you toward resolution.
fields:
  - key: needConstraintSatisfaction
    prompt: How well did the chatbot satisfy your support need or constraints?
    kind: enum
    choices: [yes, partially, no]
  - key: personalPreferenceSatisfaction
    prompt: How well did the chatbot match your communication preferences?
    kind: enum
    choices: [yes, partially, no]
  - key: overallExperienceRating
    prompt: Overall, how would you rate the experience from 1 to 10?
    kind: integer
    minimum: 1
    maximum: 10
    explanation:
      key: reason
      prompt: Briefly explain the rating in your own voice.
  - key: askedUsefulClarificationQuestions
    prompt: Did the chatbot ask useful clarification questions?
    kind: boolean
    explanation:
      key: clarifyingNotes
      prompt: Which clarification questions helped, or why they did not.
