schemaVersion: "1.0"
id: css_framework_usage_v1
title: "CSS Framework Usage Survey"
description: "How developers choose and use CSS frameworks, methodologies, and component libraries to style user interfaces."
questions:
  - id: q0
    prompt: "How often do you write CSS or style user interfaces?"
    type: single_choice
    construct: often_write_css_style_user
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just learning CSS"
      - id: "e"
        label: "I rarely work with CSS"
  - id: q1
    prompt: "How long have you been working with CSS?"
    type: single_choice
    construct: long_have_been_working_css
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes your relationship to styling and CSS?"
    type: single_choice
    construct: best_describes_relationship_styling_css
    required: true
    options:
      - id: "a"
        label: "Front-end developer"
      - id: "b"
        label: "Full-stack developer"
      - id: "c"
        label: "UI or design engineer"
      - id: "d"
        label: "Designer who also writes code"
      - id: "e"
        label: "I write CSS occasionally"
  - id: q3
    prompt: "Which CSS approach do you use most often?"
    type: single_choice
    construct: css_approach_use_most_often
    required: true
    options:
      - id: "a"
        label: "Tailwind CSS"
      - id: "b"
        label: "Bootstrap"
      - id: "c"
        label: "Plain / vanilla CSS"
      - id: "d"
        label: "CSS Modules"
      - id: "e"
        label: "CSS-in-JS (styled-components, Emotion, etc.)"
      - id: "f"
        label: "Sass / SCSS"
      - id: "g"
        label: "Other"
  - id: q4
    prompt: "Which CSS frameworks or UI libraries have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: css_frameworks_ui_libraries_have
