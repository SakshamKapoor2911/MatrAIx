schemaVersion: "1.0"
id: annual_checkup_habits_v1
title: "Annual Checkup Habits Survey"
description: "Consumer habits and attitudes around the annual physical or wellness checkup, from scheduling and preparation to follow-up."
questions:
  - id: q0
    prompt: "Do you currently have a primary care provider you see for checkups?"
    type: single_choice
    construct: currently_have_primary_care_provider
    required: true
    options:
      - id: "a"
        label: "Yes, and I see them regularly"
      - id: "b"
        label: "Yes, but I rarely see them"
      - id: "c"
        label: "No, but I have had one in the past"
      - id: "d"
        label: "No, I have never had one"
  - id: q1
    prompt: "When did you last have an annual physical or general wellness checkup?"
    type: single_choice
    construct: when_did_last_have_annual
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 to 12 months ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "3 to 5 years ago"
      - id: "e"
        label: "More than 5 years ago"
      - id: "f"
        label: "I have never had one"
  - id: q2
    prompt: "How often do you typically get a general checkup?"
    type: single_choice
    construct: often_typically_get_general_checkup
    required: true
    options:
      - id: "a"
        label: "Every year"
      - id: "b"
        label: "Every 2 to 3 years"
      - id: "c"
        label: "Only when I have a specific concern"
      - id: "d"
        label: "Rarely or never"
  - id: q3
    prompt: "Roughly how many years has it been since you started getting regular checkups? Please enter a number."
    type: free_text
    construct: roughly_many_years_has_it
    required: true
  - id: q4
    prompt: "How do you usually schedule your annual checkup?"
    type: single_choice
    construct: usually_schedule_annual_checkup
    required: true
    options:
      - id: "a"
        label: "By calling the office"
      - id: "b"
        label: "Through an online patient portal"
      - id: "c"
        label: "Through a scheduling app"
      - id: "d"
        label: "The office schedules it for me automatically"
      - id: "e"
        label: "I do not schedule them in advance"
  - id: q5
    prompt: "How far in advance do you usually book your annual checkup?"
    type: single_choice
    construct: far_advance_usually_book_annual
    required: true
    options:
      - id: "a"
        label: "Same week"
      - id: "b"
        label: "1 to 2 weeks ahead"
      - id: "c"
        label: "About a month ahead"
      - id: "d"
        label: "Several months ahead"
      - id: "e"
        label: "I do not plan ahead"
  - id: q6
    prompt: "Which of the following do you typically do to prepare for a checkup? (Select all that apply)"
    type: multi_choice
    construct: following_typically_prepare_checkup_sele
    required: true
    options:
      - id: "a"
        label: "Write down questions or concerns"
      - id: "b"
        label: "Make a list of my medications"
      - id: "c"
        label: "Track symptoms beforehand"
      - id: "d"
        label: "Fast if bloodwork is expected"
      - id: "e"
        label: "Gather records from other providers"
      - id: "f"
        label: "Bring a family member"
      - id: "g"
        label: "I do not do anything special to prepare"
  - id: q7
    prompt: "Which of the following usually happen during your annual checkup? (Select all that apply)"
    type: multi_choice
    construct: following_usually_happen_during_annual
    required: true
    options:
      - id: "a"
        label: "Blood pressure and vitals check"
      - id: "b"
        label: "Review of my medications"
      - id: "c"
        label: "Bloodwork or lab tests"
      - id: "d"
        label: "Discussion of diet and exercise"
      - id: "e"
        label: "Mental well-being check-in"
      - id: "f"
        label: "Vaccinations or boosters"
      - id: "g"
        label: "Referrals to specialists or screenings"
      - id: "h"
        label: "None of these"
  - id: q8
    prompt: "About how long does your typical checkup appointment last? Please enter a number of minutes."
    type: free_text
    construct: long_does_typical_checkup_appointment
    required: true
  - id: q9
    prompt: "How much do you agree or disagree: An annual checkup is worth doing even when I feel healthy."
    type: single_choice
    construct: much_agree_disagree_annual_checkup
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q10
    prompt: "How much do you agree or disagree: My checkups usually feel rushed."
    type: single_choice
    construct: much_agree_disagree_my_checkups
    required: true
