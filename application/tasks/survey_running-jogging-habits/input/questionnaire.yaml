schemaVersion: "1.0"
id: running_jogging_habits_v1
title: "Running and Jogging Habits Survey"
description: "How people run and jog for fitness, including their frequency, gear, and tracking apps."
questions:
  - id: q0
    prompt: "Do you run or jog for exercise?"
    type: single_choice
    construct: run_jog_exercise
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I used to"
      - id: "d"
        label: "No, I never have"
  - id: q1
    prompt: "How long have you been running or jogging?"
    type: single_choice
    construct: long_have_been_running_jogging
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't run or jog"
  - id: q2
    prompt: "How often do you run or jog?"
    type: single_choice
    construct: often_run_jog
    required: true
    options:
      - id: "a"
        label: "5 or more times a week"
      - id: "b"
        label: "3 to 4 times a week"
      - id: "c"
        label: "1 to 2 times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q3
    prompt: "About how many miles do you run in a typical week? Please enter a number."
    type: free_text
    construct: many_miles_run_typical_week
    required: true
  - id: q4
    prompt: "What is the main reason you run or jog?"
    type: single_choice
    construct: main_reason_run_jog
    required: true
    options:
      - id: "a"
        label: "General fitness and health"
      - id: "b"
        label: "Weight management"
      - id: "c"
        label: "Stress relief and mental health"
      - id: "d"
        label: "Training for a race or event"
      - id: "e"
        label: "Enjoyment or social reasons"
      - id: "f"
        label: "Competing in the sport"
  - id: q5
    prompt: "Where do you usually run? (Select all that apply)"
    type: multi_choice
    construct: where_usually_run_select_all
    required: true
    options:
      - id: "a"
        label: "Neighborhood streets and sidewalks"
      - id: "b"
        label: "Parks or trails"
      - id: "c"
        label: "A track"
      - id: "d"
        label: "A treadmill at home"
      - id: "e"
        label: "A treadmill at a gym"
      - id: "f"
