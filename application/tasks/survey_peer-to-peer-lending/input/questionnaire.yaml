schemaVersion: "1.0"
id: peer_to_peer_lending_v1
title: "Peer-to-Peer Lending Survey"
description: "How people participate in peer-to-peer lending platforms as investors, borrowers, or both."
questions:
  - id: q0
    prompt: "Have you ever used a peer-to-peer (P2P) lending platform?"
    type: single_choice
    construct: have_ever_used_peer_peer
    required: true
    options:
      - id: "a"
        label: "Yes, as an investor (lender)"
      - id: "b"
        label: "Yes, as a borrower"
      - id: "c"
        label: "Yes, as both a borrower and an investor"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you used peer-to-peer lending platforms?"
    type: single_choice
    construct: long_have_used_peer_peer
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I have never used one"
  - id: q2
    prompt: "Which best describes your primary role on these platforms?"
    type: single_choice
    construct: best_describes_primary_role_these
    required: true
    options:
      - id: "a"
        label: "Mainly an investor"
      - id: "b"
        label: "Mainly a borrower"
      - id: "c"
        label: "Equally both"
      - id: "d"
        label: "Former user, no longer active"
      - id: "e"
        label: "Never used one"
  - id: q3
    prompt: "Which peer-to-peer lending platforms have you used? (Select all that apply)"
    type: multi_choice
    construct: peer_peer_lending_platforms_have
    required: true
    options:
      - id: "a"
        label: "LendingClub"
      - id: "b"
        label: "Prosper"
      - id: "c"
        label: "Upstart"
      - id: "d"
        label: "Funding Circle"
      - id: "e"
        label: "Kiva"
      - id: "f"
        label: "PeerStreet"
      - id: "g"
        label: "SoFi"
      - id: "h"
        label: "None of these"
  - id: q4
    prompt: "What type of loans have you been involved with? (Select all that apply)"
    type: multi_choice
    construct: type_loans_have_been_involved
    required: true
    options:
      - id: "a"
        label: "Personal or consumer loans"
      - id: "b"
        label: "Debt consolidation loans"
      - id: "c"
        label: "Small business loans"
      - id: "d"
        label: "Real estate or bridge loans"
      - id: "e"
        label: "Student loan refinancing"
      - id: "f"
        label: "Microloans or charitable lending"
      - id: "g"
        label: "Medical expense loans"
  - id: q5
    prompt: "How did you first hear about peer-to-peer lending? (Select all that apply)"
    type: multi_choice
    construct: did_first_hear_peer_peer
    required: true
    options:
      - id: "a"
        label: "Online search"
      - id: "b"
        label: "A financial news article or blog"
      - id: "c"
        label: "A friend or family member"
      - id: "d"
        label: "Social media or an influencer"
      - id: "e"
        label: "An advertisement"
      - id: "f"
        label: "A financial advisor"
      - id: "g"
        label: "A comparison or review website"
  - id: q6
    prompt: "As an investor, how do you select which loans to fund? (Select all that apply)"
    type: multi_choice
    construct: as_investor_select_loans_fund
    required: true
    options:
      - id: "a"
        label: "Automated investing tools on the platform"
      - id: "b"
        label: "Credit grade or risk rating"
      - id: "c"
        label: "Borrower's stated purpose"
      - id: "d"
        label: "Interest rate offered"
      - id: "e"
        label: "Loan term length"
      - id: "f"
        label: "Diversifying across many small notes"
      - id: "g"
        label: "I am not an investor"
  - id: q7
    prompt: "About how much money have you invested through P2P lending in total, in U.S. dollars? Please enter a number."
    type: free_text
    construct: much_money_have_invested_through
    required: true
  - id: q8
    prompt: "About how much have you borrowed through P2P lending in total, in U.S. dollars? Please enter a number."
    type: free_text
    construct: much_have_borrowed_through_p2p
    required: true
  - id: q9
    prompt: "As an investor, roughly how many individual loans or notes do you hold? Please enter a number."
    type: free_text
    construct: as_investor_roughly_many_individual
    required: true
  - id: q10
    prompt: "As an investor, what annual return have you experienced on your P2P investments?"
    type: single_choice
    construct: as_investor_annual_return_have
    required: true
    options:
      - id: "a"
        label: "I have lost money overall"
      - id: "b"
        label: "0 to 3 percent"
      - id: "c"
        label: "4 to 6 percent"
      - id: "d"
        label: "7 to 9 percent"
      - id: "e"
        label: "10 percent or more"
      - id: "f"
        label: "I do not track this"
      - id: "g"
        label: "I am not an investor"
  - id: q11
    prompt: "As a borrower, what interest rate (APR) did you receive on your most recent loan?"
    type: single_choice
    construct: as_borrower_interest_rate_apr
    required: true
    options:
      - id: "a"
        label: "Under 8 percent"
      - id: "b"
        label: "8 to 12 percent"
      - id: "c"
        label: "13 to 18 percent"
      - id: "d"
        label: "19 to 25 percent"
      - id: "e"
        label: "More than 25 percent"
      - id: "f"
        label: "I do not remember"
      - id: "g"
        label: "I am not a borrower"
  - id: q12
    prompt: "Why did you choose P2P lending over traditional options? (Select all that apply)"
    type: multi_choice
    construct: why_did_choose_p2p_lending
    required: true
    options:
      - id: "a"
        label: "Better interest rates"
      - id: "b"
        label: "Faster or easier approval"
      - id: "c"
        label: "Higher potential returns as an investor"
      - id: "d"
        label: "Distrust of traditional banks"
      - id: "e"
        label: "Access when banks declined me"
      - id: "f"
        label: "Portfolio diversification"
      - id: "g"
        label: "Supporting individual borrowers"
  - id: q13
    prompt: "How much do you agree: P2P lending offers better returns than a savings account."
    type: single_choice
    construct: much_agree_p2p_lending_offers
    required: true
    options:
      - id: "a"
        label: "Strongly disagree"
      - id: "b"
        label: "Disagree"
      - id: "c"
        label: "Neither agree nor disagree"
      - id: "d"
        label: "Agree"
      - id: "e"
        label: "Strongly agree"
  - id: q14
