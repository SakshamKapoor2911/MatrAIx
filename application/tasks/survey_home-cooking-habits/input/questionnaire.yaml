schemaVersion: "1.0"
id: home_cooking_habits_v1
title: "Home Cooking Habits Survey"
description: "How people cook at home and pursue healthy eating, including their methods, tools, and barriers."
questions:
  - id: q0
    prompt: "How often do you cook a meal at home?"
    type: single_choice
    construct: often_cook_meal_home
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely or never"
  - id: q1
    prompt: "Who does most of the cooking in your household?"
    type: single_choice
    construct: who_does_most_cooking_household
    required: true
    options:
      - id: "a"
        label: "I do most of it"
      - id: "b"
        label: "I share it with someone else"
      - id: "c"
        label: "Someone else does most of it"
      - id: "d"
        label: "We rely mostly on takeout or ready-made food"
  - id: q2
    prompt: "How long have you been cooking regularly for yourself or your household?"
    type: single_choice
    construct: long_have_been_cooking_regularly
    required: true
