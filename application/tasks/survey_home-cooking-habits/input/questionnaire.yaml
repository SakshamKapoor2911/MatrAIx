        label: "Cook from scratch"
      - id: "b"
        label: "Assemble a quick meal from prepared components"
      - id: "c"
        label: "Heat a frozen or packaged meal"
      - id: "d"
        label: "Takeout or delivery"
      - id: "e"
        label: "Eat out"
      - id: "f"
        label: "Skip or graze"
