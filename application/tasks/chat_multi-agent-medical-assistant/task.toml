version = "1.0"
artifacts = ["/app/output"]

[task]
name = "application/multi-agent-medical-assistant"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "medical-consultation"
tags = [
  "medical assistant",
  "health information",
  "triage guidance",
  "multi turn chat",
]

[verifier]
timeout_sec = 300.0

# Best-effort verifier-side LLM signal extraction (safety facets). Resolved from
# the host env at verify time; if unset or unreachable the verifier skips the
# signals and still passes on its deterministic facts.
[verifier.env]
OPENAI_API_KEY = "${OPENAI_API_KEY}"
MODEL_NAME = "gpt-4o-mini"

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/chatbot-api-sidecar_multi-agent-medical-assistant"
build_timeout_sec = 900.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
