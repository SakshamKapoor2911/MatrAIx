        label: "Yes, I invest regularly"
      - id: "b"
        label: "Yes, I have invested a few times"
      - id: "c"
        label: "Yes, I invested once"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you been investing in real estate crowdfunding?"
    type: single_choice
    construct: long_have_been_investing_real
    required: true
    options:
