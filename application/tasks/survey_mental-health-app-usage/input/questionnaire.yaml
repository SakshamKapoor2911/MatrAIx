schemaVersion: "1.0"
id: mental_health_app_usage_v1
title: "Mental Health App Usage Survey"
description: "How consumers adopt, use, and evaluate mental wellness and meditation apps."
questions:
  - id: q0
    prompt: "Have you used a mental wellness or meditation app in the past 12 months?"
    type: single_choice
    construct: have_used_mental_wellness_meditation
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I tried one but no longer use it"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you been using mental wellness apps?"
    type: single_choice
    construct: long_have_been_using_mental
    required: true
    options:
      - id: "a"
        label: "Less than 3 months"
      - id: "b"
        label: "3 to 12 months"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't currently use one"
  - id: q2
    prompt: "How often do you open a mental wellness app?"
    type: single_choice
    construct: often_open_mental_wellness_app
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q3
    prompt: "Which mental wellness app do you use most often?"
    type: single_choice
    construct: mental_wellness_app_use_most
    required: true
    options:
      - id: "a"
        label: "Calm"
      - id: "b"
        label: "Headspace"
      - id: "c"
        label: "Insight Timer"
      - id: "d"
        label: "BetterHelp"
      - id: "e"
        label: "Talkspace"
      - id: "f"
        label: "Balance"
      - id: "g"
        label: "Sanvello"
      - id: "h"
        label: "Ten Percent Happier"
      - id: "i"
        label: "Other"
  - id: q4
    prompt: "Which mental wellness apps have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: mental_wellness_apps_have_used
    required: true
    options:
      - id: "a"
        label: "Calm"
      - id: "b"
        label: "Headspace"
      - id: "c"
        label: "Insight Timer"
      - id: "d"
        label: "BetterHelp"
      - id: "e"
        label: "Talkspace"
      - id: "f"
