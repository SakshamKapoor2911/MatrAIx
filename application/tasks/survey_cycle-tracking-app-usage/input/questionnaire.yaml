schemaVersion: "1.0"
id: cycle_tracking_app_usage_v1
title: "Cycle Tracking App Usage Survey"
description: "How people use menstrual and cycle tracking apps, which features they rely on, and their attitudes toward usability, cost, and privacy."
questions:
  - id: q0
    prompt: "Do you currently use a cycle tracking app?"
    type: single_choice
    construct: currently_use_cycle_tracking_app
    required: true
    options:
      - id: "a"
        label: "Yes, I use it regularly"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you used a cycle tracking app?"
    type: single_choice
    construct: long_have_used_cycle_tracking
    required: true
    options:
      - id: "a"
        label: "I do not use one"
      - id: "b"
        label: "Less than 6 months"
      - id: "c"
        label: "6 months to 1 year"
      - id: "d"
        label: "1 to 3 years"
      - id: "e"
        label: "More than 3 years"
  - id: q2
    prompt: "Which cycle tracking apps have you used? (Select all that apply)"
    type: multi_choice
    construct: cycle_tracking_apps_have_used
    required: true
    options:
      - id: "a"
        label: "Flo"
      - id: "b"
        label: "Clue"
      - id: "c"
        label: "Apple Health cycle tracking"
      - id: "d"
        label: "Natural Cycles"
      - id: "e"
        label: "Period Calendar / Period Tracker"
      - id: "f"
        label: "Ovia"
      - id: "g"
        label: "Glow"
      - id: "h"
        label: "None of these"
  - id: q3
    prompt: "Which app do you use most often?"
    type: single_choice
    construct: app_use_most_often
    required: true
    options:
      - id: "a"
        label: "Flo"
      - id: "b"
        label: "Clue"
      - id: "c"
        label: "Apple Health"
      - id: "d"
        label: "Natural Cycles"
      - id: "e"
        label: "Another app"
      - id: "f"
        label: "I do not use one"
  - id: q4
    prompt: "What is your main reason for using a cycle tracking app?"
    type: single_choice
    construct: main_reason_using_cycle_tracking
    required: true
    options:
      - id: "a"
        label: "Predicting my cycle"
      - id: "b"
        label: "General awareness and logging"
      - id: "c"
        label: "Tracking symptoms and mood"
      - id: "d"
        label: "Planning around my schedule"
      - id: "e"
        label: "Sharing information with a provider"
      - id: "f"
        label: "I do not use one"
  - id: q5
    prompt: "Which app features do you use? (Select all that apply)"
    type: multi_choice
    construct: app_features_use_select_all
    required: true
    options:
      - id: "a"
        label: "Cycle calendar and predictions"
      - id: "b"
        label: "Symptom logging"
      - id: "c"
        label: "Mood tracking"
      - id: "d"
        label: "Reminders and notifications"
      - id: "e"
        label: "Educational articles or content"
      - id: "f"
        label: "Community or forums"
      - id: "g"
        label: "Data export or reports"
      - id: "h"
        label: "Wearable or health-app sync"
      - id: "i"
