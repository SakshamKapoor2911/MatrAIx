schemaVersion: "1.0"
id: business_credit_cards_v1
title: "Small Business Credit Card Survey"
description: "How small business owners choose, use, and manage business credit cards for rewards and expense separation."
questions:
  - id: q0
    prompt: "Do you own or help run a small business?"
    type: single_choice
    construct: own_help_run_small_business
    required: true
    options:
      - id: "a"
        label: "Yes, I am the sole owner"
      - id: "b"
        label: "Yes, I co-own it"
      - id: "c"
        label: "Yes, I manage finances but don't own it"
      - id: "d"
        label: "I'm a freelancer or independent contractor"
      - id: "e"
        label: "No, I don't run a business"
  - id: q1
    prompt: "Do you currently use a credit card for business expenses?"
    type: single_choice
    construct: currently_use_credit_card_business
    required: true
    options:
      - id: "a"
        label: "Yes, a dedicated business credit card"
      - id: "b"
        label: "Yes, but I use a personal card for business"
      - id: "c"
        label: "Yes, a mix of business and personal cards"
      - id: "d"
        label: "No, but I plan to get one"
      - id: "e"
        label: "No, I don't use credit cards for business"
  - id: q2
    prompt: "How long have you used a business credit card?"
    type: single_choice
    construct: long_have_used_business_credit
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't use one"
  - id: q3
    prompt: "How many business credit cards does your business currently have?"
    type: single_choice
    construct: many_business_credit_cards_does
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2 to 3"
      - id: "d"
        label: "4 to 5"
      - id: "e"
        label: "6 or more"
  - id: q4
    prompt: "Which business credit card issuers do you currently use? (Select all that apply)"
    type: multi_choice
    construct: business_credit_card_issuers_currently
    required: true
    options:
      - id: "a"
        label: "Chase (Ink Business)"
      - id: "b"
        label: "American Express (Business)"
      - id: "c"
        label: "Capital One (Spark Business)"
      - id: "d"
        label: "Bank of America (Business Advantage)"
      - id: "e"
        label: "U.S. Bank"
      - id: "f"
        label: "Wells Fargo"
      - id: "g"
        label: "Brex"
      - id: "h"
        label: "Ramp"
      - id: "i"
        label: "A local bank or credit union"
      - id: "j"
        label: "None"
  - id: q5
    prompt: "Which card do you use most often for business spending?"
    type: single_choice
    construct: card_use_most_often_business
    required: true
