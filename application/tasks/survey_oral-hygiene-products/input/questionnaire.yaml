schemaVersion: "1.0"
id: oral_hygiene_products_v1
title: "Oral Hygiene Products Survey"
description: "How people use and choose oral hygiene products, including manual and electric toothbrushes, floss, water flossers, whitening, and mouthwash."
questions:
  - id: q0
    prompt: "How often do you brush your teeth?"
    type: single_choice
    construct: often_brush_teeth
    required: true
    options:
      - id: "a"
        label: "Less than once a day"
      - id: "b"
        label: "Once a day"
      - id: "c"
        label: "Twice a day"
      - id: "d"
        label: "More than twice a day"
  - id: q1
    prompt: "What type of toothbrush do you primarily use?"
    type: single_choice
    construct: type_toothbrush_primarily_use
    required: true
    options:
      - id: "a"
        label: "Manual toothbrush"
      - id: "b"
        label: "Battery-powered toothbrush"
      - id: "c"
        label: "Rechargeable electric toothbrush"
      - id: "d"
        label: "Smart or app-connected electric toothbrush"
  - id: q2
    prompt: "Which toothbrush brands have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: toothbrush_brands_have_used_past
    required: true
    options:
      - id: "a"
        label: "Oral-B"
      - id: "b"
        label: "Philips Sonicare"
      - id: "c"
        label: "Colgate"
      - id: "d"
        label: "Quip"
      - id: "e"
        label: "Burst"
      - id: "f"
        label: "Store or generic brand"
      - id: "g"
        label: "Other"
      - id: "h"
        label: "I do not use a toothbrush"
  - id: q3
