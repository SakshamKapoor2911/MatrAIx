      - id: "b"
        label: "A personal debit card or checking account"
      - id: "c"
        label: "Cash"
      - id: "d"
        label: "A rewards credit card I use on purpose"
      - id: "e"
        label: "I rarely pay out of pocket"
  - id: q11
