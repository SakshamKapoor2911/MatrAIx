        label: "Expensify"
      - id: "b"
        label: "SAP Concur"
      - id: "c"
        label: "Ramp"
      - id: "d"
        label: "Brex"
      - id: "e"
        label: "A spreadsheet or form"
      - id: "f"
        label: "Email"
      - id: "g"
        label: "Other"
      - id: "h"
        label: "I don't submit expenses"
  - id: q7
    prompt: "How do you capture receipts for work expenses? (Select all that apply)"
    type: multi_choice
    construct: capture_receipts_work_expenses_select
    required: true
    options:
