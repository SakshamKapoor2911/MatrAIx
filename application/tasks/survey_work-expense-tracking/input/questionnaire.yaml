schemaVersion: "1.0"
id: work_expense_tracking_v1
title: "Work Expense Tracking Survey"
description: "How employees and contractors track, submit, and get reimbursed for work-related expenses."
questions:
  - id: q0
    prompt: "Do you incur work-related expenses that you track or submit for reimbursement?"
    type: single_choice
    construct: incur_work_related_expenses_that
    required: true
    options:
      - id: "a"
        label: "Yes, frequently"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "No, but I have in a past role"
      - id: "e"
        label: "No, never"
  - id: q1
    prompt: "How are your work expenses typically handled?"
    type: single_choice
    construct: work_expenses_typically_handled
    required: true
    options:
      - id: "a"
        label: "I pay out of pocket and get reimbursed"
      - id: "b"
        label: "I use a company card"
      - id: "c"
        label: "A mix of company card and out of pocket"
      - id: "d"
        label: "I submit expenses but a manager pays"
      - id: "e"
        label: "I don't handle work expenses"
  - id: q2
    prompt: "How long have you been tracking or submitting work expenses?"
    type: single_choice
    construct: long_have_been_tracking_submitting
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't track work expenses"
  - id: q3
    prompt: "How often do you submit an expense report or reimbursement request?"
    type: single_choice
    construct: often_submit_expense_report_reimbursemen
    required: true
    options:
      - id: "a"
        label: "Weekly or more often"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Rarely"
  - id: q4
    prompt: "Which types of work expenses do you regularly track? (Select all that apply)"
    type: multi_choice
    construct: types_work_expenses_regularly_track
    required: true
    options:
      - id: "a"
        label: "Travel (flights, hotels)"
      - id: "b"
        label: "Meals and entertainment"
      - id: "c"
        label: "Ground transportation and mileage"
      - id: "d"
        label: "Office supplies"
      - id: "e"
        label: "Software and subscriptions"
      - id: "f"
        label: "Client or team events"
      - id: "g"
        label: "Conferences and training"
      - id: "h"
        label: "Phone or internet"
      - id: "i"
        label: "Home office equipment"
  - id: q5
    prompt: "Which tools does your organization use for expense tracking or reimbursement? (Select all that apply)"
    type: multi_choice
    construct: tools_does_organization_use_expense
    required: true
    options:
      - id: "a"
        label: "Expensify"
      - id: "b"
        label: "SAP Concur"
      - id: "c"
        label: "Ramp"
      - id: "d"
        label: "Brex"
      - id: "e"
        label: "Zoho Expense"
      - id: "f"
        label: "Certify / Emburse"
      - id: "g"
        label: "QuickBooks"
      - id: "h"
        label: "A spreadsheet or manual form"
      - id: "i"
        label: "Email with attached receipts"
      - id: "j"
        label: "I'm not sure"
  - id: q6
    prompt: "Which tool do you use most often to submit expenses?"
    type: single_choice
    construct: tool_use_most_often_submit
    required: true
