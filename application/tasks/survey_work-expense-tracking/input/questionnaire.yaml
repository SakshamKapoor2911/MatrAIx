        label: "Photographing them with an app"
      - id: "b"
        label: "Forwarding email receipts"
      - id: "c"
        label: "Keeping paper receipts"
      - id: "d"
        label: "Automatic capture from a company card"
      - id: "e"
        label: "Saving PDFs to a folder"
      - id: "f"
        label: "I often don't keep receipts"
