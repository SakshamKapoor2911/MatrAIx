schemaVersion: "1.0"
id: command_line_productivity_tools_v1
title: "Command-Line Productivity Tools Survey"
description: "How developers and technical users adopt and use modern command-line productivity tools."
questions:
  - id: q0
    prompt: "How often do you use command-line productivity tools beyond the basics?"
    type: single_choice
    construct: often_use_command_line_productivity
    required: true
    options:
      - id: "a"
        label: "Constantly throughout the day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I only use standard built-in commands"
  - id: q1
    prompt: "How long have you been using modern command-line tools (ripgrep, fzf, etc.)?"
    type: single_choice
    construct: long_have_been_using_modern
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What is your primary operating system for command-line work?"
    type: single_choice
    construct: primary_operating_system_command_line
    required: true
    options:
      - id: "a"
        label: "macOS"
      - id: "b"
        label: "Windows"
      - id: "c"
        label: "Linux"
      - id: "d"
        label: "Windows with WSL"
      - id: "e"
        label: "Other"
  - id: q3
    prompt: "Which command-line search or navigation tool do you use most often?"
    type: single_choice
    construct: command_line_search_navigation_tool
    required: true
    options:
      - id: "a"
        label: "ripgrep (rg)"
      - id: "b"
        label: "fzf"
      - id: "c"
        label: "zoxide"
      - id: "d"
        label: "fd"
      - id: "e"
        label: "grep or find (the classics)"
      - id: "f"
        label: "I don't use these tools"
  - id: q4
    prompt: "Which modern command-line tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: modern_command_line_tools_have
    required: true
    options:
      - id: "a"
        label: "ripgrep (rg)"
      - id: "b"
        label: "fzf"
      - id: "c"
        label: "fd"
      - id: "d"
        label: "bat"
      - id: "e"
        label: "eza or exa"
      - id: "f"
        label: "zoxide"
      - id: "g"
        label: "jq"
      - id: "h"
        label: "tmux"
      - id: "i"
        label: "delta"
      - id: "j"
        label: "sd or ast-grep"
      - id: "k"
        label: "None of these"
