      - id: "b"
        label: "Mostly work travel"
      - id: "c"
        label: "An even mix"
      - id: "d"
        label: "Mostly personal travel"
      - id: "e"
        label: "Almost all personal travel"
  - id: q8
    prompt: "About how many airline miles do you currently have across all programs? Please enter a number."
