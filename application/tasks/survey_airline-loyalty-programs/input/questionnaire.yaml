schemaVersion: "1.0"
id: airline_loyalty_programs_v1
title: "Airline Loyalty Programs Survey"
description: "How people participate in airline frequent-flyer programs, earn and redeem miles, pursue elite status, and stay loyal to a carrier."
questions:
  - id: q0
    prompt: "Are you a member of at least one airline loyalty or frequent-flyer program?"
    type: single_choice
    construct: member_least_one_airline_loyalty
    required: true
    options:
      - id: "a"
        label: "Yes, one program"
      - id: "b"
        label: "Yes, two or three programs"
      - id: "c"
        label: "Yes, four or more programs"
      - id: "d"
        label: "No, but I've been a member before"
      - id: "e"
        label: "No, I've never joined one"
  - id: q1
    prompt: "How long have you participated in airline loyalty programs?"
    type: single_choice
    construct: long_have_participated_airline_loyalty
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which airline loyalty program is your primary one?"
    type: single_choice
    construct: airline_loyalty_program_primary_one
    required: true
    options:
      - id: "a"
        label: "Delta SkyMiles"
      - id: "b"
        label: "United MileagePlus"
      - id: "c"
        label: "American Airlines AAdvantage"
      - id: "d"
        label: "Southwest Rapid Rewards"
      - id: "e"
        label: "JetBlue TrueBlue"
      - id: "f"
        label: "Alaska Mileage Plan"
      - id: "g"
        label: "A foreign carrier's program"
      - id: "h"
        label: "Other"
  - id: q3
    prompt: "Which airline loyalty programs are you a member of? (Select all that apply)"
    type: multi_choice
    construct: airline_loyalty_programs_member_select
    required: true
    options:
      - id: "a"
        label: "Delta SkyMiles"
      - id: "b"
        label: "United MileagePlus"
      - id: "c"
        label: "American Airlines AAdvantage"
      - id: "d"
        label: "Southwest Rapid Rewards"
      - id: "e"
        label: "JetBlue TrueBlue"
      - id: "f"
        label: "Alaska Mileage Plan"
      - id: "g"
        label: "Frontier or Spirit program"
      - id: "h"
        label: "A foreign carrier's program"
  - id: q4
    prompt: "Do you currently hold elite status in any airline program?"
    type: single_choice
    construct: currently_hold_elite_status_any
    required: true
    options:
      - id: "a"
        label: "No elite status"
      - id: "b"
        label: "Entry-level or silver tier"
      - id: "c"
        label: "Mid tier (gold, etc.)"
      - id: "d"
        label: "Upper tier (platinum, etc.)"
      - id: "e"
        label: "Top tier (diamond, 1K, etc.)"
  - id: q5
    prompt: "How do you primarily earn airline miles? (Select all that apply)"
    type: multi_choice
    construct: primarily_earn_airline_miles_select
    required: true
    options:
      - id: "a"
        label: "Flying with the airline"
      - id: "b"
        label: "A co-branded airline credit card"
      - id: "c"
        label: "Transferring points from a bank rewards program"
      - id: "d"
        label: "Shopping through an airline shopping portal"
      - id: "e"
        label: "Dining rewards programs"
      - id: "f"
        label: "Hotel or car rental partners"
      - id: "g"
        label: "Promotions and bonuses"
  - id: q6
    prompt: "How many flights do you take in a typical year? Please enter a number."
    type: free_text
    construct: many_flights_take_typical_year
    required: true
  - id: q7
    prompt: "What share of your flying is for work versus personal travel?"
    type: single_choice
