        label: "Under $200"
      - id: "b"
        label: "$200 to $499"
      - id: "c"
        label: "$500 to $999"
      - id: "d"
        label: "$1,000 to $2,499"
      - id: "e"
        label: "$2,500 or more"
      - id: "f"
