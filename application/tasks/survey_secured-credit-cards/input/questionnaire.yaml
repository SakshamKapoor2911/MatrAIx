schemaVersion: "1.0"
id: secured_credit_cards_v1
title: "Secured Credit Card Survey"
description: "How people use secured credit cards to build or rebuild credit, including deposits, issuers, card usage, and the path to an unsecured card."
questions:
  - id: q0
    prompt: "Do you currently have, or have you had, a secured credit card?"
    type: single_choice
    construct: currently_have_have_had_secured
    required: true
    options:
      - id: "a"
        label: "Yes, I have one now"
      - id: "b"
        label: "Yes, I had one but no longer"
      - id: "c"
        label: "No, but I am considering one"
      - id: "d"
        label: "No, and I am not considering one"
      - id: "e"
        label: "Not sure what that is"
  - id: q1
    prompt: "What is your main goal with a secured credit card?"
    type: single_choice
    construct: main_goal_secured_credit_card
    required: true
    options:
      - id: "a"
        label: "Build credit for the first time"
      - id: "b"
        label: "Rebuild credit after past problems"
      - id: "c"
        label: "Establish credit after a limited history"
      - id: "d"
        label: "Improve my credit score"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "How long have you had your secured credit card?"
    type: single_choice
    construct: long_have_had_secured_credit
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 to 12 months"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "2 to 4 years"
      - id: "e"
        label: "More than 4 years"
      - id: "f"
        label: "I do not have one"
  - id: q3
    prompt: "Why did you choose a secured card rather than an unsecured one? (Select all that apply)"
    type: multi_choice
    construct: why_did_choose_secured_card
    required: true
    options:
      - id: "a"
        label: "I was denied for unsecured cards"
      - id: "b"
        label: "I have no credit history"
      - id: "c"
        label: "I have a low credit score"
      - id: "d"
        label: "A past bankruptcy or default"
      - id: "e"
        label: "Easier approval"
      - id: "f"
        label: "To control my spending"
      - id: "g"
        label: "It was recommended to me"
      - id: "h"
        label: "Lower risk for me"
  - id: q4
    prompt: "Who issued your secured credit card?"
    type: single_choice
    construct: who_issued_secured_credit_card
    required: true
    options:
      - id: "a"
        label: "Discover it Secured"
      - id: "b"
        label: "Capital One Platinum Secured"
      - id: "c"
        label: "Citi Secured Mastercard"
      - id: "d"
        label: "Bank of America Customized Cash Secured"
      - id: "e"
        label: "OpenSky Secured Visa"
      - id: "f"
        label: "Chime Credit Builder"
      - id: "g"
        label: "Self Visa"
      - id: "h"
        label: "Varo Believe"
      - id: "i"
        label: "A local credit union"
      - id: "j"
        label: "Another issuer"
      - id: "k"
        label: "I do not have one"
  - id: q5
    prompt: "How much was the security deposit you put down?"
    type: single_choice
    construct: much_was_security_deposit_put
    required: true
    options:
      - id: "a"
        label: "Under $200"
      - id: "b"
        label: "$200 to $299"
      - id: "c"
        label: "$300 to $499"
      - id: "d"
        label: "$500 to $999"
      - id: "e"
        label: "$1,000 or more"
      - id: "f"
        label: "Not sure"
  - id: q6
    prompt: "About how much was your secured card security deposit, in U.S. dollars? Enter a whole number (0 if none)."
    type: free_text
    construct: much_was_secured_card_security
    required: true
  - id: q7
    prompt: "What is your credit limit on the card?"
    type: single_choice
    construct: credit_limit_card
    required: true
