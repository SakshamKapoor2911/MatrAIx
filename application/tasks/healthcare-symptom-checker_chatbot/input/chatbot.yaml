transport: sidecar_http
runtimeDefaults:
  applicationId: healthcare_chat
  applicationContext: healthcare_support
  domain: healthcare
connection:
  baseUrl: http://chat-sim:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: ""
    messageField: message
    titleField: ""
    botTypeField: ""
    staticBody: {}
  response:
    sessionIdField: ""
    replyField: reply
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
