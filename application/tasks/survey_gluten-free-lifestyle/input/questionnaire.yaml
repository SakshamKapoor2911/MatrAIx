schemaVersion: "1.0"
id: gluten_free_lifestyle_v1
title: "Gluten-Free Lifestyle Survey"
description: "How people follow a gluten-free diet and lifestyle, their reasons, the products they buy, and how they dine out."
questions:
  - id: q0
    prompt: "Do you follow a gluten-free diet?"
    type: single_choice
    construct: follow_gluten_free_diet
    required: true
    options:
      - id: "a"
        label: "Yes, strictly all the time"
      - id: "b"
        label: "Yes, most of the time"
      - id: "c"
        label: "Yes, occasionally"
      - id: "d"
        label: "No, but I have in the past"
      - id: "e"
        label: "No, and I never have"
  - id: q1
    prompt: "How long have you eaten gluten-free?"
    type: single_choice
    construct: long_have_eaten_gluten_free
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "This does not apply to me"
  - id: q2
    prompt: "What is the main reason you eat gluten-free?"
    type: single_choice
    construct: main_reason_eat_gluten_free
    required: true
    options:
      - id: "a"
        label: "Diagnosed celiac disease"
      - id: "b"
        label: "Diagnosed gluten or wheat sensitivity"
      - id: "c"
        label: "Digestive comfort without a diagnosis"
      - id: "d"
        label: "General health or wellness"
      - id: "e"
        label: "Weight management"
      - id: "f"
        label: "A family member eats gluten-free"
      - id: "g"
        label: "This does not apply to me"
  - id: q3
    prompt: "How was your reason for eating gluten-free determined?"
    type: single_choice
    construct: was_reason_eating_gluten_free
    required: true
    options:
      - id: "a"
        label: "Diagnosed by a doctor with testing"
      - id: "b"
        label: "Suggested by a doctor without formal testing"
      - id: "c"
        label: "Recommended by a dietitian or nutritionist"
      - id: "d"
        label: "My own decision after trying it"
      - id: "e"
        label: "Advice from friends, family, or media"
      - id: "f"
        label: "This does not apply to me"
  - id: q4
    prompt: "Which reasons describe why you eat gluten-free? (Select all that apply)"
    type: multi_choice
    construct: reasons_describe_why_eat_gluten
    required: true
    options:
      - id: "a"
        label: "Medical necessity (celiac disease)"
      - id: "b"
        label: "Non-celiac gluten sensitivity"
      - id: "c"
        label: "Digestive comfort"
      - id: "d"
        label: "Reducing bloating"
      - id: "e"
        label: "More energy"
      - id: "f"
        label: "General health"
      - id: "g"
        label: "Weight management"
      - id: "h"
        label: "Supporting a household member"
      - id: "i"
        label: "None of these"
  - id: q5
    prompt: "How strictly do you avoid gluten?"
    type: single_choice
    construct: strictly_avoid_gluten
    required: true
    options:
      - id: "a"
        label: "I avoid all gluten and cross-contamination"
      - id: "b"
        label: "I avoid gluten but do not worry about traces"
      - id: "c"
        label: "I mostly avoid gluten but make exceptions"
      - id: "d"
        label: "I cut back but still eat some gluten"
      - id: "e"
        label: "This does not apply to me"
  - id: q6
