schemaVersion: "1.0"
id: markdown_editor_usage_v1
title: "Markdown Editor Usage Survey"
description: "How people choose and use Markdown editors and note-taking tools for writing and knowledge management."
questions:
  - id: q0
    prompt: "How often do you write in Markdown?"
    type: single_choice
    construct: often_write_markdown
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I don't write in Markdown"
  - id: q1
    prompt: "How long have you been using Markdown?"
    type: single_choice
    construct: long_have_been_using_markdown
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which application do you use most often to write Markdown?"
    type: single_choice
    construct: application_use_most_often_write
    required: true
    options:
      - id: "a"
        label: "Obsidian"
      - id: "b"
        label: "Typora"
      - id: "c"
        label: "iA Writer"
      - id: "d"
        label: "Notion"
      - id: "e"
        label: "VS Code"
      - id: "f"
        label: "Bear"
      - id: "g"
        label: "A plain text editor"
      - id: "h"
        label: "Other"
  - id: q3
    prompt: "Which Markdown or note-taking tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: markdown_note_taking_tools_have
    required: true
    options:
      - id: "a"
        label: "Obsidian"
      - id: "b"
        label: "Typora"
      - id: "c"
        label: "iA Writer"
      - id: "d"
        label: "Notion"
      - id: "e"
        label: "VS Code"
      - id: "f"
        label: "Bear"
      - id: "g"
        label: "Logseq"
      - id: "h"
        label: "Joplin"
      - id: "i"
        label: "Zettlr or Marktext"
      - id: "j"
        label: "GitHub or GitLab web editor"
      - id: "k"
        label: "None of these"
  - id: q4
    prompt: "Which tools are you interested in trying next? (Select all that apply)"
    type: multi_choice
