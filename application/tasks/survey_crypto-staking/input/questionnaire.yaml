schemaVersion: "1.0"
id: crypto_staking_v1
title: "Crypto Staking Survey"
description: "How cryptocurrency holders stake assets to earn yield, including the platforms, rewards, risks, and lockup periods involved."
questions:
  - id: q0
    prompt: "Which of the following best describes your experience with crypto staking?"
    type: single_choice
    construct: following_best_describes_experience_cryp
    required: true
    options:
      - id: "a"
        label: "I currently stake crypto for rewards"
      - id: "b"
        label: "I have staked in the past but not now"
      - id: "c"
        label: "I hold crypto but do not stake it"
      - id: "d"
        label: "I am considering staking"
      - id: "e"
        label: "I have never staked crypto"
  - id: q1
    prompt: "How long have you been staking crypto?"
    type: single_choice
    construct: long_have_been_staking_crypto
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 to 12 months"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "Not applicable"
  - id: q2
    prompt: "Which assets do you stake? (Select all that apply)"
    type: multi_choice
    construct: assets_stake_select_all_that
    required: true
    options:
      - id: "a"
        label: "Ethereum (ETH)"
      - id: "b"
        label: "Solana (SOL)"
      - id: "c"
        label: "Cardano (ADA)"
      - id: "d"
        label: "Polkadot (DOT)"
      - id: "e"
        label: "Cosmos (ATOM)"
      - id: "f"
        label: "Avalanche (AVAX)"
      - id: "g"
        label: "Polygon (MATIC/POL)"
      - id: "h"
        label: "Stablecoins (e.g., USDC, USDT)"
      - id: "i"
        label: "Another proof-of-stake asset"
      - id: "j"
        label: "None"
  - id: q3
    prompt: "How did you first learn about crypto staking? (Select all that apply)"
    type: multi_choice
    construct: did_first_learn_crypto_staking
    required: true
    options:
      - id: "a"
        label: "An exchange promoted it to me"
      - id: "b"
        label: "Online research or articles"
      - id: "c"
        label: "YouTube or a crypto influencer"
      - id: "d"
        label: "Friends or family"
      - id: "e"
        label: "Reddit, Discord, or crypto forums"
      - id: "f"
        label: "X (Twitter) or other social media"
      - id: "g"
        label: "A podcast"
  - id: q4
    prompt: "How well do you understand how staking works?"
    type: single_choice
    construct: well_understand_staking_works
    required: true
    options:
      - id: "a"
        label: "Not at all well"
      - id: "b"
        label: "Slightly well"
      - id: "c"
        label: "Moderately well"
      - id: "d"
        label: "Very well"
      - id: "e"
        label: "Extremely well"
  - id: q5
    prompt: "Which platforms or methods do you use to stake? (Select all that apply)"
    type: multi_choice
    construct: platforms_methods_use_stake_select
    required: true
    options:
      - id: "a"
        label: "Coinbase"
      - id: "b"
        label: "Kraken"
      - id: "c"
        label: "Binance.US"
      - id: "d"
        label: "Lido (liquid staking)"
      - id: "e"
        label: "Rocket Pool"
      - id: "f"
        label: "Ledger Live or a hardware-wallet interface"
      - id: "g"
        label: "Running my own validator node"
      - id: "h"
        label: "A DeFi staking protocol"
      - id: "i"
        label: "Not applicable"
  - id: q6
    prompt: "Approximately what total value (in USD) do you currently have staked? (Enter a whole number, or 0 if none.)"
    type: free_text
    construct: approximately_total_value_usd_currently
    required: true
  - id: q7
    prompt: "Approximately what annual percentage yield (APY) do you earn on your staked assets?"
    type: single_choice
    construct: approximately_annual_percentage_yield_ap
    required: true
    options:
      - id: "a"
        label: "Under 3%"
      - id: "b"
        label: "3% to 4.9%"
      - id: "c"
        label: "5% to 7.9%"
      - id: "d"
        label: "8% to 12%"
      - id: "e"
        label: "More than 12%"
      - id: "f"
        label: "Don't know"
  - id: q8
    prompt: "Do you use liquid staking (for example, receiving a token like stETH that you can trade)?"
    type: single_choice
    construct: use_liquid_staking_example_receiving
    required: true
    options:
      - id: "a"
        label: "Yes, primarily"
      - id: "b"
        label: "Yes, for some assets"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I don't know what that is"
  - id: q9
    prompt: "How do you custody your staked assets?"
    type: single_choice
    construct: custody_staked_assets
    required: true
    options:
      - id: "a"
        label: "On a centralized exchange (custodial)"
      - id: "b"
        label: "Self-custody with a hardware wallet"
      - id: "c"
        label: "Self-custody with a software wallet"
      - id: "d"
        label: "Through my own validator node"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "What motivates you to stake? (Select all that apply)"
    type: multi_choice
    construct: motivates_stake_select_all_that
    required: true
    options:
      - id: "a"
        label: "Earning passive income"
      - id: "b"
        label: "Offsetting inflation of the token supply"
      - id: "c"
        label: "Supporting a network I believe in"
      - id: "d"
        label: "It feels safer than active trading"
      - id: "e"
        label: "Compounding my holdings over time"
      - id: "f"
        label: "Participating in governance"
      - id: "g"
        label: "Not applicable"
  - id: q11
