schemaVersion: "1.0"
id: plant_based_diet_attitudes_v1
title: "Plant-Based Diet Attitudes Survey"
description: "How people approach plant-based, vegetarian, and vegan eating, and the attitudes and habits behind their food choices."
questions:
  - id: q0
    prompt: "Which best describes the way you eat?"
    type: single_choice
    construct: best_describes_way_eat
    required: true
    options:
      - id: "a"
        label: "Vegan (no animal products)"
      - id: "b"
        label: "Vegetarian (no meat, but some dairy or eggs)"
      - id: "c"
        label: "Pescatarian (fish but no other meat)"
      - id: "d"
        label: "Flexitarian (mostly plant-based, occasional meat)"
      - id: "e"
        label: "Mostly meat-eater who is cutting back"
      - id: "f"
        label: "Meat-eater with no plans to change"
  - id: q1
    prompt: "How long have you eaten this way?"
    type: single_choice
    construct: long_have_eaten_this_way
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "This does not apply to me"
  - id: q2
    prompt: "In a typical week, how many of your meals are entirely plant-based?"
    type: single_choice
    construct: typical_week_many_meals_entirely
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 to 3 meals"
      - id: "c"
        label: "4 to 7 meals"
      - id: "d"
        label: "8 to 14 meals"
      - id: "e"
        label: "15 or more meals"
  - id: q3
    prompt: "How often do you eat red meat (beef, pork, lamb)?"
    type: single_choice
    construct: often_eat_red_meat_beef
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "A few times a week"
      - id: "e"
        label: "Daily"
  - id: q4
    prompt: "How often do you intentionally choose a plant-based meal instead of one with meat?"
    type: single_choice
    construct: often_intentionally_choose_plant_based
    required: true
    options:
