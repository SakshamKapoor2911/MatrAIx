        label: "JavaScript / TypeScript"
      - id: "b"
        label: "Python"
      - id: "c"
        label: "Rust"
      - id: "d"
        label: "Java or Kotlin"
      - id: "e"
        label: "Go"
      - id: "f"
        label: "Other"
  - id: q4
    prompt: "Which JavaScript package managers have you used in the past year? (Select all that apply)"
