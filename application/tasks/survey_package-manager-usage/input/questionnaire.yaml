schemaVersion: "1.0"
id: package_manager_usage_v1
title: "Package Manager Usage Survey"
description: "How developers choose and use package managers across JavaScript, Python, system, and other language ecosystems."
questions:
  - id: q0
    prompt: "How often do you install or manage software packages and dependencies?"
    type: single_choice
    construct: often_install_manage_software_packages
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just learning"
      - id: "e"
        label: "I rarely do"
  - id: q1
    prompt: "How long have you been using package managers?"
    type: single_choice
    construct: long_have_been_using_package
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes your primary role?"
    type: single_choice
    construct: best_describes_primary_role
    required: true
    options:
      - id: "a"
        label: "Front-end developer"
      - id: "b"
        label: "Back-end developer"
      - id: "c"
        label: "Full-stack developer"
      - id: "d"
        label: "DevOps or platform engineer"
      - id: "e"
        label: "Data or ML practitioner"
      - id: "f"
        label: "I write code occasionally"
