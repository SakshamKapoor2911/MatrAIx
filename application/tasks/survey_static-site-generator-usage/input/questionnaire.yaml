        label: "Netlify"
      - id: "b"
        label: "Vercel"
      - id: "c"
        label: "Cloudflare Pages"
      - id: "d"
        label: "GitHub Pages"
      - id: "e"
        label: "A VPS or self-hosted server"
      - id: "f"
        label: "AWS (S3, Amplify)"
      - id: "g"
        label: "GitLab Pages"
      - id: "h"
        label: "Other"
  - id: q9
    prompt: "How is your site content authored? (Select all that apply)"
    type: multi_choice
    construct: site_content_authored_select_all
    required: true
    options:
      - id: "a"
        label: "Markdown files"
      - id: "b"
        label: "MDX"
      - id: "c"
        label: "A headless CMS"
      - id: "d"
        label: "Data files (YAML, JSON, TOML)"
      - id: "e"
        label: "A Git-based CMS"
      - id: "f"
        label: "Hand-written HTML"
  - id: q10
    prompt: "Do you use a headless CMS with your static site?"
    type: single_choice
    construct: use_headless_cms_static_site
    required: true
    options:
      - id: "a"
        label: "Yes, a hosted CMS (Contentful, Sanity, etc.)"
      - id: "b"
        label: "Yes, a Git-based CMS (Decap, TinaCMS, etc.)"
      - id: "c"
        label: "No, I write content directly in files"
      - id: "d"
        label: "I'm not sure"
  - id: q11
    prompt: "How do you deploy your static sites?"
    type: single_choice
    construct: deploy_static_sites
    required: true
    options:
      - id: "a"
        label: "Automatic deploys on Git push"
      - id: "b"
        label: "A CI/CD pipeline I configured"
      - id: "c"
        label: "Manual uploads"
      - id: "d"
        label: "A CLI command"
      - id: "e"
        label: "It varies by project"
  - id: q12
    prompt: "About how long does a typical production build take, in seconds? Please enter a number."
