schemaVersion: "1.0"
id: static_site_generator_usage_v1
title: "Static Site Generator Usage Survey"
description: "How developers choose and use static site generators such as Hugo, Jekyll, Astro, Eleventy, Next.js, and Gatsby."
questions:
  - id: q0
    prompt: "How often do you work with static site generators?"
    type: single_choice
    construct: often_work_static_site_generators
    required: true
    options:
      - id: "a"
        label: "Regularly, as part of my main work"
      - id: "b"
        label: "Occasionally for side projects"
      - id: "c"
        label: "Rarely"
      - id: "d"
        label: "I am just starting to learn them"
      - id: "e"
        label: "I don't use static site generators"
  - id: q1
    prompt: "How long have you been using static site generators?"
    type: single_choice
    construct: long_have_been_using_static
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which static site generator do you use most often?"
    type: single_choice
    construct: static_site_generator_use_most
    required: true
    options:
      - id: "a"
        label: "Hugo"
      - id: "b"
        label: "Jekyll"
      - id: "c"
        label: "Astro"
      - id: "d"
        label: "Eleventy (11ty)"
      - id: "e"
        label: "Next.js"
      - id: "f"
        label: "Gatsby"
      - id: "g"
        label: "Nuxt"
      - id: "h"
        label: "Docusaurus"
      - id: "i"
        label: "Other"
  - id: q3
    prompt: "Which static site generators have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: static_site_generators_have_used
    required: true
    options:
      - id: "a"
        label: "Hugo"
      - id: "b"
        label: "Jekyll"
      - id: "c"
        label: "Astro"
      - id: "d"
        label: "Eleventy (11ty)"
      - id: "e"
        label: "Next.js"
      - id: "f"
        label: "Gatsby"
      - id: "g"
        label: "Nuxt"
      - id: "h"
        label: "Docusaurus"
      - id: "i"
        label: "SvelteKit"
      - id: "j"
        label: "Zola or Pelican"
      - id: "k"
        label: "None of these"
  - id: q4
    prompt: "Which static site generators are you interested in trying next? (Select all that apply)"
    type: multi_choice
    construct: static_site_generators_interested_trying
    required: true
    options:
      - id: "a"
        label: "Astro"
      - id: "b"
        label: "Hugo"
      - id: "c"
        label: "Eleventy (11ty)"
      - id: "d"
        label: "Next.js"
      - id: "e"
        label: "SvelteKit"
      - id: "f"
        label: "Docusaurus"
      - id: "g"
        label: "I'm happy with what I use"
  - id: q5
    prompt: "What kinds of sites do you build with static site generators? (Select all that apply)"
    type: multi_choice
    construct: kinds_sites_build_static_site
    required: true
    options:
      - id: "a"
        label: "Personal blog"
      - id: "b"
        label: "Documentation site"
      - id: "c"
        label: "Marketing or company website"
      - id: "d"
        label: "Portfolio"
      - id: "e"
        label: "Landing pages"
      - id: "f"
        label: "E-commerce or storefront"
      - id: "g"
        label: "A large content site"
      - id: "h"
        label: "Internal tools or dashboards"
  - id: q6
    prompt: "Why did you choose your primary static site generator?"
    type: single_choice
    construct: why_did_choose_primary_static
    required: true
    options:
      - id: "a"
        label: "Build speed and performance"
      - id: "b"
        label: "The templating or component model"
      - id: "c"
        label: "The programming language it uses"
      - id: "d"
        label: "Ecosystem and plugins"
      - id: "e"
        label: "Familiarity or prior experience"
      - id: "f"
        label: "A team or client requirement"
  - id: q7
    prompt: "About how many static sites have you built or maintained? Please enter a number."
    type: free_text
    construct: many_static_sites_have_built
    required: true
  - id: q8
    prompt: "Where do you host the static sites you build? (Select all that apply)"
    type: multi_choice
