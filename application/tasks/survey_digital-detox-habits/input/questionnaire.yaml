schemaVersion: "1.0"
id: digital_detox_habits_v1
title: "Digital Detox Habits Survey"
description: "How people manage screen time and practice digital-detox habits, including methods and motivations."
questions:
  - id: q0
    prompt: "Do you actively try to limit your screen time?"
    type: single_choice
    construct: actively_try_limit_screen_time
    required: true
    options:
      - id: "a"
        label: "Yes, consistently"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "I have tried but not lately"
      - id: "d"
        label: "No, but I would like to"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How concerned are you about the amount of time you spend on screens?"
    type: single_choice
    construct: concerned_amount_time_spend_screens
    required: true
    options:
      - id: "a"
        label: "Not at all concerned"
      - id: "b"
        label: "Slightly concerned"
      - id: "c"
        label: "Moderately concerned"
      - id: "d"
        label: "Very concerned"
      - id: "e"
        label: "Extremely concerned"
  - id: q2
    prompt: "On a typical day, about how much leisure screen time do you have?"
    type: single_choice
    construct: typical_day_much_leisure_screen
    required: true
    options:
      - id: "a"
        label: "Less than 1 hour"
      - id: "b"
        label: "1 to 2 hours"
      - id: "c"
        label: "3 to 4 hours"
      - id: "d"
        label: "5 to 6 hours"
      - id: "e"
        label: "More than 6 hours"
  - id: q3
    prompt: "On a typical day, about how many hours of leisure screen time do you have? Please enter a number."
    type: free_text
    construct: typical_day_many_hours_leisure
    required: true
  - id: q4
    prompt: "Which devices contribute most to your screen time? (Select all that apply)"
    type: multi_choice
    construct: devices_contribute_most_screen_time
    required: true
    options:
      - id: "a"
        label: "Smartphone"
      - id: "b"
        label: "Laptop or desktop computer"
      - id: "c"
        label: "Tablet"
      - id: "d"
        label: "Television or streaming device"
      - id: "e"
        label: "Gaming console"
      - id: "f"
        label: "Smartwatch or wearable"
  - id: q5
    prompt: "Which apps or platforms would you most like to cut back on? (Select all that apply)"
