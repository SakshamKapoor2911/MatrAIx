schemaVersion: "1.0"
id: credit_freeze_usage_v1
title: "Credit Freeze Usage Survey"
description: "How consumers freeze or lock their credit at the major bureaus, why they do it, and how the process works for them."
questions:
  - id: q0
    prompt: "Which of the following best describes your experience with credit freezes or locks?"
    type: single_choice
    construct: following_best_describes_experience_cred
    required: true
    options:
      - id: "a"
        label: "I currently have a freeze or lock active on my credit"
      - id: "b"
        label: "I have used a freeze or lock in the past but not now"
      - id: "c"
        label: "I am considering placing a freeze or lock"
      - id: "d"
        label: "I know what they are but have never used one"
      - id: "e"
        label: "I have never heard of credit freezes or locks"
  - id: q1
    prompt: "How familiar are you with the difference between a credit \"freeze\" and a credit \"lock\"?"
    type: single_choice
    construct: familiar_difference_between_credit_freez
    required: true
    options:
      - id: "a"
        label: "Not at all familiar"
      - id: "b"
        label: "Slightly familiar"
      - id: "c"
        label: "Moderately familiar"
      - id: "d"
        label: "Very familiar"
      - id: "e"
        label: "Extremely familiar"
  - id: q2
    prompt: "Do you currently have a freeze or lock in place at one or more credit bureaus?"
    type: single_choice
    construct: currently_have_freeze_lock_place
    required: true
    options:
      - id: "a"
        label: "Yes, a freeze"
      - id: "b"
        label: "Yes, a lock"
      - id: "c"
        label: "Yes, both freezes and locks"
      - id: "d"
        label: "No"
  - id: q3
    prompt: "At which credit bureaus do you currently have a freeze or lock? (Select all that apply)"
    type: multi_choice
    construct: credit_bureaus_currently_have_freeze
    required: true
    options:
      - id: "a"
        label: "Equifax"
      - id: "b"
        label: "Experian"
      - id: "c"
        label: "TransUnion"
      - id: "d"
        label: "Innovis"
      - id: "e"
        label: "None currently"
  - id: q4
    prompt: "When did you first place a credit freeze or lock?"
    type: single_choice
    construct: when_did_first_place_credit
    required: true
    options:
      - id: "a"
        label: "Within the past 6 months"
      - id: "b"
        label: "6 to 12 months ago"
      - id: "c"
        label: "1 to 2 years ago"
      - id: "d"
        label: "3 to 5 years ago"
      - id: "e"
        label: "More than 5 years ago"
      - id: "f"
        label: "I have never placed one"
  - id: q5
    prompt: "What prompted you to freeze or lock your credit? (Select all that apply)"
    type: multi_choice
    construct: prompted_freeze_lock_credit_select
    required: true
    options:
      - id: "a"
        label: "A data breach notification"
      - id: "b"
        label: "I was a victim of identity theft or fraud"
      - id: "c"
        label: "General precaution"
      - id: "d"
        label: "A news story about breaches or scams"
      - id: "e"
        label: "Advice from a financial expert or article"
      - id: "f"
        label: "A friend or family member recommended it"
      - id: "g"
        label: "A lost or stolen wallet or documents"
      - id: "h"
        label: "I finished making major purchases and didn't need new credit"
  - id: q6
    prompt: "How did you place your freeze or lock? (Select all that apply)"
    type: multi_choice
    construct: did_place_freeze_lock_select
    required: true
    options:
      - id: "a"
        label: "Directly on a bureau's website"
      - id: "b"
        label: "By phone"
      - id: "c"
        label: "By mail"
      - id: "d"
        label: "Through a bureau's mobile app (e.g., the Experian app)"
      - id: "e"
        label: "Through a credit monitoring or identity protection service"
  - id: q7
    prompt: "Which products or services have you used to freeze, lock, or monitor your credit? (Select all that apply)"
    type: multi_choice
    construct: products_services_have_used_freeze
    required: true
    options:
