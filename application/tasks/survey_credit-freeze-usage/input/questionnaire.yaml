        label: "Free credit freeze at the bureaus"
      - id: "b"
        label: "Experian CreditLock"
      - id: "c"
        label: "Equifax Lock & Alert"
      - id: "d"
        label: "TransUnion credit lock"
      - id: "e"
        label: "Credit Karma or a similar free monitoring app"
      - id: "f"
        label: "LifeLock / Norton"
      - id: "g"
        label: "Aura or IdentityForce"
      - id: "h"
        label: "Monitoring from my bank or card issuer"
  - id: q8
    prompt: "Do you currently pay for any credit monitoring or identity protection service?"
