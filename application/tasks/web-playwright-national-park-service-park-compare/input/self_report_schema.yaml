artifactName: user_feedback.json
instructions: |
  Reflect honestly as the persona after completing the web task.
  Base your answers on your decision, the options evaluated,
  and how confident you feel that the outcome fits your context.
fields:
  - key: needConstraintSatisfaction
    prompt: How well did the outcome satisfy your practical needs or constraints?
    kind: enum
    choices: ["yes", "partially", "no"]
  - key: personalPreferenceSatisfaction
    prompt: How well did the choice match your own personal preferences?
    kind: enum
    choices: ["yes", "partially", "no"]
  - key: overallExperienceRating
    prompt: Overall, how would you rate the experience from 1 to 10?
    kind: integer
    minimum: 1
    maximum: 10
  - key: reason
    prompt: Briefly explain the rating in your own voice.
  - key: trustLevel
    prompt: "Optional: how confident are you in the final recommendation/choice from 1 to 10?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: effortRating
    prompt: "Optional: how effortful did browsing feel from 1 to 10?"
    kind: integer
    minimum: 1
    maximum: 10
    required: false
  - key: clarityOfNextStep
    prompt: "Optional: was your final choice clear to you?"
    kind: boolean
    required: false
