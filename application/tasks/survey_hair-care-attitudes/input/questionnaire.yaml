    prompt: "How often do you wash your hair?"
    type: single_choice
    construct: often_wash_hair
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "Every other day"
      - id: "c"
        label: "Twice a week"
      - id: "d"
        label: "Once a week"
      - id: "e"
        label: "Less than once a week"
  - id: q1
    prompt: "How would you describe your hair type?"
    type: single_choice
    construct: would_describe_hair_type
    required: true
    options:
      - id: "a"
        label: "Straight"
      - id: "b"
        label: "Wavy"
      - id: "c"
        label: "Curly"
      - id: "d"
        label: "Coily"
      - id: "e"
        label: "I am not sure"
  - id: q2
    prompt: "How would you describe your main hair concern?"
    type: single_choice
