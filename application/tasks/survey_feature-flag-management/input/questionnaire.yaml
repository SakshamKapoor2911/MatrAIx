      - id: "e"
        label: "Geography"
      - id: "f"
        label: "Plan or subscription tier"
      - id: "g"
        label: "We use only on/off flags"
  - id: q11
    prompt: "How integrated are feature flags with your CI/CD pipeline?"
    type: single_choice
    construct: integrated_feature_flags_ci_cd
    required: true
    options:
