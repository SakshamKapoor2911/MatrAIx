        label: "JavaScript or TypeScript"
      - id: "b"
        label: "Python"
      - id: "c"
        label: "Java or Kotlin"
      - id: "d"
        label: "C# or .NET"
      - id: "e"
        label: "Go"
      - id: "f"
        label: "Ruby"
      - id: "g"
        label: "Mobile (iOS or Android)"
      - id: "h"
        label: "Other"
  - id: q7
