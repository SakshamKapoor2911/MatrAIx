schemaVersion: "1.0"
id: feature_flag_management_v1
title: "Feature Flag Management Survey"
description: "How software teams adopt, manage, and feel about feature flags and toggles."
questions:
  - id: q0
    prompt: "How often does your team use feature flags or toggles?"
    type: single_choice
    construct: often_does_team_use_feature
    required: true
    options:
      - id: "a"
        label: "Constantly, they are core to how we ship"
      - id: "b"
        label: "Regularly"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q1
    prompt: "How long have you worked with feature flags?"
    type: single_choice
    construct: long_have_worked_feature_flags
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I never have"
  - id: q2
    prompt: "What best describes your relationship to feature flags?"
    type: single_choice
    construct: best_describes_relationship_feature_flag
    required: true
    options:
      - id: "a"
        label: "I own or administer our flagging platform"
      - id: "b"
        label: "I create and manage flags for my features"
      - id: "c"
        label: "I use flags others have set up"
      - id: "d"
        label: "I mostly toggle flags as a PM or operator"
      - id: "e"
        label: "I rarely deal with flags"
  - id: q3
    prompt: "Which feature-flag tool does your team use most often?"
    type: single_choice
    construct: feature_flag_tool_does_team
    required: true
    options:
      - id: "a"
        label: "LaunchDarkly"
      - id: "b"
        label: "Split"
      - id: "c"
        label: "Unleash"
      - id: "d"
        label: "Flagsmith"
      - id: "e"
        label: "ConfigCat"
      - id: "f"
        label: "PostHog feature flags"
      - id: "g"
        label: "GrowthBook"
      - id: "h"
        label: "A homegrown or in-house system"
      - id: "i"
        label: "Config files or environment variables"
      - id: "j"
        label: "Other"
  - id: q4
    prompt: "Which feature-flag tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: feature_flag_tools_have_used
    required: true
    options:
      - id: "a"
        label: "LaunchDarkly"
      - id: "b"
        label: "Split"
      - id: "c"
        label: "Unleash"
      - id: "d"
        label: "Flagsmith"
      - id: "e"
        label: "ConfigCat"
      - id: "f"
        label: "PostHog feature flags"
      - id: "g"
        label: "GrowthBook"
      - id: "h"
        label: "Optimizely"
      - id: "i"
        label: "A homegrown system"
      - id: "j"
        label: "Config or environment based flags"
      - id: "k"
        label: "None"
  - id: q5
    prompt: "What do you use feature flags for? (Select all that apply)"
    type: multi_choice
    construct: use_feature_flags_select_all
    required: true
    options:
      - id: "a"
        label: "Gradual or percentage rollouts"
      - id: "b"
        label: "Kill switches"
      - id: "c"
        label: "A/B testing or experimentation"
      - id: "d"
        label: "Canary releases"
      - id: "e"
        label: "Trunk-based development"
      - id: "f"
        label: "Entitlements or plan-based access"
      - id: "g"
        label: "Operational toggles"
      - id: "h"
        label: "Targeting specific users or segments"
  - id: q6
    prompt: "In which languages or platforms do you use feature-flag SDKs? (Select all that apply)"
