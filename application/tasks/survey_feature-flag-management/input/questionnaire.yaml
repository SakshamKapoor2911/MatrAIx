    construct: who_can_toggle_flags_production
    required: true
    options:
      - id: "a"
        label: "Only engineers"
      - id: "b"
        label: "Engineers and product managers"
      - id: "c"
        label: "A broad set of roles, with permissions"
      - id: "d"
        label: "Anyone with access"
      - id: "e"
        label: "I'm not sure"
  - id: q9
    prompt: "How does your team handle removing stale or obsolete flags?"
    type: single_choice
    construct: does_team_handle_removing_stale
    required: true
    options:
      - id: "a"
        label: "We have a formal cleanup process"
      - id: "b"
        label: "We clean them up occasionally"
      - id: "c"
        label: "We rarely clean them up"
      - id: "d"
        label: "We never clean them up"
      - id: "e"
        label: "I'm not sure"
  - id: q10
