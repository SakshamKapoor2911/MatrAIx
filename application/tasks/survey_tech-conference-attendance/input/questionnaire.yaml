schemaVersion: "1.0"
id: tech_conference_attendance_v1
title: "Tech Conference Attendance Survey"
description: "How technology professionals attend conferences, meetups, and industry events, including format preferences, motivations, and spending."
questions:
  - id: q0
    prompt: "In the past two years, how many technology conferences or meetups have you attended?"
    type: single_choice
    construct: past_two_years_many_technology
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 event"
      - id: "c"
        label: "2 to 3 events"
      - id: "d"
        label: "4 to 6 events"
      - id: "e"
        label: "7 or more events"
  - id: q1
    prompt: "How long have you been attending technology events?"
    type: single_choice
    construct: long_have_been_attending_technology
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What is your main reason for attending technology events?"
    type: single_choice
    construct: main_reason_attending_technology_events
    required: true
    options:
      - id: "a"
        label: "Learning new skills and technologies"
      - id: "b"
        label: "Networking with peers"
      - id: "c"
        label: "Career advancement or job opportunities"
      - id: "d"
        label: "Representing my employer or product"
      - id: "e"
        label: "Staying current with industry trends"
      - id: "f"
        label: "Recruiting or business development"
  - id: q3
    prompt: "Which event format do you most often attend?"
    type: single_choice
    construct: event_format_most_often_attend
    required: true
    options:
      - id: "a"
        label: "In-person only"
      - id: "b"
        label: "Virtual or online only"
      - id: "c"
        label: "Hybrid events"
      - id: "d"
        label: "A mix of in-person and virtual"
  - id: q4
    prompt: "Which types of technology events have you attended in the past two years? (Select all that apply)"
    type: multi_choice
    construct: types_technology_events_have_attended
    required: true
    options:
      - id: "a"
        label: "Large industry conferences"
      - id: "b"
        label: "Vendor or product conferences"
      - id: "c"
        label: "Local meetups or user groups"
      - id: "d"
        label: "Hackathons"
      - id: "e"
        label: "Workshops or training sessions"
      - id: "f"
        label: "Unconferences or barcamps"
      - id: "g"
        label: "Online webinars"
      - id: "h"
        label: "I have not attended any"
  - id: q5
    prompt: "Which of these conferences have you attended or closely followed? (Select all that apply)"
    type: multi_choice
    construct: these_conferences_have_attended_closely
    required: true
    options:
      - id: "a"
        label: "AWS re:Invent"
      - id: "b"
        label: "Google I/O"
      - id: "c"
        label: "Microsoft Build"
      - id: "d"
        label: "KubeCon + CloudNativeCon"
      - id: "e"
        label: "PyCon"
      - id: "f"
        label: "GitHub Universe"
      - id: "g"
        label: "Apple WWDC"
      - id: "h"
        label: "RSA Conference"
      - id: "i"
        label: "DevOpsDays"
      - id: "j"
