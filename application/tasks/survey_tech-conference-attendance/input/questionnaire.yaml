        label: "Keynote sessions"
      - id: "b"
        label: "Technical talks"
      - id: "c"
        label: "Hands-on workshops"
      - id: "d"
        label: "Networking and the hallway track"
      - id: "e"
        label: "Expo or sponsor hall"
      - id: "f"
        label: "Hackathons or coding challenges"
      - id: "g"
        label: "Birds-of-a-feather or discussion groups"
      - id: "h"
