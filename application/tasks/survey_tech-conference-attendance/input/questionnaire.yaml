  - id: q6
    prompt: "How do you usually find out about technology events? (Select all that apply)"
    type: multi_choice
    construct: usually_find_out_technology_events
    required: true
    options:
      - id: "a"
        label: "Social media"
      - id: "b"
        label: "Email newsletters"
      - id: "c"
        label: "Colleagues or friends"
      - id: "d"
        label: "My employer"
      - id: "e"
        label: "Online communities or forums"
      - id: "f"
        label: "Event organizer websites"
      - id: "g"
        label: "Sponsoring vendors"
  - id: q7
