schemaVersion: "1.0"
id: pilates_attendance_v1
title: "Pilates Practice Survey"
description: "How people practice Pilates and attend classes, including mat versus reformer, studios, and attitudes."
questions:
  - id: q0
    prompt: "Do you practice Pilates?"
    type: single_choice
    construct: practice_pilates
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I used to"
      - id: "d"
        label: "No, I never have"
  - id: q1
    prompt: "How long have you been practicing Pilates?"
    type: single_choice
    construct: long_have_been_practicing_pilates
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't practice Pilates"
  - id: q2
    prompt: "How often do you practice Pilates?"
    type: single_choice
    construct: often_practice_pilates
    required: true
    options:
      - id: "a"
        label: "Daily"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "About once a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q3
    prompt: "About how many minutes does a typical Pilates session last for you? Please enter a number."
    type: free_text
    construct: many_minutes_does_typical_pilates
    required: true
  - id: q4
    prompt: "Which type of Pilates do you do most often?"
    type: single_choice
    construct: type_pilates_most_often
    required: true
    options:
      - id: "a"
        label: "Reformer Pilates"
      - id: "b"
        label: "Mat Pilates"
      - id: "c"
        label: "A mix of reformer and mat"
      - id: "d"
        label: "Tower or Cadillac"
      - id: "e"
        label: "Chair or other apparatus"
      - id: "f"
        label: "Contemporary or fusion Pilates"
  - id: q5
    prompt: "Where do you usually practice Pilates?"
    type: single_choice
    construct: where_usually_practice_pilates
    required: true
