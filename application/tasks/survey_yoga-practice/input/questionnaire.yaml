schemaVersion: "1.0"
id: yoga_practice_v1
title: "Yoga Practice Survey"
description: "How people practice yoga, including their styles, studio-versus-home settings, apps, and attitudes."
questions:
  - id: q0
    prompt: "Do you practice yoga?"
    type: single_choice
    construct: practice_yoga
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I used to"
      - id: "d"
        label: "No, I never have"
  - id: q1
    prompt: "How long have you been practicing yoga?"
    type: single_choice
    construct: long_have_been_practicing_yoga
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't practice yoga"
  - id: q2
    prompt: "How often do you practice yoga?"
    type: single_choice
    construct: often_practice_yoga
    required: true
    options:
