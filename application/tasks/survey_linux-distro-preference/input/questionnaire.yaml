schemaVersion: "1.0"
id: linux_distro_preference_v1
title: "Linux Distribution Preference Survey"
description: "Which Linux distributions people choose and how they feel about them, across Ubuntu, Debian, Arch, Fedora, Mint, and others."
questions:
  - id: q0
    prompt: "How often do you use Linux?"
    type: single_choice
    construct: often_use_linux
    required: true
    options:
      - id: "a"
        label: "It's my daily driver"
      - id: "b"
        label: "Most days"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "I'm just getting started with Linux"
  - id: q1
    prompt: "How long have you been using Linux?"
    type: single_choice
    construct: long_have_been_using_linux
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which best describes how you use Linux?"
    type: single_choice
    construct: best_describes_use_linux
    required: true
    options:
      - id: "a"
        label: "On my main desktop or laptop"
      - id: "b"
        label: "On servers I administer"
      - id: "c"
        label: "In a homelab or hobby setup"
      - id: "d"
        label: "For software development"
      - id: "e"
        label: "In a virtual machine or dual-boot only"
  - id: q3
    prompt: "Which Linux distribution do you use most often?"
    type: single_choice
    construct: linux_distribution_use_most_often
    required: true
    options:
      - id: "a"
        label: "Ubuntu"
      - id: "b"
        label: "Debian"
      - id: "c"
        label: "Arch Linux"
      - id: "d"
        label: "Fedora"
      - id: "e"
        label: "Linux Mint"
      - id: "f"
        label: "openSUSE"
      - id: "g"
        label: "Pop!_OS"
      - id: "h"
        label: "Other"
  - id: q4
    prompt: "Which Linux distributions have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: linux_distributions_have_used_past
    required: true
    options:
      - id: "a"
        label: "Ubuntu"
      - id: "b"
        label: "Debian"
      - id: "c"
        label: "Arch Linux"
      - id: "d"
        label: "Fedora"
      - id: "e"
        label: "Linux Mint"
      - id: "f"
        label: "openSUSE"
      - id: "g"
        label: "Pop!_OS"
      - id: "h"
        label: "Manjaro"
      - id: "i"
        label: "EndeavourOS"
      - id: "j"
        label: "Kali or a security distro"
      - id: "k"
        label: "None"
  - id: q5
