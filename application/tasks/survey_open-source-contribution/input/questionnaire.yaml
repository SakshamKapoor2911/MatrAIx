        label: "GitHub Sponsors"
      - id: "b"
        label: "Open Collective"
      - id: "c"
        label: "Employer-paid open source work"
      - id: "d"
        label: "Grants or foundations"
      - id: "e"
        label: "Bounties"
      - id: "f"
        label: "No, I've never been paid for it"
  - id: q12
    prompt: "About how many open source projects have you contributed to in total? Please enter a number."
    type: free_text
    construct: many_open_source_projects_have
    required: true
  - id: q13
    prompt: "About how many pull requests or merge requests have you opened in the past year? Please enter a number."
