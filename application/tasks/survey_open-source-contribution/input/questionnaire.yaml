schemaVersion: "1.0"
id: open_source_contribution_v1
title: "Open Source Contribution Survey"
description: "How people contribute to open source software, including the frequency, motivations, and types of contributions they make."
questions:
  - id: q0
    prompt: "How often do you contribute to open source projects?"
    type: single_choice
    construct: often_contribute_open_source_projects
    required: true
    options:
      - id: "a"
        label: "Every week"
      - id: "b"
        label: "A few times a month"
      - id: "c"
        label: "A few times a year"
      - id: "d"
        label: "Once in a while"
      - id: "e"
        label: "I don't contribute to open source"
  - id: q1
    prompt: "How long have you been contributing to open source?"
    type: single_choice
    construct: long_have_been_contributing_open
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which best describes your involvement in open source?"
    type: single_choice
    construct: best_describes_involvement_open_source
    required: true
    options:
      - id: "a"
        label: "Occasional contributor"
      - id: "b"
        label: "Regular contributor"
      - id: "c"
        label: "Maintainer of one or more projects"
      - id: "d"
        label: "Core member of a large project"
      - id: "e"
        label: "I mostly consume, rarely contribute"
  - id: q3
    prompt: "What kind of contribution do you make most often?"
    type: single_choice
    construct: kind_contribution_make_most_often
    required: true
    options:
      - id: "a"
        label: "Code (features and bug fixes)"
      - id: "b"
        label: "Documentation"
      - id: "c"
        label: "Bug reports and issues"
      - id: "d"
        label: "Code review"
      - id: "e"
        label: "Community support and answering questions"
      - id: "f"
        label: "Design, translation, or other non-code work"
      - id: "g"
        label: "Financial sponsorship"
  - id: q4
    prompt: "What types of contributions have you made in the past year? (Select all that apply)"
    type: multi_choice
    construct: types_contributions_have_made_past
    required: true
    options:
      - id: "a"
        label: "Code (features)"
      - id: "b"
        label: "Bug fixes"
      - id: "c"
        label: "Documentation"
      - id: "d"
        label: "Bug reports or issues"
      - id: "e"
        label: "Code review"
      - id: "f"
        label: "Testing"
      - id: "g"
        label: "Translation or localization"
      - id: "h"
        label: "Design or UX"
      - id: "i"
        label: "Community support"
      - id: "j"
        label: "Financial sponsorship"
      - id: "k"
        label: "None"
  - id: q5
    prompt: "Where do you contribute to open source? (Select all that apply)"
    type: multi_choice
    construct: where_contribute_open_source_select
    required: true
    options:
      - id: "a"
        label: "GitHub"
      - id: "b"
        label: "GitLab"
      - id: "c"
        label: "Codeberg"
      - id: "d"
        label: "SourceForge"
      - id: "e"
        label: "Project mailing lists"
      - id: "f"
        label: "Self-hosted forges (Gitea, Forgejo)"
      - id: "g"
        label: "Other platforms"
  - id: q6
    prompt: "What motivates you to contribute to open source? (Select all that apply)"
    type: multi_choice
    construct: motivates_contribute_open_source_select
    required: true
    options:
      - id: "a"
        label: "Improving tools I use"
      - id: "b"
        label: "Learning and skill-building"
      - id: "c"
        label: "Giving back to the community"
      - id: "d"
        label: "Career and reputation"
      - id: "e"
        label: "Enjoyment and fun"
      - id: "f"
        label: "Belief in open source values"
      - id: "g"
        label: "It's part of my paid job"
      - id: "h"
        label: "Networking with other developers"
  - id: q7
    prompt: "What types of projects do you contribute to? (Select all that apply)"
    type: multi_choice
    construct: types_projects_contribute_select_all
    required: true
    options:
      - id: "a"
        label: "Libraries and frameworks"
      - id: "b"
        label: "Developer tools"
      - id: "c"
        label: "Applications and end-user software"
      - id: "d"
        label: "Documentation projects"
      - id: "e"
        label: "Operating systems or infrastructure"
      - id: "f"
        label: "Data or machine-learning projects"
      - id: "g"
        label: "My own projects"
      - id: "h"
        label: "Small utilities and scripts"
  - id: q8
    prompt: "Which open source licenses do you prefer for your own contributions? (Select all that apply)"
    type: multi_choice
    construct: open_source_licenses_prefer_own
    required: true
    options:
      - id: "a"
        label: "MIT"
      - id: "b"
        label: "Apache 2.0"
      - id: "c"
        label: "GPL (v2 or v3)"
      - id: "d"
        label: "BSD"
      - id: "e"
        label: "MPL"
      - id: "f"
        label: "Creative Commons (for non-code)"
      - id: "g"
        label: "I don't have a preference"
  - id: q9
    prompt: "What has made contributing difficult for you? (Select all that apply)"
    type: multi_choice
    construct: has_made_contributing_difficult_select
    required: true
    options:
      - id: "a"
        label: "Lack of time"
      - id: "b"
        label: "Unclear contribution guidelines"
      - id: "c"
        label: "Unwelcoming or slow maintainers"
      - id: "d"
        label: "Intimidating or complex codebases"
      - id: "e"
        label: "Fear of my work being rejected"
      - id: "f"
        label: "Difficulty finding good first issues"
      - id: "g"
        label: "Complicated development setup"
      - id: "h"
        label: "None of these"
  - id: q10
    prompt: "How do you typically find projects or issues to work on? (Select all that apply)"
    type: multi_choice
    construct: typically_find_projects_issues_work
    required: true
    options:
      - id: "a"
        label: "Tools I already use and depend on"
      - id: "b"
        label: "\"Good first issue\" labels"
      - id: "c"
        label: "Recommendations from others"
      - id: "d"
        label: "GitHub trending or exploration"
      - id: "e"
        label: "Hackathons or events"
      - id: "f"
        label: "My employer's open source work"
      - id: "g"
        label: "Issues I run into myself"
  - id: q11
    prompt: "Have you ever received payment or sponsorship for open source work? (Select all that apply)"
    type: multi_choice
    construct: have_ever_received_payment_sponsorship
    required: true
    options:
