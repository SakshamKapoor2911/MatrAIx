        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "I have an account but rarely use it"
      - id: "f"
        label: "I don't use coding-challenge platforms"
