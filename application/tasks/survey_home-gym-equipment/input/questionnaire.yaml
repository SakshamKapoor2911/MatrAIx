        label: "Yes, a dedicated home gym setup"
      - id: "b"
        label: "Yes, a few pieces of equipment"
      - id: "c"
        label: "Just one piece of equipment"
      - id: "d"
        label: "No, but I plan to buy some"
      - id: "e"
        label: "No, and I have no plans to"
  - id: q1
    prompt: "How long have you been working out at home?"
    type: single_choice
    construct: long_have_been_working_out
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
