schemaVersion: "1.0"
id: graphql_adoption_v1
title: "GraphQL Adoption Survey"
description: "How developers adopt, use, and evaluate GraphQL relative to REST and other API styles."
questions:
  - id: q0
    prompt: "What best describes your current use of GraphQL?"
    type: single_choice
    construct: best_describes_current_use_graphql
    required: true
    options:
      - id: "a"
        label: "I use GraphQL regularly in production"
      - id: "b"
        label: "I use GraphQL occasionally or in side projects"
      - id: "c"
        label: "I have tried GraphQL but don't use it now"
      - id: "d"
        label: "I am currently learning GraphQL"
      - id: "e"
        label: "I have never used GraphQL"
  - id: q1
    prompt: "How long have you been working with GraphQL?"
    type: single_choice
    construct: long_have_been_working_graphql
    required: true
    options:
      - id: "a"
        label: "I have not used GraphQL"
      - id: "b"
        label: "Less than 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
  - id: q2
    prompt: "How often do you work with GraphQL?"
    type: single_choice
    construct: often_work_graphql
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q3
    prompt: "What is your primary relationship to GraphQL?"
    type: single_choice
    construct: primary_relationship_graphql
    required: true
    options:
      - id: "a"
        label: "I build GraphQL servers and schemas"
      - id: "b"
        label: "I consume GraphQL APIs from the client side"
      - id: "c"
        label: "I work on both client and server"
      - id: "d"
        label: "I evaluate or advocate for API technology choices"
      - id: "e"
        label: "I don't work with GraphQL directly"
  - id: q4
    prompt: "Which API style do you use most often overall?"
    type: single_choice
    construct: api_style_use_most_often
    required: true
    options:
      - id: "a"
        label: "REST / HTTP"
      - id: "b"
        label: "GraphQL"
      - id: "c"
        label: "gRPC"
      - id: "d"
        label: "A roughly even mix of REST and GraphQL"
      - id: "e"
        label: "Other"
  - id: q5
    prompt: "Which GraphQL client libraries have you used? (Select all that apply)"
    type: multi_choice
    construct: graphql_client_libraries_have_used
    required: true
    options:
      - id: "a"
        label: "Apollo Client"
      - id: "b"
        label: "Relay"
      - id: "c"
        label: "urql"
      - id: "d"
        label: "graphql-request"
      - id: "e"
        label: "TanStack Query with GraphQL"
      - id: "f"
        label: "gqlgen or a language-native client"
      - id: "g"
        label: "None"
  - id: q6
    prompt: "Which GraphQL server implementations have you used? (Select all that apply)"
    type: multi_choice
    construct: graphql_server_implementations_have_used
    required: true
    options:
      - id: "a"
        label: "Apollo Server"
      - id: "b"
        label: "GraphQL Yoga"
      - id: "c"
        label: "Hasura"
      - id: "d"
        label: "PostGraphile"
      - id: "e"
        label: "Nexus"
      - id: "f"
        label: "gqlgen (Go)"
      - id: "g"
        label: "Graphene (Python)"
      - id: "h"
        label: "None"
  - id: q7
    prompt: "Which languages do you use with GraphQL? (Select all that apply)"
    type: multi_choice
    construct: languages_use_graphql_select_all
    required: true
    options:
      - id: "a"
        label: "JavaScript / TypeScript"
      - id: "b"
        label: "Python"
      - id: "c"
        label: "Go"
      - id: "d"
        label: "Java or Kotlin"
      - id: "e"
        label: "Ruby"
      - id: "f"
        label: "C# / .NET"
      - id: "g"
        label: "PHP"
      - id: "h"
        label: "None"
  - id: q8
    prompt: "Which GraphQL IDEs or exploration tools do you use? (Select all that apply)"
    type: multi_choice
    construct: graphql_ides_exploration_tools_use
    required: true
