        label: "Apollo Studio / Sandbox"
      - id: "b"
        label: "GraphiQL"
      - id: "c"
        label: "GraphQL Playground"
      - id: "d"
        label: "Postman"
      - id: "e"
        label: "Insomnia"
      - id: "f"
        label: "Altair GraphQL Client"
      - id: "g"
        label: "None"
  - id: q9
