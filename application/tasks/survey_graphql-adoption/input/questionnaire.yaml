    type: multi_choice
    construct: graphql_federation_gateway_tools_have
    required: true
    options:
      - id: "a"
        label: "Apollo Federation"
      - id: "b"
        label: "GraphQL Mesh"
      - id: "c"
        label: "WunderGraph"
      - id: "d"
        label: "Hasura"
      - id: "e"
        label: "Schema stitching (manual)"
      - id: "f"
        label: "None"
  - id: q10
    prompt: "Which use cases do you use GraphQL for? (Select all that apply)"
    type: multi_choice
    construct: use_cases_use_graphql_select
    required: true
    options:
      - id: "a"
        label: "Web front-end data fetching"
      - id: "b"
        label: "Mobile app back-ends"
      - id: "c"
        label: "Aggregating multiple microservices"
      - id: "d"
        label: "Public or partner-facing APIs"
      - id: "e"
        label: "Internal tooling and dashboards"
      - id: "f"
        label: "Real-time features with subscriptions"
      - id: "g"
        label: "None"
  - id: q11
    prompt: "How do you primarily handle GraphQL caching?"
    type: single_choice
    construct: primarily_handle_graphql_caching
    required: true
    options:
      - id: "a"
        label: "Client-side normalized cache (Apollo, urql)"
      - id: "b"
        label: "CDN or edge caching"
      - id: "c"
        label: "Server-side caching"
      - id: "d"
        label: "Persisted queries"
      - id: "e"
        label: "I don't cache GraphQL responses"
  - id: q12
    prompt: "Which schema-design approach do you primarily use?"
    type: single_choice
    construct: schema_design_approach_primarily_use
    required: true
    options:
      - id: "a"
        label: "Schema-first (SDL)"
      - id: "b"
        label: "Code-first (resolvers generate the schema)"
      - id: "c"
        label: "Auto-generated from a database (Hasura, PostGraphile)"
      - id: "d"
        label: "A mix of approaches"
      - id: "e"
        label: "Not applicable"
  - id: q13
    prompt: "How would you describe the mix of REST and GraphQL in your work?"
    type: single_choice
