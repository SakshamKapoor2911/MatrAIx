    required: true
    options:
      - id: "a"
        label: "Almost entirely GraphQL"
      - id: "b"
        label: "Mostly GraphQL, some REST"
      - id: "c"
        label: "Roughly balanced"
      - id: "d"
        label: "Mostly REST, some GraphQL"
      - id: "e"
        label: "Almost entirely REST"
  - id: q14
