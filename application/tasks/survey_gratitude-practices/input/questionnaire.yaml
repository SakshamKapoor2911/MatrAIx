    prompt: "Do you have a regular gratitude practice?"
    type: single_choice
    construct: have_regular_gratitude_practice
    required: true
    options:
      - id: "a"
        label: "Yes, as a regular routine"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you had a gratitude practice?"
    type: single_choice
    construct: long_have_had_gratitude_practice
    required: true
    options:
