schemaVersion: "1.0"
id: gift_card_usage_v1
title: "Gift Card Usage Survey"
description: "How people buy, use, give, manage, and resell gift cards."
questions:
  - id: q0
    prompt: "How often do you buy or receive gift cards?"
    type: single_choice
    construct: often_buy_receive_gift_cards
    required: true
    options:
      - id: "a"
        label: "Very often"
      - id: "b"
        label: "Often"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q1
    prompt: "In the past year, have you purchased a gift card for yourself or someone else?"
    type: single_choice
    construct: past_year_have_purchased_gift
    required: true
    options:
      - id: "a"
        label: "Yes, several"
      - id: "b"
        label: "Yes, one or two"
      - id: "c"
        label: "No, but I received some"
      - id: "d"
        label: "No, not at all"
  - id: q2
    prompt: "Who do you most often buy gift cards for?"
    type: single_choice
    construct: who_most_often_buy_gift
    required: true
    options:
      - id: "a"
        label: "Myself"
      - id: "b"
        label: "Family members"
      - id: "c"
        label: "Friends"
      - id: "d"
        label: "Coworkers or colleagues"
      - id: "e"
        label: "Teachers or service providers"
      - id: "f"
        label: "I don't buy gift cards"
  - id: q3
    prompt: "Which types of gift cards have you bought or received in the past year? (Select all that apply)"
    type: multi_choice
    construct: types_gift_cards_have_bought
    required: true
    options:
      - id: "a"
        label: "Amazon"
      - id: "b"
        label: "Visa, Mastercard, or Amex (open-loop)"
      - id: "c"
        label: "Target"
      - id: "d"
        label: "Walmart"
      - id: "e"
        label: "Starbucks"
      - id: "f"
        label: "Apple / App Store or iTunes"
      - id: "g"
        label: "A restaurant chain"
      - id: "h"
        label: "A clothing or department store"
      - id: "i"
        label: "A gaming platform (Xbox, PlayStation, Steam)"
      - id: "j"
        label: "A streaming service"
      - id: "k"
        label: "None"
  - id: q4
    prompt: "Where do you usually buy gift cards? (Select all that apply)"
    type: multi_choice
    construct: where_usually_buy_gift_cards
    required: true
    options:
      - id: "a"
        label: "A grocery store gift card rack"
      - id: "b"
        label: "A big-box store (Target, Walmart)"
      - id: "c"
        label: "The retailer's own website or app"
      - id: "d"
        label: "Amazon"
      - id: "e"
        label: "A pharmacy (CVS, Walgreens)"
      - id: "f"
        label: "A warehouse club (Costco, Sam's Club)"
      - id: "g"
        label: "A gift card marketplace or reseller"
      - id: "h"
        label: "A bank or credit card rewards portal"
  - id: q5
    prompt: "For what occasions do you give gift cards? (Select all that apply)"
    type: multi_choice
    construct: occasions_give_gift_cards_select
    required: true
    options:
      - id: "a"
        label: "Birthdays"
      - id: "b"
        label: "Winter holidays"
      - id: "c"
        label: "Weddings"
      - id: "d"
        label: "Graduations"
      - id: "e"
        label: "Thank-you gifts"
      - id: "f"
        label: "Teacher or coach appreciation"
      - id: "g"
        label: "Just because"
      - id: "h"
        label: "I don't give gift cards"
  - id: q6
    prompt: "Why do you choose to give gift cards instead of other gifts? (Select all that apply)"
    type: multi_choice
    construct: why_choose_give_gift_cards
    required: true
    options:
      - id: "a"
        label: "They're convenient"
      - id: "b"
        label: "The recipient can choose what they want"
      - id: "c"
        label: "I'm unsure what to buy"
      - id: "d"
        label: "They're easy to mail or send digitally"
      - id: "e"
        label: "They fit any budget"
      - id: "f"
        label: "I can earn rewards buying them"
      - id: "g"
        label: "I don't give gift cards"
  - id: q7
