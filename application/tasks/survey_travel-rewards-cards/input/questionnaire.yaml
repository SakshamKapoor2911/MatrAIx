        label: "Chase Ultimate Rewards"
      - id: "b"
        label: "American Express Membership Rewards"
      - id: "c"
        label: "Capital One Miles"
      - id: "d"
        label: "Citi ThankYou Points"
      - id: "e"
        label: "Airline frequent-flyer miles"
      - id: "f"
        label: "Hotel loyalty points"
      - id: "g"
        label: "Bilt Rewards"
      - id: "h"
        label: "None of these"
  - id: q5
    prompt: "What is the primary reason you use a travel rewards card?"
    type: single_choice
    construct: primary_reason_use_travel_rewards
    required: true
    options:
      - id: "a"
        label: "Earning points or miles on spending"
      - id: "b"
        label: "Free or discounted travel"
      - id: "c"
        label: "Travel perks like lounge access"
      - id: "d"
        label: "The sign-up bonus"
      - id: "e"
        label: "Travel insurance and protections"
      - id: "f"
        label: "Status or elite benefits"
