schemaVersion: "1.0"
id: travel_rewards_cards_v1
title: "Travel Rewards Credit Cards Survey"
description: "How people choose, use, and get value from travel rewards credit cards, their points and miles, and premium perks."
questions:
  - id: q0
    prompt: "Do you currently hold at least one travel rewards credit card?"
    type: single_choice
    construct: currently_hold_least_one_travel
    required: true
    options:
      - id: "a"
        label: "Yes, one card"
      - id: "b"
        label: "Yes, two or three cards"
      - id: "c"
        label: "Yes, four or more cards"
      - id: "d"
        label: "No, but I've had one before"
      - id: "e"
        label: "No, I've never had one"
  - id: q1
    prompt: "How long have you been using travel rewards credit cards?"
    type: single_choice
    construct: long_have_been_using_travel
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which travel rewards card do you use most often?"
    type: single_choice
    construct: travel_rewards_card_use_most
    required: true
    options:
      - id: "a"
        label: "Chase Sapphire Preferred"
      - id: "b"
        label: "Chase Sapphire Reserve"
      - id: "c"
        label: "American Express Gold"
      - id: "d"
        label: "American Express Platinum"
      - id: "e"
        label: "Capital One Venture or Venture X"
      - id: "f"
        label: "Citi Strata Premier"
      - id: "g"
        label: "A co-branded airline card"
      - id: "h"
        label: "A co-branded hotel card"
      - id: "i"
        label: "Other"
  - id: q3
    prompt: "Which travel rewards cards do you currently hold? (Select all that apply)"
    type: multi_choice
    construct: travel_rewards_cards_currently_hold
    required: true
    options:
      - id: "a"
        label: "Chase Sapphire Preferred or Reserve"
      - id: "b"
        label: "American Express Gold"
      - id: "c"
        label: "American Express Platinum"
      - id: "d"
        label: "Capital One Venture or Venture X"
      - id: "e"
        label: "Citi Strata Premier or Prestige"
      - id: "f"
        label: "A co-branded airline card (Delta, United, etc.)"
      - id: "g"
        label: "A co-branded hotel card (Marriott, Hilton, etc.)"
      - id: "h"
        label: "Bank of America Travel Rewards"
      - id: "i"
        label: "Wells Fargo Autograph"
  - id: q4
    prompt: "Which rewards programs do you actively earn points or miles in? (Select all that apply)"
    type: multi_choice
    construct: rewards_programs_actively_earn_points
    required: true
    options:
