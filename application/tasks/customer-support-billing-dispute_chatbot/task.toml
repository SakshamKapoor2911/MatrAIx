version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "application/customer-support-billing-dispute-chatbot"

[metadata]
difficulty = "easy"
type = "chatbot"
domain = "customer-support"
tags = [ "customer-support", "billing", "disputes" ]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-sim"
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
