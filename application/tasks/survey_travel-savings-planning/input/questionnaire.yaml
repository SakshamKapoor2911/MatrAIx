schemaVersion: "1.0"
id: travel_savings_planning_v1
title: "Travel Savings and Budgeting Survey"
description: "How people save, budget, and use rewards to fund their travel and vacations."
questions:
  - id: q0
    prompt: "Do you actively save or budget for travel and vacations?"
    type: single_choice
    construct: actively_save_budget_travel_vacations
    required: true
    options:
      - id: "a"
        label: "Yes, I save for travel year-round"
      - id: "b"
        label: "Yes, I save when a trip is coming up"
      - id: "c"
        label: "Sometimes, but not consistently"
      - id: "d"
        label: "No, I pay for travel out of general funds"
      - id: "e"
        label: "No, I rarely travel"
  - id: q1
    prompt: "How many leisure trips (overnight or longer) do you typically take per year?"
    type: single_choice
    construct: many_leisure_trips_overnight_longer
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2 to 3"
      - id: "d"
        label: "4 to 5"
      - id: "e"
        label: "6 or more"
  - id: q2
    prompt: "What type of trips do you most often save for?"
    type: single_choice
    construct: type_trips_most_often_save
    required: true
    options:
      - id: "a"
        label: "Domestic road trips"
      - id: "b"
        label: "Domestic flights and city visits"
      - id: "c"
        label: "International travel"
      - id: "d"
        label: "Cruises"
      - id: "e"
        label: "All-inclusive resorts"
      - id: "f"
        label: "Visiting family or friends"
      - id: "g"
        label: "Outdoor and camping trips"
  - id: q3
    prompt: "Which travel expenses do you specifically budget for? (Select all that apply)"
    type: multi_choice
    construct: travel_expenses_specifically_budget_sele
    required: true
    options:
      - id: "a"
        label: "Flights or transportation"
      - id: "b"
        label: "Lodging or accommodations"
      - id: "c"
        label: "Food and dining"
      - id: "d"
        label: "Activities and excursions"
      - id: "e"
        label: "Travel insurance"
      - id: "f"
        label: "Souvenirs and shopping"
      - id: "g"
        label: "Rental cars"
      - id: "h"
        label: "Pet care or house sitting"
      - id: "i"
        label: "Emergency buffer"
  - id: q4
    prompt: "Where do you keep the money you save for travel? (Select all that apply)"
    type: multi_choice
    construct: where_keep_money_save_travel
    required: true
    options:
      - id: "a"
        label: "A dedicated high-yield savings account"
      - id: "b"
        label: "A labeled savings bucket or sub-account"
      - id: "c"
        label: "My regular checking account"
      - id: "d"
        label: "A travel rewards credit card's value"
      - id: "e"
        label: "Cash"
      - id: "f"
        label: "A prepaid or travel card"
      - id: "g"
        label: "A general savings account"
  - id: q5
    prompt: "Which tools or apps do you use to plan and budget for travel? (Select all that apply)"
    type: multi_choice
    construct: tools_apps_use_plan_budget
    required: true
    options:
      - id: "a"
        label: "Ally or Capital One savings buckets"
      - id: "b"
        label: "YNAB"
      - id: "c"
        label: "Google Sheets or Excel"
      - id: "d"
        label: "Hopper (price tracking)"
      - id: "e"
        label: "Going (formerly Scott's Cheap Flights)"
      - id: "f"
        label: "A travel rewards card app (Chase, Amex, Capital One)"
      - id: "g"
        label: "TripIt or a trip planner app"
      - id: "h"
        label: "My bank's standard app"
      - id: "i"
        label: "None"
  - id: q6
    prompt: "How do you fund your travel savings?"
    type: single_choice
    construct: fund_travel_savings
    required: true
    options:
      - id: "a"
        label: "Automatic recurring transfers"
      - id: "b"
        label: "Manual transfers when I can"
      - id: "c"
        label: "Setting aside windfalls (tax refunds, bonuses)"
      - id: "d"
        label: "Credit card points and rewards"
      - id: "e"
        label: "I don't set aside money specifically"
  - id: q7
    prompt: "How far in advance do you usually start saving for a trip?"
    type: single_choice
    construct: far_advance_usually_start_saving
    required: true
    options:
