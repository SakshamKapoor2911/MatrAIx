        label: "Directly with airlines or hotels"
      - id: "b"
        label: "Online travel agencies (Expedia, Booking.com)"
      - id: "c"
        label: "A travel rewards card portal"
      - id: "d"
        label: "Airbnb or Vrbo"
      - id: "e"
        label: "A travel agent"
      - id: "f"
        label: "Package or tour operators"
      - id: "g"
        label: "Costco Travel or a warehouse club"
