schemaVersion: "1.0"
id: cycling_for_fitness_v1
title: "Cycling for Fitness Survey"
description: "How people cycle for fitness and recreation, including their gear, indoor versus outdoor riding, and apps."
questions:
  - id: q0
    prompt: "Do you cycle for fitness or recreation?"
    type: single_choice
    construct: cycle_fitness_recreation
    required: true
    options:
      - id: "a"
        label: "Yes, regularly"
      - id: "b"
        label: "Yes, occasionally"
      - id: "c"
        label: "No, but I used to"
      - id: "d"
        label: "No, I never have"
  - id: q1
    prompt: "How long have you been cycling for fitness or recreation?"
    type: single_choice
    construct: long_have_been_cycling_fitness
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't cycle"
  - id: q2
    prompt: "How often do you ride?"
    type: single_choice
    construct: often_ride
    required: true
    options:
      - id: "a"
        label: "5 or more times a week"
      - id: "b"
        label: "3 to 4 times a week"
      - id: "c"
        label: "1 to 2 times a week"
      - id: "d"
        label: "A few times a month"
      - id: "e"
        label: "Rarely"
  - id: q3
    prompt: "About how many miles do you ride in a typical week? Please enter a number."
    type: free_text
    construct: many_miles_ride_typical_week
    required: true
  - id: q4
    prompt: "Do you ride mostly indoors or outdoors?"
    type: single_choice
    construct: ride_mostly_indoors_outdoors
    required: true
    options:
      - id: "a"
        label: "Almost entirely outdoors"
      - id: "b"
        label: "Mostly outdoors, some indoors"
      - id: "c"
        label: "About equal"
      - id: "d"
        label: "Mostly indoors, some outdoors"
      - id: "e"
        label: "Almost entirely indoors"
  - id: q5
    prompt: "What is your main reason for cycling?"
    type: single_choice
    construct: main_reason_cycling
    required: true
    options:
      - id: "a"
        label: "General fitness and health"
      - id: "b"
        label: "Weight management"
      - id: "c"
        label: "Stress relief and mental health"
      - id: "d"
        label: "Training or competition"
      - id: "e"
        label: "Commuting combined with exercise"
      - id: "f"
        label: "Enjoyment and being outdoors"
  - id: q6
