schemaVersion: "1.0"
id: sinking_funds_savings_v1
title: "Sinking Funds Survey"
description: "How people set aside money in dedicated sinking funds for planned, irregular future expenses."
questions:
  - id: q0
    prompt: "Do you currently set aside money in advance for specific planned expenses (a \"sinking fund\")?"
    type: single_choice
    construct: currently_set_aside_money_advance
    required: true
    options:
      - id: "a"
        label: "Yes, for several planned expenses"
      - id: "b"
        label: "Yes, for one or two planned expenses"
      - id: "c"
        label: "No, but I plan to start"
      - id: "d"
        label: "No, and I have no plans to"
      - id: "e"
        label: "I'm not sure what a sinking fund is"
  - id: q1
    prompt: "How long have you been using sinking funds to save for planned expenses?"
    type: single_choice
    construct: long_have_been_using_sinking
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 7 years"
      - id: "e"
        label: "More than 7 years"
      - id: "f"
        label: "I don't use sinking funds"
  - id: q2
    prompt: "Which best describes how you think about saving for irregular expenses?"
    type: single_choice
    construct: best_describes_think_saving_irregular
    required: true
    options:
      - id: "a"
        label: "I plan each expense separately with its own dedicated savings"
      - id: "b"
        label: "I keep one general savings pot and draw from it"
      - id: "c"
        label: "I mostly cover irregular expenses from my checking account"
      - id: "d"
        label: "I put irregular expenses on credit and pay them off later"
      - id: "e"
        label: "I rarely plan for irregular expenses"
  - id: q3
    prompt: "How many separate sinking funds or savings goals are you actively contributing to right now?"
    type: single_choice
    construct: many_separate_sinking_funds_savings
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 to 2"
      - id: "c"
        label: "3 to 5"
      - id: "d"
        label: "6 to 9"
      - id: "e"
        label: "10 or more"
  - id: q4
    prompt: "Which planned expenses do you currently keep a sinking fund for? (Select all that apply)"
    type: multi_choice
    construct: planned_expenses_currently_keep_sinking
    required: true
    options:
      - id: "a"
        label: "Holidays and gifts"
      - id: "b"
        label: "Car maintenance or repairs"
      - id: "c"
        label: "Vacation or travel"
      - id: "d"
        label: "Home repairs or improvements"
      - id: "e"
        label: "Annual insurance premiums"
      - id: "f"
        label: "Property taxes"
      - id: "g"
        label: "Medical or dental costs"
      - id: "h"
        label: "Back-to-school or children's expenses"
      - id: "i"
        label: "A new car or major purchase"
      - id: "j"
        label: "Pet care"
      - id: "k"
        label: "None of these"
  - id: q5
    prompt: "Where do you keep the money for your sinking funds? (Select all that apply)"
    type: multi_choice
    construct: where_keep_money_sinking_funds
    required: true
    options:
      - id: "a"
        label: "A high-yield savings account"
      - id: "b"
        label: "A regular savings account at my bank"
      - id: "c"
        label: "Separate labeled savings \"buckets\" or sub-accounts"
      - id: "d"
        label: "A checking account"
      - id: "e"
        label: "Cash or a physical envelope system"
      - id: "f"
        label: "A money market account"
      - id: "g"
        label: "A brokerage or investment account"
      - id: "h"
        label: "A prepaid card set aside for the purpose"
  - id: q6
    prompt: "Which apps or tools do you use to manage your sinking funds? (Select all that apply)"
    type: multi_choice
    construct: apps_tools_use_manage_sinking
    required: true
    options:
      - id: "a"
        label: "Ally Bank savings buckets"
      - id: "b"
        label: "Capital One 360 accounts"
      - id: "c"
        label: "Chime"
      - id: "d"
        label: "YNAB (You Need A Budget)"
      - id: "e"
        label: "Monarch Money"
      - id: "f"
        label: "Rocket Money"
      - id: "g"
        label: "A spreadsheet (Excel or Google Sheets)"
      - id: "h"
        label: "Qapital"
      - id: "i"
        label: "My bank's standard app with no special features"
      - id: "j"
        label: "Pen and paper"
      - id: "k"
        label: "None"
  - id: q7
    prompt: "How do you decide how much to contribute to each sinking fund?"
    type: single_choice
    construct: decide_much_contribute_each_sinking
    required: true
    options:
      - id: "a"
        label: "I divide the target amount by the number of months until I need it"
      - id: "b"
        label: "I contribute a fixed amount each payday"
      - id: "c"
        label: "I contribute whatever is left over at month's end"
      - id: "d"
        label: "I contribute irregularly when I can"
      - id: "e"
        label: "I don't have a set method"
  - id: q8
    prompt: "How often do you contribute to your sinking funds?"
    type: single_choice
    construct: often_contribute_sinking_funds
    required: true
    options:
