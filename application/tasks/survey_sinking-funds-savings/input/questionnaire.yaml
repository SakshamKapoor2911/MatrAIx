        label: "Every payday"
      - id: "b"
        label: "Weekly"
      - id: "c"
        label: "Monthly"
      - id: "d"
        label: "A few times a year"
      - id: "e"
        label: "Only when I have extra money"
      - id: "f"
        label: "I don't contribute regularly"
  - id: q9
    prompt: "Do you automate your sinking fund contributions?"
    type: single_choice
    construct: automate_sinking_fund_contributions
    required: true
    options:
      - id: "a"
        label: "Yes, all of them are automated transfers"
      - id: "b"
        label: "Yes, some are automated"
      - id: "c"
        label: "No, I transfer money manually"
      - id: "d"
        label: "No, I contribute in cash"
  - id: q10
