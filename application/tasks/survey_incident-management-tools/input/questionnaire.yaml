        label: "Always or nearly always"
      - id: "b"
        label: "About one week a month"
      - id: "c"
        label: "A few weeks a quarter"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q9
    prompt: "Does your team use defined incident severity levels?"
    type: single_choice
    construct: does_team_use_defined_incident
    required: true
    options:
