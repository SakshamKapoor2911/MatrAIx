schemaVersion: "1.0"
id: incident_management_tools_v1
title: "Incident Management Tools Survey"
description: "How engineering teams handle on-call and incident response, including tooling, practices, and postmortems."
questions:
  - id: q0
    prompt: "Are you part of an on-call or incident-response rotation?"
    type: single_choice
    construct: part_call_incident_response_rotation
    required: true
    options:
      - id: "a"
        label: "Yes, I am on call regularly"
      - id: "b"
        label: "Yes, but only as a backup or escalation"
      - id: "c"
        label: "I respond to incidents but am not formally on call"
      - id: "d"
        label: "I used to be on call but no longer am"
      - id: "e"
        label: "No"
  - id: q1
    prompt: "How long have you participated in on-call or incident response?"
    type: single_choice
    construct: long_have_participated_call_incident
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I never have"
  - id: q2
    prompt: "What best describes your relationship to incident management?"
    type: single_choice
    construct: best_describes_relationship_incident_man
    required: true
    options:
      - id: "a"
        label: "I own or run our incident-management program"
      - id: "b"
        label: "I respond to incidents on my team"
      - id: "c"
        label: "I often act as incident commander"
      - id: "d"
        label: "I get involved only for major incidents"
      - id: "e"
        label: "I am rarely involved"
  - id: q3
    prompt: "Which on-call or incident-management tool does your team use most often?"
    type: single_choice
    construct: call_incident_management_tool_does
    required: true
    options:
      - id: "a"
        label: "PagerDuty"
      - id: "b"
        label: "Opsgenie"
      - id: "c"
        label: "incident.io"
      - id: "d"
        label: "Grafana OnCall"
      - id: "e"
        label: "Splunk On-Call"
      - id: "f"
        label: "FireHydrant"
      - id: "g"
        label: "Rootly"
      - id: "h"
        label: "Other"
      - id: "i"
        label: "We don't use a dedicated tool"
  - id: q4
    prompt: "Which incident or on-call tools have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: incident_call_tools_have_used
    required: true
    options:
      - id: "a"
        label: "PagerDuty"
      - id: "b"
        label: "Opsgenie"
      - id: "c"
        label: "incident.io"
      - id: "d"
        label: "Grafana OnCall"
      - id: "e"
        label: "Splunk On-Call"
      - id: "f"
        label: "FireHydrant"
      - id: "g"
        label: "Rootly"
      - id: "h"
        label: "Blameless"
      - id: "i"
        label: "Jeli"
      - id: "j"
        label: "None"
  - id: q5
    prompt: "Where does your team coordinate during an active incident? (Select all that apply)"
    type: multi_choice
    construct: where_does_team_coordinate_during
    required: true
    options:
      - id: "a"
        label: "A dedicated Slack channel"
      - id: "b"
        label: "Microsoft Teams"
      - id: "c"
        label: "A Zoom or video bridge"
      - id: "d"
        label: "Google Meet"
      - id: "e"
        label: "A physical or virtual war room"
      - id: "f"
        label: "Within the incident-management tool itself"
      - id: "g"
        label: "Email"
  - id: q6
    prompt: "What typically triggers a page or incident? (Select all that apply)"
    type: multi_choice
    construct: typically_triggers_page_incident_select
    required: true
