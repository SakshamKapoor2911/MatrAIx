        label: "Alerts from monitoring tools"
      - id: "b"
        label: "Automated health checks"
      - id: "c"
        label: "Customer or support reports"
      - id: "d"
        label: "Manual escalation by a teammate"
      - id: "e"
        label: "Synthetic monitoring failures"
      - id: "f"
        label: "Security detections"
  - id: q7
    prompt: "How is your on-call schedule structured?"
    type: single_choice
    construct: call_schedule_structured
