schemaVersion: "1.0"
id: savings_challenges_v1
title: "Savings Challenges Survey"
description: "How people use structured savings challenges such as the 52-week challenge and no-spend months to save money."
questions:
  - id: q0
    prompt: "Have you ever tried a structured savings challenge (like a 52-week challenge or a no-spend month)?"
    type: single_choice
    construct: have_ever_tried_structured_savings
    required: true
    options:
      - id: "a"
        label: "Yes, I'm doing one right now"
      - id: "b"
        label: "Yes, I've completed one or more in the past"
      - id: "c"
        label: "Yes, but I didn't finish it"
      - id: "d"
        label: "No, but I'm interested in trying"
      - id: "e"
        label: "No, and I'm not interested"
  - id: q1
    prompt: "How long ago did you first try a savings challenge?"
    type: single_choice
    construct: long_ago_did_first_try
    required: true
    options:
      - id: "a"
        label: "Within the last 6 months"
      - id: "b"
        label: "6 months to 1 year ago"
      - id: "c"
        label: "1 to 3 years ago"
      - id: "d"
        label: "More than 3 years ago"
      - id: "e"
        label: "I've never tried one"
  - id: q2
    prompt: "How many savings challenges have you attempted in total?"
    type: single_choice
    construct: many_savings_challenges_have_attempted
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1"
      - id: "c"
        label: "2 to 3"
      - id: "d"
        label: "4 to 6"
      - id: "e"
        label: "7 or more"
  - id: q3
    prompt: "Which savings challenges have you tried? (Select all that apply)"
    type: multi_choice
    construct: savings_challenges_have_tried_select
    required: true
    options:
      - id: "a"
        label: "52-week challenge"
      - id: "b"
        label: "No-spend month or week"
      - id: "c"
        label: "100-envelope challenge"
      - id: "d"
        label: "Round-up (spare change) saving"
      - id: "e"
        label: "Weather or temperature challenge"
      - id: "f"
        label: "$5 bill saving challenge"
      - id: "g"
        label: "Pantry or no-grocery challenge"
      - id: "h"
        label: "1% net worth challenge"
      - id: "i"
        label: "A challenge I created myself"
      - id: "j"
        label: "I've never tried one"
  - id: q4
    prompt: "Which challenge are you most likely to do (or do again)?"
    type: single_choice
    construct: challenge_most_likely_again
    required: true
    options:
      - id: "a"
        label: "52-week challenge"
      - id: "b"
        label: "No-spend month"
      - id: "c"
        label: "100-envelope challenge"
      - id: "d"
