schemaVersion: "1.0"
id: skincare_routine_habits_v1
title: "Skincare Routine Habits Survey"
description: "People's daily skincare routines, the products and ingredients they use, and their attitudes toward skincare."
questions:
  - id: q0
    prompt: "How would you describe your current skincare routine?"
    type: single_choice
    construct: would_describe_current_skincare_routine
    required: true
    options:
      - id: "a"
        label: "Extensive, multiple steps daily"
      - id: "b"
        label: "A moderate routine"
      - id: "c"
        label: "A simple routine"
      - id: "d"
        label: "Only the basics when I remember"
      - id: "e"
        label: "I don't really have a routine"
  - id: q1
    prompt: "How long have you had a regular skincare routine?"
    type: single_choice
    construct: long_have_had_regular_skincare
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I don't have a regular routine"
  - id: q2
    prompt: "How many steps are in your typical morning routine?"
    type: single_choice
    construct: many_steps_typical_morning_routine
    required: true
    options:
      - id: "a"
        label: "0 steps"
      - id: "b"
        label: "1 to 2 steps"
      - id: "c"
        label: "3 to 4 steps"
      - id: "d"
        label: "5 to 6 steps"
      - id: "e"
        label: "7 or more steps"
  - id: q3
    prompt: "How many steps are in your typical evening routine?"
