        label: "Back-end developer building serverless services"
      - id: "b"
        label: "Full-stack developer using serverless for parts of an app"
      - id: "c"
        label: "Platform or DevOps engineer supporting serverless"
      - id: "d"
        label: "Architect deciding on serverless adoption"
      - id: "e"
        label: "Hobbyist or side-project builder"
      - id: "f"
        label: "I use it only occasionally"
