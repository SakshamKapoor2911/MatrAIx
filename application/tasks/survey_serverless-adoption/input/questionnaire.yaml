schemaVersion: "1.0"
id: serverless_adoption_v1
title: "Serverless Adoption Survey"
description: "How developers adopt, use, and evaluate serverless and functions-as-a-service platforms such as AWS Lambda, Cloudflare Workers, and Vercel Functions."
questions:
  - id: q0
    prompt: "How often do you build or maintain serverless functions?"
    type: single_choice
    construct: often_build_maintain_serverless_function
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I don't use serverless"
  - id: q1
    prompt: "How long have you been using serverless platforms?"
    type: single_choice
    construct: long_have_been_using_serverless
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which best describes your relationship to serverless?"
