schemaVersion: "1.0"
id: travel_insurance_v1
title: "Travel Insurance Survey"
description: "How travelers decide whether to buy travel insurance, what coverage they choose, and how they experience purchasing and claims."
questions:
  - id: q0
    prompt: "In the past 2 years, how many trips have you taken that were far from home or international?"
    type: single_choice
    construct: past_2_years_many_trips
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 trip"
      - id: "c"
        label: "2 to 3 trips"
      - id: "d"
        label: "4 to 5 trips"
      - id: "e"
        label: "6 or more trips"
  - id: q1
    prompt: "Have you purchased travel insurance for a trip in the past 2 years?"
    type: single_choice
    construct: have_purchased_travel_insurance_trip
    required: true
    options:
      - id: "a"
        label: "Yes, for every trip"
      - id: "b"
        label: "Yes, for some trips"
      - id: "c"
        label: "No, but I have before"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "Not sure"
  - id: q2
    prompt: "Which type of traveler best describes you?"
    type: single_choice
    construct: type_traveler_best_describes
    required: true
    options:
      - id: "a"
        label: "Mostly domestic leisure"
      - id: "b"
        label: "Mostly international leisure"
      - id: "c"
        label: "Business traveler"
      - id: "d"
        label: "A mix of business and leisure"
      - id: "e"
        label: "Infrequent traveler"
  - id: q3
    prompt: "For which reasons do you buy (or would you buy) travel insurance? (Select all that apply)"
    type: multi_choice
    construct: reasons_buy_would_buy_travel
    required: true
    options:
      - id: "a"
        label: "Trip cancellation"
      - id: "b"
        label: "Medical emergencies abroad"
      - id: "c"
        label: "Emergency evacuation"
      - id: "d"
        label: "Lost or delayed baggage"
      - id: "e"
        label: "Flight delays"
      - id: "f"
        label: "Rental car coverage"
      - id: "g"
        label: "Protecting an expensive prepaid trip"
      - id: "h"
        label: "Traveling with elderly relatives or children"
      - id: "i"
        label: "Required by the destination"
  - id: q4
    prompt: "How often do you buy travel insurance when you travel?"
    type: single_choice
    construct: often_buy_travel_insurance_when
    required: true
    options:
      - id: "a"
        label: "Never"
      - id: "b"
        label: "Rarely"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Often"
      - id: "e"
        label: "Always"
  - id: q5
