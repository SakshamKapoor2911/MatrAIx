        label: "Allianz Travel"
      - id: "b"
        label: "Travel Guard (AIG)"
      - id: "c"
        label: "World Nomads"
      - id: "d"
        label: "Travelex"
      - id: "e"
        label: "Seven Corners"
      - id: "f"
        label: "Nationwide"
      - id: "g"
        label: "AXA"
      - id: "h"
        label: "My credit card's built-in coverage"
      - id: "i"
        label: "The airline or booking site at checkout"
      - id: "j"
        label: "Another company"
      - id: "k"
