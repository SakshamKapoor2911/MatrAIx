transport: sidecar_http
runtimeDefaults:
  applicationId: meal_planning_nutrition
  applicationContext: meal_planning
  domain: meal_planning
connection:
  baseUrlEnv: CHATBOT_API_URL
  baseUrl: http://meal-plan-api:8000
  healthPath: /health
protocol:
  sendMessage:
    method: POST
    path: /v1/messages
    sessionIdField: sessionId
    messageField: message
    titleField: title
    botTypeField: botType
    contextField: applicationContext
    staticBody: {}
  response:
    sessionIdField: sessionId
    replyField: reply
    turnField: turn
    recommendedItemsField: recommendedItems
personaExposure:
  fields:
    - key: recommendedItems
      label: Meal plans or suggestions
      selector: recommendedItems
      format: item_list
artifacts:
  transcript: transcript.json
  applicationResult: application_result.json
  feedback: user_feedback.json
