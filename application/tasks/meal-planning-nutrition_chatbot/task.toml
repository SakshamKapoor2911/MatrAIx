version = "1.0"
artifacts = ["/app/output"]

[task]
name = "personabench/application-meal-planning-nutrition-chatbot"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "healthcare"
tags = [
  "nutrition",
  "meal planning",
  "dietary adherence",
  "health coaching",
  "multi turn chat",
  "personalized recommendations",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 900.0

[environment]
definition = "application/meal-planning-nutrition_chatbot"
build_timeout_sec = 900.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
