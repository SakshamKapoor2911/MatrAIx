schemaVersion: "1.0"
id: journaling_for_wellbeing_v1
title: "Journaling for Wellbeing Survey"
description: "How people use journaling to support their wellbeing, including tools, frequency, and perceived benefits."
questions:
  - id: q0
    prompt: "Do you keep a journal for your wellbeing?"
    type: single_choice
    construct: keep_journal_wellbeing
    required: true
    options:
      - id: "a"
        label: "Yes, as a regular routine"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you been journaling?"
    type: single_choice
    construct: long_have_been_journaling
    required: true
    options:
      - id: "a"
        label: "Less than 3 months"
      - id: "b"
        label: "3 to 12 months"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't currently journal"
  - id: q2
    prompt: "How often do you journal?"
    type: single_choice
    construct: often_journal
    required: true
    options:
