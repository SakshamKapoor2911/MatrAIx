      - id: "c"
        label: "11 to 20 minutes"
      - id: "d"
        label: "21 to 30 minutes"
      - id: "e"
        label: "More than 30 minutes"
  - id: q4
    prompt: "Which journaling methods do you use? (Select all that apply)"
