    prompt: "How often do you build or maintain data pipelines?"
    type: single_choice
    construct: often_build_maintain_data_pipelines
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Rarely"
      - id: "f"
        label: "I don't work with data pipelines"
  - id: q1
    prompt: "How long have you worked with ETL or data pipelines?"
    type: single_choice
    construct: long_have_worked_etl_data
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
