schemaVersion: "1.0"
id: etl_data_pipeline_tools_v1
title: "ETL and Data Pipeline Tools Survey"
description: "How data professionals build, orchestrate, and maintain ETL and data pipelines, and how they choose among pipeline tools."
questions:
