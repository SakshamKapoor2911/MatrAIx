schemaVersion: "1.0"
id: api_development_tools_v1
title: "API Development Tools Survey"
description: "How developers choose, use, and evaluate the tools they use to build, test, document, and consume APIs."
questions:
  - id: q0
    prompt: "How often do you build, test, or consume APIs in your work?"
    type: single_choice
    construct: often_build_test_consume_apis
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "Occasionally"
      - id: "d"
        label: "I am just learning to work with APIs"
      - id: "e"
        label: "I rarely work with APIs"
  - id: q1
    prompt: "How long have you been working with APIs?"
    type: single_choice
    construct: long_have_been_working_apis
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes your primary relationship to APIs?"
    type: single_choice
    construct: best_describes_primary_relationship_apis
    required: true
    options:
      - id: "a"
        label: "I build and maintain APIs"
      - id: "b"
        label: "I mostly consume third-party or internal APIs"
      - id: "c"
        label: "I test and validate APIs"
      - id: "d"
        label: "I write API documentation or specs"
      - id: "e"
        label: "I work across all of these roughly equally"
  - id: q3
    prompt: "Which type of API do you work with most often?"
    type: single_choice
    construct: type_api_work_most_often
    required: true
    options:
      - id: "a"
        label: "REST / HTTP"
      - id: "b"
        label: "GraphQL"
      - id: "c"
        label: "gRPC"
      - id: "d"
        label: "SOAP"
      - id: "e"
        label: "WebSockets or event-driven"
      - id: "f"
        label: "Other"
  - id: q4
    prompt: "Which API development or testing tool do you use most often?"
    type: single_choice
    construct: api_development_testing_tool_use
    required: true
    options:
      - id: "a"
