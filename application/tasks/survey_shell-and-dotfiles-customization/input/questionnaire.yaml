schemaVersion: "1.0"
id: shell_and_dotfiles_customization_v1
title: "Shell and Dotfiles Customization Survey"
description: "How technical users choose their shell and customize their dotfiles, prompt, and plugins."
questions:
  - id: q0
    prompt: "How often do you work in a command-line shell?"
    type: single_choice
    construct: often_work_command_line_shell
    required: true
    options:
      - id: "a"
        label: "Constantly throughout the day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "I don't use a shell"
  - id: q1
    prompt: "How long have you been customizing your shell environment?"
    type: single_choice
    construct: long_have_been_customizing_shell
    required: true
    options:
      - id: "a"
        label: "I don't customize it"
      - id: "b"
        label: "Less than 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "6 to 10 years"
      - id: "f"
        label: "More than 10 years"
  - id: q2
    prompt: "Which shell do you use as your primary interactive shell?"
    type: single_choice
    construct: shell_use_as_primary_interactive
    required: true
    options:
      - id: "a"
        label: "bash"
      - id: "b"
        label: "zsh"
      - id: "c"
        label: "fish"
      - id: "d"
        label: "PowerShell"
      - id: "e"
        label: "Nushell"
      - id: "f"
        label: "Ksh or another shell"
  - id: q3
    prompt: "Which shells have you used in the past year? (Select all that apply)"
    type: multi_choice
    construct: shells_have_used_past_year
    required: true
    options:
      - id: "a"
        label: "bash"
      - id: "b"
        label: "zsh"
      - id: "c"
        label: "fish"
      - id: "d"
        label: "PowerShell"
      - id: "e"
        label: "Nushell"
      - id: "f"
        label: "dash or sh"
      - id: "g"
        label: "Ksh or tcsh"
      - id: "h"
        label: "Xonsh"
  - id: q4
    prompt: "Why did you choose your primary shell?"
    type: single_choice
    construct: why_did_choose_primary_shell
    required: true
    options:
      - id: "a"
        label: "It's the system default"
      - id: "b"
        label: "Better features out of the box"
      - id: "c"
        label: "A framework or plugin ecosystem I wanted"
      - id: "d"
        label: "A colleague or community recommended it"
      - id: "e"
        label: "Required by my work environment"
      - id: "f"
        label: "I haven't really chosen — I use the default"
  - id: q5
    prompt: "Which shell framework or prompt tool do you use? (Select all that apply)"
    type: multi_choice
    construct: shell_framework_prompt_tool_use
    required: true
    options:
      - id: "a"
        label: "Oh My Zsh"
      - id: "b"
        label: "Starship"
      - id: "c"
        label: "Powerlevel10k"
      - id: "d"
        label: "Oh My Posh"
      - id: "e"
        label: "Prezto or zinit"
      - id: "f"
        label: "Fish's built-in configuration"
      - id: "g"
        label: "A hand-written prompt"
      - id: "h"
        label: "None"
  - id: q6
    prompt: "How do you manage your dotfiles?"
    type: single_choice
    construct: manage_dotfiles
    required: true
    options:
      - id: "a"
        label: "A Git repository"
      - id: "b"
        label: "A Git repo with a bare-repo or symlink manager (GNU Stow, chezmoi, yadm)"
      - id: "c"
        label: "Cloud sync (Dropbox, iCloud, etc.)"
      - id: "d"
        label: "Manual copying between machines"
      - id: "e"
        label: "I don't manage my dotfiles"
  - id: q7
    prompt: "Which dotfiles do you actively maintain? (Select all that apply)"
    type: multi_choice
    construct: dotfiles_actively_maintain_select_all
    required: true
    options:
      - id: "a"
        label: "Shell config (.bashrc, .zshrc, config.fish)"
      - id: "b"
        label: "Git config (.gitconfig)"
      - id: "c"
        label: "Vim or Neovim config"
      - id: "d"
        label: "Tmux config"
      - id: "e"
        label: "Terminal emulator config"
      - id: "f"
        label: "SSH config"
      - id: "g"
        label: "Editor settings (VS Code, etc.)"
      - id: "h"
        label: "Window manager or OS config"
  - id: q8
    prompt: "About how many lines are in your main shell config file? Please enter a number."
    type: free_text
    construct: many_lines_main_shell_config
    required: true
  - id: q9
    prompt: "About how many shell aliases do you have defined? Please enter a number."
    type: free_text
    construct: many_shell_aliases_have_defined
    required: true
  - id: q10
    prompt: "Which shell customizations do you use? (Select all that apply)"
    type: multi_choice
    construct: shell_customizations_use_select_all
    required: true
    options:
      - id: "a"
        label: "Custom aliases"
      - id: "b"
        label: "Custom functions"
      - id: "c"
        label: "Syntax highlighting"
      - id: "d"
        label: "Autosuggestions"
      - id: "e"
        label: "Custom key bindings"
      - id: "f"
        label: "Directory jumping (z, autojump, zoxide)"
      - id: "g"
        label: "A custom prompt theme"
      - id: "h"
        label: "Git status in the prompt"
      - id: "i"
        label: "Vi mode"
  - id: q11
    prompt: "How is your shell prompt configured?"
    type: single_choice
    construct: shell_prompt_configured
    required: true
    options:
      - id: "a"
        label: "A prompt framework or generator (Starship, Powerlevel10k, etc.)"
      - id: "b"
        label: "A theme from a shell framework"
      - id: "c"
        label: "Hand-written prompt code"
      - id: "d"
        label: "The default prompt"
  - id: q12
