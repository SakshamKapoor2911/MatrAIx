        label: "Current directory"
      - id: "b"
        label: "Git branch and status"
      - id: "c"
        label: "Exit code of the last command"
      - id: "d"
        label: "Language or runtime version"
      - id: "e"
        label: "Time or command duration"
      - id: "f"
        label: "Username and hostname"
      - id: "g"
        label: "Cloud or Kubernetes context"
      - id: "h"
        label: "A minimal prompt with little info"
  - id: q13
    prompt: "Do you use a plugin manager for your shell?"
    type: single_choice
    construct: use_plugin_manager_shell
    required: true
    options:
