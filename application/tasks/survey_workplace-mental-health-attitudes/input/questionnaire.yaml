      - id: "b"
        label: "A wellness or meditation app"
      - id: "c"
        label: "Counseling covered by my benefits"
      - id: "d"
        label: "A mental-health or flexible day off"
      - id: "e"
        label: "A manager or HR conversation"
      - id: "f"
        label: "A workshop or training"
      - id: "g"
        label: "None of these"
  - id: q5
    prompt: "How comfortable would you feel telling your manager you were struggling with stress or burnout?"
