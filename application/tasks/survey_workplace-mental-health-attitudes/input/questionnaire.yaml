schemaVersion: "1.0"
id: workplace_mental_health_attitudes_v1
title: "Workplace Mental Health Attitudes Survey"
description: "Attitudes toward mental-health support and stigma at work, including the resources employers offer and how comfortable people feel using them."
questions:
  - id: q0
    prompt: "Are you currently employed?"
    type: single_choice
    construct: currently_employed
    required: true
    options:
      - id: "a"
        label: "Yes, full-time"
      - id: "b"
        label: "Yes, part-time"
      - id: "c"
        label: "Self-employed"
      - id: "d"
        label: "Not currently employed"
      - id: "e"
        label: "Student"
  - id: q1
    prompt: "How would you describe your current work arrangement?"
    type: single_choice
    construct: would_describe_current_work_arrangement
    required: true
    options:
      - id: "a"
        label: "Fully in person"
      - id: "b"
        label: "Mostly in person"
      - id: "c"
        label: "Hybrid"
      - id: "d"
        label: "Mostly remote"
      - id: "e"
        label: "Fully remote"
  - id: q2
    prompt: "Does your employer offer any mental-health support or benefits?"
    type: single_choice
    construct: does_employer_offer_any_mental
    required: true
    options:
      - id: "a"
        label: "Yes, and I know the details"
      - id: "b"
        label: "Yes, but I am not sure of the details"
      - id: "c"
        label: "No"
      - id: "d"
        label: "I am not sure"
      - id: "e"
        label: "Not applicable"
  - id: q3
    prompt: "Which mental-health resources does your workplace offer? (Select all that apply)"
    type: multi_choice
    construct: mental_health_resources_does_workplace
    required: true
    options:
      - id: "a"
        label: "Employee assistance program (EAP)"
      - id: "b"
        label: "Mental-health app subscription (Calm, Headspace, etc.)"
      - id: "c"
        label: "Therapy or counseling coverage through insurance"
      - id: "d"
        label: "Mental-health days or flexible time off"
      - id: "e"
        label: "Manager or peer support programs"
      - id: "f"
        label: "Workshops or training"
      - id: "g"
        label: "On-site or virtual counselors"
      - id: "h"
        label: "None that I know of"
  - id: q4
    prompt: "Which of these have you personally used at work? (Select all that apply)"
    type: multi_choice
    construct: these_have_personally_used_work
    required: true
