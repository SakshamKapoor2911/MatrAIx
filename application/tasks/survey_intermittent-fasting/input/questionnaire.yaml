schemaVersion: "1.0"
id: intermittent_fasting_v1
title: "Intermittent Fasting Survey"
description: "How people practice intermittent fasting, the methods they use, and their attitudes toward it."
questions:
  - id: q0
    prompt: "Do you currently practice intermittent fasting?"
    type: single_choice
    construct: currently_practice_intermittent_fasting
    required: true
    options:
      - id: "a"
        label: "Yes, I do it consistently"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "No, but I have tried it in the past"
      - id: "d"
        label: "No, but I am interested in trying it"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you practiced intermittent fasting?"
    type: single_choice
    construct: long_have_practiced_intermittent_fasting
    required: true
    options:
      - id: "a"
        label: "Less than 1 month"
      - id: "b"
        label: "1 to 6 months"
      - id: "c"
        label: "6 months to 1 year"
      - id: "d"
        label: "1 to 3 years"
      - id: "e"
        label: "More than 3 years"
      - id: "f"
        label: "This does not apply to me"
  - id: q2
    prompt: "Which intermittent fasting method do you use most often?"
    type: single_choice
    construct: intermittent_fasting_method_use_most
    required: true
    options:
      - id: "a"
        label: "16:8 (16-hour fast, 8-hour eating window)"
      - id: "b"
        label: "14:10 (14-hour fast, 10-hour eating window)"
      - id: "c"
        label: "18:6 (18-hour fast, 6-hour eating window)"
      - id: "d"
        label: "5:2 (two low-calorie days per week)"
      - id: "e"
        label: "One meal a day (OMAD)"
      - id: "f"
        label: "Alternate-day fasting"
      - id: "g"
        label: "I do not follow a specific method"
  - id: q3
    prompt: "On days you fast, when does your eating window usually start?"
    type: single_choice
    construct: days_fast_when_does_eating
    required: true
    options:
      - id: "a"
        label: "Early morning (before 9 a.m.)"
      - id: "b"
        label: "Late morning (9 a.m. to noon)"
      - id: "c"
        label: "Early afternoon (noon to 3 p.m.)"
      - id: "d"
        label: "Late afternoon or evening (after 3 p.m.)"
      - id: "e"
        label: "It varies day to day"
      - id: "f"
        label: "This does not apply to me"
  - id: q4
    prompt: "How many days per week do you typically fast?"
    type: single_choice
    construct: many_days_per_week_typically
    required: true
