schemaVersion: "1.0"
id: pair_programming_habits_v1
title: "Pair Programming Habits Survey"
description: "How developers practice pair and mob programming, the tools they use, and their attitudes toward it."
questions:
  - id: q0
    prompt: "How often do you pair program?"
    type: single_choice
    construct: often_pair_program
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q1
    prompt: "How long have you been practicing pair programming?"
    type: single_choice
    construct: long_have_been_practicing_pair
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 7 years"
      - id: "e"
        label: "More than 7 years"
      - id: "f"
        label: "I have never paired"
  - id: q2
    prompt: "What is your relationship to pair programming?"
    type: single_choice
    construct: relationship_pair_programming
    required: true
    options:
      - id: "a"
        label: "I pair as a core part of my daily workflow"
      - id: "b"
        label: "I pair when a task calls for it"
      - id: "c"
        label: "I mostly pair to mentor or onboard others"
      - id: "d"
        label: "I mostly pair to learn from more senior developers"
      - id: "e"
        label: "I rarely or never pair"
  - id: q3
    prompt: "In a typical pairing session, which role do you play most often?"
    type: single_choice
    construct: typical_pairing_session_role_play
    required: true
    options:
      - id: "a"
        label: "Driver (writing the code)"
      - id: "b"
        label: "Navigator (reviewing and directing)"
      - id: "c"
        label: "I switch roles frequently"
      - id: "d"
        label: "It depends on the session"
  - id: q4
    prompt: "How are your pairing sessions usually conducted?"
    type: single_choice
    construct: pairing_sessions_usually_conducted
    required: true
    options:
      - id: "a"
        label: "Fully remote"
      - id: "b"
        label: "Fully in person"
      - id: "c"
        label: "A mix of remote and in person"
      - id: "d"
        label: "I don't pair"
  - id: q5
    prompt: "Which pairing style does your team use most often?"
    type: single_choice
    construct: pairing_style_does_team_use
    required: true
    options:
      - id: "a"
        label: "Driver and navigator"
      - id: "b"
        label: "Ping-pong (one writes a test, the other makes it pass)"
      - id: "c"
        label: "Strong-style pairing"
      - id: "d"
        label: "Unstructured, whoever has the keyboard"
      - id: "e"
        label: "We don't have a defined style"
  - id: q6
    prompt: "Which tools do you use for remote pairing or screen collaboration? (Select all that apply)"
    type: multi_choice
    construct: tools_use_remote_pairing_screen
    required: true
    options:
      - id: "a"
        label: "VS Code Live Share"
      - id: "b"
        label: "Tuple"
      - id: "c"
        label: "JetBrains Code With Me"
      - id: "d"
        label: "Zoom screen sharing"
      - id: "e"
        label: "Microsoft Teams screen sharing"
      - id: "f"
        label: "Google Meet"
      - id: "g"
        label: "Slack Huddles"
      - id: "h"
        label: "CoScreen"
      - id: "i"
        label: "Pop"
      - id: "j"
        label: "A single shared physical machine"
      - id: "k"
        label: "None"
  - id: q7
    prompt: "In which situations do you typically pair? (Select all that apply)"
    type: multi_choice
    construct: situations_typically_pair_select_all
    required: true
    options:
      - id: "a"
        label: "Onboarding new team members"
      - id: "b"
        label: "Building complex or unfamiliar features"
      - id: "c"
        label: "Hunting down difficult bugs"
      - id: "d"
        label: "Reviewing or refactoring code"
      - id: "e"
        label: "Knowledge transfer before someone leaves"
      - id: "f"
        label: "Responding to production incidents"
      - id: "g"
        label: "Learning a new language or framework"
      - id: "h"
        label: "Working through a spike or prototype"
  - id: q8
    prompt: "Which benefits have you personally experienced from pairing? (Select all that apply)"
    type: multi_choice
    construct: benefits_have_personally_experienced_fro
    required: true
    options:
      - id: "a"
        label: "Fewer bugs in the code we wrote together"
      - id: "b"
        label: "Faster onboarding"
      - id: "c"
        label: "Better shared understanding of the codebase"
      - id: "d"
        label: "Learning new tools or shortcuts"
      - id: "e"
        label: "Higher focus and less procrastination"
      - id: "f"
        label: "Better design decisions"
      - id: "g"
        label: "Stronger team relationships"
      - id: "h"
        label: "I haven't noticed clear benefits"
  - id: q9
