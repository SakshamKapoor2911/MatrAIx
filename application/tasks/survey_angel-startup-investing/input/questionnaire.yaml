schemaVersion: "1.0"
id: angel_startup_investing_v1
title: "Angel and Startup Investing Survey"
description: "How individuals invest in early-stage startups as angels or through equity crowdfunding, and their risk tolerance."
questions:
  - id: q0
    prompt: "Have you ever invested in an early-stage startup?"
    type: single_choice
    construct: have_ever_invested_early_stage
    required: true
    options:
      - id: "a"
        label: "Yes, several times"
      - id: "b"
        label: "Yes, a few times"
      - id: "c"
        label: "Yes, once"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you been investing in startups?"
    type: single_choice
    construct: long_have_been_investing_startups
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I have never invested in startups"
  - id: q2
    prompt: "Which best describes how you invest in startups?"
    type: single_choice
    construct: best_describes_invest_startups
    required: true
    options:
      - id: "a"
        label: "Direct angel investments in companies"
      - id: "b"
        label: "Through equity crowdfunding platforms"
      - id: "c"
        label: "Through an angel syndicate or group"
      - id: "d"
        label: "As a limited partner in a venture fund"
      - id: "e"
        label: "A mix of these approaches"
  - id: q3
    prompt: "Which platforms or channels have you used to invest? (Select all that apply)"
    type: multi_choice
    construct: platforms_channels_have_used_invest
    required: true
    options:
      - id: "a"
        label: "AngelList / Republic"
      - id: "b"
        label: "Wefunder"
      - id: "c"
        label: "StartEngine"
      - id: "d"
        label: "SeedInvest"
      - id: "e"
        label: "An angel group or syndicate"
      - id: "f"
        label: "Direct deals I sourced myself"
      - id: "g"
        label: "A venture capital fund"
      - id: "h"
        label: "None of these"
  - id: q4
    prompt: "Which sectors have you invested in? (Select all that apply)"
    type: multi_choice
    construct: sectors_have_invested_select_all
    required: true
    options:
      - id: "a"
        label: "Software or SaaS"
      - id: "b"
        label: "Consumer products or apps"
      - id: "c"
        label: "Fintech"
      - id: "d"
        label: "Health or biotech"
      - id: "e"
        label: "Clean energy or climate"
      - id: "f"
        label: "Artificial intelligence"
      - id: "g"
        label: "Hardware or robotics"
      - id: "h"
        label: "Food and beverage"
  - id: q5
    prompt: "What is your primary motivation for startup investing?"
