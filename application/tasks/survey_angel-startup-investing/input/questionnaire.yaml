        label: "Potential for outsized financial returns"
      - id: "b"
        label: "Supporting founders and innovation"
      - id: "c"
        label: "Portfolio diversification"
      - id: "d"
        label: "Learning and staying connected to new ideas"
      - id: "e"
        label: "Access to deals through my network"
      - id: "f"
