schemaVersion: "1.0"
id: blue_light_glasses_usage_v1
title: "Blue-Light Glasses Usage Survey"
description: "How people use blue-light glasses for eye comfort during screen use, and their perceived benefits and attitudes."
questions:
  - id: q0
    prompt: "Do you use blue-light glasses?"
    type: single_choice
    construct: use_blue_light_glasses
    required: true
    options:
      - id: "a"
        label: "Yes, I wear them daily"
      - id: "b"
        label: "Yes, but only sometimes"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you used blue-light glasses?"
    type: single_choice
    construct: long_have_used_blue_light
    required: true
    options:
      - id: "a"
        label: "I do not use them"
      - id: "b"
        label: "Less than 6 months"
      - id: "c"
        label: "6 months to 1 year"
      - id: "d"
        label: "1 to 3 years"
      - id: "e"
        label: "More than 3 years"
  - id: q2
    prompt: "What was your main reason for trying blue-light glasses?"
    type: single_choice
    construct: was_main_reason_trying_blue
    required: true
    options:
