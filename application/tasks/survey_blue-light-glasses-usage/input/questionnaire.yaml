        label: "Eye strain or discomfort from screens"
      - id: "b"
        label: "Headaches"
      - id: "c"
        label: "Trouble sleeping after screen time"
      - id: "d"
        label: "General eye comfort"
      - id: "e"
        label: "Recommendation from someone"
      - id: "f"
        label: "I do not use them"
