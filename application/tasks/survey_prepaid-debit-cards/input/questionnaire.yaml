        label: "I don't have a traditional bank account"
      - id: "b"
        label: "To control or limit my spending"
      - id: "c"
        label: "To avoid overdraft fees"
      - id: "d"
        label: "To receive direct deposit early"
      - id: "e"
        label: "To keep certain money separate"
      - id: "f"
        label: "For online shopping safety"
      - id: "g"
        label: "To give a card to a family member or teen"
      - id: "h"
        label: "I had trouble qualifying for a bank account"
