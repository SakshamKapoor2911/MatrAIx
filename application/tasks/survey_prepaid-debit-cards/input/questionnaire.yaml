schemaVersion: "1.0"
id: prepaid_debit_cards_v1
title: "Prepaid Debit Card Survey"
description: "How people use prepaid and reloadable debit cards, including their purposes, fees, and satisfaction."
questions:
  - id: q0
    prompt: "Do you currently use a prepaid or reloadable debit card?"
    type: single_choice
    construct: currently_use_prepaid_reloadable_debit
    required: true
    options:
      - id: "a"
        label: "Yes, as my main way to spend"
      - id: "b"
        label: "Yes, but only for certain purposes"
      - id: "c"
        label: "I used to, but not anymore"
      - id: "d"
        label: "No, but I've considered it"
      - id: "e"
        label: "No, and I've never used one"
  - id: q1
    prompt: "How long have you used prepaid or reloadable debit cards?"
    type: single_choice
    construct: long_have_used_prepaid_reloadable
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 3 years"
      - id: "d"
        label: "4 to 7 years"
      - id: "e"
        label: "More than 7 years"
      - id: "f"
        label: "I don't use them"
  - id: q2
    prompt: "Which prepaid or reloadable cards do you currently use or have used? (Select all that apply)"
    type: multi_choice
    construct: prepaid_reloadable_cards_currently_use
    required: true
    options:
      - id: "a"
        label: "Netspend"
      - id: "b"
        label: "Bluebird by American Express"
      - id: "c"
        label: "Chime"
      - id: "d"
        label: "Green Dot"
      - id: "e"
        label: "PayPal Prepaid Mastercard"
      - id: "f"
        label: "Cash App card"
      - id: "g"
        label: "Walmart MoneyCard"
      - id: "h"
        label: "Varo"
      - id: "i"
        label: "A card issued by my employer or government"
      - id: "j"
        label: "None of these"
  - id: q3
    prompt: "Which card do you use most often?"
    type: single_choice
    construct: card_use_most_often
    required: true
    options:
      - id: "a"
        label: "Netspend"
      - id: "b"
        label: "Bluebird"
      - id: "c"
        label: "Chime"
      - id: "d"
        label: "Green Dot"
      - id: "e"
