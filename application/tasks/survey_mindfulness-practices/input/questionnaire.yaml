schemaVersion: "1.0"
id: mindfulness_practices_v1
title: "Mindfulness Practices Survey"
description: "How people build, sustain, and experience mindfulness and meditation practices."
questions:
  - id: q0
    prompt: "Do you currently practice mindfulness or meditation?"
    type: single_choice
    construct: currently_practice_mindfulness_meditatio
    required: true
    options:
      - id: "a"
        label: "Yes, as a regular routine"
      - id: "b"
        label: "Yes, but only occasionally"
      - id: "c"
        label: "I used to but stopped"
      - id: "d"
        label: "No, but I am interested"
      - id: "e"
        label: "No, and I am not interested"
  - id: q1
    prompt: "How long have you been practicing mindfulness or meditation?"
    type: single_choice
    construct: long_have_been_practicing_mindfulness
    required: true
    options:
      - id: "a"
        label: "Less than 3 months"
      - id: "b"
        label: "3 to 12 months"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 5 years"
      - id: "e"
        label: "More than 5 years"
      - id: "f"
        label: "I don't currently practice"
