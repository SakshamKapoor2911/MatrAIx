schemaVersion: "1.0"
id: self_hosting_apps_v1
title: "Self-Hosting Apps Survey"
description: "How hobbyists and prosumers self-host apps and services at home using Docker and tools like Nextcloud, Home Assistant, Jellyfin, and Immich."
questions:
  - id: q0
    prompt: "How often do you tinker with your self-hosted apps and services?"
    type: single_choice
    construct: often_tinker_self_hosted_apps
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "A few times a week"
      - id: "c"
        label: "A few times a month"
      - id: "d"
        label: "Rarely — I set it and forget it"
      - id: "e"
        label: "I don't self-host anything yet"
  - id: q1
    prompt: "How long have you been self-hosting apps at home?"
    type: single_choice
    construct: long_have_been_self_hosting
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "Which best describes you as a self-hoster?"
    type: single_choice
    construct: best_describes_as_self_hoster
    required: true
    options:
      - id: "a"
        label: "Curious beginner just getting started"
      - id: "b"
        label: "Hobbyist who enjoys tinkering"
      - id: "c"
        label: "Prosumer running a serious home setup"
      - id: "d"
        label: "Professional who also self-hosts at home"
      - id: "e"
        label: "I self-host mostly to save money or leave the cloud"
  - id: q3
    prompt: "Which app do you consider the centerpiece of your self-hosted setup?"
    type: single_choice
    construct: app_consider_centerpiece_self_hosted
    required: true
    options:
      - id: "a"
        label: "Home Assistant"
      - id: "b"
        label: "Nextcloud"
      - id: "c"
        label: "Jellyfin or Plex"
      - id: "d"
        label: "Immich"
      - id: "e"
        label: "Pi-hole or AdGuard Home"
      - id: "f"
        label: "A *arr media stack (Sonarr, Radarr, etc.)"
      - id: "g"
        label: "Other"
  - id: q4
    prompt: "Which self-hosted apps do you currently run? (Select all that apply)"
    type: multi_choice
