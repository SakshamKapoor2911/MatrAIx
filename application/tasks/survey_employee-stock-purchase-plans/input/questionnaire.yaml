schemaVersion: "1.0"
id: employee_stock_purchase_plans_v1
title: "Employee Stock Purchase Plan Survey"
description: "How employees use workplace stock purchase plans, including the discount, contribution rate, and the decision to hold or sell shares."
questions:
  - id: q0
    prompt: "Does your current employer offer an employee stock purchase plan (ESPP)?"
    type: single_choice
    construct: does_current_employer_offer_employee
    required: true
    options:
      - id: "a"
        label: "Yes, and I participate"
      - id: "b"
        label: "Yes, but I do not participate"
      - id: "c"
        label: "Yes, and I am eligible but haven't enrolled yet"
      - id: "d"
        label: "No"
      - id: "e"
        label: "Don't know"
  - id: q1
    prompt: "Do you currently participate in an ESPP?"
    type: single_choice
    construct: currently_participate_espp
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No, but I have in the past"
      - id: "c"
        label: "No, never"
      - id: "d"
        label: "Not applicable"
  - id: q2
    prompt: "How long have you participated in an ESPP (at any employer)?"
    type: single_choice
    construct: long_have_participated_espp_any
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "Not applicable"
  - id: q3
    prompt: "How did you first learn how your ESPP works? (Select all that apply)"
    type: multi_choice
    construct: did_first_learn_espp_works
    required: true
    options:
      - id: "a"
        label: "HR or benefits onboarding"
      - id: "b"
        label: "Company benefits documents or intranet"
      - id: "c"
        label: "A coworker or manager"
      - id: "d"
        label: "The plan administrator's website"
      - id: "e"
        label: "Online research or articles"
      - id: "f"
        label: "A financial advisor"
      - id: "g"
        label: "Social media or a financial influencer"
  - id: q4
    prompt: "How well do you understand how your ESPP works?"
    type: single_choice
    construct: well_understand_espp_works
    required: true
    options:
      - id: "a"
        label: "Not at all well"
      - id: "b"
        label: "Slightly well"
      - id: "c"
        label: "Moderately well"
      - id: "d"
        label: "Very well"
      - id: "e"
        label: "Extremely well"
  - id: q5
    prompt: "What purchase discount does your ESPP offer?"
    type: single_choice
    construct: purchase_discount_does_espp_offer
    required: true
    options:
      - id: "a"
        label: "5%"
      - id: "b"
        label: "10%"
      - id: "c"
        label: "15%"
      - id: "d"
        label: "Another discount amount"
      - id: "e"
        label: "No discount"
      - id: "f"
        label: "Don't know"
  - id: q6
    prompt: "Does your plan include a \"lookback\" provision (pricing off the lower of the start or end of the period)?"
    type: single_choice
    construct: does_plan_include_lookback_provision
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "Don't know"
  - id: q7
    prompt: "What percentage of your salary do you contribute to the ESPP?"
    type: single_choice
    construct: percentage_salary_contribute_espp
    required: true
    options:
      - id: "a"
        label: "Less than 5%"
      - id: "b"
        label: "5% to 9%"
      - id: "c"
        label: "10% to 14%"
      - id: "d"
        label: "15% (or the plan maximum)"
      - id: "e"
        label: "Not applicable"
  - id: q8
    prompt: "Approximately how much do you contribute to your ESPP per year? (Enter a whole-dollar number, or 0 if none.)"
    type: free_text
    construct: approximately_much_contribute_espp_per
    required: true
  - id: q9
    prompt: "What do you typically do with shares after they are purchased?"
    type: single_choice
    construct: typically_shares_after_they_purchased
    required: true
    options:
      - id: "a"
        label: "Sell immediately (quick sale)"
      - id: "b"
        label: "Hold for less than 1 year, then sell"
      - id: "c"
        label: "Hold more than 1 year to qualify for long-term treatment, then sell"
      - id: "d"
        label: "Hold indefinitely as a long-term investment"
      - id: "e"
        label: "Not applicable"
  - id: q10
    prompt: "What drives your decision to hold or sell ESPP shares? (Select all that apply)"
    type: multi_choice
    construct: drives_decision_hold_sell_espp
    required: true
    options:
      - id: "a"
        label: "Locking in the discount as guaranteed gain"
      - id: "b"
        label: "Avoiding too much concentration in company stock"
      - id: "c"
        label: "Qualifying for long-term capital gains tax treatment"
      - id: "d"
        label: "Belief in the company's long-term growth"
      - id: "e"
        label: "Needing the cash for expenses or goals"
      - id: "f"
        label: "Advice from a financial advisor"
      - id: "g"
        label: "Not applicable"
  - id: q11
