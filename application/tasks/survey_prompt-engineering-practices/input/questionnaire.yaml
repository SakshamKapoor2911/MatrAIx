        label: "Rephrase the instruction"
      - id: "b"
        label: "Add examples"
      - id: "c"
        label: "Add explicit constraints"
      - id: "d"
        label: "Break the task into steps"
      - id: "e"
        label: "Switch to a different model"
      - id: "f"
        label: "Adjust temperature or other parameters"
      - id: "g"
        label: "Add or edit a system prompt"
