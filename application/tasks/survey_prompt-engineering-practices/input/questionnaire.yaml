        label: "Few-shot examples"
      - id: "b"
        label: "Chain-of-thought or step-by-step reasoning"
      - id: "c"
        label: "Role or persona assignment"
      - id: "d"
        label: "System prompts or custom instructions"
      - id: "e"
        label: "Explicit output-format constraints"
      - id: "f"
        label: "Delimiters or structured input"
      - id: "g"
        label: "Retrieval or context injection (RAG)"
      - id: "h"
        label: "Self-critique or reflection"
      - id: "i"
        label: "I don't use specific techniques"
