schemaVersion: "1.0"
id: prompt_engineering_practices_v1
title: "Prompt Engineering Practices Survey"
description: "How people write, test, and refine prompts for large language models, including techniques, tools, and attitudes."
questions:
  - id: q0
    prompt: "How often do you write prompts for large language models (LLMs)?"
    type: single_choice
    construct: often_write_prompts_large_language
    required: true
    options:
      - id: "a"
        label: "Many times a day"
      - id: "b"
        label: "A few times a day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Rarely"
      - id: "f"
        label: "I don't use LLMs"
  - id: q1
    prompt: "How long have you been working with LLM prompts?"
    type: single_choice
    construct: long_have_been_working_llm
    required: true
    options:
      - id: "a"
        label: "Less than 6 months"
      - id: "b"
        label: "6 months to 1 year"
      - id: "c"
        label: "1 to 2 years"
      - id: "d"
        label: "3 to 4 years"
      - id: "e"
        label: "More than 4 years"
  - id: q2
    prompt: "In what context do you primarily use LLMs?"
    type: single_choice
    construct: context_primarily_use_llms
    required: true
    options:
      - id: "a"
        label: "Mostly for work"
      - id: "b"
        label: "Mostly for personal projects"
      - id: "c"
        label: "Equally for work and personal use"
      - id: "d"
        label: "Mostly for study or learning"
  - id: q3
    prompt: "Which LLM or assistant do you use most often for prompting?"
    type: single_choice
    construct: llm_assistant_use_most_often
    required: true
    options:
      - id: "a"
        label: "ChatGPT (OpenAI)"
      - id: "b"
        label: "Claude (Anthropic)"
      - id: "c"
        label: "Gemini (Google)"
      - id: "d"
        label: "GitHub Copilot"
      - id: "e"
        label: "Microsoft Copilot"
      - id: "f"
        label: "Llama or another open model"
      - id: "g"
        label: "Perplexity"
      - id: "h"
        label: "Other"
  - id: q4
    prompt: "Which LLMs or assistants have you used in the past year? (Select all that apply)"
