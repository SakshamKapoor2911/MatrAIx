    required: true
    options:
      - id: "a"
        label: "0 to 10 percent"
      - id: "b"
        label: "11 to 25 percent"
      - id: "c"
        label: "26 to 50 percent"
      - id: "d"
        label: "51 to 75 percent"
      - id: "e"
        label: "76 to 99 percent"
      - id: "f"
        label: "I have reached or passed it"
  - id: q12
