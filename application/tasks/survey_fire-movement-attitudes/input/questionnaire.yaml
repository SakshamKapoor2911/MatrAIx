schemaVersion: "1.0"
id: fire_movement_attitudes_v1
title: "Financial Independence, Retire Early (FIRE) Survey"
description: "Attitudes, savings behavior, and targets among people engaging with the Financial Independence, Retire Early movement."
questions:
  - id: q0
    prompt: "How familiar are you with the Financial Independence, Retire Early (FIRE) movement?"
    type: single_choice
    construct: familiar_financial_independence_retire_e
    required: true
    options:
      - id: "a"
        label: "Very familiar — I actively pursue it"
      - id: "b"
        label: "Familiar and interested in pursuing it"
      - id: "c"
        label: "Somewhat familiar"
      - id: "d"
        label: "I have heard of it but know little"
      - id: "e"
        label: "I have never heard of it before now"
  - id: q1
    prompt: "Which best describes your relationship to FIRE?"
    type: single_choice
    construct: best_describes_relationship_fire
    required: true
    options:
      - id: "a"
        label: "I have already reached financial independence"
      - id: "b"
        label: "I am actively pursuing FIRE"
      - id: "c"
        label: "I follow some FIRE principles casually"
      - id: "d"
        label: "I am interested but not yet acting on it"
      - id: "e"
        label: "I am not pursuing FIRE"
  - id: q2
    prompt: "How long have you been pursuing financial independence?"
    type: single_choice
    construct: long_have_been_pursuing_financial
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
      - id: "f"
        label: "I am not pursuing it"
  - id: q3
    prompt: "Which flavor of FIRE best matches your approach?"
    type: single_choice
    construct: flavor_fire_best_matches_approach
    required: true
    options:
      - id: "a"
        label: "Lean FIRE (minimal expenses)"
      - id: "b"
        label: "Regular FIRE"
      - id: "c"
        label: "Fat FIRE (high spending)"
      - id: "d"
        label: "Barista FIRE (part-time work)"
      - id: "e"
        label: "Coast FIRE (let investments grow)"
      - id: "f"
        label: "I do not identify with a specific type"
  - id: q4
    prompt: "What is your current savings rate (share of after-tax income you save or invest)?"
    type: single_choice
    construct: current_savings_rate_share_after
    required: true
    options:
      - id: "a"
        label: "Under 10 percent"
      - id: "b"
        label: "10 to 19 percent"
      - id: "c"
        label: "20 to 29 percent"
      - id: "d"
        label: "30 to 39 percent"
      - id: "e"
        label: "40 to 49 percent"
      - id: "f"
        label: "50 to 64 percent"
      - id: "g"
        label: "65 percent or more"
  - id: q5
    prompt: "What is your target retirement age?"
    type: single_choice
    construct: target_retirement_age
    required: true
    options:
      - id: "a"
        label: "Under 35"
      - id: "b"
        label: "35 to 39"
      - id: "c"
        label: "40 to 44"
      - id: "d"
        label: "45 to 49"
      - id: "e"
        label: "50 to 54"
      - id: "f"
        label: "55 to 59"
      - id: "g"
        label: "60 or older"
  - id: q6
    prompt: "What motivates you to pursue financial independence? (Select all that apply)"
    type: multi_choice
    construct: motivates_pursue_financial_independence_
    required: true
    options:
      - id: "a"
        label: "Freedom to leave a job I dislike"
      - id: "b"
        label: "More time with family"
      - id: "c"
        label: "Ability to travel"
      - id: "d"
        label: "Reduced financial stress"
      - id: "e"
        label: "Pursuing passion projects"
      - id: "f"
        label: "Escaping burnout"
      - id: "g"
        label: "Security against layoffs or emergencies"
      - id: "h"
        label: "Retiring earlier than normal"
  - id: q7
    prompt: "Which strategies do you use to reach your goal? (Select all that apply)"
    type: multi_choice
    construct: strategies_use_reach_goal_select
    required: true
    options:
      - id: "a"
        label: "Aggressive saving and budgeting"
      - id: "b"
        label: "Index fund investing"
      - id: "c"
        label: "Real estate investing"
      - id: "d"
        label: "Side hustles or extra income"
      - id: "e"
        label: "Maximizing tax-advantaged accounts"
      - id: "f"
        label: "Frugality and minimalism"
      - id: "g"
        label: "Increasing my primary income"
      - id: "h"
        label: "Geographic arbitrage (living somewhere cheaper)"
  - id: q8
    prompt: "Which accounts do you use to build toward FIRE? (Select all that apply)"
    type: multi_choice
    construct: accounts_use_build_toward_fire
    required: true
    options:
      - id: "a"
        label: "401(k) or 403(b)"
      - id: "b"
        label: "Traditional or Roth IRA"
      - id: "c"
        label: "Taxable brokerage account"
      - id: "d"
        label: "Health Savings Account (HSA)"
      - id: "e"
        label: "Real estate"
      - id: "f"
        label: "High-yield savings account"
      - id: "g"
        label: "529 or other accounts"
  - id: q9
    prompt: "What is your FIRE number — the portfolio size you are targeting, in U.S. dollars? Please enter a number."
    type: free_text
    construct: fire_number_portfolio_size_targeting
    required: true
  - id: q10
    prompt: "What annual spending do you expect in early retirement, in U.S. dollars? Please enter a number."
    type: free_text
    construct: annual_spending_expect_early_retirement
    required: true
  - id: q11
    prompt: "About what percentage of the way to your FIRE number are you today?"
    type: single_choice
