    required: true
    options:
      - id: "a"
        label: "Under 3 percent"
      - id: "b"
        label: "3 to 3.5 percent"
      - id: "c"
        label: "About 4 percent"
      - id: "d"
        label: "More than 4 percent"
      - id: "e"
        label: "I have not decided"
      - id: "f"
