schemaVersion: "1.0"
id: balance_transfer_usage_v1
title: "Balance Transfer Credit Card Survey"
description: "How people use balance-transfer credit cards and 0% APR offers to consolidate and pay down credit card debt, and the outcomes they experience."
questions:
  - id: q0
    prompt: "In the past 2 years, have you used a balance transfer to move debt from one credit card to another?"
    type: single_choice
    construct: past_2_years_have_used
    required: true
    options:
      - id: "a"
        label: "Yes, once"
      - id: "b"
        label: "Yes, more than once"
      - id: "c"
        label: "No, but I have considered it"
      - id: "d"
        label: "No, never"
      - id: "e"
        label: "Not sure what that is"
  - id: q1
    prompt: "What was your main reason for doing (or considering) a balance transfer?"
    type: single_choice
    construct: was_main_reason_doing_considering
    required: true
    options:
      - id: "a"
        label: "Pay down debt faster"
      - id: "b"
        label: "Save on interest"
      - id: "c"
        label: "Consolidate multiple balances"
      - id: "d"
        label: "Lower my monthly payment"
      - id: "e"
        label: "Not applicable"
  - id: q2
    prompt: "Do you currently carry a balance on any credit card?"
    type: single_choice
    construct: currently_carry_balance_any_credit
    required: true
    options:
      - id: "a"
        label: "Yes, on one card"
      - id: "b"
        label: "Yes, on multiple cards"
      - id: "c"
        label: "No, I pay in full"
      - id: "d"
        label: "Prefer not to say"
  - id: q3
    prompt: "About how much credit card debt do you currently carry in total, in U.S. dollars? Enter a whole number (0 if none)."
    type: free_text
    construct: much_credit_card_debt_currently
    required: true
  - id: q4
    prompt: "What types of debt have you moved using a balance transfer? (Select all that apply)"
    type: multi_choice
    construct: types_debt_have_moved_using
    required: true
    options:
      - id: "a"
        label: "Credit card balances"
      - id: "b"
        label: "Store card balances"
      - id: "c"
        label: "A personal loan"
      - id: "d"
        label: "Medical debt"
      - id: "e"
        label: "Financing on a purchase"
      - id: "f"
        label: "Another balance transfer card"
      - id: "g"
        label: "None"
  - id: q5
    prompt: "Which card did you most recently use for a balance transfer?"
    type: single_choice
    construct: card_did_most_recently_use
    required: true
    options:
      - id: "a"
        label: "Citi Diamond Preferred"
      - id: "b"
        label: "Citi Double Cash"
      - id: "c"
        label: "Chase Freedom Unlimited or Flex"
      - id: "d"
        label: "Discover it"
      - id: "e"
        label: "Wells Fargo Reflect"
      - id: "f"
        label: "Bank of America (BankAmericard)"
      - id: "g"
        label: "Capital One"
      - id: "h"
        label: "U.S. Bank"
      - id: "i"
        label: "An American Express card"
      - id: "j"
        label: "Another issuer"
      - id: "k"
        label: "I have not done a balance transfer"
  - id: q6
    prompt: "What intro (promotional) 0% APR period did your balance transfer card offer?"
    type: single_choice
    construct: intro_promotional_0_apr_period
    required: true
    options:
      - id: "a"
        label: "6 to 11 months"
      - id: "b"
        label: "12 months"
      - id: "c"
        label: "15 months"
      - id: "d"
        label: "18 months"
      - id: "e"
        label: "21 months"
      - id: "f"
        label: "Not sure"
  - id: q7
    prompt: "What balance transfer fee did you pay?"
    type: single_choice
    construct: balance_transfer_fee_did_pay
    required: true
    options:
      - id: "a"
        label: "No fee"
      - id: "b"
        label: "3%"
      - id: "c"
        label: "4%"
      - id: "d"
        label: "5%"
      - id: "e"
        label: "Not sure"
  - id: q8
    prompt: "About how much did you transfer in your most recent balance transfer, in U.S. dollars? Enter a whole number."
    type: free_text
    construct: much_did_transfer_most_recent
    required: true
  - id: q9
    prompt: "How did you find your balance transfer card?"
    type: single_choice
    construct: did_find_balance_transfer_card
    required: true
    options:
      - id: "a"
        label: "A pre-approved offer in the mail"
      - id: "b"
        label: "My existing bank or issuer"
      - id: "c"
        label: "A comparison site such as NerdWallet or Bankrate"
      - id: "d"
        label: "A recommendation"
      - id: "e"
        label: "I searched online myself"
  - id: q10
    prompt: "What features did you look for in a balance transfer card? (Select all that apply)"
    type: multi_choice
    construct: features_did_look_balance_transfer
    required: true
    options:
      - id: "a"
        label: "A long 0% intro period"
      - id: "b"
        label: "No or low transfer fee"
      - id: "c"
        label: "No annual fee"
      - id: "d"
        label: "A high credit limit"
      - id: "e"
        label: "Rewards after payoff"
      - id: "f"
        label: "A low ongoing APR"
      - id: "g"
        label: "A reputable issuer"
      - id: "h"
        label: "An easy online application"
  - id: q11
    prompt: "How much of your available balance transfer limit did you use?"
    type: single_choice
    construct: much_available_balance_transfer_limit
    required: true
    options:
      - id: "a"
        label: "Under 25%"
      - id: "b"
        label: "25% to 49%"
      - id: "c"
        label: "50% to 74%"
      - id: "d"
        label: "75% to 99%"
      - id: "e"
        label: "The full amount"
      - id: "f"
        label: "Not sure"
  - id: q12
