    required: true
    options:
      - id: "a"
        label: "No, I only paid down the transferred balance"
      - id: "b"
        label: "Yes, a few purchases"
      - id: "c"
        label: "Yes, regularly"
      - id: "d"
        label: "Not sure"
  - id: q13
    prompt: "How much do you agree with the following statement about your balance transfer: It helped me pay down my debt faster."
    type: single_choice
    construct: much_agree_following_statement_balance
    required: true
