        label: "Cost or copay too high"
      - id: "b"
        label: "Long wait for an appointment"
      - id: "c"
        label: "No provider nearby"
      - id: "d"
        label: "Could not get time off work"
      - id: "e"
        label: "Did not think it was serious enough"
      - id: "f"
        label: "Insurance would not cover it"
      - id: "g"
        label: "I have not skipped or delayed care"
  - id: q10
    prompt: "About how far do you have to travel to reach the nearest dermatologist, in miles? Please enter a number."
