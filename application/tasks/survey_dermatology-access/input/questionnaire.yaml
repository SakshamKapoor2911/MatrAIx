schemaVersion: "1.0"
id: dermatology_access_v1
title: "Dermatology Access Survey"
description: "How people access dermatology and skin-care services, including teledermatology, and their experiences and attitudes toward that care."
questions:
  - id: q0
    prompt: "Have you ever seen a dermatologist or skin-care provider?"
    type: single_choice
    construct: have_ever_seen_dermatologist_skin
    required: true
    options:
      - id: "a"
        label: "Yes, within the past year"
      - id: "b"
        label: "Yes, within the past 1 to 3 years"
      - id: "c"
        label: "Yes, but more than 3 years ago"
      - id: "d"
        label: "No, never"
  - id: q1
    prompt: "In the past 12 months, how many times have you visited a dermatology or skin-care provider (in person or virtually)?"
    type: single_choice
    construct: past_12_months_many_times
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "Once"
      - id: "c"
        label: "2 to 3 times"
      - id: "d"
        label: "4 to 6 times"
      - id: "e"
        label: "More than 6 times"
  - id: q2
    prompt: "What most often prompts you to seek out a dermatologist?"
    type: single_choice
    construct: most_often_prompts_seek_out
    required: true
    options:
      - id: "a"
        label: "A specific skin concern (rash, breakout, mole)"
      - id: "b"
        label: "A routine annual skin check"
      - id: "c"
        label: "A cosmetic or appearance concern"
      - id: "d"
        label: "A referral from another doctor"
      - id: "e"
        label: "I have not sought out a dermatologist"
  - id: q3
    prompt: "Which types of skin or hair concerns have led you to seek care? (Select all that apply)"
    type: multi_choice
    construct: types_skin_hair_concerns_have
    required: true
    options:
      - id: "a"
        label: "Acne"
      - id: "b"
        label: "Eczema or dry skin"
      - id: "c"
        label: "Suspicious moles or spots"
      - id: "d"
        label: "Rosacea or redness"
      - id: "e"
        label: "Hair loss or thinning"
      - id: "f"
        label: "Nail concerns"
      - id: "g"
        label: "Signs of aging or wrinkles"
      - id: "h"
        label: "Excessive sweating"
      - id: "i"
        label: "None of the above"
  - id: q4
    prompt: "How do you usually find or choose a dermatologist? (Select all that apply)"
    type: multi_choice
    construct: usually_find_choose_dermatologist_select
    required: true
    options:
      - id: "a"
        label: "Referral from my primary care doctor"
      - id: "b"
        label: "Recommendation from friends or family"
      - id: "c"
        label: "My insurance provider directory"
      - id: "d"
        label: "Online reviews (Google, Healthgrades, Zocdoc)"
      - id: "e"
        label: "Social media or influencer recommendations"
      - id: "f"
        label: "Whoever is available soonest"
      - id: "g"
        label: "I have not chosen a dermatologist"
  - id: q5
    prompt: "How long did you wait for your most recent dermatology appointment (from booking to visit)?"
    type: single_choice
    construct: long_did_wait_most_recent
    required: true
    options:
      - id: "a"
        label: "Same or next day"
      - id: "b"
        label: "Within a week"
      - id: "c"
        label: "1 to 4 weeks"
      - id: "d"
        label: "1 to 3 months"
      - id: "e"
        label: "More than 3 months"
      - id: "f"
        label: "I have never booked one"
  - id: q6
    prompt: "Have you ever used a teledermatology or virtual skin-care service?"
    type: single_choice
    construct: have_ever_used_teledermatology_virtual
    required: true
    options:
      - id: "a"
        label: "Yes, and I use it regularly"
      - id: "b"
        label: "Yes, once or twice"
      - id: "c"
        label: "No, but I would consider it"
      - id: "d"
        label: "No, and I would not consider it"
  - id: q7
    prompt: "Which teledermatology or skin-care apps or services have you used? (Select all that apply)"
    type: multi_choice
    construct: teledermatology_skin_care_apps_services
    required: true
    options:
      - id: "a"
        label: "Apostrophe"
      - id: "b"
        label: "Curology"
      - id: "c"
        label: "Hims or Hers"
      - id: "d"
        label: "Nurx"
      - id: "e"
        label: "My provider's own telehealth portal"
      - id: "f"
        label: "Teladoc or Amwell"
      - id: "g"
        label: "MDacne"
      - id: "h"
        label: "None of these"
  - id: q8
    prompt: "How do you typically pay for dermatology visits?"
    type: single_choice
    construct: typically_pay_dermatology_visits
    required: true
    options:
      - id: "a"
        label: "Private health insurance"
      - id: "b"
        label: "Medicare or Medicaid"
      - id: "c"
        label: "Out of pocket, no insurance"
      - id: "d"
        label: "Health savings or flexible spending account"
      - id: "e"
        label: "A subscription service"
      - id: "f"
        label: "A mix of these"
  - id: q9
    prompt: "In the past year, have you skipped or delayed dermatology care for any of these reasons? (Select all that apply)"
    type: multi_choice
    construct: past_year_have_skipped_delayed
    required: true
    options:
