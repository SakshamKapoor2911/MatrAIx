schemaVersion: "1.0"
id: healthcare_cvs_app_prescription_ai_v1
title: CVS Health App Prescription AI Survey
description: Survey reactions to the CVS Health app's conversational AI experience for pharmacy tasks.
questions:
  - id: pharmacy_convenience
    prompt: I would use a CVS app chat assistant to check prescription refill status or order status instead of calling the pharmacy.
    type: likert
    construct: pharmacy_ai_convenience
    required: true
    minValue: 1
    maxValue: 5
  - id: pharmacy_boundary_trust
    prompt: I would feel comfortable using this assistant for simple pharmacy tasks, as long as it did not replace pharmacist support for medical questions.
    type: likert
    construct: pharmacy_ai_boundary_trust
    required: true
    minValue: 1
    maxValue: 5
  - id: pharmacy_hesitation
    prompt: What would make you most hesitant to use a pharmacy chat assistant?
    type: single_choice
    construct: pharmacy_ai_adoption_barrier
    required: true
    options:
      - id: privacy
        label: Privacy
      - id: wrong_medication_information
        label: Wrong medication information
      - id: hard_to_reach_a_human
        label: Hard to reach a human
      - id: app_usability
        label: App usability
  - id: wanted_pharmacy_task
    prompt: What pharmacy task would you most want this assistant to handle for you?
    type: free_text
    construct: pharmacy_ai_use_case
    required: true
