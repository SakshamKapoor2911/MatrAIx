schemaVersion: "1.0"
id: debt_consolidation_v1
title: "Debt Consolidation Survey"
description: "How people combine multiple debts into a single loan or program, why they do it, which providers they use, and what results they see."
questions:
  - id: q0
    prompt: "Which of the following best describes your experience with debt consolidation?"
    type: single_choice
    construct: following_best_describes_experience_debt
    required: true
    options:
      - id: "a"
        label: "I currently have an active debt consolidation loan or program"
      - id: "b"
        label: "I paid off a debt consolidation loan or completed a program in the past"
      - id: "c"
        label: "I am actively considering consolidating my debt right now"
      - id: "d"
        label: "I researched it but decided against it"
      - id: "e"
        label: "I have never consolidated debt and am not considering it"
  - id: q1
    prompt: "Roughly how many separate debts (credit cards, loans, etc.) do you currently carry?"
    type: single_choice
    construct: roughly_many_separate_debts_credit
    required: true
    options:
      - id: "a"
        label: "None"
      - id: "b"
        label: "1 to 2"
      - id: "c"
        label: "3 to 4"
      - id: "d"
        label: "5 to 7"
      - id: "e"
        label: "8 or more"
  - id: q2
    prompt: "Approximately what is your total non-mortgage debt right now?"
    type: single_choice
    construct: approximately_total_non_mortgage_debt
    required: true
    options:
      - id: "a"
        label: "Less than $2,500"
      - id: "b"
        label: "$2,500 to $9,999"
      - id: "c"
        label: "$10,000 to $24,999"
      - id: "d"
        label: "$25,000 to $49,999"
      - id: "e"
        label: "$50,000 to $99,999"
      - id: "f"
        label: "$100,000 or more"
      - id: "g"
        label: "Prefer not to say"
  - id: q3
    prompt: "Which types of debt have you carried in the past few years? (Select all that apply)"
    type: multi_choice
    construct: types_debt_have_carried_past
    required: true
    options:
      - id: "a"
        label: "Credit card balances"
      - id: "b"
        label: "Store or retail cards"
      - id: "c"
        label: "Personal loans"
      - id: "d"
        label: "Medical bills"
      - id: "e"
        label: "Student loans"
      - id: "f"
        label: "Auto loans"
      - id: "g"
        label: "Payday or short-term loans"
      - id: "h"
        label: "Buy now, pay later balances"
      - id: "i"
        label: "Tax debt"
  - id: q4
    prompt: "When did you most recently consolidate your debt (or start a program)?"
    type: single_choice
    construct: when_did_most_recently_consolidate
    required: true
    options:
