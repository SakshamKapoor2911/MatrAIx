schemaVersion: "1.0"
id: pet_insurance_v1
title: "Pet Insurance Survey"
description: "How pet owners choose, use, and evaluate pet health insurance, including plan design, cost, claims, and provider satisfaction."
questions:
  - id: q0
    prompt: "Do you currently own a pet (dog, cat, or other)?"
    type: single_choice
    construct: currently_own_pet_dog_cat
    required: true
    options:
      - id: "a"
        label: "Yes, one pet"
      - id: "b"
        label: "Yes, more than one pet"
      - id: "c"
        label: "No, but I owned a pet recently"
      - id: "d"
        label: "No"
  - id: q1
    prompt: "Do you currently have a pet health insurance policy for any of your pets?"
    type: single_choice
    construct: currently_have_pet_health_insurance
    required: true
    options:
      - id: "a"
        label: "Yes, an active policy"
      - id: "b"
        label: "No, but I had one before"
      - id: "c"
        label: "No, I have never had it"
      - id: "d"
        label: "I am considering it"
      - id: "e"
        label: "Not sure"
  - id: q2
    prompt: "How many pets do you currently own? Please enter a whole number."
    type: free_text
    construct: many_pets_currently_own_please
    required: true
  - id: q3
    prompt: "Which type of pet is covered (or would you insure) by pet insurance?"
    type: single_choice
    construct: type_pet_covered_would_insure
    required: true
    options:
      - id: "a"
        label: "A dog"
      - id: "b"
        label: "A cat"
      - id: "c"
        label: "Both dogs and cats"
      - id: "d"
        label: "Another type of pet"
      - id: "e"
        label: "Not applicable"
  - id: q4
    prompt: "Why do you have (or would you consider) pet insurance? (Select all that apply)"
    type: multi_choice
    construct: why_have_would_consider_pet
    required: true
    options:
      - id: "a"
        label: "Cover unexpected accidents"
      - id: "b"
        label: "Cover illness or disease"
      - id: "c"
        label: "Cover expensive surgeries"
      - id: "d"
        label: "Manage chronic condition costs"
      - id: "e"
        label: "Peace of mind"
      - id: "f"
        label: "My pet's breed is prone to health issues"
      - id: "g"
        label: "My pet is aging"
      - id: "h"
        label: "Recommended by my veterinarian"
  - id: q5
    prompt: "How long have you had pet insurance (current or most recent policy)?"
    type: single_choice
    construct: long_have_had_pet_insurance
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 years or more"
      - id: "e"
        label: "I have never had it"
  - id: q6
    prompt: "Who is your current pet insurance provider?"
    type: single_choice
