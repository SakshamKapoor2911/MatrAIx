schemaVersion: "1.0"
id: linting_and_formatting_tools_v1
title: "Linting and Formatting Tools Survey"
description: "How developers adopt, configure, and feel about code linters and formatters."
questions:
  - id: q0
    prompt: "How often do you use a linter or code formatter?"
    type: single_choice
    construct: often_use_linter_code_formatter
    required: true
    options:
      - id: "a"
        label: "Constantly, it runs as I type"
      - id: "b"
        label: "Every day"
      - id: "c"
        label: "A few times a week"
      - id: "d"
        label: "Occasionally"
      - id: "e"
        label: "Never"
  - id: q1
    prompt: "How long have you been using linters or formatters in your work?"
    type: single_choice
    construct: long_have_been_using_linters
    required: true
    options:
      - id: "a"
        label: "Less than 1 year"
      - id: "b"
        label: "1 to 2 years"
      - id: "c"
        label: "3 to 5 years"
      - id: "d"
        label: "6 to 10 years"
      - id: "e"
        label: "More than 10 years"
  - id: q2
    prompt: "What best describes your relationship to linting and formatting tools?"
    type: single_choice
    construct: best_describes_relationship_linting_form
    required: true
    options:
      - id: "a"
        label: "I set up and maintain the team's configuration"
      - id: "b"
        label: "I use whatever the team has configured"
      - id: "c"
        label: "I configure my own personal setup"
      - id: "d"
        label: "I rarely think about them"
      - id: "e"
        label: "I don't use them"
  - id: q3
    prompt: "Which linter do you use most often?"
    type: single_choice
    construct: linter_use_most_often
    required: true
    options:
      - id: "a"
        label: "ESLint"
      - id: "b"
        label: "Ruff"
      - id: "c"
        label: "Pylint"
      - id: "d"
        label: "Flake8"
      - id: "e"
        label: "RuboCop"
      - id: "f"
        label: "golangci-lint"
      - id: "g"
        label: "Clippy (Rust)"
      - id: "h"
        label: "Biome"
      - id: "i"
        label: "Other"
      - id: "j"
        label: "I don't use a linter"
  - id: q4
    prompt: "Which code formatter do you use most often?"
    type: single_choice
    construct: code_formatter_use_most_often
