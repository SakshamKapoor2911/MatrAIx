# Auto-label PRs by clean-main module area.

"team: persona":
  - changed-files:
      - any-glob-to-any-file:
          - persona/**

"team: application":
  - changed-files:
      - any-glob-to-any-file:
          - application/**

"team: environment":
  - changed-files:
      - any-glob-to-any-file:
          - environment/**
          - configs/**

"tooling":
  - changed-files:
      - any-glob-to-any-file:
          - apps/**
          - packages/**
          - tests/**
          - .github/**
          - pyproject.toml

"documentation":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - migration/**
          - CONTRIBUTING.md
          - README.md

"migration":
  - changed-files:
      - any-glob-to-any-file:
          - docs/migration/**
          - migration/matraix/**
