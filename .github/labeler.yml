# Auto-label PRs by team area

"team: persona":
  - changed-files:
      - any-glob-to-any-file:
          - persona/**

"team: application":
  - changed-files:
      - any-glob-to-any-file:
          - application/**

"documentation":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - CONTRIBUTING.md
          - README.md

"migration":
  - changed-files:
      - any-glob-to-any-file:
          - docs/migration/**
          - migration/matraix/**

"team: environment":
  - changed-files:
      - any-glob-to-any-file:
          - environment/**
          - src/**
          - configs/**
          - apps/**
          - packages/**
          - tests/**
          - .github/**
          - pyproject.toml
          - uv.lock
          - .gitignore
