name: Python Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install package and test dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e .
          uv pip install -e packages/playground
          uv pip install -e packages/harbor-langsmith
          uv pip install -e packages/rewardkit
          uv pip install -e environment/adapters/simpleqa
          uv pip install pytest pytest-asyncio httpx

      - name: Run curated test suite
        env:
          PYTHONPATH: .:environment/runtime:packages/playground/src:application/playground
        run: |
          uv run pytest tests/ \
            packages/harbor-langsmith/tests/ \
            packages/rewardkit/tests/ \
            application/playground/backend/tests/test_api_schemas.py \
            application/playground/backend/tests/test_application_types.py \
            application/playground/backend/tests/test_config.py \
            application/playground/backend/tests/test_harbor_chat_eval.py \
            application/playground/backend/tests/test_harbor_chat_mcp_session.py \
            application/playground/backend/tests/test_harbor_job_service.py \
            application/playground/backend/tests/test_harbor_jobs_api.py \
            application/playground/backend/tests/test_harbor_playground.py \
            application/playground/backend/tests/test_harbor_survey_eval.py \
            application/playground/backend/tests/test_harbor_web_trace.py \
            application/playground/backend/tests/test_job_aggregation.py \
            application/playground/backend/tests/test_persona_pool_service.py \
            application/playground/backend/tests/test_post_run_feedback.py \
            application/playground/backend/tests/test_remote_runner_client.py \
            application/playground/backend/tests/test_remote_runner_dispatch.py \
            application/playground/backend/tests/test_remote_runner_harbor_job_service.py \
            application/playground/backend/tests/test_remote_runner_server.py \
            application/playground/backend/tests/test_task_detail_service.py \
            application/playground/backend/tests/test_trial_events.py \
            tests/environment/test_application_tasks.py
