name: Viewer Typecheck

on:
  pull_request:
    paths:
      - "apps/viewer/**"
      - ".github/workflows/viewer.yml"
      - "tests/unit/viewer/test_frontend_environment.py"
  push:
    branches:
      - main
    paths:
      - "apps/viewer/**"
      - ".github/workflows/viewer.yml"
      - "tests/unit/viewer/test_frontend_environment.py"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/viewer/.node-version
          cache: npm
          cache-dependency-path: apps/viewer/package-lock.json
      - run: npm ci
      - run: npm run typecheck
