version = "1.0"

artifacts = ["/app/output"]

[task]
name = "matraix/acme-support-mcp"
keywords = ["matraix", "chat", "mcp"]

[metadata]
difficulty = "easy"
category = "chat"
tags = ["matraix", "persona", "mcp", "conversational"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0

[[environment.mcp_servers]]
name = "acme-support"
transport = "streamable-http"
url = "http://support-bot:8000/mcp"
args = []
