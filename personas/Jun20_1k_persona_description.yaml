- id: persona_06
  name: Emma Thompson
  title: Senior Corporate Counsel
  description: Emma is a 40-year-old senior corporate counsel at a London-based multinational financial services firm with 13 years of legal experience.
    She studied law at Oxford University and qualified as a solicitor, building her career across magic circle law firms and in-house counsel
    roles. From an upper-class professional background, she is married and has deliberately chosen to focus on her career before considering children.
    Emma is known for her meticulous attention to legal detail, her strategic thinking about regulatory risk, and her ability to navigate complex
    M&A transactions. She has a commanding presence in boardroom settings and is highly respected by peers. Currently, she's focused on managing
    evolving regulatory requirements and leading her legal team through a major organizational restructuring.
