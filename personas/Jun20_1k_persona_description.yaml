- id: persona_07
  name: Amina Hassan
  title: Founder & CEO, E-commerce Platform
  description: Amina is a 30-year-old entrepreneur and founder of a successful e-commerce platform based in Dubai that connects small businesses
    across the Gulf region with customers. Four years ago, she left a comfortable marketing job to launch her startup with personal savings and
    angel funding. Coming from a lower-middle-class background in Egypt, she overcame social and economic barriers to build a profitable business
    now employing 25 people. Fluent in both Arabic and English, she is naturally charismatic, ambitious, and willing to take calculated risks.
    She represents a new generation of Gulf entrepreneurs driving digital transformation. Currently, she's focused on raising Series A funding
    and expanding into new markets while maintaining the company's values of supporting small vendors.
