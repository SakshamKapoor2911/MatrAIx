- id: persona_01
  name: Sarah Chen
  title: Senior ML Engineer
  description: Sarah is a 38-year-old woman engineer in Shanghai leading a machine learning team at a major tech corporation. With 12 years of
    experience starting from entry-level software development, she earned her Master's degree in computer science from Tsinghua University and
    has grown into a senior engineering leadership role. Fluent in both Mandarin and English, Sarah is married with one child and comes from an
    upper-middle-class background that emphasized education. She's known for her analytical mindset, deep focus, and drive to solve complex technical
    problems. Currently, she's motivated to advance her team's model architecture and mentor junior engineers.
