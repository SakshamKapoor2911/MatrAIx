- id: persona_04
  name: Diego Ruiz
  title: Freelance Graphic Designer
  description: Diego is a 23-year-old freelance graphic designer in Mexico City who recently completed a design bootcamp and launched his independent
    career. While he only has high school formal education, his natural talent for visual design and self-taught skills in Adobe Creative Suite
    have opened opportunities. From a lower-middle-class background, Diego is driven by passion rather than pedigree. Fluent in Spanish with intermediate
    English, he's naturally creative, socially engaged, and eager to expand his international client base. He works from cafés and coworking spaces,
    balancing multiple small projects. Currently, he's focused on building a strong design portfolio and establishing long-term client relationships.
