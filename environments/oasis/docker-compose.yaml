  dashboard:
    build:
      context: ../..
      dockerfile: environments/oasis/gui/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./output:/app/output
    environment:
      - DB_PATH=/app/output/simulation.db
      - PORT=3000
    depends_on:
