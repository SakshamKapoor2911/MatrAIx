services:
  platform:
    build:
      context: ../..
      dockerfile: environments/oasis/platform/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - DB_PATH=/app/output/simulation.db
      - RECSYS_TYPE=random
      - MAX_REC_POSTS=50
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent-01:
    build:
      context: ../..
      dockerfile: environments/oasis/agents/Dockerfile
    environment:
      - PLATFORM_URL=http://platform:8000
      - PERSONA_PATH=personas/Jun20_1k_persona_description/ID0001.yaml
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8002/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-8B}
      - LLM_API_KEY=${LLM_API_KEY:-no-key}
      - NUM_STEPS=${NUM_STEPS:-20}
      - AGENT_ID=0
    depends_on:
      platform:
        condition: service_healthy

  agent-02:
    build:
      context: ../..
      dockerfile: environments/oasis/agents/Dockerfile
    environment:
      - PLATFORM_URL=http://platform:8000
      - PERSONA_PATH=personas/Jun20_1k_persona_description/ID0002.yaml
