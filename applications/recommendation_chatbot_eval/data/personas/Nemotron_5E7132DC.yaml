personas:
  professional: Randy Dodd, a budding kindergarten researcher who loves dismantling
    toy cars to discover how gears work, blends curiosity with practicality by documenting
    findings in a bright notebook, and they are known for their calm resilience that
    makes them a reliable problem‑solver in play‑based projects.
  sports: Randy Dodd, a member of the Quitman Peewee Soccer Club who energetically
    kicks the ball at Saturday practice, cheers for the New Orleans Saints and LSU
    Tigers, and they treat every backyard race as a chance to prove their speed, balancing
    a love of competition with a relaxed attitude toward losing.
  arts: Randy Dodd, an avid fan of Disney’s Frozen soundtrack, enthusiastic imitator
    of Sesame Street characters, and budding crayon artist who fills every spare surface
    with bright dinosaurs, finds inspiration in the church choir’s gospel hymns and
    they love to perform improvised songs for family gatherings.
  travel: Randy Dodd, who has visited the Gulf Coast beaches of Grand Isle, explored
    the lively Mardi Mardi floats in New Orleans, and taken a family camping trip
    to the Atchafalaya Swamp, prefers road trips with frequent snack stops, and they
    dream of seeing the snow‑capped mountains of Colorado someday.
  culinary: Randy Dodd, who can’t yet cook, delights in helping stir the pot of jambalaya
    during family gatherings, loves the buttery crunch of fried catfish, the tangy
    zest of crawfish étouffée, and the sweet cotton candy at fairs, and they eagerly
    request extra mac and cheese at school lunches.
  core: Randy Dodd, a five‑year‑old with a calm, resilient demeanor, balances curiosity
    and practicality, thrives on nature walks and toy experiments, and never misses
    a chance to challenge a friend to a race, even if they sometimes get distracted
    by shiny rocks.
background:
  cultural: Randy comes from a white, Southern‑Louisiana family in Quitman, Jackson
    Parish. His upbringing includes regular church attendance at a Baptist congregation,
    family gatherings featuring Cajun‑influenced meals such as jambalaya and crawfish
    boils, and community events like the local Fourth of July parade and Mardi Gras
    celebrations. Growing up in a rural setting, he has a close connection to the
    outdoors, local wildlife, and the community values of hospitality and self‑reliance.
