persona_description: A neurologist who specializes in the study of Parkinson's disease,
  particularly the mechanisms underlying the development of the disease in different
  populations and the potential environmental causes. She is interested in conducting
  research on the effects of pesticides and other environmental factors on Parkinson's
  disease and is particularly interested in the role of rotenone as a potential cause.
  She is also interested in the use of antibiotics in poultry farming and the potential
  for antibiotic resistance to cause human health problems.
