personas:
  professional: Ronald Gomez, a 10‑year‑old budding illustrator and storyteller, spends
    hours sketching fantasy characters, channeling his vivid imagination into detailed
    comic‑style drawings while balancing school assignments with his creative projects.
  sports: Ronald Gomez plays on the neighborhood soccer club’s under‑11 team, idolizes
    the LA Galaxy, and spends weekends practicing free‑throw drills at the local community
    center, while also enjoying occasional family bike rides along the river trail.
  arts: Ronald Gomez, a passionate young member of his school’s art club, draws inspiration
    from graphic novel legends like Neil Gaiman and Stan Lee, listens to instrumental
    indie bands such as Explosions in the Sky, and frequently visits street‑art murals
    to study color palettes and composition.
  travel: Ronald Gomez loves family outings to the city museum, the interactive science
    exhibit at the local Children’s Museum, and annual trips to Disneyland, while
    dreaming of exploring the castles of Scotland and the ancient ruins of Machu Picchu
    when he’s older.
  culinary: Ronald Gomez enjoys building elaborate LEGO kitchens and then cooking
    simple dishes like cheese‑filled quesadillas, spaghetti with marinara sauce, and
    strawberry banana smoothies, favoring fresh ingredients such as cheddar cheese,
    ripe bananas, and chocolate chips.
  core: Ronald Gomez is an imaginative, anxiety‑prone 10‑year‑old who balances a love
    for fantasy art and LEGO building with occasional impulsive spending and a diligent,
    if sometimes overwhelmed, approach to school and friendships.
background:
  cultural: Ronald grows up in Brooklyn's vibrant, multicultural neighborhoods, where
    diverse cuisines, street art, and community festivals are part of everyday life.
    His family, identifying as white American, emphasizes education, individuality,
    and social responsibility. The urban environment exposes him to a wide range of
    cultures and perspectives, nurturing his curiosity while his upbringing stresses
    kindness, cooperation, and emotional awareness, supporting his highly reactive
    emotional nature.
