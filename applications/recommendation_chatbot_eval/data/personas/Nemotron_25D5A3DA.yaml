  career_goals: Ronald dreams of becoming a graphic novelist or animation artist who
    can bring imaginative worlds to life, and he also imagines using his art to raise
    awareness about mental health and kindness. He hopes to attend a specialized arts
    high school, study illustration in college, and eventually work on comic books,
    animated series, or community art projects that inspire creativity and empathy
    in others.
