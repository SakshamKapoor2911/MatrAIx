personas:
  professional: Jacob Bowden, a seasoned painter with over three decades of experience
    in residential and commercial projects, leverages meticulous surface preparation,
    eco‑friendly colour matching, and a competitive drive to deliver on‑budget, high‑quality
    finishes while eyeing a transition to a small green‑building contracting firm.
  sports: Jacob Bowden hits the waves at Redondo Beach during the summer, joins a
    weekend surf‑club crew, casts a line for late‑afternoon fishing in the Pacific,
    and roots for the Los Angeles Dodgers and Lakers while occasionally playing pickup
    basketball at the community center to keep his reflexes sharp.
  arts: Jacob Bowden strums battered acoustic versions of The Doors and Fleetwood
    Mac while snapping golden‑hour coastal photographs, frequently visits the LA Art
    Show to admire surf‑inspired murals by artists such as Todd Hido, and curates
    his own wall of vintage car posters that double as creative inspiration.
  travel: Jacob Bowden prefers spontaneous yet well‑planned road trips along the Pacific
    Coast Highway, with frequent stops at Joshua Tree and Big Sur for surf and photography,
    yearly weekend getaways to Baja California for fishing, and a dream of catching
    waves in Hossegor, France, balanced by a modest travel budget that favors campgrounds
    and budget motels.
  culinary: Jacob Bowden enjoys grill‑cooked mahi‑mahi tacos topped with fresh cilantro
    and lime, whips up a hearty backyard barbecue with marinated ribs and corn on
    the cob, and, despite a modest cooking skill level, delights in tossing rosemary
    and lavender from his succulent garden into occasional roasted vegetable medleys.
  core: Jacob Bowden is a pragmatic yet curious 58‑year‑old painter‑turned‑aspiring
    contractor who balances surf‑driven solitude with competitive craftsmanship, eco‑focused
    business ambitions, and a fondness for classic rock, vintage cars, and the coastal
    California lifestyle.
background:
  cultural: Jacob grew up in a middle‑class white working‑class family in Southern
    California, with his early years shaped by the region’s blend of coastal leisure
    and industrious trades culture. His upbringing emphasized self‑reliance, practical
    skills, and a laid‑back yet diligent attitude toward work. Living in Los Angeles
    County, he has absorbed the multicultural atmosphere—particularly the influence
    of Spanish‑influenced architecture and the growing environmental consciousness
    of the West Coast. Though divorced, he maintains strong ties with extended family
    and the local community, valuing independence while staying connected through
    neighborhood events and volunteer projects. His cultural identity merges traditional
    American work ethic with the progressive, eco‑aware mindset prevalent in contemporary
    Southern California.
attributes:
  skills: '[''surface preparation'', ''paint mixing'', ''colour matching'', ''brush
