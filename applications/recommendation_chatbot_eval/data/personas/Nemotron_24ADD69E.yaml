personas:
  professional: Velma Parekh, an aspiring junior architect, spends playtime assembling
    Lego houses, eagerly experimenting with new designs while insisting on sturdy
    foundations, and they often help peers tidy up their scattered bricks, reflecting
    a balance of curiosity and practicality.
  sports: Velma Parekh, a member of the Rainbow Sprouts Preschool Soccer Club, darts
    across the playground chasing a bright orange ball while cheering for the New
    York Knicks during family basketball nights, and they prefer the rhythmic flow
    of toddler gymnastics over competitive sports.
  arts: Velma Parekh, an enthusiastic fan of The Wiggles and Sesame Street, spends
    afternoons dancing to "Hot Potato" and lovingly recreating scenes from Mister
    Rogers' Neighborhood in their crayons, and they enjoy singing along, fueling their
    imagination and reinforcing their gentle, cooperative nature.
  travel: Velma Parekh, an adventurous stroller-rider, delights in weekend road trips
    to the nearby botanical garden and eagerly anticipates a future family vacation
    to Disneyland Paris, and they prefer journeys that blend familiar routines with
    a sprinkle of new sights.
  culinary: Velma Parekh, a budding kitchen helper, loves scooping spoonfuls of creamy
    mac and cheese seasoned with a pinch of paprika and spreading peanut butter on
    jelly-laden bread, though they often forget to wash their hands before meals,
    leading to occasional sticky fingers.
  core: Velma Parekh, a curious four-year-old who builds Lego towers with meticulous
    bases yet leaves toys scattered, they worry about the tiniest cracks, and they
    brighten every room with a shy smile and generous sharing.
background:
  cultural: Velma comes from a white, middle‑class family living in the suburban community
    of Euless, Texas. Her upbringing reflects a blend of traditional American values
    and the distinctive Texan culture of the Dallas‑Fort Worth metroplex, including
    community gatherings, holiday celebrations, and a strong emphasis on friendliness
    and neighborly support. Her family participates in local events such as the Euless
    Summer Festival and enjoys regional foods like barbecue, while also exposing her
    to diverse cultural experiences through the city's multicultural schools and community
    programs.
