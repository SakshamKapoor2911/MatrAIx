  career_goals: Although only two years old, John enjoys mimicking the adults around
    him and already expresses simple aspirations. He loves watching construction trucks
    and often says he wants to 'build big houses' like the ones he sees on TV. He
    also admires firefighters and sometimes says he wants to be a 'firefighter' when
    he grows up. His preference for routine and practical tasks leads him to imagine
    future roles that involve hands‑on building, fixing, and helping, such as a construction
    worker, mechanic, or community helper.
