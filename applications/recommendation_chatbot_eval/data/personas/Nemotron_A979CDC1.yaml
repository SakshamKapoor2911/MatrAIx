personas:
  professional: John Garrity is a budding early‑childhood educator‑in‑training who
    loves sorting blocks by color and size, embodying a practical, routine‑oriented
    mindset, a reliable yet flexible attitude, and a balanced mix of cooperation and
    assertiveness that hints at future talents in teaching or design.
  sports: John Garrity enjoys splash‑pad water play at Ridgefield Lakes in summer
    and participates in the Kennewick Youth Soccer Club’s “Tiny Tots” T‑ball program
    in spring, cheering for the Seattle Seahawks during weekend game viewings while
    balancing boisterous runs with quiet moments on the playground swings.
  arts: John Garrity delights in weekly library storytime, sings loudly to the Sesame
    Street theme, and mimics the bright illustrations of Eric Carle’s “The Very Hungry
    Caterpillar” by drawing bold butterflies, showing how early exposure to music
    and visual art shapes their playful identity.
  travel: John Garrity has explored the Columbia River’s banks on family picnics,
    marveled at the towering Grand Coulee Dam during a day‑trip, and eagerly anticipates
    a future visit to Disneyland, preferring well‑planned itineraries with familiar
    rest stops like the local ice‑cream stand.
  culinary: John Garrity prefers soft cheese pizza bites, buttery mac and cheese,
    honey‑glazed carrots, and sweet blueberry pancakes, often helping stir banana‑banana
    smoothies with a wooden spoon, though they stubbornly refuse peas, reflecting
    a typical toddler palate.
  core: John Garrity thrives on daily routines, arranges toys meticulously, bursts
    with boundless energy at the park, yet can erupt into a dramatic tantrum when
    a favorite blanket goes missing, revealing a charming blend of order‑loving practicality
    and toddler spontaneity.
background:
  cultural: John is raised in a typical white, middle‑class family in Kennewick, Washington,
    part of the Columbia Basin region. His upbringing reflects the Pacific Northwest’s
    blend of agricultural heritage and suburban life. He attends a local early‑learning
    center where he participates in community events such as the Benton County Fair,
    seasonal holiday celebrations like Thanksgiving and Fourth of July fireworks,
    and occasional church or community‑center gatherings. The family values practicality,
    routine, and outdoor activities, often visiting nearby parks and the Columbia
    River for family outings.
