  career_goals: Qiao aims to forge a career that blends creativity with people‑focused
    work, such as community outreach, marketing, or event planning. She wants to leverage
    her communication strengths to design compelling campaigns and memorable experiences
    while maintaining a flexible schedule that respects her love for spontaneity.
    In the next few years, she plans to pursue a bachelor's degree in communications
    or marketing, gain hands‑on experience through internships at local agencies,
    and eventually launch her own boutique event‑management consultancy that serves
    culturally diverse communities.
