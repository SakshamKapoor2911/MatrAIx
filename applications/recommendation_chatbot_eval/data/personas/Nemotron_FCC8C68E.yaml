personas:
  professional: Melchor Salas, an aspiring young game developer, merges a love for
    comic storytelling with Scratch programming to prototype interactive adventures,
    using their vivid imagination and detail‑oriented mindset to sketch storyboards,
    design LEGO‑inspired levels, and iteratively improve projects while competitively
    challenging classmates' creations.
  sports: Melchor Salas, a member of the Sullivan City youth soccer team and an avid
    fan of the Dallas Cowboys and Houston Rockets, spends weekends honing soccer skills,
    biking local trails, and engaging in quick home workouts inspired by favorite
    athletes, balancing a competitive drive with occasional relaxed play.
  arts: Melchor Salas, a budding comic artist who sketches fantastical creatures drawn
    from local folklore, devotes free time to refining panel layouts, studying the
    techniques of comic masters like Jim Lee, and drawing inspiration from the music
    of Bad Bunny and the indie sounds of Tame Impala, which shape the mood of their
    creations.
  travel: Melchor Salas, an enthusiastic explorer, enjoys day trips to natural gems
    like Big Bend National Park and South Padre Island and dreams of future visits
    to historic Prague and futuristic Tokyo, planning each outing with a mix of careful
    research and spontaneous curiosity.
  culinary: Melchor Salas, a novice cook with growing confidence, loves whipping up
    cheesy quesadillas with fresh cilantro, crafting simple spaghetti carbonara using
    pancetta and Parmesan, and experimenting with pizza night toppings such as pineapple
    and jalapeño.
  core: Melchor Salas channels vivid imagination and a competitive spirit into drawing,
    coding, and building, while navigating intense emotions through mindfulness, a
    modest allowance strategy, and a love for eclectic music and adventure.
background:
  cultural: Melchor is a Mexican‑American raised in a bilingual household where Spanish
    is spoken at home and English at school. He participates in cultural traditions
    such as Día de los Muertos, enjoys family meals featuring tamales and arroz con
    pollo, and incorporates motifs from Mexican folklore—like alebrijes and La Llorona—into
    his artwork. Living in the border town of Sullivan City, Texas, he experiences
    a blend of Texan and Mexican influences, shaping his language, values of family
    solidarity, and artistic sensibility.
