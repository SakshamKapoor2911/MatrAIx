  career_goals: He aspires to become a concept artist or graphic novelist, creating
    worlds that merge Mexican folklore with futuristic themes. He also dreams of designing
    interactive robotics installations, hoping to win regional science fairs and art
    competitions. Ultimately, he wants to channel his creativity into projects that
    inspire other young people coping with anxiety, using his art to tell empowering
    stories.
