  hobbies: '[''Digital illustration'', ''Reading speculative fiction and philosophy'',
    ''Podcast listening (technology, design, art)'', ''Hiking on Monte Sano trails'',
    ''Cooking traditional Mexican dishes'', ''Strategic video gaming'']'
  career_goals: Christopher aims to transform his self‑directed skill set into a professional
    pathway within the next two years. He plans to enroll in a community‑college associate
    program in Digital Media or Computer Science, followed by certification in UX/UI
    design. His ultimate ambition is to launch a freelance studio that blends Mexican
    cultural motifs with modern digital branding for small businesses and community
    events, positioning himself as a niche specialist. He also envisions contributing
    to tech‑driven cultural projects, such as interactive museum exhibits that highlight
    Latin American art. To support these goals, he is targeting a junior web‑developer
    role or an internship that offers real‑world experience while allowing him to
    work independently and meet performance metrics that satisfy his competitive drive.
