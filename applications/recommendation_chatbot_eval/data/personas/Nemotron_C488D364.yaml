  career_goals: In the short term, Janell aims to maintain a high GPA, earn honors
    and scholarship eligibility, and expand her leadership experience through student
    council initiatives and community service projects. She plans to take advanced
    STEM courses and participate in regional science fairs to deepen her curiosity
    about the natural world. Long‑term, she envisions a career that blends scientific
    inquiry with practical impact, such as wildlife biology, environmental science,
    or veterinary medicine, allowing her to protect local ecosystems and serve the
    rural community she loves. She also hopes to eventually lead community‑based conservation
    programs, leveraging her organizational talents to bring new ideas into established
    local practices.
