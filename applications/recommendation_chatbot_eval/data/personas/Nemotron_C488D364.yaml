personas:
  professional: A disciplined teen technophile, Janell Porterfield channels their
    curiosity and organization into developing Python projects, performing in school
    drama, and leading the midfield on the soccer team, showcasing a blend of practical
    problem‑solving and creative expression.
  sports: An avid soccer athlete, Janell Porterfield plays forward for the Riverside
    Middle School team and trains with the Adirondack United Youth Soccer Club, while
    also hiking the foothills of the Adirondacks on weekends and cheering for the
    New York Knicks and Buffalo Bills.
  arts: A multifaceted creator, Janell Porterfield delights in playing Beethoven's
    Moonlight Sonata on piano, starring in the school production of The Crucible,
    editing event videos with fast cuts, and snapping candid shots inspired by Annie
    Leibovitz, all while listening to Billie Eilish on repeat.
  travel: An adventurous explorer, Janell Porterfield prefers weekend day trips to
    Lake Placid and the Catskills, has visited New York City's Central Park and the
    Museum of Natural History, and dreams of trekking the Grand Canyon's South Rim
    next summer.
  culinary: A budding home chef, Janell Porterfield loves crafting homemade pepperoni
    pizza, mastering a simple chicken teriyaki stir‑fry, and perfecting chocolate
    chip cookies, often experimenting with fresh basil from the school garden.
  core: Janell Porterfield blends relentless organization with a love for group activities,
    juggling coding, drama, soccer, and spontaneous video projects while occasionally
    hoarding snack wrappers in their locker.
background:
  cultural: 'Janell is a White American raised in Sherburne, a small town in Chenango
    County, New York. Her family embraces the values common to upstate rural communities:
    self‑reliance, close‑knit neighborhood ties, and a strong emphasis on education
    and community involvement. Seasonal town events like the county fair, local farmers''
    markets, and church gatherings shape her sense of belonging. These cultural influences
    combine with a respect for tradition and an openness to new ideas, fostering her
    balanced, pragmatic curiosity.'
