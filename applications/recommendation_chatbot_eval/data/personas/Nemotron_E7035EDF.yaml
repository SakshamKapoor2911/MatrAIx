    Max/MSP)'', ''Interdisciplinary workshop facilitation'', ''Public speaking'']'
  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Experimental music
    composition'', ''Improv theater'', ''Tabletop RPGs'', ''Puzzle solving (Escape
    rooms, Sudoku)'', ''Hiking'', ''Independent film appreciation'', ''Speculative
    fiction reading'', ''Popular science reading'', ''Volunteer STEM outreach'', ''Cooking
    new cuisines'', ''Mindfulness meditation'', ''Community maker workshops'']'
  career_goals: He aims to re‑enter the professional world by creating a part‑time
    role that leverages both his scientific and artistic strengths. His primary goal
    is to launch a community‑centered makerspace in Rochester that offers interdisciplinary
    workshops, ranging from data‑driven art to DIY science kits for adults and teens.
    He also hopes to secure a grant from a regional arts‑science foundation to produce
    a series of illustrated graphic novels that demystify quantum physics for a general
    audience. Over the next five years, he envisions becoming a recognized thought‑leader
    at the intersection of STEM and visual culture, and he seeks to mentor emerging
    creators while building a sustainable income stream that supports his mental‑health
    needs.
