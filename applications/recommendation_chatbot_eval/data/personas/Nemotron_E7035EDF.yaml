personas:
  professional: Julio Simmons, a 49‑year‑old interdisciplinary facilitator, fuses
    quantitative modeling with visual storytelling, leveraging Python, MATLAB, and
    creative coding to design immersive workshops that blend data‑driven art and DIY
    science, while their competitive drive pushes them to secure grant funding and
    position themselves as a thought‑leader at the crossroads of STEM and visual culture.
  sports: Julio Simmons, an avid hiker of the Finger Lakes region, spends weekends
    trekking the Watkins Glen trails, while also cheering for the Rochester Red Wings
    and the Rochester Americans; they play in a co‑ed ultimate frisbee league at South
    Wedge Park, and during the summer join a community cycling group that rides the
    Erie Canal towpath, balancing their desire for group activity with a competitive
    edge that drives them to improve lap times.
  arts: 'Julio Simmons immerses themselves in a spectrum of creative expression: they
    paint vivid acrylic landscapes inspired by the Finger Lakes, craft digital illustrations
    using p5.js, compose ambient textures on a modular synth that echo Brian Eno’s
    soundscapes, and perform improv with the Rochester Fringe troupe, drawing inspiration
    from the surrealist works of Yayoi Kusama and the narrative pacing of graphic
    novelists like Alan Moore when planning their upcoming quantum‑physics graphic
    series.'
  travel: 'Julio Simmons favours purposeful travel that feeds both curiosity and community:
    they have explored the Adirondack park’s remote cabins, visited the immersive
    art installations at the Museum of Modern Art in New York City, and taken a weekend
    trip to Portland, Maine for its vibrant maker festivals; their wish list includes
    a pilgrimage to Kyoto’s art cafés and the annual Burning Man gathering, which
    they view as a chance to test interdisciplinary installations among kindred creators,
    though budget constraints keep most trips regional.'
  culinary: 'Julio Simmons approaches cooking as an experimental lab: they love perfecting
    a miso‑glazed black cod, mastering sous‑vide duck breast with a cherry‑balsamic
    reduction, and blending spices for a homemade Sichuan pepper‑infused chocolate
    truffle, while their skill level ranges from confident home‑chef to occasional
    disaster when a complex fermentation process goes awry; they frequently source
    heirloom tomatoes from the Finger Lakes farmers'' market and keep a well‑stocked
    pantry of agar‑agar, kelp powder, and fresh herbs.'
  core: Julio Simmons is a 49‑year‑old restless polymath whose analytical mind fuels
    bold artistic experiments, yet anxiety and a competitive streak often drive them
    between bursts of creative brilliance and bouts of self‑critical burnout.
background:
  cultural: Julio was raised in Rochester, New York, in a middle‑class family of German‑Irish
    descent. His parents worked in the city’s manufacturing and healthcare sectors,
    exposing him early to both the technical rigor of engineering and the craftsmanship
    of artisanal trades. Rochester’s rich cultural landscape—home to the George Eastman
    Museum, the Strong National Museum of Play, and a vibrant live‑music scene—instilled
    in him a deep appreciation for the arts alongside his scientific interests. He
    identifies with progressive Midwestern values that emphasize education, self‑reliance,
    and community participation, while also embracing the region’s commitment to social
    equity and environmental stewardship. This blend of industrial heritage, artistic
    vibrancy, and inclusive civic culture has shaped his worldview and informs his
    interdisciplinary pursuits.
attributes:
  skills: '[''Computational modeling'', ''Statistical data analysis'', ''Python programming'',
    ''MATLAB'', ''R programming'', ''Scientific writing'', ''Curriculum design'',
