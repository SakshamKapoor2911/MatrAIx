version = "1.0"
artifacts = ["/app/output"]

[task]
name = "matraix/application-chatbot-chat-api"

[metadata]
difficulty = "medium"
type = "chat"
domain = "chatbot-applications"
tags = [
  "chatbot application",
  "persona evaluation",
  "application api",
  "multi turn chat",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 3600.0
cpus = 4
memory_mb = 12288
storage_mb = 40960
gpus = 0
