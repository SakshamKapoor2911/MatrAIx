version = "1.0"
artifacts = ["/app/output"]

[task]
name = "matraix/application-recommender-agent-chat-api"

[metadata]
difficulty = "medium"
type = "chat"
domain = "recommendation-systems"
tags = [
  "recommender agent",
  "conversational recommendation",
  "recai",
  "interecagent",
  "multi turn chat",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 3600.0
cpus = 4
memory_mb = 8192
storage_mb = 40960
gpus = 0
